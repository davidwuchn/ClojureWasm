    note: "D-399: reduce→IReduce/-reduce. `reduce`'s fast-path (higher_order.zig D-069) already dispatches -reduce on a typed_instance, so a custom reducible deftype reduces via its own impl — a REAL win. The 3-arg (self f init) impl shares -reduce via D-279 multi-arity."
