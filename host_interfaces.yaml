    note: "D-271 / D-280d7: a deftype may declare IMeta SEPARATELY from IObj (instaparse's AutoFlattenSeq: IObj withMeta + IMeta meta). meta→IObj/-meta, mirroring IObj's meta. Load-level (registers; `meta` fn consulting -meta for a typed_instance is the IObj follow-up)."
