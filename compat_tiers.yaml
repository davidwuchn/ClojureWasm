# cw v1 compatibility tier data — single source of truth for tier classification.
# Used by:
#   - test runner (test/clj/ for Tier A 100% PASS gate)
#   - REPL error message ("Tier D: <reason>, see ADR-NNNN")
#   - future `cljw --list-vars` command
#   - future `cljw --list-host-classes` command (planned Phase 14, ADR-0029 D5)
#   - G3 gate scripts/check_feature_keyword.sh (per ADR-0029 D4)
# Amendment: see ADR-0013 for Tier D rationale.
#
# host_classes schema (extended per ADR-0029 D5, 2026-05-24):
#   - fqn: java.<pkg>.<Class>
#     cljw_ns: cljw.java.<pkg>.<Class>       # was native_ns: cljw.host.* — host. prefix retired
#     keyword: <short-keyword>                # validated by G3 against files: paths
#     tier: A | B | C | D
#     phase: <int>
#     files:                                  # validated by G3 (wrap: slot is exempt)
#       surface: runtime/java/<pkg>/<Class>.zig
#       impl: runtime/<keyword>.zig           # or runtime/<feature-subdir>/<file>.zig
#       impl_extras: [runtime/<sub>/...]      # additional sub-impls
#       wrap: runtime/collection/<...>.zig    # value-wrap helper (exempt from G3)
#       clojure_peer: lang/primitive/<...>.zig  # optional; "null" if no peer
#     methods: [list, of, instance, methods]
#     clojure_peer_vars: [list, of, clojure, ns/vars]
#     status: <free text>   # optional; marks a TypeDescriptor-only
#                           # reservation whose backing impl is deferred (D-105/D-106)
#
# Entry migration to the extended schema is INCREMENTAL — each host class
# landing in Phase 6+ ships its entry in the new schema in the same
# commit. The legacy `{fqn, native_ns, phase}` shape (28 entries below)
# remains readable during the transition and migrates as the
# corresponding host class lands. Migrated 2026-05-29 (row 14.13):
# every class with a shipped runtime/java/**/*.zig surface now carries
# the D5 schema; the remaining legacy one-liners have no surface yet
# (pure reservations).

version: 0.1.1-draft
last_updated: 2026-05-29

tiers:
  A:
    description: "Full JVM Clojure semantic equivalence. Test gate: 100% PASS."
    target_phase: "5-7 (clojure.core core), 8 (clojure.test full); spec.alpha/math deferred post-v0.1.0 (F-010)"
    namespaces:
      clojure.core:
        # Counted from JVM clojure source (task 4.15):
        # - src/clj/clojure/core.clj           ≈ 601 (def / defn / defn-
        #   / defmacro / defmulti / defprotocol forms)
        # - src/clj/clojure/core_deftype.clj   ≈  39
        # - src/clj/clojure/core_print.clj     ≈  16
        # - src/clj/clojure/core_proxy.clj     ≈  15
        # - special-form Vars registered in clojure.core by RT.java /
        #   Compiler.java (if / do / let* / fn* / def / quote / var /
        #   loop* / recur / try / catch / finally / throw / new /
        #   set! / monitor-enter / monitor-exit / dot / .) ≈ 30
        # - subtract Tier D forms in clojure.core (gen-class /
        #   gen-interface / compile / proxy (deep) / bean
        #   (reflection-deep)) = 5
        # Net target ≈ 700; exact figure firms up as primitives land
        # and the analyser's var registry is the authoritative source.
        var_count_target: 700
      clojure.string:
        var_count_target: 21
      clojure.set:
        var_count_target: 12
      clojure.walk:
        var_count_target: 10
      clojure.zip:
        # Comprehensively implemented (src/lang/clj/clojure/zip.clj, 37
        # defs incl. private helpers; ~28 JVM-public-surface vars) +
        # e2e-tested (test/e2e/phase7_zip_cycle1-4 + exit_smoke). Stays
        # Tier A: cw v1's A/B split is comprehensive-impl (A) vs
        # minimum-surface (B); zip is comprehensive, so down-tiering to B
        # would mis-signal "minimum surface". Count is JVM-public-surface.
        var_count_target: 28
      clojure.test:
        var_count_target: 39
    special_forms:
      # Phase 1-3 existing (14 slots):
      #   if, do, let*, fn*, def, quote, var, the, loop*, recur, try*,
      #   catch, finally, throw
      # V2 added (10 slots per ADR-0004 amendment + ADR-0012 ValueTag connection):
      #   deftype, defrecord, reify, definterface, dot, new, set!,
      #   monitor-enter, monitor-exit, dosync
      # Total: 24 slots; ADR-0004 amendment reserves at least these.
      - if
      - do
      - let*
      - fn*
      - def
      - quote
      - var
      - the
      - loop*
      - recur
      - try*
      - catch
      - finally
      - throw
      - deftype
      - defrecord
      - reify
      - definterface
      - dot           # (.method obj args)
      - new           # (new ClassName args)
      - set!          # mutable field assignment (deftype volatile-mutable only)
      - monitor-enter
      - monitor-exit
      - dosync        # STM transaction
    host_classes:
      # Top-40 Java stdlib classes per ADR-0011 (the corpus references
      # 578 distinct java.* classes; the top 40 cover most production
      # Clojure I/O, time, networking, and data formatting). Phase
      # column = first phase at which the cw-native equivalent lands.
      # All entries are Tier A. The legacy `native_ns: cljw.host.*`
      # field below is the pre-ADR-0029 schema; the ADR-0029 D5
      # replacement is `cljw_ns: cljw.java.*` (host. prefix retired)
      # plus `keyword:` + `files:`. Migration is per-class as each surface
      # lands (row 14.13, 2026-05-29): every class with a shipped
      # runtime/java/**/*.zig surface is now D5; the remaining legacy
      # one-liners have no surface yet (pure reservations).
      # java.lang
      - { fqn: "java.lang.Object",                       native_ns: "cljw.host.java.lang.Object",                       phase: 5 }
      - { fqn: "java.lang.String",                       native_ns: "cljw.host.java.lang.String",                       phase: 5 }
      - fqn: java.lang.Long
        cljw_ns: cljw.java.lang.Long
        keyword: long
        tier: A
        phase: 14
        files:
          surface: runtime/java/lang/Long.zig
        methods: [parseLong, valueOf, toBinaryString, toHexString, toOctalString]
        clojure_peer_vars: [parse-long]
      - fqn: java.lang.Integer
        cljw_ns: cljw.java.lang.Integer
        keyword: integer
        tier: A
        phase: 14
        files:
          surface: runtime/java/lang/Integer.zig
        methods: [parseInt, valueOf, toBinaryString, toHexString, toOctalString]
        clojure_peer_vars: [parse-long]
      - { fqn: "java.lang.Double",                       native_ns: "cljw.host.java.lang.Double",                       phase: 5 }
      - { fqn: "java.lang.Boolean",                      native_ns: "cljw.host.java.lang.Boolean",                      phase: 5 }
      - fqn: java.lang.Math
        cljw_ns: cljw.java.lang.Math
        keyword: math
        tier: A
        phase: 14
        files:
          surface: runtime/java/lang/Math.zig
        methods: [abs, sqrt, floor, ceil, round, pow, min, max]
        clojure_peer_vars: []
      - fqn: java.lang.System
        cljw_ns: cljw.java.lang.System
        keyword: clock
        tier: A
        phase: 6
        files:
          surface: runtime/java/lang/System.zig
          impl: runtime/clock.zig
        methods: [currentTimeMillis, nanoTime]
        clojure_peer_vars: []
      - { fqn: "java.lang.Throwable",                    native_ns: "cljw.host.java.lang.Throwable",                    phase: 5 }
      - { fqn: "java.lang.Exception",                    native_ns: "cljw.host.java.lang.Exception",                    phase: 5 }
      - { fqn: "java.lang.Thread",                       native_ns: "cljw.host.java.lang.Thread",                       phase: 14 }
      # java.io
      - fqn: java.io.File
        cljw_ns: cljw.java.io.File
        keyword: file_io
        tier: A
        phase: 6
        files:
          surface: runtime/java/io/File.zig
          impl: runtime/file_io.zig
          clojure_peer: lang/primitive/file_io.zig
        methods: [exists, length, getName, getPath]
        clojure_peer_vars: [clojure.core/slurp, clojure.core/spit]
      - { fqn: "java.io.InputStream",                    native_ns: "cljw.host.java.io.InputStream",                    phase: 6 }
      - { fqn: "java.io.OutputStream",                   native_ns: "cljw.host.java.io.OutputStream",                   phase: 6 }
      - { fqn: "java.io.Reader",                         native_ns: "cljw.host.java.io.Reader",                         phase: 6 }
      - { fqn: "java.io.Writer",                         native_ns: "cljw.host.java.io.Writer",                         phase: 6 }
      - { fqn: "java.io.ByteArrayInputStream",           native_ns: "cljw.host.java.io.ByteArrayInputStream",           phase: 6 }
      - { fqn: "java.io.ByteArrayOutputStream",          native_ns: "cljw.host.java.io.ByteArrayOutputStream",          phase: 6 }
      - { fqn: "java.io.PrintWriter",                    native_ns: "cljw.host.java.io.PrintWriter",                    phase: 6 }
      # java.util
      - fqn: java.util.UUID
        cljw_ns: cljw.java.util.UUID
        keyword: uuid
        tier: A
        phase: 6
        files:
          surface: runtime/java/util/UUID.zig
          impl: runtime/uuid.zig
          clojure_peer: lang/primitive/uuid.zig
        methods: [randomUUID, fromString, toString]
        clojure_peer_vars: [clojure.core/random-uuid, clojure.core/parse-uuid]
      - fqn: java.util.Date
        cljw_ns: cljw.java.util.Date
        keyword: instant
        tier: A
        phase: 6
        files:
          surface: runtime/java/util/Date.zig
          impl: runtime/time/instant.zig
        methods: [getTime, setTime, toString, toInstant]
        clojure_peer_vars: []
      - fqn: java.util.Random
        cljw_ns: cljw.java.util.Random
        keyword: random
        tier: A
        phase: 6
        files:
          surface: runtime/java/util/Random.zig
          impl: runtime/random.zig
        methods: [nextInt, nextLong, nextDouble, setSeed]
        clojure_peer_vars: []
      - { fqn: "java.util.Locale",                       native_ns: "cljw.host.java.util.Locale",                       phase: 6 }
      - fqn: java.util.regex.Pattern
        cljw_ns: cljw.java.util.regex.Pattern
        keyword: regex
        tier: A
        phase: 6
        files:
          surface: runtime/java/util/regex/Pattern.zig
          impl: runtime/regex/compile.zig
          impl_extras: [runtime/regex/match.zig]
          clojure_peer: lang/primitive/regex.zig
        methods: [compile, matcher, pattern, quote]
        clojure_peer_vars: [clojure.core/re-pattern, clojure.core/re-find, clojure.core/re-matches, clojure.core/re-seq, clojure.core/re-groups, clojure.string/replace, clojure.string/split]
      - fqn: java.util.regex.Matcher
        cljw_ns: cljw.java.util.regex.Matcher
        keyword: regex
        tier: A
        phase: 14
        files:
          surface: runtime/java/util/regex/Matcher.zig
          impl: runtime/regex/match.zig
          clojure_peer: lang/primitive/regex.zig
        methods: [find, matches, group, groupCount, start, end]
        clojure_peer_vars: [clojure.core/re-find, clojure.core/re-matches, clojure.core/re-seq, clojure.core/re-groups]
      - { fqn: "java.util.concurrent.Future",            native_ns: "cljw.host.java.util.concurrent.Future",            phase: 14 }
      - { fqn: "java.util.concurrent.atomic.AtomicLong", native_ns: "cljw.host.java.util.concurrent.atomic.AtomicLong", phase: 15 }
      # java.time
      - fqn: java.time.Instant
        cljw_ns: cljw.java.time.Instant
        keyword: instant
        tier: A
        phase: 6
        files:
          surface: runtime/java/time/Instant.zig
          impl: runtime/time/instant.zig
        methods: [now, toEpochMilli, getEpochSecond, getNano, parse]
        clojure_peer_vars: []
      - { fqn: "java.time.LocalDate",                    native_ns: "cljw.host.java.time.LocalDate",                    phase: 6 }
      - fqn: java.time.LocalDateTime
        cljw_ns: cljw.java.time.LocalDateTime
        keyword: time
        tier: A
        phase: 14
        files:
          surface: runtime/java/time/LocalDateTime.zig
        methods: [now, of, parse, plusDays, toLocalDate, toLocalTime]
        clojure_peer_vars: []
        status: "reservation - TypeDescriptor only; backing runtime/time/local_date_time.zig deferred (D-105)"
      - fqn: java.time.Duration
        cljw_ns: cljw.java.time.Duration
        keyword: time
        tier: A
        phase: 14
        files:
          surface: runtime/java/time/Duration.zig
        methods: [between, ofMillis, ofSeconds, plus, minus, toMillis, toNanos]
        clojure_peer_vars: []
        status: "reservation - TypeDescriptor only; backing deferred (D-105)"
      - fqn: java.time.ZonedDateTime
        cljw_ns: cljw.java.time.ZonedDateTime
        keyword: time
        tier: A
        phase: 14
        files:
          surface: runtime/java/time/ZonedDateTime.zig
        methods: [now, of, parse, withZoneSameInstant, toInstant]
        clojure_peer_vars: []
        status: "reservation - TypeDescriptor only; backing deferred (D-105)"
      - { fqn: "java.time.ZoneId",                       native_ns: "cljw.host.java.time.ZoneId",                       phase: 6 }
      # java.net
      - { fqn: "java.net.URL",                           native_ns: "cljw.host.java.net.URL",                           phase: 14 }
      - { fqn: "java.net.URI",                           native_ns: "cljw.host.java.net.URI",                           phase: 14 }
      - fqn: java.net.Socket
        cljw_ns: cljw.java.net.Socket
        keyword: net
        tier: A
        phase: 14
        files:
          surface: runtime/java/net/Socket.zig
        methods: [connect, getInputStream, getOutputStream, close]
        clojure_peer_vars: []
        status: "reservation - TypeDescriptor only; backing runtime/net/socket.zig deferred (D-106)"
      # java.nio
      - { fqn: "java.nio.file.Path",                     native_ns: "cljw.host.java.nio.file.Path",                     phase: 6 }
      - { fqn: "java.nio.file.Files",                    native_ns: "cljw.host.java.nio.file.Files",                    phase: 6 }
      - { fqn: "java.nio.charset.Charset",               native_ns: "cljw.host.java.nio.charset.Charset",               phase: 6 }
      # java.math
      - { fqn: "java.math.BigInteger",                   native_ns: "cljw.host.java.math.BigInteger",                   phase: 5 }
      - fqn: java.math.BigDecimal
        cljw_ns: cljw.java.math.BigDecimal
        keyword: big_decimal
        tier: A
        phase: 5
        files:
          surface: runtime/java/math/BigDecimal.zig
          impl: runtime/numeric/big_decimal.zig
        methods: [valueOf, add, subtract, multiply, divide, toPlainString]
        clojure_peer_vars: [clojure.core/bigdec]
      # java.security
      - fqn: java.security.MessageDigest
        cljw_ns: cljw.java.security.MessageDigest
        keyword: digest
        tier: A
        phase: 14
        files:
          surface: runtime/java/security/MessageDigest.zig
        methods: [getInstance, update, digest, reset]
        clojure_peer_vars: []
        status: "reservation - TypeDescriptor only; backing runtime/crypto/message_digest.zig deferred (D-106)"
  B:
    description: "Recommended compatibility, target Phase 8-14. Test gate: coverage report (no fail required)."
    namespaces:
      # Implemented + bootstrap-loaded `.clj` (verified 2026-05-29 — each
      # was wrongly marked "planned"). Minimum surfaces; promote to fuller
      # coverage in the quality loop.
      clojure.edn:         { status: "implemented (read-string / read minimum surface)" }
      clojure.pprint:      { status: "implemented (pprint minimum surface)" }
      clojure.tools.cli:   { status: "implemented (parse-opts minimum surface)" }
      clojure.data.json:   { status: "implemented (read-str / write-str minimum surface)" }
      clojure.data.csv:    { status: "implemented (read-csv / write-csv; DIVERGENCE — write-csv cells must be strings)" }
      # Still planned (not yet implemented / verified):
      clojure.data:        { status: "planned (clojure.data/diff)" }
      clojure.java.io:     { status: "planned (cw-native rewrite)" }
      clojure.java.shell:  { status: "planned" }
      # Down-tiered from A 2026-05-29: these were declared Tier A
      # ("100% PASS gate") but are UNIMPLEMENTED at v0.1.0 — no math.clj,
      # no spec/ directory (verified). Their math/spec surfaces are
      # post-v0.1.0 quality-loop work (F-010), not a v0.1.0 Tier A peer of
      # JVM Clojure. cw v1 math fns currently live in clojure.core.
      clojure.math:           { status: "deferred (post-v0.1.0 quality loop, F-010; unimplemented)" }
      clojure.spec.alpha:     { status: "deferred (post-v0.1.0 quality loop, F-010; unimplemented)" }
      clojure.spec.gen.alpha: { status: "deferred (post-v0.1.0 quality loop, F-010; unimplemented)" }
  C:
    description: "Thin reflective implementation via TypeDescriptor walk."
    special_forms:
      - bean
      - supers
      - bases
      - memfn
      - class?
  D:
    description: "Permanent exclusion. MAJOR release required to add."
    rationale_adr: "ADR-0013"
    excluded_special_forms:
      - { name: "gen-class",       reason: "requires JVM Class system, out of cw scope" }
      - { name: "gen-interface",   reason: "requires JVM Class system, out of cw scope" }
      - { name: "compile",         reason: "JVM bytecode emission, out of cw scope" }
      - { name: "proxy (deep)",    reason: "proxy targeting Apache HC / Swing / java.util.logging base classes (per excluded_proxy_targets below); other proxy uses go through reify against cw-native protocols and are Tier A" }
      - { name: "bean (reflection-deep)", reason: "deep reflection beyond what TypeDescriptor exposes; basic field walk via TypeDescriptor stays Tier C" }
    excluded_proxy_targets:
      - { pattern: "java.awt.*",                        reason: "GUI base classes, out of cw scope" }
      - { pattern: "javax.swing.*",                     reason: "GUI base classes, out of cw scope" }
      - { pattern: "Apache HttpComponents base classes", reason: "deep Java extension, replaced by cw native HTTP (Phase 14)" }
      - { pattern: "java.util.logging.Formatter / Handler", reason: "host-specific logging base, replaced by cw logger" }
    excluded_java_packages:
      - { pattern: "java.awt.*",                  reason: "GUI, out of cw scope" }
      - { pattern: "javax.swing.*",               reason: "GUI, out of cw scope" }
      - { pattern: "java.applet.*",               reason: "deprecated, out of cw scope" }
      - { pattern: "java.lang.reflect.* (deep)",  reason: "reflection internals beyond what TypeDescriptor exposes (Method/Field surface stays Tier C via src/runtime/host/reflect/)" }
