    status: "open (2026-06-16, observed while perf-probing the D-448 fix). The leftmost `re-find` scan (match.zig findFrom/scanFrom) retries `tryMatchAt` at EVERY start position; on a long input where no match exists (or the prefilter can't skip because the input is all in the leading-byte set), this is O(n²·m). Measured: `(re-find #\"(a*)*c\" \"aaaa…\")` on 50k a's (no `c`) = 63s; `(re-find #\"(a+)*c\" …)` (NO D-448 transform) = 36s on the same input — so this is the find-scan, INDEPENDENT of D-448 (a matching `(a*)*` on 50k a's is 0.01s = per-attempt O(n·m) is fine). Pre-existing; quadratic not exponential (Thompson, not a backtracker), and ADR-0031 notes regex is not the hot path."
    category: "perf"
    barrier: |-
      Not blocked. The leftmost-scan retries each start; the ADR-0147 lazy DFA is
      span-only and (for capture patterns) does not short-circuit the per-start
      Pike-VM retries on a non-matching all-prefilter-byte input. Finished form:
      a single forward DFA/NFA scan that finds the leftmost match start in one O(n)
      pass (then the Pike VM runs ONCE over the matched span for captures), or a
      reverse-scan start-finder — so `re-find` is O(n·m), not O(n²·m). Lower
      priority than correctness sweep items (pathological non-matching inputs only;
      real corpora don't hit it). Cross-ref ADR-0147 (lazy DFA), ADR-0031, D-448.
