134 re-amended 2026-06-12 after a user finished-form reconsideration caught a Progress-pressure/scope-escalation smell in 'do all 13 now'): the finished form is full metable-ness, but a substrate is made metable + admitted to IObj/IMeta membership WHEN A CONSUMER PULLS IT, never speculatively to chase clj-completeness. Membership grows by accretion (per-tag activation only once that tag is genuinely metable, so instance?⟹with-meta holds at every step); narrower-than-clj in the interim is an honest TRACKED gap (this row), NOT a permanent AD. The original bug ((with-meta (range 3) m)) is NICHE; the cross-zone fn-meta (tree_walk/multimethod/protocol) is high-effort/near-zero-value → LAST/if-pulled. NOTHING currently pulls the full change. First value-driven slice (when taken): resolve IObj/IMeta as values + membership for the already-metable tags (clears the name_error; the part datafy's guard exercises — though datafy has OTHER blockers too: class/.getName, host-class extends, clojure.reflect). Per-tag CLJW_GC_TORTURE with-meta-roundtrip corpus is the GC-trace-coverage mandate when a substrate is added. === CONSUMERS 2026-06-12 (P4 lib-load — TWO real consumers now pull the IObj/IMeta value-resolution+membership slice, so it is no longer purely speculative): (1) clojure.datafy — `(instance? clojure.lang.IObj v)` guard (has OTHER blockers too: class/.getName, host-class extends, clojure.reflect); (2) instaparse — instaparse.auto_flatten_seq is a deftype EXTENDING clojure.lang.IObj/IMeta (custom metable seq) + `(instance? clojure.lang.IObj obj)`; blocks at auto_flatten_seq.cljc:157 'Unable to resolve clojure.lang.IMeta'. instaparse's extend-type half ALSO needs the clojure.lang.* deftype-supertype recognition/remap (D-280 family), so wiring it = D-271 IObj/IMeta value+membership + D-280 IObj/IMeta supertype remap together. Next D-271 cycle: verify BOTH consumers (datafy guard + instaparse load) past the IMeta blocker."
