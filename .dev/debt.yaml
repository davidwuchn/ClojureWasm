  - id: "D-476"
    status: "DISCHARGED (7c40041f, verified 2026-06-23). The macro-shadow gate (nil-root marker check in expandIfMacro) + caseTest rt/or hygiene landed; a user/lib macro shadowing a builtin name now runs its own body. Verified: phase14_macro_shadow_builtin.sh + spec's s/or/s/and route correctly. ORIGINAL: open (2026-06-20). BUG: a user/lib macro that SHADOWS a builtin-macro NAME is hijacked by the builtin. `expandIfMacro` (src/eval/macro_dispatch.zig:107) looks up the Zig builtin-macro table by `head_name` (NAME only) BEFORE the user-defmacro fallback, so an alias/qualified call to a same-named macro in another ns runs the BUILTIN transform, not the resolved Var's own body. Repro: `(ns mylib (:refer-clojure :exclude [or])) (defmacro or [& xs] ...) (ns user (:require [mylib :as m])) (m/or 1 2)` → expands as clojure.core/or, NOT mylib/or (even `(mylib/or …)` fully-qualified; `(ns-resolve 'mylib 'or)` correctly returns #'mylib/or). Hits clojure.spec.alpha HARD: spec excludes + redefines `or`/`and`/`cat`/`keys`/`def`/`merge`; `s/or` mis-routes to core/or (returns the first label `:i`), `s/and` mis-routes to core/and (validates only the LAST pred — silently wrong, only LOOKED right for `(s/and int? pos?)` by coincidence). ATTEMPTED FIX (reverted 2026-06-20): gate the table lookup on the resolved Var being a nil-root MARKER (builtins are interned `.nil_val` in rt ns, registerInto; a user defmacro has a callable root) — the minimal repro then works (`m/or` → user body) and builtin or/and/case/cond regress-clean. BUT it cascaded: spec's macros then route through the callFn fallback, and a spec macro THROWS during expansion (`error.ThrownValue` at alpha.clj:1516, masked as 'foreign error' → now surfaced via @errorName), and `ExpandError = ClojureWasmError` does NOT include `error.ThrownValue`, so the throw cannot propagate (clj surfaces a macro-expansion throw as a compile error / lets the expanding code catch it). FULL LANDING (focused cycle) = (a) the nil-root gate (or a Var-pointer-identity gate vs the rt builtin), PLUS (b) widen the macro-expansion error channel to carry a user throw — add `error.ThrownValue` to ExpandError + thread it through the analyzer's expand call sites — AND (c) root-cause WHY a spec macro throws at expansion (the 1516 location is suspicious; renderer may mis-point). Keep the @errorName(e) diagnostic (strict improvement over the fixed 'foreign error' string). This is the LAST blocker for full s/or + strict s/and (D-475 is otherwise mostly-functional: load + s/cat/*/+/alt/coll-of/keys/conform/valid? all clj-verified via the 6 committed generic fixes). ROOT-CAUSE LEAD (for the focused cycle): spec.alpha's own `(defmacro …)` set that shadows a Zig builtin name = {`and`, `or`, `assert`} (verified via `comm` of spec defmacros ∩ the Zig BOOTSTRAP table; the wider {cat/keys/def/merge/fdef/…} are NOT Zig builtins so they always took the callFn fallback and are unaffected). Under the nil-root gate, bare `and`/`or`/`assert` in spec's ns route to spec's OWN macro via callFn. BUT all of spec's bare `and`/`or` uses are inside SYNTAX-QUOTE templates (describe* at 1125/1192; the `(spec (and …))` in int-in/inst-in/double-in macro bodies at 1902/1917/1930) — i.e. they are quoted SYMBOLS, not expanded at load — and there is no bare load-time `assert`. So the 1516 (`add-ret`, which uses only let/case/fn = nil-root builtins) throw should NOT happen by static reasoning → the error LOCATION is almost certainly mis-pointed (known renderer issue). The focused cycle should re-apply the gate + add a one-shot trace of (head_name, head_var.ns.name) at the callFn entry to find the ACTUAL throwing macro/site, rather than trust 1516. Likely candidate to check first: a builtin whose deref is unexpectedly callable, or a syntax-quote expansion path that evaluates a shadowed macro."
