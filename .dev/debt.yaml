  - id: "D-184"
    discharged_at: "DISCHARGED 2026-06-01 (ADR-0038 amendment, DA-fork): the clean fix WAS the structural one this row predicted. New `env.internDeclare` (register-if-absent, root untouched if present) replaces `analyzeDef`/`analyzeDefmacro`'s `intern(ΓÇ³nilΓÇ³)` so a def target's existing root is no longer reset at analyze time; `__make-multifn` then returns the existing MultiFn when `name` already resolves to one Γ¶Ê re-`defmulti` is a defonce-style no-op preserving `defmethod`s (`(defmulti a :s)(defmethod a :c [_] :circ)(defmulti a :s)(a {:s :c})`Γ¶Ê`:circ`). Bonus (JVM parity, the DA called it the direct F-011 consequence): a throwing re-`def` keeps the old value (`(def x 5)(def x (/ 1 0)) x`Γ¶Ê5). DA fork confirmed it a **spec-drift fix** (ADR-0038 already claimed the JVM error semantics the code violated), walked all 5 def cases correct, rejected the back-door wildcard. 4 e2e (phase14_redef) + phase7_multimethod case 6 + `--compare` OK; gated by 191 tests + diff oracle. Description below = pre-landing context."
