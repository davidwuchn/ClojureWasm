  - id: "D-160"
    discharged_at: "DISCHARGED 2026-06-01 (both halves): **`sequence`** pushŌåÆpull lazy bridge + **`eduction`** re-iterable `deftype` (ADR-0067) ŌĆö `eduction` is a `deftype Eduction [xform coll]` extending `IReduce` (`-reduce`ŌåÆ`transduce`, variadic for the 3-arg `into` path, `(completing f)` for arbitrary `f`) + `Seqable` (`-seq`ŌåÆ`sequence`), so it is re-iterable (counter xform reduced twice fires 6, not 3 ŌĆö clj MATCH) and distinct from `sequence`, NOT a cached-lazy-seq alias. 6 e2e (phase14_transducers seq_*) + 5 e2e (ed_*) clj-grounded; DA-fork output in ADR-0067. Residuals ŌĆö BOTH RESOLVED: **3-arg multi-coll `sequence` DONE 2026-06-01** (pure `.clj`: `map`'s `[result input & inputs]` step arity + `-tx-seq-pump` generalised to N sources + `sequence` multi-arity via `-tx-seq-run`; `(sequence (map +) [1 2 3] [4 5 6])`ŌåÆ`(5 7 9)`, shortest-stop, single-input-xform-first ŌåÆ ArityException parity; lazy, no hang on infinite. **Surfaced+fixed a ROOT `next` bug**: `nextFn` `.lazy_seq` arm did not `seqFn`-collapse an empty lazy tail, so `(nil? (next (map identity [1])))` was `false` and `apply`'s eager spread appended a trailing nil ŌĆö 1-line fix matching the `.list`/`.chunked_cons` arms); `first`/`rest` Seqable-deftype = **D-189 DONE**. Description below = pre-landing context."
    resolution: |-
      partially landed 2026-06-01: **`sequence` DONE** ŌĆö the pushŌåÆpull bridge (`-tx-seq-pump` + `sequence`, core.clj) is pure `.clj` in cljw's lazy-seq idiom (a buffering rf conj's each emitted output into a volatile vector stepped one source item per `lazy-seq` thunk; `xf = (xform rf)` created once so `take`/`partition-all` keep state; completion arity flush handled). Lazy-verified: `(first (sequence (map inc) (iterate inc 0)))`ŌåÆ1 and `(into [] (sequence (take 2) (iterate inc 0)))`ŌåÆ[0 1] do NOT hang (the eager-`into` fake is avoided, DIVERGENCE D1 honoured). 8 e2e (phase14_transducers seq_*) clj-grounded. **Residual: `eduction`** (reduce-half = `transduce`, seq-half reuses the bridge; the deftype-vs-closure shape is a DA-fork at depth Ōēź2) + the 3-arg multi-coll `sequence` arm. Description below = pre-landing context. | scope | **`sequence` / `eduction` deferred** ŌĆö the transducer surface (cycles 1-5, 2026-05-30) landed reduced?/unreduced/ensure-reduced + the map/filter/remove/keep/take/drop/map-indexed/dedupe/distinct/partition-all arities + cat + completing/transduce/3-arg-into + halt-when, all over the existing reduce/reduced foundation (eager, reduce-driven). `sequence`/`eduction` are NOT reduce-driven: upstream Clojure builds them on `TransformerIterator`, an INCREMENTAL PULL that runs the transducer step lazily as the seq is consumed. cljw's transducer machinery is push-based (reduce drives); bridging to cljw's pull-based lazy-seq needs a TransformerIterator-equivalent. An eager `(seq (into [] xform coll))` would be a DIVERGENCE (hangs on infinite sources where Clojure's lazy `sequence` does not) ŌåÆ not shipped as a fake. Discharge: build the pushŌåÆpull transducer bridge (lazy-seq driven by stepping the rf), then `sequence`/`eduction` over it. Surfaced 2026-05-30 completing transducers (survey: private/notes/phaseA26-transducers-survey.md DIVERGENCE D1). | when lazy transducer iteration is built OR a corpus test needs lazy sequence/eduction | 2026-05-30
