    status: "NARROWED (2026-06-20, B/C sweep — the headline repro is now FIXED). Re-probed vs clj: the original `(get {{(map inc [0 1 2]) 1} :v} {(list 1 2 3) 1})` and the map-nested / set-nested / deep-map-nested cases all MATCH clj now (corpus `lazy_nested_key.txt`, 6 golden pairs locked — the map-KEY path hashes its key at construction, realizing the inner lazy). REMAINING gap (4 repro classes, all the SAME root): a lazy nested inside a NON-realizing container that is itself a map key hashes the lazy by IDENTITY — `(get {[(map inc [0 1 2])] :v} [(list 1 2 3)])`, `(get {(list (map inc [0 1])) :v} (list (list 1 2)))`, `(get {{:k (map inc [0 1])} :v} {:k (list 1 2)})`, `(get {[[(map inc [0 1])]] :v} [[(list 1 2)]])` → all cljw nil / clj :v. (`#{lazy}` and a direct lazy key already work — sets + map-keys hash elements at construction.) Cause: `hashConsult` routes only `.lazy_seq/.range/.chunked/.list/.instance` top-level keys through the rt-aware `hashDispatch`; a `.vector`/`.array_map`-VALUE/nested container key falls to rt-free `valueHash`, whose element recursion can't realize a lazy (no rt). FINISHED FORM = the rt-free memoized realized-hash on the lazy_seq/range value (Alt-2) — NOT the alternative of routing collection keys through rt-aware recursion, which would tax the HOT vector-key path (the perf reason the design kept valueHash rt-free, shared with D-381's deferral)."
