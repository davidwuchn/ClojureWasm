    status: "open (found 2026-06-06, tricky-behaviour sweep) — `(with-meta (range 3) m)` raises type_error; clj attaches meta (range is IObj). The `.range` substrate AND its `.chunked_cons` seq view have no meta slot, so withMetaFn's switch has no arm. map/filter/lazy-seq/list/cons/take all work (lazy_seq is metable). ADR-0116 D: IObj/IMeta instance? membership is a D-271 deliverable — clj IObj⟹withMeta but range/chunked_cons have no meta slot, so IObj/IMeta activate only when this row lands; full oracle-verified tag sets are enumerated INACTIVE in interface_membership.zig (網羅 recognition up-front, F-013 cl.4). === SCOPE CORRECTION 2026-06-12 (polish-loop Step-0.6 finding): the audit billed this 'cleanest found bug, ready to fix' but the FINISHED FORM is a MULTI-SUBSTRATE structural change, not a 2-struct patch. clj with-meta works on EVERY IObj member (verified: cons, sorted-map, string-seq, array-seq), and the clj invariant (instance? IObj x)⟹(with-meta x m) couples membership-activation to with-meta support. cljw UNMETABLE IObj tags = SEVEN: {cons, range, chunked_cons, string_seq, array_seq, sorted_map, sorted_set} (metable today: vector/list/hash_set/array_map/hash_map/lazy_seq/symbol/persistent_queue). Finished-form options: (a) per-struct meta:Value field on all 7 extern structs + GC-trace each + metaOf/withMeta arms (clj-faithful; preserves range O(1) count/nth + tag identity; template=lazy_seq.zig meta field) — RECOMMENDED; (d) a uniform .meta_seq wrapper {inner,meta} delegating seq ops (ONE struct but every seq-consuming site must unwrap → MORE invasive, + (class (with-meta (range 3) m)) diverges from clj LongRange → an AD). Big-bang per clj_diff_sweep Discipline 2 (all 7 in one push). Per F-003 (image+record+defer structural/layout plans — outranks the polish-audit note) this BROAD seq-substrate meta-layout activation is DEFERRED to a deliberate ADR cycle (needs the mandated DA fork on a/d + GC-torture); a range-only partial is the Smallest-diff-bias smell