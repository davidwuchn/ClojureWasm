continuation): `s/coll-of`/`s/every` → alpha.clj:1291 `cpred` is nil at conform (every-impl closure-capture or opts-destructure issue — classify generic-cljw vs spec-internal); `s/or` → Exception; `s/keys` → alpha.clj:317 (unfn conj-on-symbol — cljw's postwalk-replace/destructure/conj all individually MATCH clj, so the trigger is a specific s/keys path, needs isolation); `s/cat`/`s/*` regex-op conform → `::invalid` (the regex-op state-machine — the hardest part). The 4 port adaptations (bytes?-drop, Spec-FQCN→var, checkSpecAsserts→atom, fn-sym→nil) live in /tmp/spec_cp and are re-derivable from this blocker chain; promote into the tracked bundle (src/lang/clj/clojure/spec/ + bootstrap.zig FILES, EPL variant-① header per clj_attribution.md) only once the regex-op tail is green. MILESTONE-4 2026-06-20: the regex-op tail is GREEN — 2 more generic cljw fixes landed [:keys [::ns-key] auto-resolve a17b97c8 (unblocked coll-of/s/* via every-impl's {:keys [::cpred]}); (conj map other-map) merge 8fc081d4 (unblocked the whole pcat* state machine → s/cat/s/*/s/+/s/alt conform)]. spec.alpha is now MOSTLY FUNCTIONAL + clj-verified: load + s/def + s/and (basic) + s/valid? + s/conform + s/cat + s/* + s/+ + s/alt + s/coll-of + s/keys all correct. The LAST blocker is the builtin-macro-shadow bug → D-476 (s/or mis-routes to core/or; strict s/and validates only the last pred). 7 generic clj-parity fixes total this arc (BigDecimal/valueOf, reify/deftype destructured params, symbol-of-var, reify-IObj-metadata, :keys auto-resolve, conj map-merge — all committed + benefit ALL cljw code). Resolve D-476, then promote the /tmp port into the bundle + verify the full surface. MILESTONE-6 2026-06-20: D-476 RESOLVED (7c40041f, macro-shadow gate + caseTest rt/or hygiene) → s/or + strict s/and work. 3 more generic fixes landed: clojure.walk over a cons/lazy-tailed list (cf0b8dd2), valueToForm .hash_map macro return (978b41e2). 10 generic cljw fixes total this arc; spec ~95% functional (s/def/and/or