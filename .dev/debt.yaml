      embedded-FIRST `chainedResolver` so core/test never shadowed);
      `RequireResolverFn`→`{source,label}` (lib errors render at the lib's
      file:line); new `lib_load_failed` Code. VERIFIED: a disk test-ns requiring
      clojure.test + another disk lib runs its `deftest` suite (`[4 0]`); CLJW_PATH;
      lib_not_found; no-shadow; cycle. e2e phase15_require_fs (6). Deferred:
      deps.edn parse, `:reload`, standalone-require multi-libspec wall. So the
      whole macro/ns/test/load stack (D-226/D-230/D-227/D-158) is complete — the
      **actual lib-suite validation campaign** (clone real pure-Clojure libs +
      run THEIR suites) is now the runnable follow-on (recall: corpus-driven
      validation phase). ORIGINAL (2026-05-30 forward-looking memo):
      scope | **Shift from AI-probed coverage to CORPUS-DRIVEN bug discovery** (user direction 2026-05-30). The current sweep (ratio-arith / HAMT / IFn / atoms / …) is biased by what the AI thinks to probe; a real corpus surfaces gaps unbiased. Two tiers: **(1) clojuredocs walkthrough** — run the community examples for each clojure.core var; PURE CORE, **needs NO deps.edn / classpath / dependency fetch** → the cheaper, earlier win, runnable as soon as core coverage is solid; both validates output AND surfaces missing/wrong fns. **(2) real-world library test suites** — clone real (pure-Clojure) libs + run THEIR `clojure.test` suites on cljw (densest edge-case bug-finder); REQUIRES the deps story (deps.edn parse + classpath + multi-file `require`/`ns` maturity + `clojure.test` runner). Sequence: clojuredocs first (low infra), then lib-tests (needs deps infra). Prereqs for (1): enough core coverage that walking clojuredocs is productive (not blocked by missing fns) + a harness to fetch/run example snippets + compare. Prereqs for (2): deps resolution + classpath + clojure.test. Fits the F-010 quality-loop / cw-v0-parity tail. | recall trigger — when core coverage is solid enough that a clojuredocs walkthrough is productive | 2026-05-30
  - id: "D-159"
    discharged_at: "Discharged (core.clj `-comparator` normalizer + multi-arity `sort`/`sort-by`, 2026-05-30)"
    resolution: |-
      runtime | **`sort` with a 2-arg COMPARATOR fn errors**: `(sort (comparator <) [3 1 2])` → "Wrong number of args (2) passed to fn, expected 1" — cljw's `sort` 2-arg form treats its fn arg as a 1-arg key-fn, not a 2-arg comparator (JVM `sort` 2-arg is `(sort comp coll)` where comp is a Comparator / 2-arg fn returning -1/0/1). `comparator` itself works (built it 2026-05-30); the gap is `sort`/`sort-by` not threading a comparator fn into the merge compare. Discharge: `sort`'s 2-arg arm should detect/accept a comparator fn (call it as `(cmp a b)` returning a number) vs the key-fn path. Surfaced 2026-05-30 building `comparator` (gap sweep). | Opportunistic — when sort-with-comparator is needed (clojuredocs/lib tests will hit it) | 2026-05-30
  - id: "D-160"
    discharged_at: "DISCHARGED 2026-06-01 (both halves): **`sequence`** push→pull lazy bridge + **`eduction`** re-iterable `deftype` (ADR-0067) — `eduction` is a `deftype Eduction [xform coll]` extending `IReduce` (`-reduce`→`transduce`, variadic for the 3-arg `into` path, `(completing f)` for arbitrary `f`) + `Seqable` (`-seq`→`sequence`), so it is re-iterable (counter xform reduced twice fires 6, not 3 — clj MATCH) and distinct from `sequence`, NOT a cached-lazy-seq alias. 6 e2e (phase14_transducers seq_*) + 5 e2e (ed_*) clj-grounded; DA-fork output in ADR-0067. Residuals — BOTH RESOLVED: **3-arg multi-coll `sequence` DONE 2026-06-01** (pure `.clj`: `map`'s `[result input & inputs]` step arity + `-tx-seq-pump` generalised to N sources + `sequence` multi-arity via `-tx-seq-run`; `(sequence (map +) [1 2 3] [4 5 6])`→`(5 7 9)`, shortest-stop, single-input-xform-first → ArityException parity; lazy, no hang on infinite. **Surfaced+fixed a ROOT `next` bug**: `nextFn` `.lazy_seq` arm did not `seqFn`-collapse an empty lazy tail, so `(nil? (next (map identity [1])))` was `false` and `apply`'s eager spread appended a trailing nil — 1-line fix matching the `.list`/`.chunked_cons` arms); `first`/`rest` Seqable-deftype = **D-189 DONE**. Description below = pre-landing context."
    resolution: |-
      partially landed 2026-06-01: **`sequence` DONE** — the push→pull bridge (`-tx-seq-pump` + `sequence`, core.clj) is pure `.clj` in cljw's lazy-seq idiom (a buffering rf conj's each emitted output into a volatile vector stepped one source item per `lazy-seq` thunk; `xf = (xform rf)` created once so `take`/`partition-all` keep state; completion arity flush handled). Lazy-verified: `(first (sequence (map inc) (iterate inc 0)))`→1 and `(into [] (sequence (take 2) (iterate inc 0)))`→[0 1] do NOT hang (the eager-`into` fake is avoided, DIVERGENCE D1 honoured). 8 e2e (phase14_transducers seq_*) clj-grounded. **Residual: `eduction`** (reduce-half = `transduce`, seq-half reuses the bridge; the deftype-vs-closure shape is a DA-fork at depth ≥2) + the 3-arg multi-coll `sequence` arm. Description below = pre-landing context. | scope | **`sequence` / `eduction` deferred** — the transducer surface (cycles 1-5, 2026-05-30) landed reduced?/unreduced/ensure-reduced + the map/filter/remove/keep/take/drop/map-indexed/dedupe/distinct/partition-all arities + cat + completing/transduce/3-arg-into + halt-when, all over the existing reduce/reduced foundation (eager, reduce-driven). `sequence`/`eduction` are NOT reduce-driven: upstream Clojure builds them on `TransformerIterator`, an INCREMENTAL PULL that runs the transducer step lazily as the seq is consumed. cljw's transducer machinery is push-based (reduce drives); bridging to cljw's pull-based lazy-seq needs a TransformerIterator-equivalent. An eager `(seq (into [] xform coll))` would be a DIVERGENCE (hangs on infinite sources where Clojure's lazy `sequence` does not) → not shipped as a fake. Discharge: build the push→pull transducer bridge (lazy-seq driven by stepping the rf), then `sequence`/`eduction` over it. Surfaced 2026-05-30 completing transducers (survey: private/notes/phaseA26-transducers-survey.md DIVERGENCE D1). | when lazy transducer iteration is built OR a corpus test needs lazy sequence/eduction | 2026-05-30
  - id: "D-163"
    discharged_at: "open — perf; **first cycle (O-004) DONE**, later increments low-ROI deferred (ADR-0065)"
    resolution: |-
      perf | **Heap-allocating / higher-order / lazy-seq operations run at ~100–400µs per element, so large-input `(reduce + (range 1e6))` / `(count (range 1e6))` TIME OUT** (correct value when they finish — purely perf, not correctness). Quantified 2026-05-31 via the structural-defect probe sweep (startup baseline 0.48s subtracted): pure `dotimes`/`loop`-`recur` over 100000 = ~1–2µs/iter (FAST), but `count(range N)` ≈ 118µs/element (linear, pathological constant), `count(map inc (range 20000))` ≈ 500µs/element, `reduce + (vec (range 20000))` ≈ 5–7s. Root cause is NOT GC over-triggering (`gc_heap.default_n_bytes` = 1MB adaptive threshold is fine) — it is **per-element interpreter overhead**: (a) higher-order primitives (`reduce`/`map`) invoke the passed fn through the full `callFnVal`/vtable path per element (vs an analyzed inlined `(+ acc i)` in `loop`, which is fast), (b) lazy_seq realization steps a thunk through tree-walk per element, (c) per-object heap allocation cost. Finished-form fixes (all in the F-010-deferred perf window, do NOT attempt now per the no-premature-JIT directive): the superinstruction/fusion pass (cuts per-node interpreter overhead) + a `reduce`-over-`range` fast-path via the F-004 chunked `LongRange` day-1 type (reduces in a tight Zig loop with no per-element thunk) + a faster higher-order dispatch that avoids full call-frame setup per element. The narrow integer-loop JIT (D-133) does NOT subsume this — `reduce+range` is alloc/dispatch-heavy, not an integer hot loop. Cross-ref F-010 (perf deferred post-M) / F-004 (chunked LongRange) / D-133 (JIT) / D-140 (startup perf). **cw v0 blueprint (investigated 2026-05-31, user-directed)**: cw v0 (`~/Documents/MyProducts/ClojureWasm/src/lang/builtins/sequences.zig`) solves exactly this with (1) a **compact `Meta.range` value** `{current, end, step}` (NOT cons cells — the F-004 chunked-LongRange shape) and (2) **`fusedReduce`**: `map`/`filter`/`take`/`range` produce *meta-annotated* lazy-seqs (`__zig-lazy-map`/`-filter`/`-range` set a `LazySeq.Meta` tag); at reduce time `fusedReduce` walks the meta chain, extracts `[transforms…] + base + take_n`, and iterates the base directly applying transforms inline → **0 intermediate allocations** (measured: lazy_chain 21,375ms→16ms = 1336x, sieve 134x, transduce 526x), reusing the active VM for the per-element callback so no ~500KB VM alloc per call. This is the concrete plan for the F-010 perf window; pull forward WITH `PROVISIONAL:` markers if a corpus bench shows range-reduce hot (user authorised 2026-05-31). **D-168 relevance**: D-168 made `(range n)`/`(range a b)` a lazy cons-seq (was an eager vector) for correctness — so `(count/reduce (range N))` now rides this per-element path (the old eager vector had O(1) count but the wrong type); the `Meta.range` + fusedReduce fast-path is now the both-correct-and-fast finished form. **RE-LAID 2026-05-31 (ADR-0065)**: the cw-v0 `fusedReduce` blueprint above is SUPERSEDED. cljw already ships complete JVM-shaped transducer arities (map/filter/take/drop/keep/remove 1-arg + transduce/completing/cat/into-xform/vec), so meta-annotated fusion would be a SECOND fusion mechanism = F-011 violation (the cw-v0 89K-LOC duplication pattern). Finished form = JVM's own answer: chunked seqs for the implicit `(reduce f (map g coll))` path + transducers for the explicit 0-alloc opt-in (one reducing-function model). First cycle (Alt C, ADR-0065): a `chunked_cons` reduceFn arm + `.clj`-callable chunk-builder primitives (`chunk-buffer`/`chunk-append`/`chunk`/`chunk-cons`/`chunk-first`/`chunk-rest`/`chunked-seq?`) + chunk-aware `map`/`filter`/`keep`/`remove` bodies — they MUST land together (the reduce arm alone is inert; map's current `cons` body shreds chunks back to per-element Cons cells). Realistic **~4-7×** (NOT 1336×): chunking kills the per-thunk tree-walk + alloc term, but the per-element `f` vtable call is the residual, owned by D-133/superinstruction (out of scope). Cross-ref ADR-0065. **FIRST CYCLE DONE 2026-05-31 (O-004)**: chunk-preserving `map`/`filter`/`keep` (remove inherits) + `chunked_cons` reduceFn arm + `countFn` chunk drain + 7 `.clj` chunk-builder primitives. Measured `(count (map inc (range 1e5)))` 41.3s → 2.8s (~15×, better than the estimated 4-7× — the per-element fn-call residual was ~2µs not 50-100µs, measurement in ADR-0065 impl note). Off-by-one fixed (chunk-boundary empty lazy tail was over-counted by seqNext/nextFn/count — now seq'd to nil). Later increments (route `into`/`sequence`/`eduction` through the existing transducer arities for explicit-path 0-alloc) are **low ROI deferred** — the implicit path is now fast; pick up if a corpus bench shows the explicit path hot. | §9.2.S — first cycle landed; later increments low-ROI deferred | 2026-05-31
