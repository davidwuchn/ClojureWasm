    category: "scope"
    barrier: |-
      **No Namespace-as-value, no `*ns*`, no ns-reflection.** cljw holds the
      current namespace as an internal `*Namespace` (env.current_ns) but never
      exposes it to Clojure code: `*ns*`, `ns-name`, `the-ns`, `find-ns`,
      `all-ns`, `ns-interns`, `ns-publics`, `ns-map`, `ns-resolve` are all
      unresolved, and there is no `Value` that wraps a namespace (so `(str *ns*)`,
      `(ns-name *ns*)` have nothing to return). This is the Phase-15 structural
      prerequisite the D-227 clojure.test design probe surfaced: a per-ns test
      registry keyed by ns symbol (the finished form) needs current-ns identity
      at the Clojure level. Scope (the contained ns-reflection cluster, NOT the
      broader `*out*`/print-control system-var-registry which stays deferred):
      (1) a Namespace value representation (wrap `*Namespace`, or a `.namespace`
      heap kind ΓÇË F-004 slot question for the DA), (2) `*ns*` as a
      runtime-maintained dynamic var reflecting env.current_ns (the special part:
      it tracks the runtime, unlike the user-set `*data-readers*` precedent in
      bootstrap.zig), (3) `ns-name`/`the-ns`/`find-ns`/`all-ns` + `ns-interns`/
      `ns-publics` (enumerate a ns's interned vars ΓÇË the data already lives in the
      Env ns map; this is exposure, not invention). Broadly reusable beyond
      clojure.test: clojure.repl/dir, REPL introspection, tooling. ADR-level
      (DA fork mandatory: Namespace value representation + F-004 slot + `*ns*`
      runtime-coupling). Cross-ref D-227 (the blocked consumer) / D-158 / F-004
      (NaN-box slot) / handover system-var-registry note (the `*out*` half stays
      deferred). recall trigger: NOW ΓÇË it is the active unit gating clojure.test.
