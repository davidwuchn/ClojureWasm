    discharged_at: "DISCHARGED (2026-05-30, shared `rt.stdout` writer) — single process writer routes println/print/prn through the same offset-tracking writer as the runner's result-print; e2e `phase14_println_stdout` (7 cases) locks it in. Root cause was two independent `std.Io.File.stdout().writer(...)` each flushing from file offset 0, so the result-print clobbered the println output. Fix: `Runtime.stdout: ?*std.Io.Writer` set by runSource/runSourceCompare/repl/nrepl; `core.zig emitToStdout` writes through it (test-init fallback = private writer, correct in isolation)."
    resolution: |-
      runtime | **`println` / side-effect stdout output missing in file + `-e` + `-` modes**: `cljw -e '(println "hi")'` produces only `nil` (the form's return value) on stdout; the `"hi\n"` side-effect output never reaches the user terminal. Surfaced at §9.12 row 10.2 when `clojure.pprint/pprint` was wired as `(println x)` and its e2e tests had to be scoped to "var resolution + return value" rather than stdout capture. Likely root cause: `printlnFn` (src/lang/primitive/core.zig:457-474) creates its OWN `std.Io.File.stdout().writer(rt.io, &stdout_buf)` with a fresh 4KB buffer and flushes at end-of-fn; the `runner.zig` (src/app/runner.zig:33,101-104) similarly creates its OWN stdout writer with its OWN 4KB buffer and flushes at end-of-source-loop. Both writers share the underlying FD, but inside one cljw process the writes are not interleaving as expected — `nil` (from runner's final result print) reaches the terminal but `"hi\n"` (from println's earlier flush) does not. Discharge route: a single shared stdout writer threaded through Runtime (e.g. `rt.stdout: *std.Io.Writer`) that println + runner + future pprint/print/pr all use; OR a deeper investigation into Zig 0.16's `std.Io.File.stdout()` semantics under multiple writers. Not blocking any feature — Tier-A e2e tests rely on the runner's final-form result print, not println side-effects. Source: row 10.2 pprint smoke. | Opportunistic — stdout buffer ordering investigation (or shared writer refactor) | 2026-05-27
