    status: "DISCHARGED 2026-06-14. A deftype may write a method under a clojure.lang interface SECTION HEADER that does not own it directly, as long as an implemented interface does — clj's leniency. data.finger-tree's `defdigit` writes `count` under `Indexed`, CountedDoubleList writes `valAt` under `Associative`. INVESTIGATION re-laid the finished form (Step 0.6): BOTH cases are interface INHERITANCE, not arbitrary cross-section placement — clj `Indexed extends Counted` (Counted owns count) and `Associative extends ILookup` (ILookup owns valAt). cljw's existing remap convention ALREADY flattens inheritance into the per-section tables (COUNTED maps count→IPersistentCollection/-count, the single target `(count x)` dispatches through). So the finished form is the SAME flatten: INDEXED += count→IPersistentCollection/-count, ASSOCIATIVE += valAt→ILookup/-lookup (host_interface.zig, each with an INHERITED comment citing the clj edge). Both additions are UNAMBIGUOUS everywhere (count→-count, valAt→-lookup uniformly), so no D-415 collision and no global name→target fallback (the unsafe shape D-415 rejects). A first-pass sibling-relocation mechanism (collect declared interfaces, move a misplaced method) was prototyped then REVERTED as the wrong abstraction — inheritance-flatten subsumes it and follows the established convention; both finger-tree cases are inheritance, none arbitrary-sibling. e2e phase14_deftype_inherited_method (count-under-Indexed + valAt-under-Associative, bare clojure.lang spelling, lower+dispatch). data.finger-tree now LOADS fully (all 8 deftypes lower); it does NOT yet RUN — `(conjl (double-list) 1)` segfaults (= new D-422, a runtime recursion bug, distinct from this lowering gap). Notes: p14-deftype-inherited-method.md."
