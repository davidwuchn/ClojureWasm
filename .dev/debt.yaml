ine blocker path is now mapped. LOAD-BLOCKER CHAIN (probed 2026-06-20 via `-cp /tmp/spec_cp` classpath load of the official src — this is the right dev harness: the classpath resolver loads .clj WITHOUT touching the @embedFile bundle, so the tracked build stays green while iterating blockers; bundle into FILES only once it loads + s/valid?/conform verify): #1 gen/alpha.clj `BigDecimal/valueOf` — FIXED commit 1a5e0ed0 (the static cljw.java.math.BigDecimal descriptor had an empty method_table; added valueOf + an .init populate fn). #2 gen/alpha.clj:188 `bytes?` unresolved — cljw lacks the predicate AND it is AD-019-blocked (JavaArray is fully type-erased, no element-type field, so byte[] is indistinguishable from int[]; = the known D-472). gen-builtins needs ALL 43 core type-predicates to resolve at analyze time (delay-body map KEYS); only bytes? is missing — so the port adapts that one gen-builtins entry (gen is generators-only, never forced without test.check) OR a deliberate bytes?=array? AD decision in the focused cycle (DA subagent on the AD-019 envelope). #3+ spec.alpha CORE (1996 lines) unprobed past gen; static scan: 12 `reify` of the Spec/Specize protocols (THE core spec mechanism — cljw reify-of-protocol must carry these), 2 `set!` on dynamic vars (*recursion-limit* etc.), defmulti/defmethod `describe`, `(alias 'c 'clojure.core)`, JVM-internal RT/checkSpecAsserts + Compiler/demunge (AD-008 deferred-host-ref handles those — ns loads, errors only if called). MILESTONE 2026-06-20: spec.alpha LOADS (`:loaded`) — 6 blockers cleared: 3 committed cljw clj-parity fixes [#1 BigDecimal/valueOf 1a5e0ed0; reify/deftype destructured method params 8c4f4827; (symbol var) f74f8f18] + 3 port adaptations in scratch /tmp/spec_cp [drop the bytes? gen-builtin (AD-019), `clojure.spec.alpha.Spec` FQCN→protocol var `Spec` (no-JVM, ADR-0059), checkSpecAsserts JVM-static→cljw atom]. REMAINING FUNCTIONAL BLOCKER (spec loads but s/valid? errors `Unable to resolve spec`): spec's `with-n