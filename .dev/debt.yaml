    status: 'open (2026-06-14, found probing the BigDecimal interop surface during the clj-parity floor drain). The BigDecimal instance-method surface is PARTIAL: setScale (2+3 arg) + scale/signum/unscaledValue/precision are LANDED (e2e phase14_bigdecimal_setscale, 28 cases); PARTIAL 2026-06-15 — negate\/abs\/toBigInteger\/stripTrailingZeros LANDED (e2e phase14_bigdecimal_setscale 35); STILL unimplemented: movePointLeft/movePointRight (scale shift), stripTrailingZeros (trailing-zero strip + scale reduce), negate/abs/plus, toBigInteger/toBigIntegerExact (truncate to int), add/subtract/multiply/divide instance forms. Each returns a new BigDecimal needing Managed arithmetic (negate/clone/mul-10^n) — fiddly but bounded. NICHE: clojure.core ops (- abs + * / and bigdec contagion) cover most arithmetic; the .method interop forms are reached mainly by Java-ported lib code. Take up when a real consumer hits one, or as a big-bang BigDecimal-interop-completion unit (clj_diff_sweep Discipline 2). NARROWED 2026-06-20 (the big-bang completion unit ran): the COMMON instance arithmetic + point-shift LANDED — add/subtract/multiply (delegate to the shared allocAdd/allocSub/allocMul the +/-/* operators use), divide (allocDiv; throws non_terminating_decimal/divide_by_zero like clj (/ aM bM)), movePointLeft/movePointRight (new big_decimal.allocMovePoint: unscaled unchanged + scale shift by ±n, a negative result-scale normalized by *10^|scale|). All clj-verified incl. movePointRight scale<0 (12.34 ·10^3 -> 12340); e2e phase14_bigdecimal_setscale now 43. The BigDecimal interop surface is now SUBSTANTIALLY COMPLETE (setScale/scale/signum/unscaledValue/precision/negate/abs/toBigInteger/stripTrailingZeros + add/subtract/multiply/divide/movePointLeft/movePointRight). REMAINING (niche, take-up-on-consumer; RE-NARROWED 2026-06-25 debt audit — pow/compareTo/min/max/remainder/round now LAND too, verified directly: 8M/-1/1M/2M/1M/3.14M): only sqrt/scaleByPowerOfTen/ulp/divideAndRemainder still unimplemented. DRAIN 2026-06-25: scaleByPowerOfTen/ulp/divideAndRemainder LANDED — scaleByPowerOfTen (pure scale shift, negative scale KEPT so it prints scientific, big_decimal.allocScaleByPowerOfTen), ulp (unscaled 1 at this scale, allocUlp), divideAndRemainder (2-elem [divideToIntegralValue, remainder] array, built under enterFabrication so the first result survives the alloc of the second; divide-by-zero raises). All clj-verified (123M/0.123M/1.2E+4M, 0.01M/1M/0.1M, [3M 2M]/[4M 0.7M]); e2e phase14_bigdecimal_setscale bd_sbpt*/bd_ulp*/bd_divrem* (8 cases, 105 total). ONLY sqrt(MathContext) REMAINS — the hardest piece (correctly-rounded arbitrary-precision sqrt + JDK preferred-output-scale reproduction; the native Managed.sqrt integer floor-sqrt is the base, exposed as BigInteger .sqrt). Deferred-by-tractability to a dedicated numeric cycle (easiest-first ordering), NOT abandoned.'
