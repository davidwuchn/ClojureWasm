conventions: |-
  - Structure: two top-level lists ŌĆö `active:` and `discharged:`. Active entries carry id / status / category / barrier (+ optional quality_floor / last_reviewed); discharged entries carry id / discharged_at / resolution. Edit as YAML (no Markdown table to align).
  - New debt: grep `.dev/debt.yaml` for class-overlap before adding (per `.claude/rules/debt_dedup.md`).
  - Discharge: move the entry from `active:` to `discharged:` (do not leave an inline-discharged copy under `active:`).
  - Status `blocked-by:` barrier text must be a present-tense, testable predicate. NO vague hopes.
  - last_reviewed must be updated when re-evaluating; stale (>14 days) entries trigger narrow audit.
  - Debt entries reference ADRs by short ID (e.g., `ADR-0010`) without filesystem paths.
  - Open questions and external blockers live here as `D-NNN` entries. `.dev/handover.md` names them by ID only (framing per `.claude/rules/handover_framing.md` ŌĆö handover is a driving doc, not a deliberation doc).
