         POINTER-EQ relying on interning (`equal.zig:551` — non-bit-identical
         symbols → false; `hash.zig`). A non-interned with-meta'd symbol has a
         different pointer, so `(= 'a (with-meta 'a m))` would wrongly be false.
         Add a `.symbol => ns+name structural compare` arm to `valueEqual` and an
         ns+name hash for `.symbol` (META IGNORED in both — symbol identity is
         ns+name only). Verify map-key behaviour (symbols as keys) still holds.
      4. `metaFn` symbol arm → the meta field; `vary-meta` works over `meta`+`with-meta`.

