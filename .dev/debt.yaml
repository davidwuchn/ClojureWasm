    status: "DISCHARGED (2026-06-21, ADR-0157). 2b (aaf391e3): stack_overflow is a catchable own-Kind StackOverflowError. 2a (48be8e91): a self-calibrating native-stack guard (threadlocal stack-base anchor at the shallowest vm.eval entry + a 6 MiB byte-budget check) raises the catchable stack_overflow before the native stack overflows — validator/reducer/watch re-entry (all were SIGSEGV) now error gracefully + catchably; legit flat reduce(1e6) + HOF-recursion to ~500-1000 deep still run; the watch-256 partial is subsumed + removed. The ONE residual (split to D-486): same-eval direct-recursion-at-FRAMES_MAX catch (flattened recursion never re-enters vm.eval, so neither the entry guard nor the existing handler-synthesis catches it). ORIGINAL: open (2026-06-21, surfaced by the atom/watch differential sweep). A higher-order primitive that re-enters the evaluator via a user callback — `notifyWatches`→`invokeCallable`, a `set-validator!` validator, a `sort` comparator, a `reduce` fn — recurses in NATIVE Zig frames that the VM's per-run frame budget (vm.zig FRAMES_MAX=2048) does NOT bound (each `vt.callFn` re-entry starts a fresh VM run with frame_top=0). So an UNBOUNDED self-re-entering callback overflows the native stack → SIGSEGV (exit 134), where clj raises a catchable StackOverflowError. Repro (was SIGSEGV): `(let [a (atom 0)] (add-watch a :w (fn [k r o n] (swap! r inc))) (swap! a inc))`. PARTIAL FIX LANDED for the watch case: a threadlocal watch-nesting guard (iref.enterWatchNotify, cap 256) in BOTH the sync (atom.zig) + async (iref.zig) notify loops converts the watch runaway into a graceful stack_overflow error (e2e phase15_watch_recursion). STILL OPEN: validators / comparators / reduce-fns re-entering unboundedly are NOT yet guarded — they share the same native-reentry overflow. RELATED: cljw's stack_overflow error is NOT catchable by (catch Throwable …) (clj's StackOverflowError is) — a separate AD-007-adjacent gap. SCOPE CONFIRMED (2026-06-21 investigation): a `set-validator!` validator that re-triggers its atom AND a `reduce` fn that re-reduces BOTH still SIGSEGV (unguarded re-entry); but a comparator that recurses on ITSELF (`(sort (fn cmp [x y] (cmp x y)) …)`) is ALREADY graceful (direct VM self-call → op_call/flattenPush, FRAMES_MAX-bounded) — only PRIMITIVE→callFn re-entry is unguarded, not VM self-recursion. NAIVE FIX RULED OUT: a low nesting cap at `higher_order.invokeCallable` (the shared re-entry chokepoint) would FALSE-TRIP legit deep recursion that flows through map/reduce (those nest invokeCallable too), since clj + cljw's VM allow 2048-deep recursion. So a 256-ish invokeCallable cap breaks `(defn f [n] (when (pos? n) (reduce + (map (fn [_] (f (dec n))) [1]))))` at depth 256. CORRECT FIX = the GLOBAL-frame-budget variant (below): the re-entrant VM run CONTINUES the outer frame_top instead of resetting, so legit recursion-through-higher-order AND infinite re-entry BOTH hit the same 2048 limit that plain recursion does (2048 VM-frames of native stack is KNOWN safe — plain recursion proves it). The watch partial's cap-256 is safe ONLY because watch nesting never legitimately deep-recurses. 2b LANDED (commit aaf391e3, ADR-0157): stack_overflow is now a catchable own-Kind StackOverflowError (re-entry + nested-eval overflows catch). REMAINING 2a: the self-calibrating native-stack guard that converts the still-SIGSEGV validator/reducer cases to a graceful error + fixes the same-eval direct-recursion-at-FRAMES_MAX catch edge (the synthesis does not fire when frames are exhausted in the handler's own eval)."
