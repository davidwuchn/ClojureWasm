    discharged_at: "DISCHARGED 2026-06-02 (┬¦A26 clj-diff sweep, opportunistic Map-equality cycle): extended `equal.valueHash` + `equal.keyEqValue` to hash/compare **all persistent collections by content** as keys/elements ŌĆö map, set, list, AND cross-type vectorŌēĪlist (one shared `seqHash` ordered formula so `(get {[1 2] :v} '(1 2))`ŌåÆ`:v`). rt-free was preserved (the ~68-call-site constraint that kept vector/defrecord inline): added rt-free structure walks `map.contentHash`/`keysetHash`/`contentEq`/`keysSubsetOf` (ArrayMap linear + HAMT recursive) and `set.contentHash`/`contentEq` delegating to the map backing (F-011 commonization); `equal.SeqKeyCursor` (vector index / list first-rest, rt-free). `core.hashFn` already delegated to `valueHash`, so `(hash coll)` is now content-based + order-independent for maps/sets in the SAME fix. Fixes `clojure.set/index`/`join` (map-key merge), `frequencies`/`distinct`/`set`-dedup of collections, `zipmap`/`assoc` collection-key dedup. Lazy/range keys stay identity (cannot realize rt-free ŌĆö documented residual). 20-case e2e (`phase14_collection_keys.sh`) + 8 diff_test cases (literal keys; the minimal fixture lacks core.clj `set`/runtime-call keys, exercised in e2e) + 20-expr `collection_keys` corpus. ALSO fixed a latent clj_diff_sweep harness bug: non-core ns (`clojure.set` etc.) were never required, so clj aborted at line 1 ŌåÆ false all-DIFF; the harness now auto-requires referenced namespaces. clj-grounded (18/19 sweep OK; the 1 residual DIFF is value-internal set print order, an acceptable divergence)."
