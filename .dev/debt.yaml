      runtime | **Unquoted `()` does not self-evaluate to the empty list ŌĆö it raises `NotImplemented` on BOTH backends.** `((fn [] ()))`ŌåÆcljw error / clj `()`. JVM Clojure special-cases an empty list in evaluation position as a self-evaluating empty list (`PersistentList/EMPTY`); cljw evaluates `()` as an empty invocation (no operator) ŌåÆ `NotImplemented`. Forces a `(list)` / `'()` workaround everywhere an empty-list literal is wanted (hit while writing `sequence` 1-arg `(or (seq coll) (list))`, D-160). Fix: the analyzer should lower an empty `()` list form to the empty-list constant (self-evaluating) rather than an invocation Node, on both backends. Surfaced 2026-06-01 (D-160 bridge). Cross-ref D-160 / F-011. | quality-loop floor: empty-list literal self-eval (`()`) | 2026-06-01
  - id: "D-189"
    discharged_at: "DISCHARGED 2026-06-01 (quality-loop floor drain): the `first`/`rest`/`next` else-arms (`sequence.zig`) now try `ISeq -first/-rest/-next` via `dispatchOrNull` and, on null, fall back to `seqFn` + `firstOfSeq`/`restOfSeq` ŌĆö JVM `RT.first`ŌåÆ`seq().first()`. So `(first (eduction (map inc) [5 6 7]))`ŌåÆ6, `(rest ŌĆ”)`ŌåÆ(7 8), `(next ŌĆ”)`ŌåÆ(7 8) (clj MATCH), while an ISeq-implementing deftype still dispatches its `-first`/`-rest` directly (no regression: `(first (->S))`ŌåÆ`:head`) and built-ins are untouched. Benefits every Seqable-only deftype. 3 e2e (phase14_transducers ed_first/rest/next). Description below = pre-landing context."
    resolution: |-
      runtime | **`first`/`rest`/`next` do NOT coerce a `Seqable`-only deftype via `seq`** ŌĆö they dispatch `ISeq -first`/`-rest`/`-next` directly (`sequence.zig::firstFn` else-arm L259-264 + the rest/next siblings), so `(first <eduction>)`ŌåÆ`No implementation of method '-first' on protocol 'ISeq'` where clj coerces via `RT.first`ŌåÆ`seq`ŌåÆfirst (clj `(first (eduction (map inc) [5 6 7]))`ŌåÆ6). `(seq e)` / `(into [] e)` / `(map f e)` already work (they call `seq`, which routes `Seqable -seq`). Fix: the first/rest/next else-arms try `ISeq -first/-rest/-next` via `dispatchOrNull`, and on null fall back to `(seqFn coll)` then the seq op (mirrors the `.array_map`/`.hash_set` arms already doing this). Benefits every Seqable deftype, not just Eduction. Surfaced 2026-06-01 (ADR-0067 eduction). Cross-ref ADR-0067 / F-011. | quality-loop floor: Seqable deftype first/rest coercion | 2026-06-01
  - id: "D-184"
    discharged_at: "DISCHARGED 2026-06-01 (ADR-0038 amendment, DA-fork): the clean fix WAS the structural one this row predicted. New `env.internDeclare` (register-if-absent, root untouched if present) replaces `analyzeDef`/`analyzeDefmacro`'s `intern(ŌĆ”nilŌĆ”)` so a def target's existing root is no longer reset at analyze time; `__make-multifn` then returns the existing MultiFn when `name` already resolves to one ŌåÆ re-`defmulti` is a defonce-style no-op preserving `defmethod`s (`(defmulti a :s)(defmethod a :c [_] :circ)(defmulti a :s)(a {:s :c})`ŌåÆ`:circ`). Bonus (JVM parity, the DA called it the direct F-011 consequence): a throwing re-`def` keeps the old value (`(def x 5)(def x (/ 1 0)) x`ŌåÆ5). DA fork confirmed it a **spec-drift fix** (ADR-0038 already claimed the JVM error semantics the code violated), walked all 5 def cases correct, rejected the back-door wildcard. 4 e2e (phase14_redef) + phase7_multimethod case 6 + `--compare` OK; gated by 191 tests + diff oracle. Description below = pre-landing context."
    resolution: |-
      runtime | **`defmulti` re-evaluation clobbers the existing MultiFn**: JVM `defmulti` is a `defonce`-style no-op when the var already holds a MultiFn (reloading keeps registered methods); cljw's `expandDefmulti` lowers to `(def name (rt/__make-multifn ŌĆ”))` which re-creates it, dropping prior `defmethod`s. **Investigated 2026-06-01 ŌĆö the clean fix is structural, not the predicate guard this row first guessed.** A `__make-multifn` "return the existing MultiFn if `name` already resolves to one" check was tried + REVERTED: it cannot see the old MultiFn because **`analyzeDef`'s ADR-0038 pre-registration resets an existing Var's root to nil at ANALYZE time** (`env.intern(ns, name, .nil_val, null)` overwrites `existing.root`), before `__make-multifn` runs at eval time. So the real fix is an **ADR-0038 amendment**: `analyzeDef` should register-if-absent and NOT reset an existing root (which is also a robustness win ŌĆö a re-`def` whose value-expr throws today destroys the old root at analyze time). Then `__make-multifn` returning the existing MultiFn makes `(def name existing)` a no-op. Blast radius = every `def`/`defn` re-eval, so it is a deliberate depth-2 ADR-amendment unit + DA-fork, NOT an end-of-session ram (deferred to avoid the Progress-pressure smell). Low priority (REPL reload only). Cross-ref ADR-0038 / F-011. | quality-loop floor: defmulti re-eval no-op (REPL reload) | 2026-06-01
  - id: "D-182"
    discharged_at: "mostly landed (default number parity DONE both directions 2026-06-02; only `:bigdec` opt + write-side ratio/bigdec residual): **write-side `.big_int` DONE** (`cwToJson` emits the managed digit string) + **read-side integer DONE** ŌĆö `jsonToCw`'s `.integer` arm lifts a JSON integer beyond i48 (within i64) to a BigInt via `big_int_mod.allocFromI64` (JVM data.json parses large ints as Long/BigInt; value-exact, cljw prints the i48-overflow as `ŌĆ”N` per D-165). `(read-str \"[1, 999999999999999999, 2]\")`ŌåÆ`[1 999999999999999999N 2]`, `(= (read-str \"999ŌĆ”\") 999ŌĆ”N)`ŌåÆtrue. 4 e2e (phase9_json write_bigint + read_bigint*). **read-side `.number_string` DONE 2026-06-02**: a number_string with `.`/`e`/`E` ŌåÆ `f64` (JVM data.json default = Double), else ŌåÆ BigInt via `setString` (`(read-str \"12345678901234567890\")`ŌåÆ`ŌĆ”N`; 1 e2e read_bigint_huge; Ōēź2^64 inherits D-047). **Residual** (explicit errors, tracked stubs, NOT silent): the `:bigdec true` opt (decimal ŌåÆ BigDecimal instead of Double ŌĆö an option flag, not default) + write-side `.ratio`/`.big_decimal` (rarer; data.json itself errors on Ratio without a value-fn). Description below = pre-landing context."
    resolution: |-
      runtime | **`clojure.data.json` BigInt path is unimplemented both directions** (split off from D-171's float-printer fix 2026-06-01): the *read* path (`json.zig` cwFromJson) raises `feature_not_supported` for an integer outside i48 range or an arbitrary-precision number string (JVM data.json parses these into a Long/BigInt/BigDecimal per `:bigdec`); the *write* path (`cwToJson`) hits `UnsupportedJsonTag` for a `.big_int` value (JVM data.json writes `(str x)` ŌåÆ plain digits, e.g. `(write-str 10N)`ŌåÆ`"10"`). Both are explicit errors (tracked transient stubs, NOT silent), so no correctness lie ŌĆö pure coverage. Fix: write side = a `.big_int` arm emitting the managed digit string (cheap, F-011 share the existing big_int formatter); read side = route large/precise JSON numbers to the numeric-tower parse (needs the JSONŌåÆBigInt decision, larger). Surfaced as the residual of D-171 (2026-06-01). Cross-ref D-171 / F-005 / F-011. | minor residual: data.json `:bigdec` opt + ratio/bigdec write (default parity drained) | 2026-06-02
  - id: "D-178"
    discharged_at: "structural ŌĆö `.list` / `.cons` tag conflation (PersistentList vs Cons-over-seq); defer to F-004 seq-family owner"
    resolution: |-
      runtime | **The `.list` heap tag is used for BOTH a true PersistentList (list/nil tail, valid O(1) `count` field) AND a Cons-over-a-seq (`(cons x lazy_seq)` / `(conj (range 3) 99)`, whose tail is a non-list seq).** Consequence: the Cons `.count` field (`1 + countOf(tail)`, and `countOf` returns 0 for non-list tails) is a lie for mixed chains, and the list-specialized fast paths (printList / deepRealize `.list` arm / countFn `.list`) assumed a homogeneous `.list` chain. Surfaced 2026-05-31 by D-168 (rangeŌåÆlazy-seq exposed `(cons x non-list-seq)`, previously hidden because range was an eager vector routed via seqFn). **Correctness fixed at D-168** by walking `.list` generically (count + print no longer trust the O(1) field for mixed chains) ŌĆö but that drops the O(1) `count` optimisation for pure PersistentLists. The finished form (per F-004 seq-family slot map: `lazy_seq` / `cons` / `chunked_cons` are distinct tags) **splits `.list` (PersistentList, O(1) count, list-only tail) from `.cons` (ASeq Cons over any seq, O(n) walk)** ŌĆö matching JVM `clojure.lang.PersistentList` vs `Cons`. The `.cons` tag already exists but is vestigial (only a value.zig test creates it). Activating it + per-tag first/rest/seq/count/print is an F-004 structural decision ŌåÆ defer to that owner (F-003). NOT a per-op patch. Cross-ref D-168 (the correctness fix) / F-004 (NaN-box 2nd-gen seq family) / F-011. | when the F-004 NaN-box 2nd-gen (D-027) seq-family cycle opens OR a corpus test needs O(1) list count back | 2026-05-31
