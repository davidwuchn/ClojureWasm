  - id: "D-163"
    discharged_at: "open ΓÇË perf; **first cycle (O-004) DONE**, later increments low-ROI deferred (ADR-0065)"
    resolution: |-
      perf | **Heap-allocating / higher-order / lazy-seq operations run at ~100ΓÇô400┬╡s per element, so large-input `(reduce + (range 1e6))` / `(count (range 1e6))` TIME OUT** (correct value when they finish ΓÇË purely perf, not correctness). Quantified 2026-05-31 via the structural-defect probe sweep (startup baseline 0.48s subtracted): pure `dotimes`/`loop`-`recur` over 100000 = ~1ΓÇô2┬╡s/iter (FAST), but `count(range N)` Γëê 118┬╡s/element (linear, pathological constant), `count(map inc (range 20000))` Γëê 500┬╡s/element, `reduce + (vec (range 20000))` Γëê 5ΓÇô7s. Root cause is NOT GC over-triggering (`gc_heap.default_n_bytes` = 1MB adaptive threshold is fine) ΓÇË it is **per-element interpreter overhead**: (a) higher-order primitives (`reduce`/`map`) invoke the passed fn through the full `callFnVal`/vtable path per element (vs an analyzed inlined `(+ acc i)` in `loop`, which is fast), (b) lazy_seq realization steps a thunk through tree-walk per element, (c) per-object heap allocation cost. Finished-form fixes (all in the F-010-deferred perf window, do NOT attempt now per the no-premature-JIT directive): the superinstruction/fusion pass (cuts per-node interpreter overhead) + a `reduce`-over-`range` fast-path via the F-004 chunked `LongRange` day-1 type (reduces in a tight Zig loop with no per-element thunk) + a faster higher-order dispatch that avoids full call-frame setup per element. The narrow integer-loop JIT (D-133) does NOT subsume this ΓÇË `reduce+range` is alloc/dispatch-heavy, not an integer hot loop. Cross-ref F-010 (perf deferred post-M) / F-004 (chunked LongRange) / D-133 (JIT) / D-140 (startup perf). **cw v0 blueprint (investigated 2026-05-31, user-directed)**: cw v0 (`~/Documents/MyProducts/ClojureWasm/src/lang/builtins/sequences.zig`) solves exactly this with (1) a **compact `Meta.range` value** `{current, end, step}` (NOT cons cells ΓÇË the F-004 chunked-LongRange shape) and (2) **`fusedReduce`**: `map`/`filter`/`take`/`range` produce *meta-annotated* lazy-seqs (`__zig-lazy-map`/`-filter`/`-range` set a `LazySeq.Meta` tag); at reduce time `fusedReduce` walks the meta chain, extracts `[transformsΓÇ³] + base + take_n`, and iterates the base directly applying transforms inline Γ¶Ê **0 intermediate allocations** (measured: lazy_chain 21,375msΓ¶Ê16ms = 1336x, sieve 134x, transduce 526x), reusing the active VM for the per-element callback so no ~500KB VM alloc per call. This is the concrete plan for the F-010 perf window; pull forward WITH `PROVISIONAL:` markers if a corpus bench shows range-reduce hot (user authorised 2026-05-31). **D-168 relevance**: D-168 made `(range n)`/`(range a b)` a lazy cons-seq (was an eager vector) for correctness ΓÇË so `(count/reduce (range N))` now rides this per-element path (the old eager vector had O(1) count but the wrong type); the `Meta.range` + fusedReduce fast-path is now the both-correct-and-fast finished form. **RE-LAID 2026-05-31 (ADR-0065)**: the cw-v0 `fusedReduce` blueprint above is SUPERSEDED. cljw already ships complete JVM-shaped transducer arities (map/filter/take/drop/keep/remove 1-arg + transduce/completing/cat/into-xform/vec), so meta-annotated fusion would be a SECOND fusion mechanism = F-011 violation (the cw-v0 89K-LOC duplication pattern). Finished form = JVM's own answer: chunked seqs for the implicit `(reduce f (map g coll))` path + transducers for the explicit 0-alloc opt-in (one reducing-function model). First cycle (Alt C, ADR-0065): a `chunked_cons` reduceFn arm + `.clj`-callable chunk-builder primitives (`chunk-buffer`/`chunk-append`/`chunk`/`chunk-cons`/`chunk-first`/`chunk-rest`/`chunked-seq?`) + chunk-aware `map`/`filter`/`keep`/`remove` bodies ΓÇË they MUST land together (the reduce arm alone is inert; map's current `cons` body shreds chunks back to per-element Cons cells). Realistic **~4-7├ù** (NOT 1336├ù): chunking kills the per-thunk tree-walk + alloc term, but the per-element `f` vtable call is the residual, owned by D-133/superinstruction (out of scope). Cross-ref ADR-0065. **FIRST CYCLE DONE 2026-05-31 (O-004)**: chunk-preserving `map`/`filter`/`keep` (remove inherits) + `chunked_cons` reduceFn arm + `countFn` chunk drain + 7 `.clj` chunk-builder primitives. Measured `(count (map inc (range 1e5)))` 41.3s Γ¶Ê 2.8s (~15├ù, better than the estimated 4-7├ù ΓÇË the per-element fn-call residual was ~2┬╡s not 50-100┬╡s, measurement in ADR-0065 impl note). Off-by-one fixed (chunk-boundary empty lazy tail was over-counted by seqNext/nextFn/count ΓÇË now seq'd to nil). Later increments (route `into`/`sequence`/`eduction` through the existing transducer arities for explicit-path 0-alloc) are **low ROI deferred** ΓÇË the implicit path is now fast; pick up if a corpus bench shows the explicit path hot. | ┬¯9.2.S ΓÇË first cycle landed; later increments low-ROI deferred | 2026-05-31
