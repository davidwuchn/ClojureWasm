    status: "DISCHARGED 2026-06-10 (ADR-0093 am1) ŌĆö `(await a)` Ōåö watch-fire race root-fixed. SYMPTOM: Ubuntu x86_64 full gate failed e2e_phase16_agent agent_add_watch (`got '[[0 1] [1 2]]' want '[[0 1] [1 2] [2 2]]'`); the clj oracle reliably gives 3 fires (the `[2 2]` is await's own count-down action's no-op watch). Mac/JVM usually win the race; Linux lost it. ROOT CAUSE: await was `(send a (fn* [s] (deliver p s) s))` ŌĆö deliver INSIDE the body, so `runAction` released the awaiter (step callFn) BEFORE its `notifyWatches` fired the `[2 2]` watch; the awaiter could read `@log` before the swap. The e2e comment documented the intended CONTRACT (await guarantees every fire ran incl. its own `[2 2]`) ŌĆö the impl violated it. A real concurrency-correctness bug (user-directed root-fix: ŃĆīŃüōŃü«flaky testŃü»µĀ╣µ▓╗ŃüŚŃü”ŃüŖŃüŹŃü¤ŃüäŃĆŹ). FIX (minimal DA-Alt-2): agent queue element is now `Action{body: Value, completion: Value}` (body=nil = pure barrier, no state change; completion = optional promise the drainer delivers AFTER store+notifyWatches). `await` = `(__agent-await a)` (new primitive: enqueues a nil-body barrier that still fires the clj-faithful `[s s]` watch, returns the completion promise) mapped over agents + `(dorun (map deref ŌĆ”))`. Deterministic, watch-order-independent. Leaf-lock (F-006) preserved (deliver is post-pop/post-unlock); all agent e2e behaviours preserved (send_await/serial_100/send_args/send_off/concurrent_400/concurrent_agents_8/remove_watch[1 1]/nested_send/multi_await); agent_add_watch now 30/30 deterministic `[[0 1] [1 2] [2 2]]` on Mac. Surfaced 2026-06-10 (Ubuntu look-ahead gate)."
