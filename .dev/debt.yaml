    discharged_at: "DISCHARGED 2026-05-31 (cluster A26 cycle E): `math.zig::pairwise` now routes same-category big-number pairs (int/big_int, ratio/ratio, big_decimal/big_decimal) through `compare.valueCompare` (exact) via Order-domain predicates oLT/oGT/oLE/oGE/oEQ; the f64 path's `toF64` was extended to convert big_int/ratio/big_decimal (was zeroing them), fixing cross-category-with-float too (`(< 1/2 0.5)` → false). `==`/`<`/`>`/`<=`/`>=`/`neg?`/`pos?` all clj-correct for the tower; NaN/float/int regressions preserved. Residual: exact cross-category big-magnitude (Ratio vs Int huge) is the deferred D-014a combine ladder (f64 approximation, not zeroing). 19+5 e2e cases."
