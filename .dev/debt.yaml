    discharged_at: "DISCHARGED 2026-05-31 (cluster A26, after bit statics): `print.zig::printFloat` re-lays Zig `std.fmt.float.render` shortest-scientific output into JVM `Double.toString` form ΓÇË decimal layout when the decimal exponent Γêê [-3, 6] (`1e-3 Γë¨"
