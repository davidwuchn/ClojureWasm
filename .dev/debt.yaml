      scope | **clojure.core daily-driver coverage backlog**: a 2026-05-29 probe found ~35 high-frequency clojure.core fns unimplemented: update / mapv / filterv / reduce-kv / not-any? / frequencies / group-by / interpose / interleave / partition / partition-all / zipmap / range / repeat / repeatedly / iterate / cycle / take-while / drop-while / split-at / flatten / distinct / dedupe / sort / sort-by / max-key / min-key / reverse / last / butlast / fnil / reductions / vec / list* / update-keys / update-vals. **Cluster 1 Discharged** (update/vec/mapv/filterv/reverse/last). **Cluster 2 Discharged** (reduce-kv/update-keys/update-vals/not-any?/butlast). **Cluster 3 Discharged** (dedupe/distinct/frequencies/group-by — unblocked by D-136 universal `=`). **Cluster 4 Discharged** (empty?/interpose/fnil/zipmap/interleave). **Cluster 5 Discharged** (max-key/min-key/flatten/reductions-3arg). **Cluster 6 Discharged** (second/ffirst/not-empty/take-last/drop-last). **Sort cluster Discharged** (sort/sort-by — stable merge sort via D-137 compare). **All eager (a) clusters done.** **range (eager finite 1/2-arg) + map-indexed + keep-indexed Discharged** (multi-arity fn* confirmed working; D-NEW-2 "multi-arity deferred" comments in core.clj are STALE — separate cleanup). **lazy Layer-2 CLOSED (ADR-0054 / `ec9ccfed`); all (b) lazy forms landed**: repeat/repeatedly/iterate/cycle/take-while/drop-while/partition + infinite `(range)` 0-arg, and `(range start end step)` 3-arg step (inline lazy recursion in core.clj — JVM step-sign + step-0/start=end `not=` semantics; landed this cycle, e2e phase14_range_indexed). Remaining (b) edges: JVM step-0 chunked-seq nicety — minor JVM-completeness, NOT a coverage-floor blocker. **comp/juxt multi-arity + partition 4-arg pad DONE (§A26, 2026-05-30)**: `comp` 0/1/2/N-ary (right-to-left, any composed arity via apply); `juxt` multi-fn + multi-arg (was 2-fn/single-arg — N-ary builds the vector via reduce+conj since `mapv` is a later core.clj defn unresolvable at the juxt def site); `partition` 4-arg pad (`(take n (concat p pad))` final-partition padding). e2e phase14_comp_juxt_partition (12 cases) + 1 diff case. **complement multi-arg + map multi-coll (1/2/3-coll) + the `vector` fn DONE (§A26, 2026-05-30)**: `complement` → `(fn [& args] (not (apply pred args)))`; `map` 1/2/3-coll (parallel, stop-at-shortest); `vector` fn `(fn [& args] (vec args))` (was unresolved — unblocks `(map vector …)`/`(apply vector …)`). e2e phase14_map_complement_vector (11 cases). **split-with / take-nth / list* DONE (§A26, 2026-05-30)**: `split-with` → `[(take-while…) (drop-while…)]`; `take-nth` (lazy every-nth); `list*` 1-4-arg (the `(list* a args)` macro idiom; 5+-arg variadic deferred). e2e phase14_seq_core_batch (8 cases). **merge-with / partition-by DONE (§A26, 2026-05-30)**: `merge-with` (combine shared keys via `(f existing new)`, nil maps skip); `partition-by` (lazy runs where `(f x)` is constant — uses a `take-while` lazy_seq run, NOT `(cons fst (take-while …))`, since a raw cons-onto-lazy mis-counts — surfaced D-153). e2e phase14_merge_partition_by (8 cases). Still pending: `map` N-coll variadic (`& colls`; primitive-only seq-all, def-order, lower freq). NOTE surfaced: nested lazy-seqs inside a collection print as `#<lazy_seq>` (ADR-0054 cycle-2 "top-level realize only" — documented printer limitation); **D-153** (raw `(cons x lazy-seq)` mis-counts/prints). NEW coverage-floor gaps surfaced verifying this cycle (NOT clojure.core D-134 fns, separate): `fn` macro = D-145, `#()` reader macro = D-146 — both HIGH frequency for real-corpus loading. Remaining split by dependency: (a) pure-eager Pattern A (interpose/interleave/zipmap/distinct/dedupe/reduce-kv/reductions/butlast/fnil/update-keys/update-vals/flatten/group-by/frequencies/sort/sort-by/max-key/min-key — over existing primitives); (b) **lazy/infinite-dependent** (range/repeat/repeatedly/iterate/cycle/take-while/drop-while/partition — need finite-arity now + true lazy at the lazy-seq Layer-2 gap). This is the coverage floor D-133 names; it is the recurring quality-loop work per F-010. Discharge: knock out cluster-by-cluster (1-3 TDD cycles each), eager forms now, lazy forms with the lazy-seq wiring. | Recurring (row 14.13 + post-M quality loop); never "done" until cw-v0 parity-PLUS | 2026-05-29
  - id: "D-138"
    discharged_at: "Watch — intermittent (cause unconfirmed)"
    resolution: |-
      tooling | **`e2e_phase14_error_format` flaky in the full gate**: failed once (exit 1, [fail]) in a `test/run_all.sh` run on 2026-05-29, but PASSES standalone and on immediate gate re-run (98/98). Unrelated to the source change in that cycle (range/map-indexed — `error_format` doesn't reference them; its Case 6/7 use `(undefined-symbol)`/`(another-undefined)` + a per-run `mktemp` log file, so no stale-file path). Likely a transient timing/resource issue (the test spawns several `cljw -e` subprocesses) or an env-var (`CLJW_ERROR_FORMAT`/`CLJW_ERROR_LOG`) leak ordering effect. Discharge: reproduce under load (loop the gate N×), then either add explicit `unset CLJW_ERROR_FORMAT CLJW_ERROR_LOG` at the test's top + a subprocess-timeout guard, or pin the root cause. Until reproduced, a one-off gate failure on this step is a re-run, not a code regression. | Reproduce via repeated gate runs | 2026-05-29
  - id: "D-139"
    discharged_at: "Opportunistic — after fn_val serialization lands; when AOT error-frame param-name fidelity is wanted"
    resolution: |-
      scope | **AOT-built functions lose param-name labels in error frames**: ADR-0034 amendment 2 (A2-D3) serializes `fn_val` constants by `slot_base` + per-method `arity`/`has_rest` + recursive method-body chunk, but NOT the per-method param-name strings (`params` reconstructed as an empty slice). Param names are debug-only (error-frame labels); dispatch uses the `arity` field, so a `cljw build`-produced binary runs correctly but shows no param names in error stack frames. Dropping them avoids a `freeFunction` param-string ownership flag (deserialized param strings need a different free path than the analyzer-arena-owned compile path). Transparent fidelity gap, not a semantics drop. Discharge: serialize per-method param names + own them on the deserialized Function (a `bytecode_owned`-style flag freeing param strings + sub-chunks in `freeFunction`, or an arena) when error-frame fidelity for AOT binaries is wanted. Source: ADR-0034 amendment 2 A2-D3. **Raised (2026-05-30, ADR-0056 Cycle 2)**: AOT-bootstrap now restores clojure.core from bytecode on ALL startup paths, so the param-label gap now affects CORE fns' error frames, not just user `cljw build` binaries. Still labels-only (gate 125/125; no test depends on them). Deferred from Cycle 2 for memory-correctness care (the ownership marker above), NOT cycle budget (F-002). | Next focused AOT cycle (param fidelity) OR when error-frame labels wanted | 2026-05-30
  - id: "D-140"
    discharged_at: "Opportunistic — perf pass (post-v0.1.0 quality loop)"
    resolution: |-
      perf | **`cljw` startup reads its whole self-exe to check for an embedded trailer**: `builder.tryRunEmbedded` (`src/app/builder.zig`) calls `readSelfExe` (reads the entire ~1.4MB binary) on EVERY invocation, then `extractPayload` checks the 12-byte `[u64 len]["CLJC"]` footer at the tail. A plain `cljw -e …` thus reads 1.4MB only to find no trailer. Cold-start stays well under budget (page cache makes the re-read of the just-spawned exe cheap — measured 6560us vs 12000 threshold), so this is not blocking, but it is wasteful. Discharge: open self-exe, `stat` the size, read only the last 12 bytes (footer); if magic matches, positioned-read just the `[size-12-payload_len .. size-12]` payload region — avoiding the full-binary read on normal startup. Needs a positioned/seeking read on `std.Io.File` (confirm the 0.16 API). Source: D-100(b) step 3b (`cljw build` startup detect, 2026-05-29). | Opportunistic — startup perf pass | 2026-05-29
  - id: "D-137"
    discharged_at: "Discharged (ADR-0053: runtime/compare.zig valueCompare + `compare` rewired; 17 e2e cases) — sort/sort-by unblocked (separate stable-sort cycle); exact cross-category numeric→D-014a ladder"
    resolution: |-
      runtime | **`compare` is numeric-only — same class of bug as D-136 `=`**: `(compare :a :b)` / `(compare "a" "b")` / `(compare [1] [2])` raise type_error; only numbers compare (`(compare 1 2)`→-1). JVM `compare` (`clojure.lang.Util.compare`) is a general 3-way comparator: numbers by value, strings lexicographic, keywords/symbols by ns+name, vectors length-then-element-wise, booleans, nil lowest (nil < everything; `(compare nil x)`→-1, `(compare x nil)`→1, `(compare nil nil)`→0), anything Comparable. Blocks `sort`/`sort-by` (deferred behind this), sorted-map/sorted-set, `(sort-by key)` idioms. Discharge: extend `runtime/equal.zig` (or a sibling `runtime/compare.zig`) with `valueCompare(rt, a, b) anyerror!std.math.Order` mirroring valueEqual's dispatch (numeric by value across categories — note: compare DOES cross int/float unlike `=`; string lexicographic via std.mem.order; kw/sym by name; vector element-wise; nil lowest), rewire the `compare` primitive. Needs Step 0 survey (cw v0 compare, JVM Util.compare, the `=` precedent ADR-0052). Surfaced 2026-05-29 reaching for sort (D-134). | P1 next foundational cycle — survey then implement general compare | 2026-05-29
  - id: "D-136"
    discharged_at: "Discharged (ADR-0052: runtime/equal.zig valueEqual + `=` rewired + `==` added; 21 e2e cases) — keyEq widening→D-092, cross-category `==`→combine ladder"
    resolution: |-
      runtime | **`=` is numeric-only — a universal-equality correctness bug**: `=` is registered in `lang/primitive/math.zig:529` as `&equals` → `pairwise("=", … pEQ)` (numeric pairwise, the JVM `==` role). So `(= :a :a)` / `(= "a" "a")` / `(= [1 2] [1 2])` / `(= true true)` / `(= nil nil)` / `(= 1 nil)` all raise `type_error: =: expected number, got nil` (or "got <tag>") instead of returning true/false. JVM `=` is universal value equality (clojure.lang.Util.equiv): by-value across nil/bool/number/keyword/symbol/string + STRUCTURAL for collections; numeric `=` is category-based (`(= 1 1N)`→true, `(= 1 1.0)`→false), and `==` is the numeric-tower-equality op. This blocks dedupe/distinct/frequencies/group-by/set-membership-on-non-numbers and a huge swath of real code (the D-133 coverage floor). Discharge: add a neutral `runtime/equal.zig` `valueEqual(rt, a, b) bool` (fast bit-pattern path for nil/bool/int/char/interned kw·sym/identical-ptr; byte-equal strings; structural vector/list/map/set recursion; category-based numeric; different-tag → false, never error), rewire the `=` primitive to it, and add `==` as the numeric-equality primitive. Needs Step 0 survey (cw v0 equality, `runtime/hash.zig`, JVM Util.equiv, numeric-category semantics) — a focused cycle, not a tail-of-session rush. Surfaced 2026-05-29 writing dedupe (D-134). | P0 next cycle — survey then implement universal `=` | 2026-05-29
  - id: "D-135"
    discharged_at: "Opportunistic — analyzer empty-collection-literal handling"
    resolution: |-
      runtime | **Bare `()` rejected as an expression**: cljw raises `not_implemented "Empty list as expression value is not supported"` for a bare `()`, but JVM Clojure self-evaluates `()` to the empty list (it is NOT a call). Surfaced while writing `reverse` (D-134 cluster 1) — worked around with `'()` (quoted). Likely the analyzer treats `()` as an empty call form and bails before recognising it as an empty-list literal. Discharge: analyzer arm that evaluates a bare `()` to the empty PersistentList (mirror the `[]` / `{}` / `#{}` empty-literal path). Low-frequency in real code (most write `'()` or `(list)`), so opportunistic. | Opportunistic — when a corpus `.clj` uses bare `()` OR analyzer empty-literal pass | 2026-05-29
  - id: "D-133"
    discharged_at: "JIT-phase entry — coverage-floor prerequisite ordering (F-010 / ADR-0051)"
    resolution: |-
      structure | **JIT coverage-floor prerequisite (recorded, ordering deferred)**: the cw v1 runtime cannot yet run real Clojure code (interop syntax `.`/`new`/`set!` per D-121 VM follow-on D-130; daily-driver core cluster `get-in`/`assoc-in`/`concat`/`mapcat` D-126 + `pr-str`/`prn` D-127 missing; seqs eager not lazy). A cw-v0-level JIT on such a runtime repeats cw v0's 1.0x-on-`fib_recursive` trap (JIT never reaches a hot loop in real code). The coverage floor must be green before the JIT lands; the **ordering** of this floor vs the superinstruction/fusion pass is the JIT-phase entry owner's call (F-003 defer). Also folds the D-035 JIT-vtable extraction + superinstruction module-boundary foresight. | JIT-phase entry (post-Phase-15, M window) | 2026-05-29
  - id: "D-144"
    discharged_at: "Discharged (ADR-0055 am2: `Info.origin=.thrown` + `Info.data` + throw-time `*error-context*` snapshot via `dispatch.last_thrown_context` + `kindLabel`; `error_render.buildThrownInfo`; e2e `phase14_user_throw` 16 cases)"
    resolution: |-
      runtime | **User `(throw ex-info)` renders a degraded EDN error event**: `(throw (ex-info "boom" {:type :x}))` raises `error.ThrownValue` (the eval/VM signal, payload in `dispatch.last_thrown_exception`), NOT a catalog `raise`, so `setErrorFmt` never runs and the threadlocal `Info` stays null. `renderError`'s null-Info fallback emits `{:cljw/error true :file … :kind :unknown :message "ThrownValue"}` — no real kind/message, and (relevant to ADR-0055) **no `cljw.error/*error-context*` fields**, because the raise-time context snapshot lives in `setErrorFmt` which user-throws bypass. So `(with-context {…} (throw (ex-info …)))` does NOT carry context into the EDN event, while `(with-context {…} (/ 1 0))` (a catalog error) does. Pre-existing (affects ALL user throws, not introduced by with-context). Discharge: convert the thrown value into a structured `Info` at the throw→render boundary (kind from ex-info `:type`/class, message from `ex-message`, data from `ex-data`) AND snapshot `*error-context*` there too (the binding frame is still live at throw time, before `evalThrow`'s unwind pops it — same constraint as the catalog path). Likely a `renderError` extension that, when Info is null but `dispatch.last_thrown_exception` is set, builds an Info from the ex-info + the context provider. Source: ADR-0055 read-side verification (2026-05-29). | Error-system cycle (structured user-exception EDN rendering) OR when a corpus workload needs ex-info context in logs | 2026-05-29
  - id: "D-143"
    discharged_at: "Opportunistic — multi-arity apply spread vs fixed-method selection"
    resolution: |-
      runtime | **`apply` bind-direct ignores a fixed method whose arity equals the spread length (ADR-0042 am1 residual)**: `applyFn::canBindDirect` (`src/lang/primitive/higher_order.zig`) keys on `v.arity == leading_count` and, when true, binds the trailing seq straight to the variadic `& rest`. But if the callee ALSO has a fixed method whose arity equals `leading_count + (spread length)`, JVM Clojure spreads `(apply f x '(y))` to `(f x y)` and selects the FIXED method — cw v1 instead binds-direct to the variadic. Example: `(apply (fn ([a b] :two) ([a & r] :var)) x '(y))` → cw `:var`, JVM `:two`. Single-method variadic fns (the overwhelmingly common case, incl. every `& body` macro) are unaffected — bind-direct picks the only method either way. Discharge: in `canBindDirect`, when the callee has fixed methods, fall through to eager-spread (the general `applyFn` path already selects correctly via `selectMethod` on the spread arg count) rather than bind-direct; bind-direct stays only for the no-fixed-method-collision case. Needs the spread length, so either count the trailing seq (defeats the lazy-preservation for the multi-arity case — acceptable, it is rare) or bind-direct only when the callee has NO fixed method matching any plausible spread arity. Source: ADR-0042 am1 DA fork (2026-05-29). | Opportunistic — when a multi-arity fn is applied with a spread that should hit a fixed method (rare; surfaced by ADR-0042 am1 review, not a live failure) | 2026-05-29
  - id: "D-142"
    discharged_at: "nREPL EDN-error owner — Env-scope the `*error-context*` Var slot (latent multi-session race)"
    resolution: |-
      runtime | **`*error-context*` `*Var` slot is process-global (ADR-0055 D3)**: `cljw.error/*error-context*` (cw v1's first dynamic var) is read at error-raise time via a process-global `?*const Var` slot in `runtime/error/`, because `catalog.zig::raise(comptime code, location, args)` has NO `rt`/`env` access (an Env-scoped slot would ripple raise's signature across ~100 call sites). Correct for the single-Env CLI path — the ONLY path that renders EDN error events today (nREPL returns errors to the client via the protocol, bypassing `renderError`/`formatErrorEdn`). The Devil's-advocate (ADR-0055 Alternatives, Alt 1 break #1) flagged that a second Env (nREPL multi-session, the stated `env.zig` isolation goal) would race on the global slot: each Env has its own `cljw.error/*error-context*` Var (distinct ptr), so a global slot holding the last-registered Env's ptr would make `raise` snapshot the wrong Env's var → `deref` misses the threadlocal frame (keyed by a different ptr) → context lost. Latent (not manifest) until nREPL gains EDN error events carrying context. Discharge: when that path lands, either Env-scope the slot (thread `env`/`rt` to the snapshot site — likely an `Env.system_vars.error_context: ?*Var` field, which is ALSO the home the future `*out*`/`*ns*`/`*print-length*` Zig-owned dynamic vars want, per ADR-0055 Alt 2 / the F-003 system-var-registry imagination) OR make the slot a per-thread threadlocal set at Env-on-thread init. Source: ADR-0055 D3 + DA fork (2026-05-29). | nREPL EDN-error-event path landing (carries `*error-context*`) OR the system-var registry cycle (`*out*`/`*print-length*` owner) | 2026-05-29
  - id: "D-141"
    discharged_at: "Perf/bench owner — multi-lock anchor policy (defer per F-003; cross-ref D-005 σ-gate)"
    resolution: |-
      perf | **`bench/history.yaml` now carries multiple `lock: true` entries per (machine.id, backend)**: row 14.13 (2) added the v0.1.0 lock-point `14A.0` alongside the Phase-7-end `8A.0` for (mac-arm-m4pro, tree_walk). `scripts/check_bench_regression.sh` selects the anchor via `yq … | head -1`, which silently picks the OLDEST (`8A.0`), so the v0.1.0 lock-point is a historical record, NOT the active regression anchor. ADR-0044 § Lock mechanism assumed one lock per tuple and never defined multi-lock selection. The structural decision — anchor on oldest-origin ("never regress vs first baseline"; `binary_size_bytes` already at exactly 1.2x vs `8A.0` and will breach on the next binary growth) vs latest-release ("never regress vs last release"; risks baking a regression INTO the anchor at record time) vs replacing ratio-anchoring entirely with the D-005 Phase-17 σ-gate — has real tradeoffs and belongs to the perf/bench owner, not row 14.13. Recorded here to avoid Defer-to-amnesia + Silent-default-shift (the `head -1` resolution my commit made load-bearing is now documented). Discharge: when a 2nd+ release lock-point makes oldest-vs-latest selection bite, OR `binary_size_bytes` breaches 1.2x vs `8A.0`, decide the anchor policy (likely co-resolved with D-005 σ-gate) + amend ADR-0044 § Lock mechanism + update `check_bench_regression.sh`. Source: row 14.13 (2) v0.1.0 lock-point landing (2026-05-29). | Perf/bench owner — D-005 σ-gate (Phase 17) OR post-M quality-loop perf cycle OR `binary_size` 1.2x breach vs 8A.0 | 2026-05-29
  - id: "D-145"
    discharged_at: "Discharged (`expandFn` bootstrap transform in macro_transforms.zig — head `fn`→`fn*`; multi-arity/`&rest`/closure ride fn* per ADR-0041; self-name→D-147, destructuring→D-076; e2e phase14_fn_macro)"
    resolution: |-
      runtime | **`fn` (the macro) is unresolved — only `fn*` (special form) exists**: `((fn [x] (+ x 1)) 41)` → `Unable to resolve symbol: 'fn'`. core.clj + `defn` use `fn*` internally, but real Clojure corpus uses `(fn [args] …)` pervasively (every anonymous fn that is not `#()`). JVM `fn` is a macro over `fn*` adding optional self-name + multi-arity dispatch sugar + destructuring + pre/post conditions. Minimal cw v1 `fn` forwards to `fn*` for the common (no-destructure) case; the full shape needs a survey (does `fn*` already do multi-arity? is destructuring landed? is `fn` a bootstrap macro or an analyzer transform?). HIGH coverage-floor impact (D-133): without `fn`, most real `.clj` will not load — higher leverage than any single D-134 fn. Discharge: survey-first cycle (JVM `fn` macro, cw `fn*` capability audit, destructuring state) then land `fn`. Surfaced 2026-05-29 verifying D-134 (b) (the range 3-arg cycle). | P1 next coverage-floor cycle — survey then implement `fn` macro | 2026-05-29
  - id: "D-146"
    discharged_at: "Discharged (tokenizer `.fn_lit` arm + reader `readFnLit`/`transformFnLit` — literal `%N`/`%&`, bare `%`→`%1` canonicalised, emits `(fn* …)` directly [no new Node], nested `#()` → `fn_lit_nested`; e2e phase14_anon_fn_reader 7 cases)"
    resolution: |-
      runtime | **`#(…)` reader macro unimplemented**: `#(< % 3)` → `Invalid token '#'` — the reader rejects `#(`. JVM expands `#(f %1 %2)` at READ time to `(fn* [p1 p2] (f p1 p2))`, with params `%`/`%1`/`%2`/…/`%&` (rest). Pervasive in real corpus (terse predicates/mappers, e.g. `(filter #(> % 0) xs)`). Distinct from D-145 (`fn` macro) — this is a READER-layer transform, not a core macro. Discharge: reader arm recognising `#(` → read the inner form → collect `%`/`%N`/`%&` usages (max N → arity; bare `%` == `%1`) → rewrite to `(fn* [%1 … %&] body)`. Needs the reader + the `fn*` target (exists). Lower-priority than D-145 (`fn` covers the explicit form; `#()` is the terse sugar). Surfaced 2026-05-29 verifying D-134 (b). | Coverage-floor — when corpus `.clj` uses `#()` OR the reader-macro cycle | 2026-05-29
  - id: "D-147"
    discharged_at: "Coverage-floor — `fn*` self-name slot (dual-backend) so `(fn name …)` self-recurses"
    resolution: |-
      runtime | **`(fn name [params] body)` self-name is unsupported**: JVM binds `name` as a body-visible LOCAL (for self-recursion) distinct from `recur`. cljw's `fn*` has no self-name slot — a leading symbol falls into the multi-arity branch → `fn_star_params_not_vector` (bindings.zig). The `fn` macro (D-145) detects it and raises a clear transient `fn_named_not_supported` rather than forwarding to a confusing fn* error. Discharge: extend the `fn*` SPECIAL FORM with an optional leading self-name → allocate a body-visible slot bound to the closure Value, in BOTH backends (analyzer `bindings.zig` + TreeWalk fn* eval + VM op + ≥1 differential case per ADR-0036), then drop the `fn` macro's guard so it forwards the name. **Open design question (D-145 Step 0.6 survey)**: how the self-name local interacts with the existing `recur` `.fn_kw` target (`recur.zig`) — confirm it binds as a body-visible local without colliding with the recur machinery. ADR-0041-style cycle (the multi-arity fn* precedent); Devil's-advocate at depth ≥ 2. Lower corpus frequency than `#()` (D-146). Source: D-145 fn-macro Step 0.6 (2026-05-29). | Coverage-floor — named anonymous fns in corpus OR the fn* self-name cycle | 2026-05-29
  - id: "D-148"
    discharged_at: "Coverage-floor — static-field reads (`Math/PI`, `Math/E`, `Integer/MAX_VALUE`)"
    resolution: |-
      runtime | **Bare `Class/FIELD` static-field read unsupported**: `Math/PI` / `Math/E` (and `Integer/MAX_VALUE` etc.) are static FIELDS, written as a bare `Class/member` symbol with NO call parens, so they never reach the `analyzeStaticMethodCall` arm (which only fires inside a `(…)` call form — analyzer.zig qualified-head path). §A26 q1 shipped the call-form Math static METHODS (abs/sqrt/floor/ceil/round/pow/min/max) but deliberately did NOT fake `Math/PI` as a 0-arity `(Math/PI)` method (not JVM-faithful — JVM exposes it as a bare value symbol, not a call). Discharge: a static-field resolution path at symbol-analysis time — when a qualified symbol `Class/FIELD` resolves via `resolveJavaSurface` to a native descriptor and the member is a constant field, evaluate it as a value read. Needs a design call for where static-field constants live (a sibling `static_fields` map on TypeDescriptor vs a method_table entry flagged as a 0-arg constant). Source: §A26 q1 Math survey §4 + Step 0.6 (2026-05-29). | Coverage-floor — when corpus needs `Math/PI` / `Integer/MAX_VALUE` OR the static-field cycle | 2026-05-29
  - id: "D-149"
    discharged_at: "Discharged (§A26, 2026-05-30: printFloat in print.zig + formatFloat in form.zig append `.0` when no `.`/`e`/`E`; e2e phase14_float_print 8 cases) — residual: exact JVM `Double.toString` E-notation thresholds (cosmetic; `1e10`→`10000000000.0` not `1.0E10`, still round-trips)"
    resolution: |-
      runtime | **Whole-valued doubles print without the `.0`**: `cljw -e '5.0'` → `5` (and `(Math/sqrt 4)` → `2`, `(Math/abs -5.0)` → `5`), but JVM Clojure prints `5.0` / `2.0` — the trailing `.0` distinguishes a double from a long in printed / `pr-str` output and is required for read-round-trip fidelity (`(read-string (pr-str 5.0))` must yield a double, not a long). The value IS a float internally (`(float? 5.0)` → true); only the printer drops the `.0`. Affects `pr` / `prn` / `pr-str` / `str` on whole-valued doubles. Pre-existing (NOT introduced by §A26 q1 Math — surfaced while e2e-testing `(Math/abs -5.0)`; distinct from D-014a which is numeric LITERAL parsing / BigDecimal print). Discharge: the double formatter (`runtime/print` double path) appends `.0` when the formatted value has no fractional part and no exponent (mirror JVM `Double.toString` / Clojure's `pr` double rendering). Source: §A26 q1 Math e2e (2026-05-29). | Opportunistic — float-print fidelity OR clojuredocs differential surfaces it | 2026-05-29
  - id: "D-150"
    discharged_at: "Opportunistic — VM-mode Java-class ctor cljw-prefix parity (focused fix)"
    resolution: |-
      runtime | **VM `op_ctor_call` resolves the class via bare `rt.types.get(type_name)`, TreeWalk `evalConstructorCall` via `resolveJavaSurface`**: `vm.zig` `op_ctor_call` does `rt.types.get(type_name)` directly, but TreeWalk's `evalConstructorCall` (tree_walk.zig) calls `special_forms.resolveJavaSurface(rt, env, type_name)` which tries literal + `cljw.` + (post-§A26-q1) `cljw.java.lang.` prefixes. So a VM-mode Java-class ctor like `(java.io.File. "x")` (registered key `cljw.java.io.File`) would MISS the cljw-prefix that TreeWalk resolves → `symbol_unresolved` on VM but success on TreeWalk = a dual-backend parity gap (ADR-0036). Latent / unexercised today: no diff or e2e case runs a Java-class ctor on the VM backend; deftype/record ctors use literal `rt.types` keys (no prefix needed) so they pass on both. Discharge: route VM `op_ctor_call` through `resolveJavaSurface` (env is available in the VM dispatch loop) instead of bare `rt.types.get`, + a differential case for a Java-class ctor (needs a deterministic non-heap result, or assert via a field read / `instance?`). Distinct from D-130 (static dispatch). Surfaced by the D-130 Step 0 survey (2026-05-29). | Opportunistic — when VM-mode Java ctor parity matters OR a corpus workload runs `(pkg.Class. …)` under the VM backend | 2026-05-29
  - id: "D-151"
    discharged_at: "Cycle 1 DONE (array_map string keys, 2026-05-30); remaining: HAMT (>8 keys) value-hash = D-045"
    resolution: |-
      runtime | **Cycle 1 DONE (§A26, 2026-05-30)**: array_map + transient `keyEq` now route through `equal.keyEqValue(a,b)` (no-`rt`: identity fast path + `.string` byte-equality), so `(get {"x" 5} "x")` → 5, `(contains? …)` → true, `(assoc …)` replaces, structural `(= …)` over string-keyed maps works, and `:strs` destructuring (D-076) is unblocked. Keys by `=` (category-based: `{1 :a}` vs `1.0` → nil). e2e phase14_map_string_keys (10 cases) + 1 diff case. **Residual** (rare, pre-existing, NOT regressed): collection (vector/map/set) + ratio/big_decimal/big_int KEYS still compare by identity — the recursive/category `valueEqual` needs `rt`, which the ~68 map call sites lack; deferred (a future cycle could add a value-hash + a no-`rt` numeric/collection key path). **HAMT (>8-key maps)**: the `.hash_map` path is unimplemented (D-045) and raises explicitly — needs BOTH `keyEqValue` AND a value-consistent `valueHash` (byte-hash strings) for the equal/hash contract; that lands with D-045. ORIGINAL: **Map lookup misses value-equal STRING keys**: `(get {"x" 5} "x")` → nil and `(contains? {"x" 5} "x")` → false, even though `(= "x" "x")` → true (D-136 valueEqual byte-equal strings landed). Map `get`/`contains?`/`assoc` match INTERNED keys (keyword ✓, symbol ✓ — both identity/pointer-comparable) but compare strings by identity/hash that differs across separately-allocated `String` Values, so a string key never matches another string of the same bytes. JVM Clojure maps key by `=` (value equality) — `{"x" 5}` is fully usable. Blocks string-keyed maps generally + `:strs` map-destructuring (D-076: the `:strs` lowering is correct + forward-compatible but functionally returns nil until this lands). Discharge: route `runtime/collection/map` key hashing + equality through the same `runtime/equal.zig valueEqual` + a matching `valueHash` (byte-hash for strings) the `=` rewire (ADR-0052) established, so non-interned keys compare by value. Needs Step 0 survey (cw v0 map key hashing, `runtime/hash.zig`, the keyword/symbol intern fast-path vs the general path). Surfaced 2026-05-30 implementing D-076 cycle 2 `:strs`. | P1 foundational — value-keyed map equality/hash (sibling of ADR-0052 `=` rewire) | 2026-05-30
  - id: "D-152"
    discharged_at: "Opportunistic — diff-test harness can't cover bootstrap `.clj` closures cross-backend (low priority; not user-facing)"
    resolution: |-
      tests | **`evaluator.compare` diverges on expressions that call a bootstrap `.clj` closure**: a `((comp inc inc inc) 0)` differential case failed `r.equal` even though BOTH backends compute it correctly in real whole-program runs (tree-walk e2e → 3; a `-Dbackend=vm` whole-program run → 3). Root-cause hypothesis: `compare` (eval/evaluator.zig) bootstraps core.clj ONCE under a single backend (Fixture init) then swaps the vtable per run, so the second backend executes `fn_val`s that were analyzed/created under the FIRST backend — fine for primitives + expression-local `fn*` (the existing diff cases), but a bootstrap `.clj` closure (comp/juxt/most core.clj fns) created under backend A and called under backend B can diverge (likely the per-`Function` bytecode-vs-treewalk routing, or a CallSite/closure-capture artifact). NOT user-facing (users run one backend whole-program; both give the right answer). Effect: the Layer-3 differential oracle CANNOT cover any expression whose top-level call resolves to a bootstrap `.clj` fn — a real coverage hole for `.clj`-defined behaviour. Discharge: make the Fixture bootstrap per-backend (re-bootstrap core.clj under each backend before its run) OR document the constraint and rely on e2e for `.clj`-fn coverage. Needs investigation (confirm the root cause: does compare-VM error or mis-evaluate the bootstrap closure?). Surfaced 2026-05-30 adding a comp diff case (D-134). | Opportunistic — when differential coverage of `.clj`-defined fns is wanted, OR the diff harness is reworked | 2026-05-30
  - id: "D-153"
    discharged_at: "P1 — `(cons x lazy-seq)` raw cons caches a wrong `count` + prints truncated (lazy-seq foundational)"
    resolution: |-
      runtime | **A raw cons cell with a lazy_seq tail reports `count` 1 and prints truncated**: `(count (cons 0 (take-while … [2 3])))` → 1 (should be 3); `(cons 1 (take-while … [1 2 2]))` prints `(1)` (should be `(1 1)`). Root: `runtime/collection/list.zig consHeap` (L68) caches `.count = 1 + countOf(tail)`, and `countOf` (L108) returns 0 for a non-`.list` tail (lazy_seq) — so a cons onto an unforced lazy_seq caches count=1. `consFn` correctly keeps the lazy tail unforced (ADR-0054 cycle 1: must NOT realize at cons time), and `first`/`rest`/`reduce`/`vec`/`seq` all CROSS the boundary correctly (`(vec (cons 0 lazy))` → [0 2 3], `(rest (cons 0 lazy))` → (2 3)); ONLY the cached `.count` (the `count` primitive reads it for `.list`) and the eager list-printer (stops at the lazy boundary, ADR-0054 cycle-2 "top-level realize only") are stale. Effect: any direct `(cons x lazyseq)` mis-counts/mis-prints (lazy-seq-WRAPPED results like `(map …)` are fine — they count via the lazy_seq seq/rest loop, not a cached cons count). Discharge: a cons onto a lazy_seq can't cache an O(1) count — mark it lazy (a `count_known: bool` / sentinel on `Cons`) and have the `count` primitive traverse-realize for it; the list printer must realize a lazy_seq tail. Needs care (touches the `Cons` extern layout + count + print + the `1 + countOf(tail)` chaining). Workaround in practice: keep seqs lazy_seq-wrapped, not raw `(cons x lazyseq)` (partition-by does — uses a `take-while` run, not `(cons fst (take-while …))`). Surfaced 2026-05-30 implementing partition-by (D-134). | P1 — lazy-seq foundational cycle (sibling of ADR-0054); also unblocks raw cons-lazy print/count | 2026-05-30
  - id: "D-154"
    discharged_at: "DISCHARGED (2026-05-30, same session) — `print.zig::printCharReadable` emits `\\A` for printable ASCII + `\\space`/`\\newline`/`\\tab`/`\\return`/`\\backspace`/`\\formfeed` + `\\uXXXX` otherwise (readable form); `core.zig writeArgsSpaced` + `strFn` emit the bare UTF-8 char for the raw `print`/`str` form. e2e `phase14_char_print` (9 cases)."
    resolution: |-
      print | **Chars print as `\uXXXX` for ALL codepoints, not JVM's readable forms**: cljw's char printer emits `A` for `(char 65)` where JVM Clojure prints `\A`. JVM uses readable literals — `\A`/`\a` for printable ASCII, named forms `\space`/`\newline`/`\tab`/`\return`/`\backspace`/`\formfeed`, and `\uXXXX` only for non-printable/non-named. cljw always uses `\uXXXX`. Construction + value are CORRECT (codepoint round-trips: `(int (char 65))` → 65); only the printed surface diverges. Not a semantics drop. Discharge: the char arm of `runtime/print.zig` should emit `\<ch>` for printable ASCII, the named forms for the standard whitespace chars, and `\uXXXX` only otherwise (mirror JVM `clojure.lang.Util`/`RT.charToString`). Surfaced 2026-05-30 adding the `char` primitive (D-134). | Opportunistic — when char print fidelity (REPL / pr-str of chars) matters | 2026-05-30
  - id: "D-155"
    discharged_at: "Opportunistic — astronomically rare (full 32-bit Murmur3 collision)"
    resolution: |-
      runtime | **HAMT depth-exhaustion raises `error.HashCollision` instead of bucketing colliding keys (cycle C)**: when two distinct map/set keys share a full 32-bit `equal.valueHash`, `map.zig createTwoNode` (at shift > 30) raises `error.HashCollision` — a legal transient stub (explicit error, no silent drop). The analyzer converts it to a `feature_not_supported` message for map/set literals; primitives propagate it to the eval loop (bare render). Discharge: implement `HashCollisionMapNode` (tag 62, declared `heap_tag.zig:123`) — a flat linear-scan bucket for keys sharing a 32-bit hash, with assoc/get/dissoc arms + (if its layout diverges from the `[64]Value` slot region) a dedicated `traceHashCollisionMapNode`. Birthday bound ~77k keys for 50% collision at 32 bits, so essentially never hit in practice. Surfaced 2026-05-30 landing D-045 cycle A. | Opportunistic — when a real workload hits a 32-bit hash collision (essentially never) or adversarial-key robustness is wanted | 2026-05-30
  - id: "D-156"
    discharged_at: "Opportunistic — micro-optimization, no observable effect"
    resolution: |-
      runtime | **HAMT `dissoc` prunes emptied children but does NOT inline a single-entry sub-node into its parent**: `map.zig hamtDissoc` removes the entry and drops a fully-emptied child (clears the node bit), but a sub-node left holding a single data entry is not collapsed up into the parent as a data entry (the canonical CHAMP form). cw has no trie-shape-dependent operation (get/contains/assoc/keys/vals/seq/= are shape-independent; count is stored on `PersistentHashMap`), so a non-inlined node is observationally identical — only a micro-optimization (one extra traversal level + one extra node for the affected key). Discharge: add the single-entry-inline collapse to `hamtDissoc` (the mirror of cycle A's `createTwoNode` push-down). Surfaced 2026-05-30 landing D-045 cycle B. | Opportunistic — when HAMT depth / footprint after heavy dissoc is profiled and matters | 2026-05-30
  - id: "D-157"
    discharged_at: "Phase 15 (atom+watch bucket, ADR-0009/0010); WATCHES + VALIDATOR landed 2026-06-03 (ADR-0081)"
    resolution: |-
      **VALIDATOR LANDED 2026-06-03 (ADR-0081, same pattern as watches)**: `set-validator!`/`get-validator` for atoms — the `Atom` struct gained a `validator: Value` field (nil or a fn; GC-traced). `set-validator!` validates the CURRENT value against the new validator immediately (clj parity: throws IllegalStateException "Invalid reference state" if it fails) and returns nil; `swap!`/`reset!`/`compare-and-set!` validate the proposed value BEFORE committing — a falsey return throws IllegalStateException (via `dispatch.last_thrown_exception` + `error.ThrownValue`) and leaves the ref UNCHANGED. `get-validator` returns the fn (or nil). Corpus `atom_validator` (10); 8 e2e in phase14_atom_watch. RESIDUAL: the `(atom x :validator f :meta m)` constructor KWARGS are not parsed (atomFn stays arity-1) → **D-223** (the explicit set-validator! API is the primary surface). **WATCHES LANDED 2026-06-03 (ADR-0081, pulled-forward Phase-15 concurrency piece)**: `add-watch`/`remove-watch` for atoms — the `Atom` extern struct gained the planned `watches: Value` field (nil for the common zero-watch atom, else a persistent `{key→fn}` map; appended after `current`, header stays offset 0; GC-traced one line). `add-watch`=`assoc`, `remove-watch`=`dissoc` (clj-faithful key-replace + remove-absent-no-op); `swap!`/`reset!`/`compare-and-set!` fire watches SYNCHRONOUSLY after the in-place set via `notifyWatches` (`map.keys`+`map.get`+`invokeCallable`, `(fn key ref old new)`), on EVERY change incl. `old==new`, CAS on success only. DA-fork (ADR-0081) chose Alt 2 (struct field) over a Runtime side-table (GC dangling-key/leak) + a metadata side-block (F-003 over-reservation). `validator` still NOT added (F-003 — its own field when set-validator! lands). Multi-watch NOTIFICATION ORDER is clj-undefined (cljw array-map order vs clj hash order) → single-watch corpus only. Corpus `atom_watch` (8); 9 e2e phase14_atom_watch. ORIGINAL (basic atom): runtime | **Atom watches / validators / real CAS atomicity deferred**: basic single-threaded `atom`/`swap!`/`reset!`/`deref`/`@`/`compare-and-set!` landed 2026-05-30 (`runtime/atom.zig` + `lang/primitive/atom.zig`; pull-forward of the Phase-15 "atom+watch" bucket — ADR-0010 §79 "implement only atom" sketch). Deferred to Phase 15: `add-watch`/`remove-watch` (watch fns fired on change), `:validator` (set-validator!/validate on swap!/reset!), and real CAS-under-contention atomicity + the swap!-retry loop (single-threaded now → no contention, so a retry loop would be a no-op smell). The `Atom extern struct` is `{header,_pad,current}` with NO reserved watch field (F-003 / Reservation-as-bias) — Phase 15 APPENDS `watches`/`validator`/`meta` fields (header stays offset 0, `current` unmoved), an additive extension not a rewrite. compare-and-set! uses reference IDENTITY (JVM `AtomicReference`, not `=`) — recorded in the primitive docstring. Surfaced 2026-05-30 landing basic atoms. **§A26 (2026-06-02)**: an atom/state clj sweep re-confirmed `add-watch`/`remove-watch` are absent (`name_error`) — correctly Phase-15-deferred here (NOT a new gap; the would-be D-193 was a duplicate, removed). The non-deferred `swap-vals!`/`reset-vals!` (single-threaded, no CAS/watch needed) landed §A26 as `.clj` wrappers over swap!/reset!. | Phase 15 entry (concurrency buckets) | 2026-05-30
  - id: "D-158"
    discharged_at: "INFRA LANDED 2026-06-03 (ADR-0084 filesystem require); tier-2 lib-suite validation now runnable"
    resolution: |-
      **2026-06-03 — tier-2 prerequisite DONE (ADR-0084).** Filesystem `require`
      now loads a lib's `.clj`/`.cljc` source off a classpath (`-cp`/`CLJW_PATH`,
      default "."): `src/eval/loader.zig::loadNamespace` (analyze+eval into the
      env via `rt.load_arena`, cycle guard `require_in_progress` →
      `circular_require`, `*ns*` save/restore, `loaded_libs` idempotency) wired
