    status: "open (2026-06-20, surfaced bundling clojure.spec.alpha). LATENT GAP: an EAGER-bundled lib that does a top-level `(set! *config-var* v)` raises, because eager libs load DURING loadCore/buildBootstrapEnvelope (AOT build) + are replayed atomically by loadCoreAot (AOT restore) — both BEFORE `installBaselineBindings` establishes the thread-binding frame that makes config-var set! work (the frame is installed AFTER all libs load, in setupCore/setupCoreAot). spec.alpha's `(set! *warn-on-reflection* true)` was the first hit; it was DROPPED as a no-JVM adaptation (warn-on-reflection is a no-op in cljw), sidestepping the gap. But a future stdlib/contrib bundled lib that set!s a MEANINGFUL config var at top level (`*print-length*`/`*unchecked-math*`/`*math-context*`) WILL hit it. FIX (when a real consumer appears): install the baseline binding frame AFTER core.clj (FILES[0]) but BEFORE the non-core libs, in all three paths (loadCoreFiles source-mode, buildBootstrapEnvelope AOT-build, and crucially loadCoreAot AOT-restore — which replays the whole blob atomically, so the frame must be pushed before the replay or the set! op must be hoisted). The AOT-restore path is the hard part (atomic blob replay). Diagnostic landed this cycle: builder.zig buildBootstrapEnvelope now prints `[AOT-FAIL] <file> form #N` on a bootstrap-eval error (was a bare ValueError)."
