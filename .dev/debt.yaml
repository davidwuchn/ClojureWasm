    barrier: "GC-deinit finalise-vs-descriptor-free ordering (gc.deinit runs finalisers AND tears down gc.infra). Needs a finalise/teardown split — careful GC surgery, deferred from a 4am session. Not production-affecting (AOT binary works); blocks the datafy SOURCE-bootstrap bundle. Medium value (unblocks datafy + hardens deinit)."
