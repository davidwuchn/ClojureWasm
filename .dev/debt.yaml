      bounded within-session retention: a hot loop of `with-local-vars` grows
      `env.local_vars` until the session ends. The finished-form reclamation is a
      **generation-handle slotmap** (Alt C''): mint anon Vars from a pooled slot
      table, free/recycle the slot at the extent, bump a generation; an escaped
      var_ref carries (slot, gen) and derefs to Unbound when the gen is stale —
      zero leak AND zero UAF AND JVM-faithful Unbound-on-escape. Deferred as
      disproportionate for a rarely-used feature until a workload makes the
      retention material. Barrier dissolves when a real `with-local-vars`-heavy
      workload (or a long-running edge process) shows the retention matters; then
      build the slotmap + flip AD-015 (escape → real Unbound, not nil). Cross-ref
