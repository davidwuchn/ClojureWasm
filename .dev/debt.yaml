    status: "open (2026-06-20, clj-diff probe). Host java.util collections print OPAQUELY, losing their content: cljw `(prn (doto (java.util.ArrayList.) (.add 1) (.add 2)))` → `#<cljw.java.util.ArrayList>`; clj → `[1 2]`. clj prints java.util collections BY CONTENT in Clojure syntax: ArrayList→`[1 2]` (pr) / `[1, 2]` (str/toString), HashSet/TreeSet→`#{1 2}`, HashMap/TreeMap→`{:a 1}` (TreeMap sorted). cljw's `seq` over these already works (content IS accessible) — only print is opaque, so this is a real F-011 fidelity gap, NOT covered by AD-020 (which is opaque-IDENTITY objects like java.util.Random with no printable content). NOT a quick fix: TWO print contexts (pr vs str) + per-backing logic — HashSet/TreeSet/HashMap/TreeMap hold a NATIVE cljw persistent collection in host_instance state[0] (printable directly → exact clj form), but ArrayList holds a raw `*std.ArrayList(Value)` (state[0]) needing a vector rebuild. Design idea: an rt/env-aware print pre-pass (sibling of print.zig deepRealize) maps a 'collection' host_instance to its backing native Value before the pure printer (printValueNative line 973 `#<fqcn>`) sees it → pr gets `[1 2]`/`#{1 2}`/`{:a 1}` generically; str wants the Java-comma `[1, 2]` form (add a toString method per descriptor, reusing the existing str-context hook at print.zig:165). MODERATE value (printing a RAW java.util collection is uncommon — code usually `vec`/`into`s first), so deferred for a focused cycle rather than rushed into a long session. Repro: `(prn (doto (java.util.HashSet.) (.add 1) (.add 2)))` → cljw `#<cljw.java.util.HashSet>` vs clj `#{1 2}`. DISCHARGED (2026-06-20, same session — the focused cycle was now). Mechanism: a new `print_content: ?*const fn(rt, recv) anyerror!Value` hook on TypeDescriptor (fn-pointer field beside host_trace/host_finalise); the print pre-pass (print.zig deepRealize) calls it on a host_instance and RECURSES on the result (so nested host collections transform too — verified `[#{9}]`). The 5 descriptor