  - id: "D-139"
    discharged_at: "Opportunistic ΓÇË after fn_val serialization lands; when AOT error-frame param-name fidelity is wanted"
    resolution: |-
      scope | **AOT-built functions lose param-name labels in error frames**: ADR-0034 amendment 2 (A2-D3) serializes `fn_val` constants by `slot_base` + per-method `arity`/`has_rest` + recursive method-body chunk, but NOT the per-method param-name strings (`params` reconstructed as an empty slice). Param names are debug-only (error-frame labels); dispatch uses the `arity` field, so a `cljw build`-produced binary runs correctly but shows no param names in error stack frames. Dropping them avoids a `freeFunction` param-string ownership flag (deserialized param strings need a different free path than the analyzer-arena-owned compile path). Transparent fidelity gap, not a semantics drop. Discharge: serialize per-method param names + own them on the deserialized Function (a `bytecode_owned`-style flag freeing param strings + sub-chunks in `freeFunction`, or an arena) when error-frame fidelity for AOT binaries is wanted. Source: ADR-0034 amendment 2 A2-D3. **Raised (2026-05-30, ADR-0056 Cycle 2)**: AOT-bootstrap now restores clojure.core from bytecode on ALL startup paths, so the param-label gap now affects CORE fns' error frames, not just user `cljw build` binaries. Still labels-only (gate 125/125; no test depends on them). Deferred from Cycle 2 for memory-correctness care (the ownership marker above), NOT cycle budget (F-002). | Next focused AOT cycle (param fidelity) OR when error-frame labels wanted | 2026-05-30
  - id: "D-140"
    discharged_at: "Opportunistic ΓÇË perf pass (post-v0.1.0 quality loop)"
    resolution: |-
      perf | **`cljw` startup reads its whole self-exe to check for an embedded trailer**: `builder.tryRunEmbedded` (`src/app/builder.zig`) calls `readSelfExe` (reads the entire ~1.4MB binary) on EVERY invocation, then `extractPayload` checks the 12-byte `[u64 len]["CLJC"]` footer at the tail. A plain `cljw -e ΓÇ³` thus reads 1.4MB only to find no trailer. Cold-start stays well under budget (page cache makes the re-read of the just-spawned exe cheap ΓÇË measured 6560us vs 12000 threshold), so this is not blocking, but it is wasteful. Discharge: open self-exe, `stat` the size, read only the last 12 bytes (footer); if magic matches, positioned-read just the `[size-12-payload_len .. size-12]` payload region ΓÇË avoiding the full-binary read on normal startup. Needs a positioned/seeking read on `std.Io.File` (confirm the 0.16 API). Source: D-100(b) step 3b (`cljw build` startup detect, 2026-05-29). | Opportunistic ΓÇË startup perf pass | 2026-05-29
  - id: "D-137"
    discharged_at: "Discharged (ADR-0053: runtime/compare.zig valueCompare + `compare` rewired; 17 e2e cases) ΓÇË sort/sort-by unblocked (separate stable-sort cycle); exact cross-category numericΓ¶ÊD-014a ladder"
    resolution: |-
      runtime | **`compare` is numeric-only ΓÇË same class of bug as D-136 `=`**: `(compare :a :b)` / `(compare "a" "b")` / `(compare [1] [2])` raise type_error; only numbers compare (`(compare 1 2)`Γ¶Ê-1). JVM `compare` (`clojure.lang.Util.compare`) is a general 3-way comparator: numbers by value, strings lexicographic, keywords/symbols by ns+name, vectors length-then-element-wise, booleans, nil lowest (nil < everything; `(compare nil x)`Γ¶Ê-1, `(compare x nil)`Γ¶Ê1, `(compare nil nil)`Γ¶Ê0), anything Comparable. Blocks `sort`/`sort-by` (deferred behind this), sorted-map/sorted-set, `(sort-by key)` idioms. Discharge: extend `runtime/equal.zig` (or a sibling `runtime/compare.zig`) with `valueCompare(rt, a, b) anyerror!std.math.Order` mirroring valueEqual's dispatch (numeric by value across categories ΓÇË note: compare DOES cross int/float unlike `=`; string lexicographic via std.mem.order; kw/sym by name; vector element-wise; nil lowest), rewire the `compare` primitive. Needs Step 0 survey (cw v0 compare, JVM Util.compare, the `=` precedent ADR-0052). Surfaced 2026-05-29 reaching for sort (D-134). | P1 next foundational cycle ΓÇË survey then implement general compare | 2026-05-29
  - id: "D-136"
    discharged_at: "Discharged (ADR-0052: runtime/equal.zig valueEqual + `=` rewired + `==` added; 21 e2e cases) ΓÇË keyEq wideningΓ¶ÊD-092, cross-category `==`Γ¶Êcombine ladder"
    resolution: |-
      runtime | **`=` is numeric-only ΓÇË a universal-equality correctness bug**: `=` is registered in `lang/primitive/math.zig:529` as `&equals` Γ¶Ê `pairwise("=", ΓÇ³ pEQ)` (numeric pairwise, the JVM `==` role). So `(= :a :a)` / `(= "a" "a")` / `(= [1 2] [1 2])` / `(= true true)` / `(= nil nil)` / `(= 1 nil)` all raise `type_error: =: expected number, got nil` (or "got <tag>") instead of returning true/false. JVM `=` is universal value equality (clojure.lang.Util.equiv): by-value across nil/bool/number/keyword/symbol/string + STRUCTURAL for collections; numeric `=` is category-based (`(= 1 1N)`Γ¶Êtrue, `(= 1 1.0)`Γ¶Êfalse), and `==` is the numeric-tower-equality op. This blocks dedupe/distinct/frequencies/group-by/set-membership-on-non-numbers and a huge swath of real code (the D-133 coverage floor). Discharge: add a neutral `runtime/equal.zig` `valueEqual(rt, a, b) bool` (fast bit-pattern path for nil/bool/int/char/interned kw┬╖sym/identical-ptr; byte-equal strings; structural vector/list/map/set recursion; category-based numeric; different-tag Γ¶Ê false, never error), rewire the `=` primitive to it, and add `==` as the numeric-equality primitive. Needs Step 0 survey (cw v0 equality, `runtime/hash.zig`, JVM Util.equiv, numeric-category semantics) ΓÇË a focused cycle, not a tail-of-session rush. Surfaced 2026-05-29 writing dedupe (D-134). | P0 next cycle ΓÇË survey then implement universal `=` | 2026-05-29
  - id: "D-135"
    discharged_at: "Opportunistic ΓÇË analyzer empty-collection-literal handling"
    resolution: |-
      runtime | **Bare `()` rejected as an expression**: cljw raises `not_implemented "Empty list as expression value is not supported"` for a bare `()`, but JVM Clojure self-evaluates `()` to the empty list (it is NOT a call). Surfaced while writing `reverse` (D-134 cluster 1) ΓÇË worked around with `'()` (quoted). Likely the analyzer treats `()` as an empty call form and bails before recognising it as an empty-list literal. Discharge: analyzer arm that evaluates a bare `()` to the empty PersistentList (mirror the `[]` / `{}` / `#{}` empty-literal path). Low-frequency in real code (most write `'()` or `(list)`), so opportunistic. | Opportunistic ΓÇË when a corpus `.clj` uses bare `()` OR analyzer empty-literal pass | 2026-05-29
  - id: "D-133"
    discharged_at: "JIT-phase entry ΓÇË coverage-floor prerequisite ordering (F-010 / ADR-0051)"
    resolution: |-
      structure | **JIT coverage-floor prerequisite (recorded, ordering deferred)**: the cw v1 runtime cannot yet run real Clojure code (interop syntax `.`/`new`/`set!` per D-121 VM follow-on D-130; daily-driver core cluster `get-in`/`assoc-in`/`concat`/`mapcat` D-126 + `pr-str`/`prn` D-127 missing; seqs eager not lazy). A cw-v0-level JIT on such a runtime repeats cw v0's 1.0x-on-`fib_recursive` trap (JIT never reaches a hot loop in real code). The coverage floor must be green before the JIT lands; the **ordering** of this floor vs the superinstruction/fusion pass is the JIT-phase entry owner's call (F-003 defer). Also folds the D-035 JIT-vtable extraction + superinstruction module-boundary foresight. | JIT-phase entry (post-Phase-15, M window) | 2026-05-29
  - id: "D-144"
    discharged_at: "Discharged (ADR-0055 am2: `Info.origin=.thrown` + `Info.data` + throw-time `*error-context*` snapshot via `dispatch.last_thrown_context` + `kindLabel`; `error_render.buildThrownInfo`; e2e `phase14_user_throw` 16 cases)"
    resolution: |-
      runtime | **User `(throw ex-info)` renders a degraded EDN error event**: `(throw (ex-info "boom" {:type :x}))` raises `error.ThrownValue` (the eval/VM signal, payload in `dispatch.last_thrown_exception`), NOT a catalog `raise`, so `setErrorFmt` never runs and the threadlocal `Info` stays null. `renderError`'s null-Info fallback emits `{:cljw/error true :file ΓÇ³ :kind :unknown :message "ThrownValue"}` ΓÇË no real kind/message, and (relevant to ADR-0055) **no `cljw.error/*error-context*` fields**, because the raise-time context snapshot lives in `setErrorFmt` which user-throws bypass. So `(with-context {ΓÇ³} (throw (ex-info ΓÇ³)))` does NOT carry context into the EDN event, while `(with-context {ΓÇ³} (/ 1 0))` (a catalog error) does. Pre-existing (affects ALL user throws, not introduced by with-context). Discharge: convert the thrown value into a structured `Info` at the throwΓ¶Êrender boundary (kind from ex-info `:type`/class, message from `ex-message`, data from `ex-data`) AND snapshot `*error-context*` there too (the binding frame is still live at throw time, before `evalThrow`'s unwind pops it ΓÇË same constraint as the catalog path). Likely a `renderError` extension that, when Info is null but `dispatch.last_thrown_exception` is set, builds an Info from the ex-info + the context provider. Source: ADR-0055 read-side verification (2026-05-29). | Error-system cycle (structured user-exception EDN rendering) OR when a corpus workload needs ex-info context in logs | 2026-05-29
  - id: "D-143"
    discharged_at: "Opportunistic ΓÇË multi-arity apply spread vs fixed-method selection"
    resolution: |-
      runtime | **`apply` bind-direct ignores a fixed method whose arity equals the spread length (ADR-0042 am1 residual)**: `applyFn::canBindDirect` (`src/lang/primitive/higher_order.zig`) keys on `v.arity == leading_count` and, when true, binds the trailing seq straight to the variadic `& rest`. But if the callee ALSO has a fixed method whose arity equals `leading_count + (spread length)`, JVM Clojure spreads `(apply f x '(y))` to `(f x y)` and selects the FIXED method ΓÇË cw v1 instead binds-direct to the variadic. Example: `(apply (fn ([a b] :two) ([a & r] :var)) x '(y))` Γ¶Ê cw `:var`, JVM `:two`. Single-method variadic fns (the overwhelmingly common case, incl. every `& body` macro) are unaffected ΓÇË bind-direct picks the only method either way. Discharge: in `canBindDirect`, when the callee has fixed methods, fall through to eager-spread (the general `applyFn` path already selects correctly via `selectMethod` on the spread arg count) rather than bind-direct; bind-direct stays only for the no-fixed-method-collision case. Needs the spread length, so either count the trailing seq (defeats the lazy-preservation for the multi-arity case ΓÇË acceptable, it is rare) or bind-direct only when the callee has NO fixed method matching any plausible spread arity. Source: ADR-0042 am1 DA fork (2026-05-29). | Opportunistic ΓÇË when a multi-arity fn is applied with a spread that should hit a fixed method (rare; surfaced by ADR-0042 am1 review, not a live failure) | 2026-05-29
  - id: "D-142"
    discharged_at: "nREPL EDN-error owner ΓÇË Env-scope the `*error-context*` Var slot (latent multi-session race)"
    resolution: |-
      runtime | **`*error-context*` `*Var` slot is process-global (ADR-0055 D3)**: `cljw.error/*error-context*` (cw v1's first dynamic var) is read at error-raise time via a process-global `?*const Var` slot in `runtime/error/`, because `catalog.zig::raise(comptime code, location, args)` has NO `rt`/`env` access (an Env-scoped slot would ripple raise's signature across ~100 call sites). Correct for the single-Env CLI path ΓÇË the ONLY path that renders EDN error events today (nREPL returns errors to the client via the protocol, bypassing `renderError`/`formatErrorEdn`). The Devil's-advocate (ADR-0055 Alternatives, Alt 1 break #1) flagged that a second Env (nREPL multi-session, the stated `env.zig` isolation goal) would race on the global slot: each Env has its own `cljw.error/*error-context*` Var (distinct ptr), so a global slot holding the last-registered Env's ptr would make `raise` snapshot the wrong Env's var Γ¶Ê `deref` misses the threadlocal frame (keyed by a different ptr) Γ¶Ê context lost. Latent (not manifest) until nREPL gains EDN error events carrying context. Discharge: when that path lands, either Env-scope the slot (thread `env`/`rt` to the snapshot site ΓÇË likely an `Env.system_vars.error_context: ?*Var` field, which is ALSO the home the future `*out*`/`*ns*`/`*print-length*` Zig-owned dynamic vars want, per ADR-0055 Alt 2 / the F-003 system-var-registry imagination) OR make the slot a per-thread threadlocal set at Env-on-thread init. Source: ADR-0055 D3 + DA fork (2026-05-29). | nREPL EDN-error-event path landing (carries `*error-context*`) OR the system-var registry cycle (`*out*`/`*print-length*` owner) | 2026-05-29
  - id: "D-141"
    discharged_at: "Perf/bench owner ΓÇË multi-lock anchor policy (defer per F-003; cross-ref D-005 ╧â-gate)"
    resolution: |-
      perf | **`bench/history.yaml` now carries multiple `lock: true` entries per (machine.id, backend)**: row 14.13 (2) added the v0.1.0 lock-point `14A.0` alongside the Phase-7-end `8A.0` for (mac-arm-m4pro, tree_walk). `scripts/check_bench_regression.sh` selects the anchor via `yq ΓÇ³ | head -1`, which silently picks the OLDEST (`8A.0`), so the v0.1.0 lock-point is a historical record, NOT the active regression anchor. ADR-0044 ┬¯ Lock mechanism assumed one lock per tuple and never defined multi-lock selection. The structural decision ΓÇË anchor on oldest-origin ("never regress vs first baseline"; `binary_size_bytes` already at exactly 1.2x vs `8A.0` and will breach on the next binary growth) vs latest-release ("never regress vs last release"; risks baking a regression INTO the anchor at record time) vs replacing ratio-anchoring entirely with the D-005 Phase-17 ╧â-gate ΓÇË has real tradeoffs and belongs to the perf/bench owner, not row 14.13. Recorded here to avoid Defer-to-amnesia + Silent-default-shift (the `head -1` resolution my commit made load-bearing is now documented). Discharge: when a 2nd+ release lock-point makes oldest-vs-latest selection bite, OR `binary_size_bytes` breaches 1.2x vs `8A.0`, decide the anchor policy (likely co-resolved with D-005 ╧â-gate) + amend ADR-0044 ┬¯ Lock mechanism + update `check_bench_regression.sh`. Source: row 14.13 (2) v0.1.0 lock-point landing (2026-05-29). | Perf/bench owner ΓÇË D-005 ╧â-gate (Phase 17) OR post-M quality-loop perf cycle OR `binary_size` 1.2x breach vs 8A.0 | 2026-05-29
  - id: "D-145"
