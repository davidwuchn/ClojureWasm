    status: "PARTIAL (2026-06-16, ADR-0153 — future-cancel sub-steps 1 + 2 landed; DA-forked; cancellation arc DONE bar the rare deref-wait abort). DONE sub-step 1 (state machine): `future-cancel` / `future-cancelled?` + `FutureState += .cancelled`; `future-cancel` marks a still-`.pending` future `.cancelled` (true; false once realised/cancelled, clj parity); the worker's result store is GUARDED on `.pending` (mark-cancelled-wins, DA defect-1). DONE sub-step 2b (precise class): new catchable `Kind .cancellation_error` → `java.util.concurrent.CancellationException` (a RuntimeException via IllegalStateException; host_class ENTRIES + FQCN); `.future_cancelled` remapped off `.value_error`, so `(deref <cancelled>)` throws the precise CancellationException (catchable by name + supertypes, NOT by sibling IllegalArgumentException). DONE sub-step 2a (cooperative abort, Thread/sleep): threadlocal `future.current_future` (set by worker) + `Thread/sleep` polling `future.cancelRequested` in 20ms slices, raising the UNCATCHABLE `future_cancel_abort` (new `Kind .cancellation_abort` → null) which unwinds the thunk past its own `(catch Throwable …)` so a cancelled sleeping worker releases thread+GC-pin promptly; off-worker sleep unchanged (1 syscall). e2e phase14_future_promise_delay: future_cancel_pending / _deref_throws / _deref_cancellation_class / _deref_not_iae / _deref_ise_supertype / _sleep_cooperative_abort (cancel a (Thread/sleep 500) future, wait 900ms → @a stays :init: neither :slept nor :caught) / _done_false + smoke green. REMAINING (tracked here, NOT an AD): (i) deref-WAIT cooperative abort — a worker blocked on a NESTED (deref future/promise) is not yet aborted promptly (needs a future/promise.deref `?Value`→`anyerror!?Value` signature ripple + degrading the condWait park to a poll); LOW value (resource-release only, un-observable via state, currently inert with auto-collect OFF), so deferred with a concrete barrier rather than implemented now or papered with a blanket Alt-1 AD; (ii) the legacy/executor surface — CLASSIFIED by ADR-0155 (DA-forked). LANDED 2026-06-20 (5/8): `send-via`/`set-agent-send-executor!`/`set-agent-send-off-executor!` RAISE (AD-045 — cljw has no `java.util.concurrent` executor type; silent-ignore would be a lie, DA-confirmed); `agent-errors`/`clear-agent-errors` as core.clj sugar over the live `agent-error`/`restart-agent`. PART 2 LANDED 2026-06-20 (8/8 — the agent legacy/executor surface is now COMPLETE): `release-pending-sends` (flush `nested_pending` + RE-ARM-to-empty so subsequent in-action sends stay held, return count; clj-verified 0 outside an action), `*agent*` (interned Zig-side `clojure.core/*agent*` + cached `rt.agent_var`; the drainer binds it around each action body — visible to the action fn + its watches; nil outside), `shutdown-agents` (process-global `agents_shut_down` flag checked in `enqueueDirect`). PREMISE-CORRECTED: ADR-0155 part-1 assumed post-shutdown send THROWS; the clj oracle proved clj DROPS it (send returns the agent, no throw, action never runs — `Action.execute` swallows the RejectedExecutionException). Landed = the clj-faithful DROP (2nd DA fork, Alt A on F-011 priority); new AD-046 scopes the only residual divergence (clj routes the swallowed rejection to a set `:error-handler`; cljw has no exception type to synthesize, so it drops without firing it — the no-handler common case is byte-identical). e2e phase16_agent: agent_star_in_action/_outside_nil/_in_watch, release_pending_sends_in_action/_outside, shutdown_agents_returns_nil/_send_returns_agent/_action_dropped/_no_handler_fire. SUB-GAP NOTED (pre-existing, separate): `restart-agent` permits a NON-failed agent (clj raises 'does not need a restart'); `clear-agent-errors` inherits this on the non-failed edge. ORIGINAL: open (2026-06-15, Track R R1 parity micro-survey — D-440). Remaining clj concurrency-surface gaps after agent ctor options (D-441), await-for, swap-vals!/reset-vals!, io! all landed. NOT-YET-IMPLEMENTED, by value: (1) future-cancel / future-cancelled? — cljw futures run on DETACHED std.Thread with no interrupt/cancel mechanism; faithful support needs cooperative cancellation infra (a per-Future cancel flag + cooperative checks at safepoints, and future-cancel returning false once running/done per clj Future.cancel). future-done? exists but is timing-racy on a just-spawned future (clj has the same race). (2) LOW-VALUE legacy / executor surface (likely accepted-not-implemented or thin): agent-errors / clear-agent-errors (pre-1.0 multi-error API; agent-error singular exists), send-via / set-agent-send-executor! / set-agent-send-off-executor! (cljw has one implicit pool, no user-exposed executors), shutdown-agents (detached threads, no pool to shut), *agent* (the agent bound inside its own action), release-pending-sends, io! ALREADY DONE. (3) io! / dosync side-effect guard — DONE this session. Decide each: implement, accept-divergence (AD-NNN with derives_from), or thin-stub. future-cancel is the only medium-value item and is infra-gated; the rest are low-value completeness."
