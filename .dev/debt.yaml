  - id: "D-431"
    status: "RE-NARROWED 2026-07-02 (audit): the central OVER-CLAIM finding is now INVERTED — Instant/Duration/LocalDateTime/BigDecimal ALL resolve and work. Remaining work is ONLY corpus-building for the landed surface + java.util.Arrays. ORIGINAL: PARTIAL (2026-06-14, the F-014/ADR-0137 completeness gate — makes per-class Java completeness a real GATE, not a vibe). MECHANISM LANDED + String/Object closed: scripts/clj_diff_sweep.sh gained --class-corpus <Class> (→ test/diff/class_corpus/<Class>.txt); check_corpus_regression.sh now scans clj_corpus/ AND class_corpus/, so the per-class corpus is gated by the EXISTING smoke step (corpus_regression) — no new gate. String.txt (44) + Object.txt (15, universal Object methods) + Throwable.txt (15, the exception family on the shared .ex_info descriptor) landed; the frequency data is private/clojure_frequent_java_interop/00a_frequency_overview.md (§2 class freq / §5 instance-method freq). Building each corpus surfaced + fixed real completeness gaps same-cycle (oracle-catches-under-scoping in action): String — .indexOf/.lastIndexOf fromIndex+codepoint overloads, .stripLeading/.stripTrailing, .compareToIgnoreCase, .intern; Throwable — .getLocalizedMessage; Pattern — /compile + /matches statics + .pattern instance accessor (were empty reservations). Corpora landed: String(44) Object(15) Throwable(15) Pattern(7) Matcher(11) Math(52) ArrayList(17) HashMap(18) StringBuilder(15) Long(19) Integer(19) Double(15) Boolean(11) Character(13) UUID(8) Random(6, SEEDED — cljw matches Java's exact LCG) URI(7, /create completed) Date(6, .before/.after completed) [18 classes — per-class coverage of built+deterministic+touched classes CLOSED, exhaustive-then-closed not drip]. UUID gap fixed: instance bit-accessors getMostSignificantBits/getLeastSignificantBits/version/variant/compareTo (were missing; static fromString/toString only). OVER-CLAIM FINDING: the corpus campaign surfaced that compat_tiers lists `methods:` for classes that DON'T resolve ('No namespace') — the whole java.time family (Instant/Duration/LocalDateTime/ZonedDateTime, runtime/time unbuilt = D-105/D-243), java.math.BigDecimal, java.util.Arrays. These are FEATURE gaps (build the surface), NOT D-431 completeness gaps; the corpus correctly excludes them. This is the stale-hand-list problem ADR-0137 fixes via the generated index. HashSet/TreeMap absent (candidates). Boxing family: Long/Integer/Boolean already complete; Double gained .isFinite, Character gained .isAlphabetic/.toString. Excluded: Double/MIN_VALUE denormal print-edge (same bits), Character/isSpaceChar (Unicode SPACE_SEPARATOR, rare, out-of-common-surface). Per-class gaps fixed same-cycle: ArrayList .addAll; HashMap .getOrDefault/.putIfAbsent/.containsValue; StringBuilder .isEmpty/.charAt/.deleteCharAt/.insert/.setLength/.reverse (codepoint-indexed, ADR-0014). Math already complete — corpus locks it; the compat_tiers methods hand-list was stale, missing log/exp/trig/hypot that ARE wired — confirms ADR-0137's 'generate the index from the corpus' point. java.util.HashSet/TreeMap absent (not partial — in-scope candidates, not completeness gaps). Accepted divergences are OUT of the corpus, locked by AD pins / debt instead (.hashCode AD-009, .getClass AD-003, nil-receiver F-011, exception .toString/str-vs-pr D-433). REMAINING (per-class corpus coverage is CLOSED — the rest is NOT more of this sweep): (a) build the over-claimed feature surfaces (java.time family D-105/D-243, BigDecimal, Arrays) — then corpus them; (b) make the lib stop-chasing rule mechanical = a blocker is 'general' iff its failing surface has a class_corpus home; (c) anchor the linguistically-general Axis-1 in/out list to a frequency threshold; + generate compat_tiers.yaml `methods:` index from the passing corpus (kills both the under-claim and over-claim the campaign found). Non-deterministic classes (System clock/env, randomUUID, Math/random) are not golden-corpus-able. Big-bang per class (clj_diff_sweep.md Discipline 2), not drip. UPDATE 2026-06-20: File.txt landed (23 deterministic path-method cases; #1-frequency interop class). Building it SURFACED + FIXED a real gap — cljw stored the RAW constructor path, so getPath/toString diverged from Java's UnixFileSystem.normalize (`/a//b/c`→cljw \"/a//b/c\" vs clj \"/a/b/c\"; `a/b/`→\"a/b/\" vs \"a/b\"). Fixed via a normalizePath applied at construction (collapse `/` runs + strip a trailing `/` unless the path is `/`; no ./.. resolution). FS-touching methods stay covered by phase16_java_io_file.sh. ALSO 2026-06-20: IMPLEMENTED `java.util.HashSet` — one of the two 'absent candidates' flagged above — as a NEW surface (host_instance over a cljw persistent-set HAMT: O(log n) dedup via cljw value semantics; add/remove/contains/size/isEmpty/clear/addAll + Seqable/-count). e2e phase14_hashset.sh + class_corpus/HashSet.txt (11 cases) + compat_tiers entry (keyword hash_set_java); all clj-oracle-matched. Layer-0 seq-walk avoided (init shares the HAMT; addAll vector-only, `(vec coll)` for other seqables = ArrayList's documented limit). ALSO 2026-06-20: IMPLEMENTED `java.util.TreeSet` (the SORTED sibling) — host_instance over a cljw persistent sorted-set RB-tree; add/remove/contains/size/isEmpty/clear/addAll/first/last + Seqable/-count. Iteration is SORTED = real clj parity (seq pinned DIRECTLY, not AD-001-wrapped). e2e phase14_treeset.sh + class_corpus/TreeSet.txt (11) + compat_tiers entry (tree_set_java). The wider NavigableSet surface (floor/ceiling/headSet/tailSet/subSet/descendingSet) is a deliberate follow-up. Side-fix: phase15_ns_import.sh's unsupp-load/unsupp-use used HashSet as the 'unsupported class' example — now supported, so swapped to java.util.ArrayDeque (the full-gate miss-window caught this; smoke runs only the changed step). ALSO 2026-06-20: IMPLEMENTED `java.util.TreeMap` (the LAST absent candidate — the java.util container family HashMap/ArrayList/HashSet/TreeSet/TreeMap is now COMPLETE). host_instance over a cljw persistent sorted-map RB-tree; put/get/containsKey/remove/getOrDefault/putIfAbsent/size/isEmpty/clear/keySet/values/firstKey/lastKey + Seqable/-count. Iteration by KEY = clj parity. The `{…}`-seed is REBUILT into a sorted map via forEachEntry (GC-safe, no seq-walk); sorted-map/TreeMap seeds share the RB-tree. e2e phase14_treemap.sh + class_corpus/TreeMap.txt (11) + compat_tiers entry (tree_map_java). AD-032 EXTENDED to TreeMap: raw `(seq tm)`/`.keySet`/`.values` are cljw collections (MapEntry/seq) not Java Entry/Set/Collection views — the corpus pins the matched forms (into / map-key-over-seq / sort-of-keySet), the e2e pins cljw's forms. The wider NavigableMap surface (floorKey/ceilingKey/headMap/tailMap/subMap/descendingMap) + `.containsValue` are a follow-up. ALSO 2026-06-20: closed a gap the TreeMap work surfaced — `(keys java-map)` / `(vals java-map)` ERRORed (HashMap/TreeMap host_instances had Seqable -seq but no IPersistentMap -keys/-vals; clj allows keys/vals on a java.util.Map). Added `-keys`/`-vals` MethodEntries (reusing keySet/values) to both; `(keys hm)`/`(vals hm)`/`(keys tm)`/`(vals tm)` now match clj (corpus cases added to HashMap.txt + TreeMap.txt). ALSO 2026-06-20: closed a WIDER cluster the keys/vals work surfaced — `(get hm k)` SILENTLY returned nil (correctness bug), `(contains? hm k)` / `(contains? hs k)` ERRORed, `(:k hm)` returned nil. cljw `get`→ILookup `-lookup`, `contains?`→Associative `-contains-key?`; the host_instances lacked both. Added ILookup `-lookup` + Associative `-contains-key?` to HashMap/TreeMap (`(get hm k)`/`(get hm k d)`/`(:k hm)`/`(contains? hm k)` now match clj), and Associative `-contains-key?` to HashSet/TreeSet (`(contains? hs k)` works; `(get hs k)` STAYS nil = clj parity — a java.util.Set is a Collection, not an IPersistentSet). Shared-code fix: `lookup.invoke`'s keyword-as-fn arm now routes a host_instance through `lookupDispatch` (so `(:k hm)` ≡ `(get hm :k)`; generalizes to any -lookup-bearing host_instance). All clj-oracle-matched; corpus cases added to all four class corpora. ALSO 2026-06-20: the NavigableMap/NavigableSet CORE navigation methods (the 'deliberate follow-up' flagged above) LANDED — TreeMap.floorKey/ceilingKey/lowerKey/higherKey + TreeSet.floor/ceiling/lower/higher (greatest ≤ / least ≥ / greatest < / least >, nil if none). Backed by a NEW `sorted.navKey` (O(log n) RB-tree descent using only the collection's comparator — no seq realization, no test-fn resolution); this also makes the D-466-sub `(instance? java.util.NavigableMap/NavigableSet tm/ts)` registration functional (instance? + nav now both real). clj-verified incl. nil edges; class_corpus TreeMap.txt (+6) / TreeSet.txt (+5). REMAINING NavigableMap/Set follow-up (lower-value range views): headMap/tailMap/subMap/descendingMap + the *Entry variants (floorEntry/ceilingEntry/firstEntry/lastEntry) + descendingSet — take up on a real consumer."
