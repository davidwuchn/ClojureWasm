  - id: "D-177"
    discharged_at: "DISCHARGED 2026-06-01, **re-corrected 2026-06-02 (§A26)**: the 2026-06-01 discharge OVER-CLAIMED — it listed `take-while`/`drop-while`/`take-nth`/`partition-by` as having transducer single-arities, but a §A26 differential sweep found **5 were actually still missing** (`take-while`/`drop-while`/`take-nth`/`keep-indexed`/`replace`/`partition-by` raised arity_error as xforms). Landed 2026-06-02: `drop-while`+`interpose` (commit 1), then `take-while`/`take-nth`/`keep-indexed`/`replace`/`partition-by` (commit 2) — all over the volatile!/reduced? foundation, verified composed with `take` + under `transduce` (8 e2e in phase14_transducers.sh + phase14_seq_helpers2.sh). `random-sample` is still undefined (separate, lower-priority — non-deterministic). LESSON: a discharge that lists coverage must probe each item, not assume the cycle landed them (audit_scaffolding false-positive class). Prior (now-corrected) discharge prose: the transducer single-arities (`map`/`filter`/`take`/`drop`/`keep`/`remove`/`map-indexed`/`partition-all`/`dedupe`/`distinct`/`cat`/`halt-when`) + `transduce`/`completing`/3-arg `into` landed 2026-05-30 (cycles 1-5); `mapcat` 1-arg landed 2026-06-01. The lazy pull surface (`sequence`/`eduction`) is the only remaining transducer gap, tracked separately as **D-160** (needs a push→pull bridge). clj-grounded (`(into [] (mapcat …) …)` / `(transduce (mapcat range) + 0 …)`). Description below = pre-landing context."
