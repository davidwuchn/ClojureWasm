      runtime | **Transient hash map `assoc!` is persistent-path O(log32 n) copy-on-write, not an in-place editable transient** (ADR-0064 Alt 1). Past `ARRAY_MAP_THRESHOLD` (8) the transient holds a persistent `.hash_map` in `overflow` and delegates `assoc!`/`dissoc!` to `map.assoc`/`map.dissoc` ŌĆö correct (the result equals `(reduce conj {} ŌĆ”)` byte-for-byte) but with no in-place allocation win, so `(into {} big)` is O(n log n) like the persistent path, not the O(1)-amortised-assoc + O(1)-persistent! a true transient gives. **Finished-form candidate (named by the ADR-0064 Devil's-advocate): an editable CHAMP HAMT with a ClojureScript-style edit token** (a freshly-minted sentinel `?*anyopaque` compared by identity ŌĆö cljs proves this works single-threaded, fitting cljw's no-threading + no-`pub var` constraints). Cost: adds an `edit` field to the `HamtMapNode` `extern` layout (F-004) + a parallel `ensureEditable`-gated editable-insert path through `hamtAssoc`/`insertDataEntry`/`pushDownDataToNode`; also inherits the unfinished collision bucket (D-155). NOT Alt 2 (flat + open-addressing side index + `map.fromSlice`) ŌĆö the ADR-0064 DA showed `map.fromSlice` is not an O(n) bulk build (CHAMP slot placement is hash-driven), so Alt 2 pays for a second hash mechanism (F-011 liability) for only a constant-factor win. Surfaced 2026-05-31 by the O-003 into/vec transient routing (D-180). Cross-ref ADR-0064 / D-045 / D-155 / D-156 / F-002 / F-004 / F-011. | blocked-by: a corpus / bench measurement shows large-map `into` / `assoc!` as a hot path (then build the editable-CHAMP transient per ADR-0064 Alt 3) | 2026-05-31
