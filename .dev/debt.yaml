  - id: "D-090"
    discharged_at: "DISCHARGED 2026-06-01 (quality-loop floor drain): fn-body recur landed on BOTH backends + the analyzer. TreeWalk `callMethodImpl` wraps the body eval in a recur-catch `while` loop (drains `pending_recur_buf` into `locals[slot_base+i]`, re-enters); VM `compileFnMethodBody` seeds the sub-compiler's `current_loop` with the param slots + `top_ip = 0` so `compileRecur` emits op_store_local + a back-edge op_jump to ip 0; analyzer `bindings.zig` fn `RecurTarget.arity` corrected to `arity + has_rest` so a variadic `(fn [a & r] (recur x ys))` rebinds the rest param. Constant-stack (1e6-deep recur safe). 7 e2e (phase14_fn_recur incl. --compare parity) + 2 diff cases (diff_test.zig). clj-grounded; a recur inside an enclosing loop still targets the loop (inner frame)."
    resolution: |-
      runtime | **`recur` inside fn-body propagates uncaught**: the analyzer's `Scope.recur_target` carries `kind = .fn_kw` for fn bodies, but at runtime only `evalLoop` catches `error.RecurSignaled`. fn-body recur (`(fn* [n] (if (= n 0) :done (recur (- n 1))))`) raises `RecurSignaled` uncaught. Surfaced when row 7.8 cycle 1's e2e originally tried per-arity recur — confirmed pre-existing via `git stash` rollback. Discharge route: `callFunction` (TreeWalk) wraps the body eval in a `while` loop that catches `RecurSignaled`, copies `pending_recur_buf[..method.arity]` back into `locals[slot_base..]`, and re-enters the same method's body. VM op_call dispatch needs the same shape via its `evalChunk` hook. Per-method scope creation from row 7.8 cycle 1 already sets the analyzer-side groundwork (each FnMethod's body is analyzed with its own `recur_target` arity). recall trigger: opportunistic — any cycle that touches `callFunction` or wants user-facing `recur` in fn-body. Source: row 7.8 cycle 1 e2e diagnosis (`private/notes/phase7-7.7-survey.md` R1 + cycle 1 implementation). | DISCHARGED 2026-06-01 | 2026-06-01
