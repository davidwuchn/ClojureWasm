  - id: "D-234"
    status: |-
      DISCHARGED 2026-06-03 ŌĆö `for` rewritten from mapcat-of-singletons to
      clj's `letfn` + `lazy-seq` `emit-bind` shape (`src/lang/macro_transforms.zig`
      forStep): each binding group is a self-recursive iterator
      `(giter [gxs] (lazy-seq (loop* [gxs gxs] (when (seq gxs) (let [bind (first
      gxs)] <do-mod>)))))` (self-ref via letfn ŌĆö cljw has no named-fn self-ref),
      `do-mod` threads modifiers in order (`:let`ŌåÆlet, `:while`ŌåÆ`(when t ŌĆ”)`
      terminate, `:when`ŌåÆ`(if t ŌĆ” (recur (rest gxs)))` skip), innermost emits
      `(cons body (giter (rest gxs)))`, nested splices via `(let [fs (seq (child
      coll))] (if fs (concat fs (giter (rest gxs))) (recur (rest gxs))))`. Now
      clj-exact for ALL `:while` positions incl. post-`:when` (the previously
      impossible case) and `:while` reading a same-group `:let` var. 12 ad-hoc
      clj-oracle cmps + 7 e2e (phase15_for_while). NO diff-oracle cases: `for`
      is a macro expanding to bootstrap `.clj` closures (letfn/lazy-seq/concat/
      cons), so `evaluator.compare` hits the documented bootstrap-closure blind
      spot; both backends verified correct whole-program (VM default +
      `-Dbackend=tree-walk` both match clj). for.clj went from won't-load to
      49/51 pass (2 errors = `(Integer. ŌĆ”)` ctor interop, unrelated).
      `for_while_not_supported` catalog code fully removed (variant + entry arm,
      dead). Cross-ref D-134 / D-133 / F-011.
    category: "runtime"
    barrier: |-
      **`(for [a coll :when w :while p] ŌĆ”)` raises `for_while_not_supported`.**
      cljw's `for` lowers to a mapcat-of-singletons composition; a `:while`
      immediately after a binding lifts to `take-while` on that coll (the
      common idiom, works), but a `:while` after a `:when`/`:let` in the same
      group cannot. clj's semantics apply `:while` AFTER the `:when` filter ŌĆö
      it breaks only on elements that PASSED `:when`. Proof:
      `(for [a (range 5) :when (> a 0) :while (odd? a)] a)` ŌåÆ clj `(1)` (a=0 is
      skipped by `:when`, so `:while` never sees it and does not break); a
      raw-coll `take-while` lift would break at a=0 and yield `()`. A
      mapcat-of-singletons has no "stream at the modifier point" to truncate,
      so the post-filter sequential short-circuit is inexpressible by lifting.
      **Finished-form fix**: rewrite `for` to clj's `letfn` + `lazy-seq` step
      shape (one step-fn per binding level; `:while` ŌåÆ `(when p <cont> nil)`,
      `:when` ŌåÆ skip, `:let` ŌåÆ inner let), mirroring
      `clojure.core/for`. Both prerequisites now exist (letfn* + the lazy_seq
      producer, D-133). This is a depth-3 macro redesign of `expandFor`
      (`src/lang/macro_transforms.zig`); `doseq` (loop/recur) already handles
      `:while` correctly and is the reference for the per-element modifier
      order. NOT urgent (the common `:while`-after-binding case works); HIGH
      value for upstream-suite parity (for.clj). Cross-ref D-134 / D-133 /
      F-011 / F-002 (finished-form). recall trigger: the for-macro redesign
      cycle, or a corpus lib using `:while` after `:when`.
    last_reviewed: "2026-06-03"
  - id: "D-233"
    status: |-
      DISCHARGED 2026-06-03 (root cause was NOT "unresolved class" ŌĆö it was an
      8-bit operand overflow). `op_ctor_call`'s operand packed
      `(name_idx << 8) | arg_count`, truncating the class-name constant index
      to 8 bits; in a chunk with > 255 constants (a large `deftest`) name_idx
      overflowed and the VM read a NON-String constant ŌåÆ `raiseInternal("vm:
      op_ctor_call name is not a String")`, aborting the whole `run-tests`
      batch. **Fix**: route ctor calls through a `ctor_sites` side-table
      (`CtorEntry { type_name, arg_count }`), mirroring `op_method_call`'s
      `call_sites` ŌĆö the class name now carries full width and the operand is a
      plain side-table index. With the corruption gone, an unsupported class
      (`StringBuffer`) now raises the normal catchable `Unable to resolve
      symbol` so a single `is` reports an error and the suite continues (verified
      on string.clj ŌĆö it now runs through the StringBuffer cases instead of
      dying). Wired: opcode.zig (CtorEntry + chunk.ctor_sites) + compiler.zig
      (ctor_sites accumulator + finalize) + vm.zig (read side-table) +
      serialize.zig (write/read/free). 1 diff regression case (>270 constants
      then a deftype ctor ŌĆö both backends must agree). tree_walk was never
      affected (it carries the type_name directly on InteropCallNode). Cross-ref
      D-232 / F-011 / F-012 (VM is the production default ŌĆö this was a real
      production-backend bug).
    category: "runtime"
    barrier: |-
      (DISCHARGED ŌĆö see status.) op_ctor_call 8-bit name_idx overflow corrupted
