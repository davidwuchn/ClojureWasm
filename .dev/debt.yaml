  - id: "D-185"
    discharged_at: "DISCHARGED 2026-06-01 (quality-loop floor drain): `*print-readably*` modelled as `print.zig::print_readably` (a `threadlocal var`, NOT a dynamic Var — the pure `printValue` renderer carries no `rt`/`env`; mirrors print.zig's existing pure-renderer precedent). `writeArgsSpaced` sets it to `readable` (false for `print`/`println`) with a `defer` restore, so it threads into collection-element recursion; `printValue`'s `.string`/`.char` arms branch on it (`print` → raw bytes / bare char via new `printCharRaw`; `pr`-family → quoted / `\\X` literal). `(print [\"a\" (char 98) {:k \"v\"}])`→`[a b {:k v}]`, `(prn [\"a\" (char 98)])`→`[\"a\" \\b]`, `(println (str ...))` stays readable — all clj-grounded (oracle MATCH). 5 e2e (phase14_print_family) + gate green 186/0. Description below = pre-landing context."
    resolution: |-
      runtime | **`print` / `println` / `print-str` do not bind `*print-readably*` to false** — they render collection elements the same as `pr` (readable): `(print ["a"])`→cljw `["a"]` / clj `[a]`; a char inside a coll also mis-renders under `print` (cljw `(print [(char 97)])`→`[]`, clj `[a]`). JVM `print`-family binds `*print-readably*` nil so strings print without quotes and chars without `\`; `pr`-family keeps them readable. cljw's collection printer always uses the readable element form. Fix: thread a `readably` flag through the print path (or a dynamic `*print-readably*` Var) so `print`/`println` render elements non-readably while `pr`/`prn`/`pr-str` stay readable. Top-level bare strings already print unquoted under `println`; the gap is element rendering inside collections + the char-in-coll drop. Surfaced 2026-06-01 clj differential sweep (mapcat-variadic cycle). Cross-ref F-011. | quality-loop floor: print-readably (print vs pr element rendering) | 2026-06-01
  - id: "D-186"
    discharged_at: "DISCHARGED 2026-06-01 (quality-loop floor drain): two paths now honour reader meta on a collection literal. **Expression position** (`^:foo [1 2 3]`): the analyzer's `.vector`/`.map`/`.set` arms detect `Form.meta` and lower to `(with-meta <bare-literal> <meta-map>)` via `analyzeMetaColl`, re-analysed through the shared `with-meta` call path — so BOTH backends attach metadata with NO per-literal-Node meta field (dual-backend parity contract unengaged; `--compare`→OK). Meta-map values are EVALUATED, matching JVM (`(:a (meta ^{:a (+ 1 2)} [1]))`→3). **Quoted / data position** (`'(^:foo [1])`): `formToValue` attaches `Form.meta` to the IObj value via the Layer-0 collection `withMeta`. 5 e2e (phase14_var_metadata coll_*) + 1 diff case, clj-grounded. `^Sym` tag with an unresolvable symbol errors in expression position — consistent with clj (both fail tag resolution). Description below = pre-landing context."
    resolution: |-
      runtime | **`^meta` on a collection literal is dropped**: `(meta ^:foo [1 2 3])`→cljw `nil` / clj `{:foo true}`. D-183(b) landed the general `^` reader (parks normalized meta on `Form.meta`) + def-target honoring (`analyzeDef`→`Var.meta`), but `formToValue` (analyzer.zig) ignores `Form.meta` when lifting vector/map/set literals, so reader meta on a collection literal never reaches the Value. Fix: when the Form carries `.meta`, build the collection then attach the meta Value via the existing `with-meta` path (vector/map/set/list metaOf slots already exist). Surfaced 2026-06-01 during D-183 part b — the `^` reader is general but only def-target was wired this cycle. Cross-ref D-183 / F-011. | quality-loop floor: collection-literal reader meta | 2026-06-01
  - id: "D-187"
    discharged_at: "DISCHARGED 2026-06-01 (both parts): **(1)** `analyzeDefmacro` head-scans a leading docstring + attr-map after the name (was a hard `defmacro_params_not_vector` error on valid `(defmacro m \"doc\" [x] …)`) and lowers `:doc`/attr-map/`:arglists` into `Var.meta`, mirroring defn's D-183(d); reader `^meta` merges first. **(2)** `doc` IMPLEMENTED (the row first mis-guessed a typed-field-sync; `doc`/`clojure.repl/doc` simply did not exist) — a `doc` macro + `print-doc` fn in core.clj print the Var's name / `:arglists` / `:doc` in clojure.repl/doc's format off `(meta (var sym))`, the user-facing payoff of the D-183 metadata surface. Lives in core (cljw has no `clojure.repl` ns; that home is a later structural refinement). clj-MATCH format. 4 e2e (defmacro_*) + 3 e2e (phase14_doc) + 1 diff case. Description below = pre-landing context."
    resolution: |-
      runtime | **Two D-183 follow-ups** (var-metadata surface landed for `defn` + def-target): (1) `defmacro` does NOT accept a leading docstring/attr-map — `(defmacro m "doc" [x] ...)` raises `defmacro_params_not_vector` because `analyzeDefmacro` requires `items[2]` to be the params vector; mirror `expandDefn`'s head-scan + meta lowering. (2) `(doc f)` reads the typed `Var.doc`/`Var.arglists` fields, but D-183(d) populates only the `Var.meta` Clojure-map (not the typed fields), so `(doc f)` shows nothing for a defn docstring while `(:doc (meta #'f))` works — sync `:doc`/`:arglists` from the meta map into the typed fields at `analyzeDef`, OR route `(doc)` through `Var.meta`. Both low priority (the metadata IS observable via `(meta #'f)`). Surfaced 2026-06-01 discharging D-183. Cross-ref D-183 / F-011. | quality-loop floor: var-metadata follow-ups (defmacro docstring + (doc) typed sync) | 2026-06-01
  - id: "D-188"
    discharged_at: "DISCHARGED 2026-06-01 (quality-loop floor drain): `analyzeList`'s `items.len == 0` arm lowered `()` to `makeConstant(.nil_val)` instead of raising `feature_not_supported` — the prior \"Phase-5 collections not landed\" deferral was long stale. `()` now self-evaluates to nil, matching `(list)` / `'()` (cljw's empty≡nil representation — the **distinct** empty-list Value is D-164's structural overhaul, NOT in scope here; lowering to nil keeps `()` consistent with the other empty-list spellings within the current model). Shared analyzer arm → both backends agree (`--compare ((fn* [] ()))`→OK nil + 1 diff case `(if () 1 2)`→2). 5 e2e (phase14_empty_list). Description below = pre-landing context."
    resolution: |-
      runtime | **Unquoted `()` does not self-evaluate to the empty list — it raises `NotImplemented` on BOTH backends.** `((fn [] ()))`→cljw error / clj `()`. JVM Clojure special-cases an empty list in evaluation position as a self-evaluating empty list (`PersistentList/EMPTY`); cljw evaluates `()` as an empty invocation (no operator) → `NotImplemented`. Forces a `(list)` / `'()` workaround everywhere an empty-list literal is wanted (hit while writing `sequence` 1-arg `(or (seq coll) (list))`, D-160). Fix: the analyzer should lower an empty `()` list form to the empty-list constant (self-evaluating) rather than an invocation Node, on both backends. Surfaced 2026-06-01 (D-160 bridge). Cross-ref D-160 / F-011. | quality-loop floor: empty-list literal self-eval (`()`) | 2026-06-01
  - id: "D-189"
    discharged_at: "DISCHARGED 2026-06-01 (quality-loop floor drain): the `first`/`rest`/`next` else-arms (`sequence.zig`) now try `ISeq -first/-rest/-next` via `dispatchOrNull` and, on null, fall back to `seqFn` + `firstOfSeq`/`restOfSeq` — JVM `RT.first`→`seq().first()`. So `(first (eduction (map inc) [5 6 7]))`→6, `(rest …)`→(7 8), `(next …)`→(7 8) (clj MATCH), while an ISeq-implementing deftype still dispatches its `-first`/`-rest` directly (no regression: `(first (->S))`→`:head`) and built-ins are untouched. Benefits every Seqable-only deftype. 3 e2e (phase14_transducers ed_first/rest/next). Description below = pre-landing context."
    resolution: |-
      runtime | **`first`/`rest`/`next` do NOT coerce a `Seqable`-only deftype via `seq`** — they dispatch `ISeq -first`/`-rest`/`-next` directly (`sequence.zig::firstFn` else-arm L259-264 + the rest/next siblings), so `(first <eduction>)`→`No implementation of method '-first' on protocol 'ISeq'` where clj coerces via `RT.first`→`seq`→first (clj `(first (eduction (map inc) [5 6 7]))`→6). `(seq e)` / `(into [] e)` / `(map f e)` already work (they call `seq`, which routes `Seqable -seq`). Fix: the first/rest/next else-arms try `ISeq -first/-rest/-next` via `dispatchOrNull`, and on null fall back to `(seqFn coll)` then the seq op (mirrors the `.array_map`/`.hash_set` arms already doing this). Benefits every Seqable deftype, not just Eduction. Surfaced 2026-06-01 (ADR-0067 eduction). Cross-ref ADR-0067 / F-011. | quality-loop floor: Seqable deftype first/rest coercion | 2026-06-01
  - id: "D-184"
    discharged_at: "DISCHARGED 2026-06-01 (ADR-0038 amendment, DA-fork): the clean fix WAS the structural one this row predicted. New `env.internDeclare` (register-if-absent, root untouched if present) replaces `analyzeDef`/`analyzeDefmacro`'s `intern(…nil…)` so a def target's existing root is no longer reset at analyze time; `__make-multifn` then returns the existing MultiFn when `name` already resolves to one → re-`defmulti` is a defonce-style no-op preserving `defmethod`s (`(defmulti a :s)(defmethod a :c [_] :circ)(defmulti a :s)(a {:s :c})`→`:circ`). Bonus (JVM parity, the DA called it the direct F-011 consequence): a throwing re-`def` keeps the old value (`(def x 5)(def x (/ 1 0)) x`→5). DA fork confirmed it a **spec-drift fix** (ADR-0038 already claimed the JVM error semantics the code violated), walked all 5 def cases correct, rejected the back-door wildcard. 4 e2e (phase14_redef) + phase7_multimethod case 6 + `--compare` OK; gated by 191 tests + diff oracle. Description below = pre-landing context."
    resolution: |-
      runtime | **`defmulti` re-evaluation clobbers the existing MultiFn**: JVM `defmulti` is a `defonce`-style no-op when the var already holds a MultiFn (reloading keeps registered methods); cljw's `expandDefmulti` lowers to `(def name (rt/__make-multifn …))` which re-creates it, dropping prior `defmethod`s. **Investigated 2026-06-01 — the clean fix is structural, not the predicate guard this row first guessed.** A `__make-multifn` "return the existing MultiFn if `name` already resolves to one" check was tried + REVERTED: it cannot see the old MultiFn because **`analyzeDef`'s ADR-0038 pre-registration resets an existing Var's root to nil at ANALYZE time** (`env.intern(ns, name, .nil_val, null)` overwrites `existing.root`), before `__make-multifn` runs at eval time. So the real fix is an **ADR-0038 amendment**: `analyzeDef` should register-if-absent and NOT reset an existing root (which is also a robustness win — a re-`def` whose value-expr throws today destroys the old root at analyze time). Then `__make-multifn` returning the existing MultiFn makes `(def name existing)` a no-op. Blast radius = every `def`/`defn` re-eval, so it is a deliberate depth-2 ADR-amendment unit + DA-fork, NOT an end-of-session ram (deferred to avoid the Progress-pressure smell). Low priority (REPL reload only). Cross-ref ADR-0038 / F-011. | quality-loop floor: defmulti re-eval no-op (REPL reload) | 2026-06-01
  - id: "D-182"
    discharged_at: "mostly landed (default number parity DONE both directions 2026-06-02; only `:bigdec` opt + write-side ratio/bigdec residual): **write-side `.big_int` DONE** (`cwToJson` emits the managed digit string) + **read-side integer DONE** — `jsonToCw`'s `.integer` arm lifts a JSON integer beyond i48 (within i64) to a BigInt via `big_int_mod.allocFromI64` (JVM data.json parses large ints as Long/BigInt; value-exact, cljw prints the i48-overflow as `…N` per D-165). `(read-str \"[1, 999999999999999999, 2]\")`→`[1 999999999999999999N 2]`, `(= (read-str \"999…\") 999…N)`→true. 4 e2e (phase9_json write_bigint + read_bigint*). **read-side `.number_string` DONE 2026-06-02**: a number_string with `.`/`e`/`E` → `f64` (JVM data.json default = Double), else → BigInt via `setString` (`(read-str \"12345678901234567890\")`→`…N`; 1 e2e read_bigint_huge; ≥2^64 inherits D-047). **Residual** (explicit errors, tracked stubs, NOT silent): the `:bigdec true` opt (decimal → BigDecimal instead of Double — an option flag, not default) + write-side `.ratio`/`.big_decimal` (rarer; data.json itself errors on Ratio without a value-fn). Description below = pre-landing context."
    resolution: |-
      runtime | **`clojure.data.json` BigInt path is unimplemented both directions** (split off from D-171's float-printer fix 2026-06-01): the *read* path (`json.zig` cwFromJson) raises `feature_not_supported` for an integer outside i48 range or an arbitrary-precision number string (JVM data.json parses these into a Long/BigInt/BigDecimal per `:bigdec`); the *write* path (`cwToJson`) hits `UnsupportedJsonTag` for a `.big_int` value (JVM data.json writes `(str x)` → plain digits, e.g. `(write-str 10N)`→`"10"`). Both are explicit errors (tracked transient stubs, NOT silent), so no correctness lie — pure coverage. Fix: write side = a `.big_int` arm emitting the managed digit string (cheap, F-011 share the existing big_int formatter); read side = route large/precise JSON numbers to the numeric-tower parse (needs the JSON→BigInt decision, larger). Surfaced as the residual of D-171 (2026-06-01). Cross-ref D-171 / F-005 / F-011. | minor residual: data.json `:bigdec` opt + ratio/bigdec write (default parity drained) | 2026-06-02
  - id: "D-178"
    discharged_at: "structural — `.list` / `.cons` tag conflation (PersistentList vs Cons-over-seq); defer to F-004 seq-family owner"
    resolution: |-
      runtime | **The `.list` heap tag is used for BOTH a true PersistentList (list/nil tail, valid O(1) `count` field) AND a Cons-over-a-seq (`(cons x lazy_seq)` / `(conj (range 3) 99)`, whose tail is a non-list seq).** Consequence: the Cons `.count` field (`1 + countOf(tail)`, and `countOf` returns 0 for non-list tails) is a lie for mixed chains, and the list-specialized fast paths (printList / deepRealize `.list` arm / countFn `.list`) assumed a homogeneous `.list` chain. Surfaced 2026-05-31 by D-168 (range→lazy-seq exposed `(cons x non-list-seq)`, previously hidden because range was an eager vector routed via seqFn). **Correctness fixed at D-168** by walking `.list` generically (count + print no longer trust the O(1) field for mixed chains) — but that drops the O(1) `count` optimisation for pure PersistentLists. The finished form (per F-004 seq-family slot map: `lazy_seq` / `cons` / `chunked_cons` are distinct tags) **splits `.list` (PersistentList, O(1) count, list-only tail) from `.cons` (ASeq Cons over any seq, O(n) walk)** — matching JVM `clojure.lang.PersistentList` vs `Cons`. The `.cons` tag already exists but is vestigial (only a value.zig test creates it). Activating it + per-tag first/rest/seq/count/print is an F-004 structural decision → defer to that owner (F-003). NOT a per-op patch. Cross-ref D-168 (the correctness fix) / F-004 (NaN-box 2nd-gen seq family) / F-011. | when the F-004 NaN-box 2nd-gen (D-027) seq-family cycle opens OR a corpus test needs O(1) list count back | 2026-05-31
  - id: "D-179"
    discharged_at: "structural — seq-family slot co-activation (`.string_seq` A13 / `.array_seq` A14); defer to their owning rows (F-003)"
    resolution: |-
      runtime | **`.range` (A12) was activated as a compact value (ADR-0063); its two Group-A neighbours `.string_seq` (A13) and `.array_seq` (A14) share the identical pattern** (compact descriptor + index cursor + O(1) count/nth + chunked-cons `seq`) but stay vestigial. ADR-0063's Devil's-advocate Alt-3 noted activating all three together would amortise the ~14-arm seq call-site surgery once instead of three times; rejected for ADR-0063 as an F-003 scope-explosion (no F-NNN fixes "activate the seq family together") + F-005 trespass (bigint bounds). **When the `.string_seq` / `.array_seq` owning row opens, reuse ADR-0063's `range.zig` chunked-seq substrate** so each becomes a one-arm fall-through, not a repeat surgery. ALSO: `.range` inherits **D-165** (elements / count beyond ±2^47 silently become float via `initInteger`) and **D-164** (empty range → nil) unchanged — both F-005/seq-model owner territory, not fixed by ADR-0063. Cross-ref ADR-0063 / D-163 / D-165 / D-164 / F-004 (A13/A14 slots) / F-005. | when the `.string_seq` / `.array_seq` owning row opens OR a corpus test needs string-seq/array-seq value identity | 2026-05-31
  - id: "D-180"
    discharged_at: "DISCHARGED 2026-05-31 (O-003)"
    resolution: |-
      runtime | **DONE (O-003)**: `vector.fromSlice` builds the HAMT trie bottom-up from the transient's flat buffer in O(n) (32-element leaves → interiors grouped 32-at-a-time → root; trailing ≤32 = tail); `toPersistent` uses it (carrying through `tv.meta`, which the old N-conj rebuild silently dropped); `into`/`vec` route editable targets (vector / hash-map / hash-set — NOT sorted / nil / list) through `transient`/`conj!`/`persistent!` via an `-editable?` guard. **Measured `(count (vec (range 1e6)))` 121s → 2.4s; `(reduce + (vec (range 1e6)))` 123s → 2.5s.** Verified by a `fromSlice`-vs-conj boundary unit test (n ∈ {0,1,31,32,33,63,64,65,1023,1024,1025,1e5}: identical count/shift/tail/root + element-wise) + diff oracle vs `clj` (into/vec over vector/map/set/sorted/nil/list + meta). Residual ~2.4s = per-element reduce/conj! dispatch + lazy-seq walk of `from` → D-163/D-140, not `persistent!`. **Original:** **`transient_vector.toPersistent` rebuilds the persistent vector via N persistent `conj`s** (`transient_vector.zig` L124-131: `while … out = vector.conj(rt, out, p[i])`). The transient's flat-buffer fill is O(1) amortised, but `persistent!` is O(n log n) + N HamtNode allocs — so transient-backed `into`/`vec` get NO speed-up over plain persistent conj (the whole point of transients is an O(1) `persistent!` handoff). **Measured 2026-05-31 (mac-arm-m4pro): `(count (vec (range 1e6)))` = 121s, almost all in `persistent!`** (the `reduce conj!` fill is <1s; cf. `(reduce + (range 1e6))` = 60ms). **Fix:** a bulk `vector.fromSlice(rt, items)` building the HAMT trie bottom-up from the flat buffer in O(n) (32-element leaf HamtNodes → interior levels via the same shift/overflow invariants as `conj`'s tail-full path → tail = last ≤32), used by `toPersistent`; THEN re-land the reverted O-003 pair (route `into`/`vec` through `transient`/`conj!`/`persistent!` with an `-editable?` guard so sorted/nil/list fall to persistent conj). Pair must land together (O-003 alone is net-neutral). **Core Vector type → exhaustive boundary tests** (n ∈ {0,1,31,32,33,63,64,65,1023,1024,1025,1e5}: build → nth-all + count + `=` vs a conj-built vector) before gating. cw v0 + JVM keep the trie incremental in the transient (O(1) persistent!); cljw's flat-buffer transient does the one O(n) conversion at `persistent!`. Cross-ref ADR-0063 / O-001 / O-002 / `.dev/optimizations.md` (O-003) / F-002 / F-011. | DISCHARGED 2026-05-31 | 2026-05-31
  - id: "D-181"
