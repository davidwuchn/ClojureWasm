  - id: "D-185"
    discharged_at: "DISCHARGED 2026-06-01 (quality-loop floor drain): `*print-readably*` modelled as `print.zig::print_readably` (a `threadlocal var`, NOT a dynamic Var ŌĆö the pure `printValue` renderer carries no `rt`/`env`; mirrors print.zig's existing pure-renderer precedent). `writeArgsSpaced` sets it to `readable` (false for `print`/`println`) with a `defer` restore, so it threads into collection-element recursion; `printValue`'s `.string`/`.char` arms branch on it (`print` ŌåÆ raw bytes / bare char via new `printCharRaw`; `pr`-family ŌåÆ quoted / `\\X` literal). `(print [\"a\" (char 98) {:k \"v\"}])`ŌåÆ`[a b {:k v}]`, `(prn [\"a\" (char 98)])`ŌåÆ`[\"a\" \\b]`, `(println (str ...))` stays readable ŌĆö all clj-grounded (oracle MATCH). 5 e2e (phase14_print_family) + gate green 186/0. Description below = pre-landing context."
    resolution: |-
      runtime | **`print` / `println` / `print-str` do not bind `*print-readably*` to false** ŌĆö they render collection elements the same as `pr` (readable): `(print ["a"])`ŌåÆcljw `["a"]` / clj `[a]`; a char inside a coll also mis-renders under `print` (cljw `(print [(char 97)])`ŌåÆ`[]`, clj `[a]`). JVM `print`-family binds `*print-readably*` nil so strings print without quotes and chars without `\`; `pr`-family keeps them readable. cljw's collection printer always uses the readable element form. Fix: thread a `readably` flag through the print path (or a dynamic `*print-readably*` Var) so `print`/`println` render elements non-readably while `pr`/`prn`/`pr-str` stay readable. Top-level bare strings already print unquoted under `println`; the gap is element rendering inside collections + the char-in-coll drop. Surfaced 2026-06-01 clj differential sweep (mapcat-variadic cycle). Cross-ref F-011. | quality-loop floor: print-readably (print vs pr element rendering) | 2026-06-01
  - id: "D-186"
    discharged_at: "DISCHARGED 2026-06-01 (quality-loop floor drain): two paths now honour reader meta on a collection literal. **Expression position** (`^:foo [1 2 3]`): the analyzer's `.vector`/`.map`/`.set` arms detect `Form.meta` and lower to `(with-meta <bare-literal> <meta-map>)` via `analyzeMetaColl`, re-analysed through the shared `with-meta` call path ŌĆö so BOTH backends attach metadata with NO per-literal-Node meta field (dual-backend parity contract unengaged; `--compare`ŌåÆOK). Meta-map values are EVALUATED, matching JVM (`(:a (meta ^{:a (+ 1 2)} [1]))`ŌåÆ3). **Quoted / data position** (`'(^:foo [1])`): `formToValue` attaches `Form.meta` to the IObj value via the Layer-0 collection `withMeta`. 5 e2e (phase14_var_metadata coll_*) + 1 diff case, clj-grounded. `^Sym` tag with an unresolvable symbol errors in expression position ŌĆö consistent with clj (both fail tag resolution). Description below = pre-landing context."
    resolution: |-
      runtime | **`^meta` on a collection literal is dropped**: `(meta ^:foo [1 2 3])`ŌåÆcljw `nil` / clj `{:foo true}`. D-183(b) landed the general `^` reader (parks normalized meta on `Form.meta`) + def-target honoring (`analyzeDef`ŌåÆ`Var.meta`), but `formToValue` (analyzer.zig) ignores `Form.meta` when lifting vector/map/set literals, so reader meta on a collection literal never reaches the Value. Fix: when the Form carries `.meta`, build the collection then attach the meta Value via the existing `with-meta` path (vector/map/set/list metaOf slots already exist). Surfaced 2026-06-01 during D-183 part b ŌĆö the `^` reader is general but only def-target was wired this cycle. Cross-ref D-183 / F-011. | quality-loop floor: collection-literal reader meta | 2026-06-01
  - id: "D-187"
    discharged_at: "DISCHARGED 2026-06-01 (both parts): **(1)** `analyzeDefmacro` head-scans a leading docstring + attr-map after the name (was a hard `defmacro_params_not_vector` error on valid `(defmacro m \"doc\" [x] ŌĆ”)`) and lowers `:doc`/attr-map/`:arglists` into `Var.meta`, mirroring defn's D-183(d); reader `^meta` merges first. **(2)** `doc` IMPLEMENTED (the row first mis-guessed a typed-field-sync; `doc`/`clojure.repl/doc` simply did not exist) ŌĆö a `doc` macro + `print-doc` fn in core.clj print the Var's name / `:arglists` / `:doc` in clojure.repl/doc's format off `(meta (var sym))`, the user-facing payoff of the D-183 metadata surface. Lives in core (cljw has no `clojure.repl` ns; that home is a later structural refinement). clj-MATCH format. 4 e2e (defmacro_*) + 3 e2e (phase14_doc) + 1 diff case. Description below = pre-landing context."
