    discharged_at: "DISCHARGED 2026-05-31 (quality-loop floor drain): range 1/2-arg arms now delegate to the 3-arg lazy-seq form (`([n] (range 0 n 1))` / `([start end] (range start end 1))`); `-range-acc` eager-vector helper removed (dead). `(seq? (range 3))`→true, `(range 3)`→`(0 1 2)`, `(take 5 (range 1e9))` lazy. **Cascade fix (the prereq the row understated)**: `(conj <ISeq> x)` threw / the cons-over-seq walk dropped the lazy tail. Fixed by (a) conjOne routing all ISeq through `sequence.consFn` (prepend ≡ `(cons x coll)`, F-011 single mechanism); (b) `deepRealize`(print) + `countFn` walking `.list` generically (lazy_seq.seq/first/rest) so a `.list` cons with a non-list seq rest realizes fully. Structural tail (the `.list`/`.cons` tag conflation) deferred to D-178. clj-grounded; 9 new e2e in phase14_range_indexed."
