  - id: "D-481"
    status: "DISCHARGED 2026-06-21 — moved `self.gc.deinit()` in Runtime.deinit to BEFORE the native/class/user TypeDescriptor frees (it was last, after them). The host_instance finaliers run inside gc.deinit + read `inst.descriptor`, so the descriptors must outlive finalisation; the frees use `gc.infra` (a passed-in allocator field gc.deinit never tears down) so they stay valid after. Validated: the `app.builder.test.deserialized fn_val` test + full suite + CLJW_GC_TORTURE green WITH datafy bundled. Unblocked the datafy re-land (D-478). ORIGINAL: GC-deinit ordering bug: `Runtime.deinit` FREES the per-Tag native descriptors + the class_descriptors (and user TypeDescriptors) — all gc.infra-allocated — BEFORE calling `self.gc.deinit()`, which is what RUNS the host_instance finaliers (`host_instance.zig:96 finaliseGc` reads `inst.descriptor.host_finalise`). So a host_instance whose descriptor is one of those freed native/class descriptors dangles → segfault at finalize. Repro: extend a protocol to BOTH `Object` AND a host-native-tag (`(extend-protocol Datafiable Object … )` in core.protocols + datafy's `(extend-protocol Datafiable clojure.lang.Namespace/IRef java.lang.Throwable/Class …)`) at the SOURCE-bootstrap path, then deinit (the `app.builder.test.deserialized fn_val` test crashed). The tangle: gc.deinit BOTH runs finalisers AND tears down gc.infra (the descriptors' backing allocator), so descriptors are freed before gc.deinit by necessity — but finalisers run during gc.deinit, after the free. FIX needs SPLITTING gc.deinit into a finalise phase (descriptors alive) then an infra-teardown phase, OR freeing the native/class/user descriptors between finalise + teardown. A focused GC-lifetime unit (careful — finalisers also touch the time/locale singletons freed at deinit's top). Blocks re-bundling clojure.datafy (D-478). The AOT-restore binary path does NOT hit it (datafy works there). Bisected: bisect A (datafy host-extends, no Object default) PASSED; bisect B (Datafiable Object default + datafy host-extends) CRASHED → the Object×host-tag combination on one protocol is the trigger."
