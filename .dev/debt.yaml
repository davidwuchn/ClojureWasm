    discharged_at: "CORE DONE (2026-05-30): meta / with-meta / vary-meta over collections (vector/array_map/hash_map/set/list/lazy_seq) via the existing per-type `meta` field (ArrayMap gained one); ops preserve meta; `lang/primitive/metadata.zig`. The survey's ~500 LOC / HeapHeader-extension / IObj-protocol estimate was over-scoped (no header change, plain tag-switch). clojure.set project/rename meta-wrap RESTORED 2026-05-30 (2 PROVISIONAL markers discharged, feature_deps flipped to landed). Residuals: symbol/keyword meta, alter-meta! / reset-meta! (ref-type mutable meta), reader `^{...}` form."
