      scope | **Shift from AI-probed coverage to CORPUS-DRIVEN bug discovery** (user direction 2026-05-30). The current sweep (ratio-arith / HAMT / IFn / atoms / ŌĆ”) is biased by what the AI thinks to probe; a real corpus surfaces gaps unbiased. Two tiers: **(1) clojuredocs walkthrough** ŌĆö run the community examples for each clojure.core var; PURE CORE, **needs NO deps.edn / classpath / dependency fetch** ŌåÆ the cheaper, earlier win, runnable as soon as core coverage is solid; both validates output AND surfaces missing/wrong fns. **(2) real-world library test suites** ŌĆö clone real (pure-Clojure) libs + run THEIR `clojure.test` suites on cljw (densest edge-case bug-finder); REQUIRES the deps story (deps.edn parse + classpath + multi-file `require`/`ns` maturity + `clojure.test` runner). Sequence: clojuredocs first (low infra), then lib-tests (needs deps infra). Prereqs for (1): enough core coverage that walking clojuredocs is productive (not blocked by missing fns) + a harness to fetch/run example snippets + compare. Prereqs for (2): deps resolution + classpath + clojure.test. Fits the F-010 quality-loop / cw-v0-parity tail. | recall trigger ŌĆö when core coverage is solid enough that a clojuredocs walkthrough is productive | 2026-05-30
