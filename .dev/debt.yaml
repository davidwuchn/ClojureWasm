      runtime | **HAMT depth-exhaustion raises `error.HashCollision` instead of bucketing colliding keys (cycle C)**: when two distinct map/set keys share a full 32-bit `equal.valueHash`, `map.zig createTwoNode` (at shift > 30) raises `error.HashCollision` ΓÇË a legal transient stub (explicit error, no silent drop). The analyzer converts it to a `feature_not_supported` message for map/set literals; primitives propagate it to the eval loop (bare render). Discharge: implement `HashCollisionMapNode` (tag 62, declared `heap_tag.zig:123`) ΓÇË a flat linear-scan bucket for keys sharing a 32-bit hash, with assoc/get/dissoc arms + (if its layout diverges from the `[64]Value` slot region) a dedicated `traceHashCollisionMapNode`. Birthday bound ~77k keys for 50% collision at 32 bits, so essentially never hit in practice. Surfaced 2026-05-30 landing D-045 cycle A. | Opportunistic ΓÇË when a real workload hits a 32-bit hash collision (essentially never) or adversarial-key robustness is wanted | 2026-05-30
  - id: "D-156"
