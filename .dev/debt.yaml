  - id: "D-418"
    status: "open (2026-06-13, surfaced as a parallel-gate flaky in e2e_phase16_gc_torture). `agent_conj` — `(let [a (agent [])] (send a conj 1) (send a conj 2) (await a) @a)` — intermittently returns `[#<promise> 2]` instead of `[1 2]` UNDER PARALLEL GATE LOAD (CPU contention from the full run_all.sh e2e fan-out). A `#<promise>` (the agent's internal send-completion / await signal) leaks into the agent's value in place of the sent arg `1`. Deterministic-green in isolation (6/6) and standalone (`bash test/e2e/phase16_gc_torture.sh` ALL PASS), so it is a genuine concurrency race in the agent send-action path (src/runtime/agent.zig + send/await), NOT a deftype/remap issue — it is independent of the D-417 change that exposed it (D-417 is macro-expansion-time only; this is runtime). Same load-sensitivity class as memory `gate_parallel_e2e_timeout` / `tool_channel_corrupts_under_load`. Finished form: the send action's arg/value handoff must not race with the await/promise signaling — trace where a `.promise` Value reaches the agent state slot. recall trigger: reproduce by running the full gate under load (or `e2e_phase16_gc_torture` concurrently with other e2e); fix the agent send/await value handoff."
    category: "concurrency"
    barrier: "blocked-by: a reliable reproducer. 2026-06-13 attempts: 200 iterations in-process = 0 mismatches; 3000 iterations under 6x `yes` CPU load = 0 mismatches. So the race needs the gate's SPECIFIC contention (≈16 parallel cljw processes + the e2e harness preempting the agent worker vs main thread vs a cross-thread GC collect), not mere in-process concurrency or coarse CPU load. LEAD for the next attempt: agent.zig docstring flags the `send` FABRICATION WINDOW (the `[f & args]` action vector is a Zig local, not yet GC-rooted, before the queue lock — GC-ROOT note ~:35) — a cross-thread collect during that window is the prime suspect for how `await`'s completion Promise (a heap value) displaces the first action's arg. NOTE: the leaked arg `1` is an IMMEDIATE (not heap), so the corruption is at the action-VECTOR level (the vector's slot/memory), not the int — re-read fabrication-window rooting + the await barrier-action injection order. Fix only with a reproducer in hand (a rare race fixed blind cannot be verified)."
