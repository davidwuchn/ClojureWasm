    discharged_at: "DISCHARGED (2026-05-30, shared `rt.stdout` writer) ŌĆö single process writer routes println/print/prn through the same offset-tracking writer as the runner's result-print; e2e `phase14_println_stdout` (7 cases) locks it in. Root cause was two independent `std.Io.File.stdout().writer(...)` each flushing from file offset 0, so the result-print clobbered the println output. Fix: `Runtime.stdout: ?*std.Io.Writer` set by runSource/runSourceCompare/repl/nrepl; `core.zig emitToStdout` writes through it (test-init fallback = private writer, correct in isolation)."
