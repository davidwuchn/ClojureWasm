    status: "DISCHARGED 2026-06-16 (gaps/bugs sweep). cljw now unrolls a top-level `(do …)`: each child is analyzed+evaluated IN SEQUENCE, so an effect in an earlier child (`(import …)` / `(defmacro …)`) is visible to a later child's ANALYSIS — `(do (defmacro m [] 42) (m))` → 42 (was a 'macro Var not callable' analyze error), `(do (import …) (instance? … x))` matches clj. Impl: driver.zig `topLevelDoChildren(form)` detector + `evalTopLevelForm` (recursive; do's value = last child, empty `(do)`→nil) routed through ALL form-loading paths — runner.zig (`-e`/main), loader.zig (file load/require; per-leaf chunk to the `cljw build` sink so replay order is preserved), evaluator.zig (`--compare` dual-backend oracle, backend-parameterized twin), driver.evalValue (so `(eval '(do …))` unrolls), bootstrap.zig (consistency; no-op for hand-written core). e2e phase14_eval (5 new cases: defmacro-then-use / def-then-use / value-is-last / nested-do / eval-of-do) + smoke green (diff oracle ×2 + corpus 3206 + zlinter). RESIDUAL (narrow, not re-filed): a MACRO expanding to a top-level `(do …)` is not unrolled (only a LITERAL `do` head is matched); clj macroexpands first. No real case hits it (declare→do-of-defs needs no effect-sequencing). ORIGINAL: open (2026-06-10, surfaced by the D-373 corpus). cljw does NOT unroll a top-level `(do …)` — it analyzes the whole form before evaluating, so a side-effecting form and a later form that depends on its effect cannot share one compilation unit. Concretely: `(do (import 'java.io.BufferedReader) (instance? BufferedReader x))` → cljw NameError (BufferedReader resolved at analyze time, before the import effect ran); clj → true (clj treats each top-level-`do` child as if a separate top-level form, compiling+evaluating in sequence). This was MASKED for instance? until D-373: the old macro quoted the class symbol so it resolved at EVAL time (after import). The REALISTIC forms — `(ns … (:import …))` then use, OR separate top-level forms — both work in