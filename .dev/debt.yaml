  - id: "D-087"
    discharged_at: "DISCHARGED 2026-06-01 (ADR-0066, quality-loop floor drain): deftype retired as a special form ŌåÆ macro `expandDeftype` (route (b)), sharing `lowerDefType` with `expandDefrecord` and a new `rt/__deftype!` primitive (`.kind = .deftype`, shares `registerTypePrim` with `__defrecord!` ŌĆö F-011). Now binds `Name` + `->Name` and applies the protocol body (previously **silently dropped** ŌĆö a permanent-no-op smell `analyzeDeftype` carried). Removed: deftype from the special-forms table + `deftype_form` enum + dispatch arm + `analyzeDeftype` + `deftype_node` Node variant + `evalDeftype` (TreeWalk) + VM compile arm + `op_deftype` (opcode/emit/dispatch). DA fork (mandatory, fresh context) surfaced **BUG-1** (VM `op_deftype` never registered the type; the diff harness masked it via TreeWalk-first state leak) ŌĆö **fixed as a side effect** since registration is now a backend-neutral primitive call. deftype is kind-gated out of map semantics (`(:v (->T 5))`ŌåÆnil). 7 e2e (phase14_deftype incl. --compare) + 2 diff cases; clj-grounded. **Var-metadata** for deftype (`#'`/`var` reader) remains D-183."
