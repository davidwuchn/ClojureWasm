  - id: "D-151"
    discharged_at: "Cycle 1 DONE (array_map string keys, 2026-05-30); remaining: HAMT (>8 keys) value-hash = D-045"
    resolution: |-
      runtime | **Cycle 1 DONE (┬¦A26, 2026-05-30)**: array_map + transient `keyEq` now route through `equal.keyEqValue(a,b)` (no-`rt`: identity fast path + `.string` byte-equality), so `(get {"x" 5} "x")` ŌåÆ 5, `(contains? ŌĆ”)` ŌåÆ true, `(assoc ŌĆ”)` replaces, structural `(= ŌĆ”)` over string-keyed maps works, and `:strs` destructuring (D-076) is unblocked. Keys by `=` (category-based: `{1 :a}` vs `1.0` ŌåÆ nil). e2e phase14_map_string_keys (10 cases) + 1 diff case. **Residual** (rare, pre-existing, NOT regressed): collection (vector/map/set) + ratio/big_decimal/big_int KEYS still compare by identity ŌĆö the recursive/category `valueEqual` needs `rt`, which the ~68 map call sites lack; deferred (a future cycle could add a value-hash + a no-`rt` numeric/collection key path). **HAMT (>8-key maps)**: the `.hash_map` path is unimplemented (D-045) and raises explicitly ŌĆö needs BOTH `keyEqValue` AND a value-consistent `valueHash` (byte-hash strings) for the equal/hash contract; that lands with D-045. ORIGINAL: **Map lookup misses value-equal STRING keys**: `(get {"x" 5} "x")` ŌåÆ nil and `(contains? {"x" 5} "x")` ŌåÆ false, even though `(= "x" "x")` ŌåÆ true (D-136 valueEqual byte-equal strings landed). Map `get`/`contains?`/`assoc` match INTERNED keys (keyword Ō£ō, symbol Ō£ō ŌĆö both identity/pointer-comparable) but compare strings by identity/hash that differs across separately-allocated `String` Values, so a string key never matches another string of the same bytes. JVM Clojure maps key by `=` (value equality) ŌĆö `{"x" 5}` is fully usable. Blocks string-keyed maps generally + `:strs` map-destructuring (D-076: the `:strs` lowering is correct + forward-compatible but functionally returns nil until this lands). Discharge: route `runtime/collection/map` key hashing + equality through the same `runtime/equal.zig valueEqual` + a matching `valueHash` (byte-hash for strings) the `=` rewire (ADR-0052) established, so non-interned keys compare by value. Needs Step 0 survey (cw v0 map key hashing, `runtime/hash.zig`, the keyword/symbol intern fast-path vs the general path). Surfaced 2026-05-30 implementing D-076 cycle 2 `:strs`. | P1 foundational ŌĆö value-keyed map equality/hash (sibling of ADR-0052 `=` rewire) | 2026-05-30
  - id: "D-152"
    discharged_at: "Opportunistic ŌĆö diff-test harness can't cover bootstrap `.clj` closures cross-backend (low priority; not user-facing)"
    resolution: |-
      tests | **`evaluator.compare` diverges on expressions that call a bootstrap `.clj` closure**: a `((comp inc inc inc) 0)` differential case failed `r.equal` even though BOTH backends compute it correctly in real whole-program runs (tree-walk e2e ŌåÆ 3; a `-Dbackend=vm` whole-program run ŌåÆ 3). Root-cause hypothesis: `compare` (eval/evaluator.zig) bootstraps core.clj ONCE under a single backend (Fixture init) then swaps the vtable per run, so the second backend executes `fn_val`s that were analyzed/created under the FIRST backend ŌĆö fine for primitives + expression-local `fn*` (the existing diff cases), but a bootstrap `.clj` closure (comp/juxt/most core.clj fns) created under backend A and called under backend B can diverge (likely the per-`Function` bytecode-vs-treewalk routing, or a CallSite/closure-capture artifact). NOT user-facing (users run one backend whole-program; both give the right answer). Effect: the Layer-3 differential oracle CANNOT cover any expression whose top-level call resolves to a bootstrap `.clj` fn ŌĆö a real coverage hole for `.clj`-defined behaviour. Discharge: make the Fixture bootstrap per-backend (re-bootstrap core.clj under each backend before its run) OR document the constraint and rely on e2e for `.clj`-fn coverage. Needs investigation (confirm the root cause: does compare-VM error or mis-evaluate the bootstrap closure?). Surfaced 2026-05-30 adding a comp diff case (D-134). | Opportunistic ŌĆö when differential coverage of `.clj`-defined fns is wanted, OR the diff harness is reworked | 2026-05-30
  - id: "D-153"
    discharged_at: "P1 ŌĆö `(cons x lazy-seq)` raw cons caches a wrong `count` + prints truncated (lazy-seq foundational)"
    resolution: |-
      runtime | **A raw cons cell with a lazy_seq tail reports `count` 1 and prints truncated**: `(count (cons 0 (take-while ŌĆ” [2 3])))` ŌåÆ 1 (should be 3); `(cons 1 (take-while ŌĆ” [1 2 2]))` prints `(1)` (should be `(1 1)`). Root: `runtime/collection/list.zig consHeap` (L68) caches `.count = 1 + countOf(tail)`, and `countOf` (L108) returns 0 for a non-`.list` tail (lazy_seq) ŌĆö so a cons onto an unforced lazy_seq caches count=1. `consFn` correctly keeps the lazy tail unforced (ADR-0054 cycle 1: must NOT realize at cons time), and `first`/`rest`/`reduce`/`vec`/`seq` all CROSS the boundary correctly (`(vec (cons 0 lazy))` ŌåÆ [0 2 3], `(rest (cons 0 lazy))` ŌåÆ (2 3)); ONLY the cached `.count` (the `count` primitive reads it for `.list`) and the eager list-printer (stops at the lazy boundary, ADR-0054 cycle-2 "top-level realize only") are stale. Effect: any direct `(cons x lazyseq)` mis-counts/mis-prints (lazy-seq-WRAPPED results like `(map ŌĆ”)` are fine ŌĆö they count via the lazy_seq seq/rest loop, not a cached cons count). Discharge: a cons onto a lazy_seq can't cache an O(1) count ŌĆö mark it lazy (a `count_known: bool` / sentinel on `Cons`) and have the `count` primitive traverse-realize for it; the list printer must realize a lazy_seq tail. Needs care (touches the `Cons` extern layout + count + print + the `1 + countOf(tail)` chaining). Workaround in practice: keep seqs lazy_seq-wrapped, not raw `(cons x lazyseq)` (partition-by does ŌĆö uses a `take-while` run, not `(cons fst (take-while ŌĆ”))`). Surfaced 2026-05-30 implementing partition-by (D-134). | P1 ŌĆö lazy-seq foundational cycle (sibling of ADR-0054); also unblocks raw cons-lazy print/count | 2026-05-30
  - id: "D-154"
    discharged_at: "DISCHARGED (2026-05-30, same session) ŌĆö `print.zig::printCharReadable` emits `\\A` for printable ASCII + `\\space`/`\\newline`/`\\tab`/`\\return`/`\\backspace`/`\\formfeed` + `\\uXXXX` otherwise (readable form); `core.zig writeArgsSpaced` + `strFn` emit the bare UTF-8 char for the raw `print`/`str` form. e2e `phase14_char_print` (9 cases)."
