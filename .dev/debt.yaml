  - id: "D-157"
    discharged_at: "Phase 15 (atom+watch bucket, ADR-0009/0010); WATCHES + VALIDATOR landed 2026-06-03 (ADR-0081)"
    resolution: |-
      **VALIDATOR LANDED 2026-06-03 (ADR-0081, same pattern as watches)**: `set-validator!`/`get-validator` for atoms ΓÇË the `Atom` struct gained a `validator: Value` field (nil or a fn; GC-traced). `set-validator!` validates the CURRENT value against the new validator immediately (clj parity: throws IllegalStateException "Invalid reference state" if it fails) and returns nil; `swap!`/`reset!`/`compare-and-set!` validate the proposed value BEFORE committing ΓÇË a falsey return throws IllegalStateException (via `dispatch.last_thrown_exception` + `error.ThrownValue`) and leaves the ref UNCHANGED. `get-validator` returns the fn (or nil). Corpus `atom_validator` (10); 8 e2e in phase14_atom_watch. RESIDUAL: the `(atom x :validator f :meta m)` constructor KWARGS are not parsed (atomFn stays arity-1) Γ¶Ê **D-223** (the explicit set-validator! API is the primary surface). **WATCHES LANDED 2026-06-03 (ADR-0081, pulled-forward Phase-15 concurrency piece)**: `add-watch`/`remove-watch` for atoms ΓÇË the `Atom` extern struct gained the planned `watches: Value` field (nil for the common zero-watch atom, else a persistent `{keyΓ¶Êfn}` map; appended after `current`, header stays offset 0; GC-traced one line). `add-watch`=`assoc`, `remove-watch`=`dissoc` (clj-faithful key-replace + remove-absent-no-op); `swap!`/`reset!`/`compare-and-set!` fire watches SYNCHRONOUSLY after the in-place set via `notifyWatches` (`map.keys`+`map.get`+`invokeCallable`, `(fn key ref old new)`), on EVERY change incl. `old==new`, CAS on success only. DA-fork (ADR-0081) chose Alt 2 (struct field) over a Runtime side-table (GC dangling-key/leak) + a metadata side-block (F-003 over-reservation). `validator` still NOT added (F-003 ΓÇË its own field when set-validator! lands). Multi-watch NOTIFICATION ORDER is clj-undefined (cljw array-map order vs clj hash order) Γ¶Ê single-watch corpus only. Corpus `atom_watch` (8); 9 e2e phase14_atom_watch. ORIGINAL (basic atom): runtime | **Atom watches / validators / real CAS atomicity deferred**: basic single-threaded `atom`/`swap!`/`reset!`/`deref`/`@`/`compare-and-set!` landed 2026-05-30 (`runtime/atom.zig` + `lang/primitive/atom.zig`; pull-forward of the Phase-15 "atom+watch" bucket ΓÇË ADR-0010 ┬¯79 "implement only atom" sketch). Deferred to Phase 15: `add-watch`/`remove-watch` (watch fns fired on change), `:validator` (set-validator!/validate on swap!/reset!), and real CAS-under-contention atomicity + the swap!-retry loop (single-threaded now Γ¶Ê no contention, so a retry loop would be a no-op smell). The `Atom extern struct` is `{header,_pad,current}` with NO reserved watch field (F-003 / Reservation-as-bias) ΓÇË Phase 15 APPENDS `watches`/`validator`/`meta` fields (header stays offset 0, `current` unmoved), an additive extension not a rewrite. compare-and-set! uses reference IDENTITY (JVM `AtomicReference`, not `=`) ΓÇË recorded in the primitive docstring. Surfaced 2026-05-30 landing basic atoms. **┬¯A26 (2026-06-02)**: an atom/state clj sweep re-confirmed `add-watch`/`remove-watch` are absent (`name_error`) ΓÇË correctly Phase-15-deferred here (NOT a new gap; the would-be D-193 was a duplicate, removed). The non-deferred `swap-vals!`/`reset-vals!` (single-threaded, no CAS/watch needed) landed ┬¯A26 as `.clj` wrappers over swap!/reset!. | Phase 15 entry (concurrency buckets) | 2026-05-30
  - id: "D-158"
    discharged_at: "INFRA LANDED 2026-06-03 (ADR-0084 filesystem require); tier-2 lib-suite validation now runnable"
    resolution: |-
      **2026-06-03 ΓÇË tier-2 prerequisite DONE (ADR-0084).** Filesystem `require`
      now loads a lib's `.clj`/`.cljc` source off a classpath (`-cp`/`CLJW_PATH`,
