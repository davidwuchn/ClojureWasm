  - id: "D-149"
    discharged_at: "Discharged (┬¯A26, 2026-05-30: printFloat in print.zig + formatFloat in form.zig append `.0` when no `.`/`e`/`E`; e2e phase14_float_print 8 cases) ΓÇË residual: exact JVM `Double.toString` E-notation thresholds (cosmetic; `1e10`Γ¶Ê`10000000000.0` not `1.0E10`, still round-trips)"
