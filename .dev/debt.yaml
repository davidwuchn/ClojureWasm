      runtime | **`print` / `println` / `print-str` do not bind `*print-readably*` to false** ŌĆö they render collection elements the same as `pr` (readable): `(print ["a"])`ŌåÆcljw `["a"]` / clj `[a]`; a char inside a coll also mis-renders under `print` (cljw `(print [(char 97)])`ŌåÆ`[]`, clj `[a]`). JVM `print`-family binds `*print-readably*` nil so strings print without quotes and chars without `\`; `pr`-family keeps them readable. cljw's collection printer always uses the readable element form. Fix: thread a `readably` flag through the print path (or a dynamic `*print-readably*` Var) so `print`/`println` render elements non-readably while `pr`/`prn`/`pr-str` stay readable. Top-level bare strings already print unquoted under `println`; the gap is element rendering inside collections + the char-in-coll drop. Surfaced 2026-06-01 clj differential sweep (mapcat-variadic cycle). Cross-ref F-011. | quality-loop floor: print-readably (print vs pr element rendering) | 2026-06-01
  - id: "D-186"
    discharged_at: "DISCHARGED 2026-06-01 (quality-loop floor drain): two paths now honour reader meta on a collection literal. **Expression position** (`^:foo [1 2 3]`): the analyzer's `.vector`/`.map`/`.set` arms detect `Form.meta` and lower to `(with-meta <bare-literal> <meta-map>)` via `analyzeMetaColl`, re-analysed through the shared `with-meta` call path ŌĆö so BOTH backends attach metadata with NO per-literal-Node meta field (dual-backend parity contract unengaged; `--compare`ŌåÆOK). Meta-map values are EVALUATED, matching JVM (`(:a (meta ^{:a (+ 1 2)} [1]))`ŌåÆ3). **Quoted / data position** (`'(^:foo [1])`): `formToValue` attaches `Form.meta` to the IObj value via the Layer-0 collection `withMeta`. 5 e2e (phase14_var_metadata coll_*) + 1 diff case, clj-grounded. `^Sym` tag with an unresolvable symbol errors in expression position ŌĆö consistent with clj (both fail tag resolution). Description below = pre-landing context."
