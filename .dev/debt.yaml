    status: "SUPERSEDED 2026-06-14 by ADR-0138 (Track C step 2) — `out_writer_method.zig` DELETED; `*out*`/`*err*` are now first-class text_io writer VALUES (their roots are `(rt/__stdout-writer)`/`(rt/__stderr-writer)`), so `.write`/`.append`/`.flush` dispatch on the value's own method_table (no sentinel, no fallback). `*err*` interop is now wired too (the sentinel path never did). ORIGINAL DISCHARGE 2026-06-14 (same session) — `src/eval/backend/out_writer_method.zig`: a shared dispatch-fallback (called by BOTH tree_walk + vm after the Object/clojure.lang misses) routes `.write`/`.append`/`.flush` on the `:clojure.core/stdout` sentinel through `clojure.core/print`, which is capture-lane-aware (emitToStdout). `(with-out-str (.write *out* \"hi\"))` → \"hi\"; data.csv `(with-out-str (csv/write-csv *out* rows))` works (its verify.clj now asserts it). clj-parity locked by clj_corpus/out_writer.txt (5 goldens, single-backend). PARITY BASIS HONESTLY: both backends call the IDENTICAL shared helper (structural guarantee) — NOT diff-oracle-verified, because the diff Fixture can't bootstrap *out* (that gap = D-435, logged to the D-436 大整理 epic per the user's directive). Scope: stdout only; *err* writer-interop + the sentinel-vs-writer-value architectural question are D-436 candidates. ORIGINAL: open (2026-06-14, surfaced verifying clojure.data.csv's write-csv to *out*). cljw's `*out*` (and `*err*`) root is the keyword SENTINEL `:clojure.core/stdout`, NOT a Writer object — `(type *out*)` => Keyword, even under with-out-str. The cljw PRINT fns (print/println/pr/prn via core.zig emitToStdout) understand the sentinel + the out_capture lane, so `(print …)`/with-out-str work. But a Java-WRITER-INTEROP dot-call on *out* — `(.write *out* s)` / `.append` / `.flush` — fails with 'No implementation of method write on protocol <.member> for type Keyword', because the sentinel keyword has no .write method. Real libs that write to *out* via the Writer interface hit this: clojure.data.csv's