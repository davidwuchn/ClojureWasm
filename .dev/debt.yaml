    discharged_at: "DISCHARGED 2026-06-01 (quality-loop floor drain, 3 cycles): all 4 sub-parts landed. **(a)** `var` special form + `#'` reader (`925e3283`) — const-folds to a `.var_ref` `.constant` Node (stable `*Var`, no new Node → dual-backend contract unengaged); prints `#'ns/name`, derefs. **(b)+(c)** `^meta` reader (`.meta_caret` token + `readMeta` normalising `:kw`→`{:kw true}`/`Sym`→`{:tag Sym}`/map, stacking-merge) + `Form.meta` side-channel + `analyzeDef` lifting target meta into `Var.meta` at analyze time (`81eee799`); `metaFn` `.var_ref` arm. cljw symbols are metadata-less (ADR-0037) so meta rides the Form, NOT the symbol — inverts JVM's symbol-meta order. **(d)** `expandDefn` lowers docstring→`:doc` + attr-map + synthesized `:arglists` onto the name Form's `.meta` (this cycle), closing D-091's silent drop; reader meta (`^:private`) merged. clj-grounded by KEY extraction (`(:doc (meta #'f))` etc.) — full-map equality intentionally diverges (cljw omits JVM's auto `:name`/`:ns`/`:line`/`:file` keys per the survey's Reservation-as-bias avoidance). 15 e2e (phase14_var_special/var_metadata/defn_meta) + 3 diff cases + 4 catalog codes. **Spinoffs**: D-186 (collection-literal `^meta` drop), D-187 (`defmacro` docstring + `(doc f)` typed-field sync) — both low-priority, tracked. Description below = pre-landing context."
