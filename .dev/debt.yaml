    status: "DISCHARGED 2026-06-07 (ADR-0110). Symbol value-metadata landed: `with-meta` on a symbol mints a FRESH non-interned gc.alloc'd Symbol sharing the interned base's ns/name slices + the new meta; `meta` reads it (nil for interned). Symbol identity stays ns+name-structural, meta-IGNORED, across valueEqual/keyEqValue/valueHash (symbolStructEq) — the new `.symbol` valueHash arm (hash_cache) closed a latent pointer-bits bug that would have broken `(get {'a 1} (with-meta 'a m))`. GC: the `.symbol` membrane (isGcManaged) flipped to true + a `.symbol` trace marks meta; this CORRECTS ADR-0095's symbol/keyword conflation (a Symbol HAS a header — only var_ref/ns are headerless). Interned symbols ride the trace as a nil-meta no-op (bit-stale inert: no GC child by construction). Header kept at offset 0 for gc.alloc via `header: HeapHeader align(8)` (Zig reorder ties → declaration order wins), avoiding an extern/ptr-len rewrite of every .ns/.name reader. Keyword still rejects meta (clj ClassCastException). 15 e2e (phase14_symbol_metadata, incl. GC-survival across 50k allocs); GATE 274/0. SCOPE = symbol only; var/atom/ns/ref meta = D-239. Ladder re-probe of core.cache + algo.generic.math-functions pending hand-laid -cp."
    category: "runtime"
    barrier: |-
      **`(with-meta sym m)` / `(meta sym)` unsupported — symbols carry no metadata.**
      clj (oracle-verified): `(meta (with-meta 'a {:x 1}))`→{:x 1}; `(= 'a (with-meta
      'a {:x 1}))`→TRUE (meta is NOT part of symbol identity); `(with-meta :a m)`→
      error (keyword has no meta — keep cljw's error). Driver libs: core.cache,
      algo.generic.math-functions.

      REFERENCE CHAIN (audited 2026-06-07):
      - `src/runtime/symbol.zig` — `Symbol{header, ns, name}` has NO meta field
        ("ADR-0037 D6, no meta_ptr — deferred to D-075"); `SymbolInterner` interns
        by ns+name (shared pointers).
      - `src/lang/primitive/metadata.zig` — `withMetaFn`/`metaFn` switch over
        collection tags; symbol falls to the `else` → `with_meta_target_not_iobj`.
        Mirror the COLLECTION precedent (`vector.withMeta`/`metaOf`, per-type meta
        field — the pattern D-075 core used).
      - `src/runtime/error/catalog.zig:1200` `with_meta_target_not_iobj`.
      - ADR-0037 (`0037_symbol_heap_value.md`) D6 — where symbol meta was deferred.

      APPROACH (the load-bearing crux — likely a small ADR + DA, depth ~2):
      1. Add an optional `meta: Value = nil` to `Symbol` (interned ones = nil).
      2. `with-meta` on a symbol allocates a FRESH **non-interned** Symbol (same
         ns+name + meta) — meta-bearing symbols are not interned (clj: with-meta
         returns a distinct symbol `=` to the original).
