  - id: "D-134"
    discharged_at: "Recurring ΓÇË quality-elevation loop coverage backlog (F-010 / D-133 coverage floor)"
    resolution: |-
      scope | **clojure.core daily-driver coverage backlog**: a 2026-05-29 probe found ~35 high-frequency clojure.core fns unimplemented: update / mapv / filterv / reduce-kv / not-any? / frequencies / group-by / interpose / interleave / partition / partition-all / zipmap / range / repeat / repeatedly / iterate / cycle / take-while / drop-while / split-at / flatten / distinct / dedupe / sort / sort-by / max-key / min-key / reverse / last / butlast / fnil / reductions / vec / list* / update-keys / update-vals. **Cluster 1 Discharged** (update/vec/mapv/filterv/reverse/last). **Cluster 2 Discharged** (reduce-kv/update-keys/update-vals/not-any?/butlast). **Cluster 3 Discharged** (dedupe/distinct/frequencies/group-by ΓÇË unblocked by D-136 universal `=`). **Cluster 4 Discharged** (empty?/interpose/fnil/zipmap/interleave). **Cluster 5 Discharged** (max-key/min-key/flatten/reductions-3arg). **Cluster 6 Discharged** (second/ffirst/not-empty/take-last/drop-last). **Sort cluster Discharged** (sort/sort-by ΓÇË stable merge sort via D-137 compare). **All eager (a) clusters done.** **range (eager finite 1/2-arg) + map-indexed + keep-indexed Discharged** (multi-arity fn* confirmed working; D-NEW-2 "multi-arity deferred" comments in core.clj are STALE ΓÇË separate cleanup). **lazy Layer-2 CLOSED (ADR-0054 / `ec9ccfed`); all (b) lazy forms landed**: repeat/repeatedly/iterate/cycle/take-while/drop-while/partition + infinite `(range)` 0-arg, and `(range start end step)` 3-arg step (inline lazy recursion in core.clj ΓÇË JVM step-sign + step-0/start=end `not=` semantics; landed this cycle, e2e phase14_range_indexed). Remaining (b) edges: JVM step-0 chunked-seq nicety ΓÇË minor JVM-completeness, NOT a coverage-floor blocker. **comp/juxt multi-arity + partition 4-arg pad DONE (┬¯A26, 2026-05-30)**: `comp` 0/1/2/N-ary (right-to-left, any composed arity via apply); `juxt` multi-fn + multi-arg (was 2-fn/single-arg ΓÇË N-ary builds the vector via reduce+conj since `mapv` is a later core.clj defn unresolvable at the juxt def site); `partition` 4-arg pad (`(take n (concat p pad))` final-partition padding). e2e phase14_comp_juxt_partition (12 cases) + 1 diff case. **complement multi-arg + map multi-coll (1/2/3-coll) + the `vector` fn DONE (┬¯A26, 2026-05-30)**: `complement` Γ¶Ê `(fn [& args] (not (apply pred args)))`; `map` 1/2/3-coll (parallel, stop-at-shortest); `vector` fn `(fn [& args] (vec args))` (was unresolved ΓÇË unblocks `(map vector ΓÇ³)`/`(apply vector ΓÇ³)`). e2e phase14_map_complement_vector (11 cases). **split-with / take-nth / list* DONE (┬¯A26, 2026-05-30)**: `split-with` Γ¶Ê `[(take-whileΓÇ³) (drop-whileΓÇ³)]`; `take-nth` (lazy every-nth); `list*` 1-4-arg (the `(list* a args)` macro idiom; 5+-arg variadic deferred). e2e phase14_seq_core_batch (8 cases). **merge-with / partition-by DONE (┬¯A26, 2026-05-30)**: `merge-with` (combine shared keys via `(f existing new)`, nil maps skip); `partition-by` (lazy runs where `(f x)` is constant ΓÇË uses a `take-while` lazy_seq run, NOT `(cons fst (take-while ΓÇ³))`, since a raw cons-onto-lazy mis-counts ΓÇË surfaced D-153). e2e phase14_merge_partition_by (8 cases). Still pending: `map` N-coll variadic (`& colls`; primitive-only seq-all, def-order, lower freq). NOTE surfaced: nested lazy-seqs inside a collection print as `#<lazy_seq>` (ADR-0054 cycle-2 "top-level realize only" ΓÇË documented printer limitation); **D-153** (raw `(cons x lazy-seq)` mis-counts/prints). NEW coverage-floor gaps surfaced verifying this cycle (NOT clojure.core D-134 fns, separate): `fn` macro = D-145, `#()` reader macro = D-146 ΓÇË both HIGH frequency for real-corpus loading. Remaining split by dependency: (a) pure-eager Pattern A (interpose/interleave/zipmap/distinct/dedupe/reduce-kv/reductions/butlast/fnil/update-keys/update-vals/flatten/group-by/frequencies/sort/sort-by/max-key/min-key ΓÇË over existing primitives); (b) **lazy/infinite-dependent** (range/repeat/repeatedly/iterate/cycle/take-while/drop-while/partition ΓÇË need finite-arity now + true lazy at the lazy-seq Layer-2 gap). This is the coverage floor D-133 names; it is the recurring quality-loop work per F-010. Discharge: knock out cluster-by-cluster (1-3 TDD cycles each), eager forms now, lazy forms with the lazy-seq wiring. | Recurring (row 14.13 + post-M quality loop); never "done" until cw-v0 parity-PLUS | 2026-05-29
