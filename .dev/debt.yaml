  - id: "D-188"
    discharged_at: "DISCHARGED 2026-06-01 (quality-loop floor drain): `analyzeList`'s `items.len == 0` arm lowered `()` to `makeConstant(.nil_val)` instead of raising `feature_not_supported` ŌĆö the prior \"Phase-5 collections not landed\" deferral was long stale. `()` now self-evaluates to nil, matching `(list)` / `'()` (cljw's emptyŌēĪnil representation ŌĆö the **distinct** empty-list Value is D-164's structural overhaul, NOT in scope here; lowering to nil keeps `()` consistent with the other empty-list spellings within the current model). Shared analyzer arm ŌåÆ both backends agree (`--compare ((fn* [] ()))`ŌåÆOK nil + 1 diff case `(if () 1 2)`ŌåÆ2). 5 e2e (phase14_empty_list). Description below = pre-landing context."
