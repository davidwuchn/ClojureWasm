  - id: "D-237"
    status: "now (vars.clj cluster, 2026-06-03) ŌĆö `with-local-vars` needs anonymous-Var creation + a heap binding-frame primitive; var-get/var-set landed."
    category: "runtime"
    barrier: |-
      **`(with-local-vars [a 1] ŌĆ”)` is unsupported.** `var-get`/`var-set`
      LANDED (2026-06-03, core.zig primitives over `Var.deref` + `env.setBinding`;
      var-set requires a thread binding, else clean `var_set_not_bound` ŌĆö clj
      parity; 6 e2e phase15_var_get_set). `with-local-vars` is the remaining
      piece: it creates ANONYMOUS dynamic Vars, thread-binds them over the body,
      and binds the local names to those var values. Needs (a) a `__make-local-var`
      primitive (alloc a fresh dynamic `Var`, return a `.var_ref`), (b) a
      heap-allocated binding-frame push/pop primitive pair (mirroring vm.zig
      op_push/pop_binding_frame's `rt.gpa.create(BindingFrame)` lifecycle, since
      the frame must outlive the primitive call and pop in a `finally`), and (c)
      the `with-local-vars` macro `(let [a (__make-local-var) ŌĆ”]
      (__push-local-frame a 1 ŌĆ”) (try body (finally (__pop-local-frame))))`. var-set/
      var-get/`@` already operate on the resulting var values. Moderate cluster;
      vars.clj is its consumer (with-local-vars ├Ś2).
      **STRUCTURAL lifetime question (F-003 ŌĆö owner decides, do NOT cold-seize):**
      an anonymous local Var cannot be GC-managed because the GC membrane skips
      `.var_ref` (D-230 ŌĆö var_ref values are assumed ns-owned/permanent, not
      traced). So `__make-local-var` must infra-alloc, and the lifetime choice
      is genuinely open: (a) free at frame-pop (no leak, but a var value that
      ESCAPES the with-local-vars extent ŌĆö captured in a returned closure ŌĆö
      dangles ŌåÆ UAF; clj allows escape via its GC); (b) leak (memory-safe but
      an unbounded leak under a with-local-vars loop). Neither is clearly right
      without either tracing var_ref in the membrane (reverses a D-230 decision)
      or an arena tied to the extent. Resolve this lifetime/GC-membrane question
      FIRST (it is the real work; the primitives + macro are mechanical after).
      Cross-ref D-230 (Var-as-value + GC membrane skips var_ref) / set!
      (env.setBinding) / F-006 (GC) / F-011. recall trigger: vars.clj drain or a
      real lib using with-local-vars.
