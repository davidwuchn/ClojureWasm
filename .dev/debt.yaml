o 5] / :the-end). 13 e2e (phase14_tagged_literal, incl. --compare). cycle 3 LANDED (ADR-0074): `#uuid` reads to a REAL `.uuid` heap value type (NaN-box slot 31, `reserved_b15`→`uuid`) — EDN round-trips via `pr-str` (`#uuid \"…\"`), `(uuid? x)`→true, `(class x)`→UUID (cljw simple-name), `=` by 128 bits, `(str x)` bare canonical. `random-uuid`/`parse-uuid`/`java.util.UUID/randomUUID` MIGRATED to the type (one coherent representation); malformed `#uuid` raises `uuid_string_invalid`. Root `*data-readers*` ships the `uuid` reader (works without a binding). 13 e2e (phase14_uuid_literal, incl. --compare) + unit test. cycle 4 LANDED (ADR-0075): generic `tagged_literal` carrier on slot 24 — `clojure.lang.TaggedLiteral` ({tag,form}, ILookup-only `:tag`/`:form`, `pr-str`→`#foo 5`, `=` by (tag,form), `31*h(tag)+h(form)`); `tagged-literal`/`tagged-literal?` builtins; opt-in unknown-tag carry via `(binding [*default-data-reader-fn* tagged-literal] …)` (default still RAISES — ADR-0073 unchanged). 5 e2e + unit. REMAINING (D-200 still open): ONLY `#inst`/Date value-type. **2026-06-02 survey + Step 0.6 finding — the representation is a DEFERRED STRUCTURAL decision (principle.md Structural imagination phase), NOT a quick mirror of `#uuid`**: ALL 64 NaN-box slots are now NAMED (verified value.zig:52-110 — Group D 48-63 full; Group B's only unused slot is `reader_conditional=25`, earmarked for `.cljc`; `reified_instance=27` is used by reify). So a dedicated `.date`/`.inst` tag (the clean uuid-style shape) has NO free slot — it needs either a USER F-004 slot decision (the 64-slot shape is user-LAW) or stealing `reader_conditional`'s reservation. `host_instance=29` (Date's JVM-natural home) is D-048-gated (zero live code, all PROVISIONAL markers). The compliant fallback is a `typed_instance` deftype-style Date (no slot; cljw-native per no_jvm_specific_assumption — answers inst?/inst-ms/=/pr-str/class→Date), but whether that vs a dedicated tag is finished-form is genuinely contested (DA-worthy) and entangled with the slot-map + D-048 owners. PARSER: full clojure.instant grammar (~60 lines Zig) + civil-date→epoch-ms closed-form; print `#inst \"YYYY-MM-DDTHH:MM:SS.mmm-00:00\"`; store i64 UTC epoch-ms only (DIVERGENCE: no Calendar/TimeZone graph). Survey: `private/notes/phase14-inst-date-survey.md`. DEFER to the slot-map/D-048 owner OR a user F-004 reshuffle; do NOT force a to-be-unwound representation mid-Phase-14. D-200's reader infra + edn 2-arity + uuid + tagged-literal carrier are DONE; only this structurally-deferred piece remains."
