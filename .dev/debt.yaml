      runtime | **with-meta / meta / vary-meta + IObj/IMeta protocols**. JVM Clojure attaches arbitrary metadata to symbols / collections / fn vars via `^{...}` reader form + `(with-meta x m)` runtime call. cw v1 は heap value に metadata slot を持たず (F-004 第二世代 layout は per-value metadata の slot を含むか未確定 — Phase 5 entry で確定)、 `clojure.set/project` + `rename` (DIVERGENCE D-β) が `(with-meta result (meta xrel))` wrap を drop。 D-075 着地後、 該当 `.clj` defns に wrap を戻し、 `feature_deps.yaml#clojure.set/project` + `rename` を landed に。 解消推定: HeapHeader 拡張 + meta slot allocator + reader `^{...}` form + IObj/IMeta protocol method dispatch (Phase 7 ADR-0008 protocol layer 着地後)、 計 ~500 LOC。 Source: 6.16.b-3 per-task note DIVERGENCE D-β; F-004 NaN-box 第二世代 + Phase 7 protocol activation. | Phase 7+ entry (metadata system + IObj/IMeta protocols) | 2026-05-26
  - id: "D-076"
    discharged_at: "Discharged (§A26 cycles 1-4, 2026-05-30: `let` seq+assoc, `fn`/`defn` params, `loop`); `:strs` unblocked by D-151 cycle 1 for ≤8-key maps (>8 awaits D-045 HAMT)"
    resolution: |-
      runtime | **Cycle 4 DONE (§A26, 2026-05-30)**: `loop` MACRO (newly registered — bare `(loop …)` was previously unresolved; `loop*` had to be written directly) + `loop` destructuring. `(loop [pat init] body)` → `(loop* [g init] (let [pat g] body))`; each binding pair = exactly one loop* slot so `recur` arity matches (JVM-faithful), patterns get a gensym slot + body-wrapping `let`, plain bindings stay loop* slots. e2e phase14_destructure now 27 cases + 5 diff cases. **D-076 destructuring is functionally complete** (`let`/`fn`/`defn`/`loop`, sequential + associative + nested + `& rest` + `:as`/`:or`/`:keys`/`:syms`). Only `:strs` (string keys) remains non-functional — blocked by D-151 (map string-key value-equality), tracked separately; its lowering is correct + forward-compatible. **Cycle 3 DONE (§A26, 2026-05-30)**: FN-PARAM destructuring — `(fn [[a b]] …)` / `(defn f [{:keys [x]}] …)` (single + multi-arity, `& [rest pat]`). Shared `transformFnArity` (called by both `expandFn` + `expandDefn`) replaces each pattern param with a gensym and wraps the body in `(let [pattern gensym …] body)`, reusing the cycle-1/2 `let` destructure via recursive macroexpansion (the JVM `fn` shape). Plain-symbol/`&`/variadic params pass through (zero regression). e2e phase14_destructure now 22 cases + 4 diff cases. **Remaining**: `loop*` destructuring (needs a `loop` macro — none registered; `loop*` used directly today). `:strs` still D-151-blocked. **Cycle 2 DONE (§A26, 2026-05-30)**: ASSOCIATIVE map destructuring in `let` — `{:keys [..] :syms [..] :or {..} :as m}` + bare `{local kexpr}` + nested (map-in-seq, seq-in-map) — lowered in `associativeDestructure` (`expandLet`) to `(get g <key> <default>)`. `:keys`→keyword key, `:syms`→quoted-symbol key (both interned, work); `:strs`→string key lowering is correct + forward-compatible but functionally returns nil until **D-151** (map string-key value-equality) lands — intentionally not asserted. e2e phase14_destructure now 16 cases + 3 diff cases. **Remaining**: (b) FN-PARAM destructuring (`(fn [[x y]] …)` — touches `expandFn` + multi-arity); (c) `loop*` destructuring (needs a `loop` macro). Both reuse `destructureInto`. **Cycle 1 (2026-05-30)**: SEQUENTIAL vector destructuring in `let` — `[a b]` / `[a b & rest]` / `[a b :as all]` / nested — lowered at the **macro layer** (`macro_transforms.zig expandLet` → plain-symbol `let*` + `nth`/`nthnext`, JVM `clojure.core/destructure` shape; NOT analyzer pass nor `.clj`, since `let`/`fn` are already Zig macros and a `.clj` destructure hits bootstrap-order fragility — the survey's layer call, diverging from the original "analyzer pass" framing AND from cw v0's dual analyzer+`.clj` impl). Prereq `nthnext`/`nthrest` added to core.clj. e2e phase14_destructure (9 cases) + 2 diff cases. Fast path (all-symbol bindings) untouched = zero regression. **Remaining**: (a) ASSOCIATIVE `{:keys [x y] :strs :syms :or :as}` — currently raises `feature_not_supported "associative (map) destructuring"`; (b) FN-PARAM destructuring (`(fn [[x y]] …)`) — touches `expandFn` + multi-arity; (c) `loop*` destructuring (needs a `loop` macro — none registered today). Each reuses the cycle-1 lowering helpers (`destructureInto`/`sequentialDestructure`). After (a), restore vector destructure in `.clj` defns that hand-wrote `(nth kv 0)` (e.g. `clojure.set/rename-keys`) + flip `feature_deps.yaml#clojure.set/rename-keys` to landed. Source: §A26 D-076 survey + cycle-1 note. | Coverage-floor follow-up — associative `{:keys}` next (highest corpus frequency), then fn-param | 2026-05-30
