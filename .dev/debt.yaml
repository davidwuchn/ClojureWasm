    status: |-
      DISCHARGED 2026-06-12 — the gate failure is fixed + the mechanism made
      clj-faithful. The original triage was BACKWARDS: a JVM Clojure oracle proves
      `(send a (fn [s] (send a inc) (inc s))) (await a) @a)` is **deterministically
      1** (5/5) — `await` waits for `outer` ONLY (which sets 0→1); the nested `inc`
      is dispatched from the AGENT thread, NOT awaited. So the TEST's expectation of
      2 was wrong, and cljw's Mac result (2) was the non-clj-faithful one, not
      Ubuntu's 1. Root divergence: clj DEFERS nested sends (`Agent.java` `nested`
      ThreadLocal + `releasePendingSends`) until the action completes; cljw enqueued
      them immediately. Fixes landed: (1) agent.zig grew the same deferral
      (`nested_pending` threadlocal; held sends `gc.pin`'d — GC-torture-clean, 19/19);
      (2) the e2e now asserts the DETERMINISTIC full-drain state via a second
      `(await a)` → 2 on both clj and cljw (a single-await capability check that does
      not depend on the race). RESIDUAL (known limitation, not fixed): the
      single-`(await a)` exact result is still timing-dependent on cljw (Mac 2 /
      Ubuntu 1) vs clj's reliable 1, because cljw's EAGER per-agent drainer runs
      `outer` before the main thread reaches `await`, whereas clj's executor pool
      does not start until after — a drainer-MODEL difference (ADR-0093). The
      deferral alone cannot close it (the drainer still wins the race on Mac, 20/20).
      A deterministic single-await would need a drainer-model change (lazy/pooled
      dispatch) — deferred as out-of-scope + risky; the deferral is the right
      mechanism regardless.
