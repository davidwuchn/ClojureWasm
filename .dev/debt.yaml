    discharged_at: "structural ΓÇË `.list` / `.cons` tag conflation (PersistentList vs Cons-over-seq); defer to F-004 seq-family owner"
    resolution: |-
      runtime | **The `.list` heap tag is used for BOTH a true PersistentList (list/nil tail, valid O(1) `count` field) AND a Cons-over-a-seq (`(cons x lazy_seq)` / `(conj (range 3) 99)`, whose tail is a non-list seq).** Consequence: the Cons `.count` field (`1 + countOf(tail)`, and `countOf` returns 0 for non-list tails) is a lie for mixed chains, and the list-specialized fast paths (printList / deepRealize `.list` arm / countFn `.list`) assumed a homogeneous `.list` chain. Surfaced 2026-05-31 by D-168 (rangeΓ¶Êlazy-seq exposed `(cons x non-list-seq)`, previously hidden because range was an eager vector routed via seqFn). **Correctness fixed at D-168** by walking `.list` generically (count + print no longer trust the O(1) field for mixed chains) ΓÇË but that drops the O(1) `count` optimisation for pure PersistentLists. The finished form (per F-004 seq-family slot map: `lazy_seq` / `cons` / `chunked_cons` are distinct tags) **splits `.list` (PersistentList, O(1) count, list-only tail) from `.cons` (ASeq Cons over any seq, O(n) walk)** ΓÇË matching JVM `clojure.lang.PersistentList` vs `Cons`. The `.cons` tag already exists but is vestigial (only a value.zig test creates it). Activating it + per-tag first/rest/seq/count/print is an F-004 structural decision Γ¶Ê defer to that owner (F-003). NOT a per-op patch. Cross-ref D-168 (the correctness fix) / F-004 (NaN-box 2nd-gen seq family) / F-011. | when the F-004 NaN-box 2nd-gen (D-027) seq-family cycle opens OR a corpus test needs O(1) list count back | 2026-05-31
  - id: "D-179"
    discharged_at: "structural ΓÇË seq-family slot co-activation (`.string_seq` A13 / `.array_seq` A14); defer to their owning rows (F-003)"
    resolution: |-
      runtime | **`.range` (A12) was activated as a compact value (ADR-0063); its two Group-A neighbours `.string_seq` (A13) and `.array_seq` (A14) share the identical pattern** (compact descriptor + index cursor + O(1) count/nth + chunked-cons `seq`) but stay vestigial. ADR-0063's Devil's-advocate Alt-3 noted activating all three together would amortise the ~14-arm seq call-site surgery once instead of three times; rejected for ADR-0063 as an F-003 scope-explosion (no F-NNN fixes "activate the seq family together") + F-005 trespass (bigint bounds). **When the `.string_seq` / `.array_seq` owning row opens, reuse ADR-0063's `range.zig` chunked-seq substrate** so each becomes a one-arm fall-through, not a repeat surgery. ALSO: `.range` inherits **D-165** (elements / count beyond ┬▒2^47 silently become float via `initInteger`) and **D-164** (empty range Γ¶Ê nil) unchanged ΓÇË both F-005/seq-model owner territory, not fixed by ADR-0063. Cross-ref ADR-0063 / D-163 / D-165 / D-164 / F-004 (A13/A14 slots) / F-005. | when the `.string_seq` / `.array_seq` owning row opens OR a corpus test needs string-seq/array-seq value identity | 2026-05-31
  - id: "D-180"
    discharged_at: "DISCHARGED 2026-05-31 (O-003)"
    resolution: |-
      runtime | **DONE (O-003)**: `vector.fromSlice` builds the HAMT trie bottom-up from the transient's flat buffer in O(n) (32-element leaves Γ¶Ê interiors grouped 32-at-a-time Γ¶Ê root; trailing Γë¨32 = tail); `toPersistent` uses it (carrying through `tv.meta`, which the old N-conj rebuild silently dropped); `into`/`vec` route editable targets (vector / hash-map / hash-set ΓÇË NOT sorted / nil / list) through `transient`/`conj!`/`persistent!` via an `-editable?` guard. **Measured `(count (vec (range 1e6)))` 121s Γ¶Ê 2.4s; `(reduce + (vec (range 1e6)))` 123s Γ¶Ê 2.5s.** Verified by a `fromSlice`-vs-conj boundary unit test (n Γêê {0,1,31,32,33,63,64,65,1023,1024,1025,1e5}: identical count/shift/tail/root + element-wise) + diff oracle vs `clj` (into/vec over vector/map/set/sorted/nil/list + meta). Residual ~2.4s = per-element reduce/conj! dispatch + lazy-seq walk of `from` Γ¶Ê D-163/D-140, not `persistent!`. **Original:** **`transient_vector.toPersistent` rebuilds the persistent vector via N persistent `conj`s** (`transient_vector.zig` L124-131: `while ΓÇ³ out = vector.conj(rt, out, p[i])`). The transient's flat-buffer fill is O(1) amortised, but `persistent!` is O(n log n) + N HamtNode allocs ΓÇË so transient-backed `into`/`vec` get NO speed-up over plain persistent conj (the whole point of transients is an O(1) `persistent!` handoff). **Measured 2026-05-31 (mac-arm-m4pro): `(count (vec (range 1e6)))` = 121s, almost all in `persistent!`** (the `reduce conj!` fill is <1s; cf. `(reduce + (range 1e6))` = 60ms). **Fix:** a bulk `vector.fromSlice(rt, items)` building the HAMT trie bottom-up from the flat buffer in O(n) (32-element leaf HamtNodes Γ¶Ê interior levels via the same shift/overflow invariants as `conj`'s tail-full path Γ¶Ê tail = last Γë¨32), used by `toPersistent`; THEN re-land the reverted O-003 pair (route `into`/`vec` through `transient`/`conj!`/`persistent!` with an `-editable?` guard so sorted/nil/list fall to persistent conj). Pair must land together (O-003 alone is net-neutral). **Core Vector type Γ¶Ê exhaustive boundary tests** (n Γêê {0,1,31,32,33,63,64,65,1023,1024,1025,1e5}: build Γ¶Ê nth-all + count + `=` vs a conj-built vector) before gating. cw v0 + JVM keep the trie incremental in the transient (O(1) persistent!); cljw's flat-buffer transient does the one O(n) conversion at `persistent!`. Cross-ref ADR-0063 / O-001 / O-002 / `.dev/optimizations.md` (O-003) / F-002 / F-011. | DISCHARGED 2026-05-31 | 2026-05-31
  - id: "D-181"
    discharged_at: "open ΓÇË perf (deferred; maps not a measured bottleneck)"
    resolution: |-
      runtime | **Transient hash map `assoc!` is persistent-path O(log32 n) copy-on-write, not an in-place editable transient** (ADR-0064 Alt 1). Past `ARRAY_MAP_THRESHOLD` (8) the transient holds a persistent `.hash_map` in `overflow` and delegates `assoc!`/`dissoc!` to `map.assoc`/`map.dissoc` ΓÇË correct (the result equals `(reduce conj {} ΓÇ³)` byte-for-byte) but with no in-place allocation win, so `(into {} big)` is O(n log n) like the persistent path, not the O(1)-amortised-assoc + O(1)-persistent! a true transient gives. **Finished-form candidate (named by the ADR-0064 Devil's-advocate): an editable CHAMP HAMT with a ClojureScript-style edit token** (a freshly-minted sentinel `?*anyopaque` compared by identity ΓÇË cljs proves this works single-threaded, fitting cljw's no-threading + no-`pub var` constraints). Cost: adds an `edit` field to the `HamtMapNode` `extern` layout (F-004) + a parallel `ensureEditable`-gated editable-insert path through `hamtAssoc`/`insertDataEntry`/`pushDownDataToNode`; also inherits the unfinished collision bucket (D-155). NOT Alt 2 (flat + open-addressing side index + `map.fromSlice`) ΓÇË the ADR-0064 DA showed `map.fromSlice` is not an O(n) bulk build (CHAMP slot placement is hash-driven), so Alt 2 pays for a second hash mechanism (F-011 liability) for only a constant-factor win. Surfaced 2026-05-31 by the O-003 into/vec transient routing (D-180). Cross-ref ADR-0064 / D-045 / D-155 / D-156 / F-002 / F-004 / F-011. | blocked-by: a corpus / bench measurement shows large-map `into` / `assoc!` as a hot path (then build the editable-CHAMP transient per ADR-0064 Alt 3) | 2026-05-31
