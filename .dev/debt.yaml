s — Thread/currentThread + .getName + Runtime/getRuntime + .availableProcessors (rt-cached host_instance singletons, identity holds; Runtime.zig new surface). [DONE] java.util.ArrayList — host_instance over a gc.infra std.ArrayList(Value); elements GC-traced via the descriptor's host_trace hook (the D-294 Iterator pattern, NOT new GC design — de-risked); add/get/set/size/isEmpty/contains + the seq/count/into bridge via a (Seqable -seq)+(IPersistentCollection -count) MethodEntry (the seqFn/countFn else-arms dispatch these — no shared-code change); GC-torture-verified. [DONE] java.util.HashMap — host_instance backing a cljw MAP Value in state[0] (put/get/containsKey/size/isEmpty/remove via assoc/get/dissoc; host_trace marks the ONE map Value; reuses cljw key-equality/hashing); seq/count/into bridge; GC-torture-verified; `(seq hm)`→cljw MapEntry not Java Node = AD-032. ArrayList/HashMap ctor-from-coll seeding + addAll/keySet/values are follow-ups. The HIGH+MEDIUM-value commonly-used Java surface is now COMPLETE (System/exceptions/Thread/Runtime/StringBuilder/ArrayList/HashMap). [DONE] java.util.Date ctor (java.util.Date. [ms]) + .getTime — surface <init>→date.make; .getTime on the per-Runtime date.zig descriptor (the value's descriptor) reads the epoch-ms field; `(inst-ms d)` reads the same. setTime/toString/toInstant follow-up. REMAINING (lower-value-for-cljw — Clojure prefers its own reader/charset; take up on a real consumer): (e) Reader family (StringReader/PushbackReader — only valuable WITH the *in*/pushback subsystem, see D-414); [DONE] String.getBytes (signed UTF-8 byte .array) + (String. bytes [charset]) (byte↔string roundtrip, UTF-8; via installNativeMethods + a String <init>). REMAINING follow-ups (all niche-for-cljw, take up on a real consumer): StandardCharsets/UTF_8 the VALUE (charset args currently accept a name String, UTF-8 always); (String. char-array) (toCharArray returns a vector not .array); Reader family (StringReader/PushbackReader — needs the *in*/pushback subsystem, D-414); Date setTime/toString/toInstant; ArrayList general-seqable ctor (vector + cljw-map seeding DONE; list/lazy needs the Layer-2 seq subsystem → use (ArrayList. (vec coll))) + addAll/keySet/indexOf. THE COMMONLY-USED JAVA SURFACE IS COMPLETE (System/exceptions/Thread/Runtime/StringBuilder/ArrayList/HashMap/Date/String-bytes); full gate 344/344 + conformance 13/13 validate the whole campaign. (singleton host_instance — identity must hold across calls; System/out,err writers→*out*/*err*); (c) java.util.ArrayList + HashMap (host_instance pointer-in-state + the seq/into bridge + identity-vs-value = decision); (d) Reader family (StringReader/PushbackReader for edn/read) + java.util.Date ctor+.getTime (#inst) ; (e) String.getBytes/(String. bytes)+StandardCharsets; (f) exception ctors (IllegalArgumentException. msg); (g) cheap recognition-only opaque sweep. Each unit: pick the model, implement, e2e + clj-verify, update compat_tiers methods, corpus where value-bearing. SSOT detail: private/notes/survey-java-class-coverage.md."
