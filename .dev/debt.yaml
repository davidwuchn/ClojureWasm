  - id: "D-482"
    status: "open (2026-06-21, found probing instance? Counted). cljw EAGERLY REALIZES the output of some seq ops into a counted `PersistentList` where clj keeps a lazy non-counted Cons/LazySeq → `counted?` (and `(instance? clojure.lang.Counted x)`) diverge: `(counted? (cons 1 [2 3]))` / `(counted? (take 3 (iterate inc 0)))` / `(counted? (take 3 (repeat 1)))` → cljw TRUE, clj FALSE. Confirmed via `(class …)`: all three are `PersistentList` in cljw, `Cons`/`LazySeq` in clj. The legit chunked-vector-seq `(seq (vec (range 40)))` is counted in BOTH (clj-correct). So the divergence is exactly: cljw `cons`/`take`/… build an eager realized list, clj a lazy seq. ROOT = cljw's seq-realization model (the ADR-0054 print-realizes lineage), NOT a countedQ tag-membership bug — removing `.cons`/`.list` from countedQ would wrongly un-count a real `(list …)`. `(take 3 (range))` works (take IS bounded-lazy on its INPUT — only the OUTPUT is realized eager), so this is not an infinite-seq hang, just a counted?/laziness representation gap. Likely broader side-effect-timing implications (eager realization). A focused seq-laziness unit (make cons/take return a lazy/Cons-equivalent non-counted seq) — deep, deferred; low-urgency (counted? on a lazy seq is rare). Could alternatively be classified as an accepted divergence if the eager model is deemed permanent."
    category: "interop"
    barrier: "cljw's eager seq-output realization (cons/take build a PersistentList, clj a lazy Cons/LazySeq). A laziness-model change touching cons/take/etc. — deep + behavior-wide; deferred. Low value (counted? on a lazy seq is niche). Decide fix-vs-AD in a focused unit."
