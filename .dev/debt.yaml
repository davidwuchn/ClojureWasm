    discharged_at: "fix(analyzer): bare imported deftype falls back to simple-name rt.types key"
    resolution: |-
      Found + fixed 2026-06-12 (P4 lib-load: hiccup.core blocked at compiler.clj:200
      `(extend-protocol … RawString …)`). The original hypothesis was RIGHT (the
      re-verification confirmed it): the analyzer's bare-symbol→class-VALUE fallback
      (`analyzeSymbol`, analyzer.zig) calls `resolveClassImport` which rewrites the
      bare `RawString` → its imported FQCN `ml.util.RawString` (from `ns.imports`,
      D-235), then `rt.types.get(cname)` MISSES — because `registerType`
      (type_descriptor.zig) keys a USER deftype/record by its SIMPLE name
      ("RawString"), NOT the FQCN. The ctor path `(RawString. …)` works precisely
      because it keeps the simple name (constructInstance → resolveJavaSurface step
      1 `rt.types.get("RawString")` hits); the value path broke only because the
      FQCN rewrite is needed for host-surface (java.net.URI) + classValueKeyFor
      (Map$Entry) lookups but a user type's FQCN is absent. Since `instance?` is now
      a FN whose class arg EVALUATES (ADR-0128), the macro-path `resolveInstanceClassArg`
      rewrite is dead for it, so the value path is the one that matters.
      FIX: at the rt.types value-lookup, fall back to the bare `sym.name` when the
      FQCN `cname` misses (`get(cname) orelse (if cname≠name) get(name)`) — host
      surfaces stay FQCN-keyed, user deftypes resolve by simple name like the ctor.
      One-block change, zone-clean. Verified: new e2e phase14_deftype_cross_ns_import
      (cross-ns instance? + extend-protocol, 2 assertions, clj-matched); hiccup.core
      now LOADS and `(h/html [:div {:class "x"} [:p "hello"]])` renders byte-identical
      to clj (`<div class="x"><p>hello</p></div>`); smoke 5/0 both backends.
  - id: "D-390"
    discharged_at: "feat(analyzer): defmacro lowers through fn (destructured macro params)"
    resolution: |-
      Found + fixed 2026-06-12 (P4 lib-load: grammarly/perseverance blocked at
      core.clj:127 `(defmacro … [{:keys [strategy selector log-fn]} & body] …)`).
      `(defmacro m [{:keys [a]}] …)` raised "fn* parameter must be a symbol" at
      ANALYZE time: cljw's `analyzeDefmacro` (special_forms.zig) built the macro fn
      as a synthetic `(fn* [&form &env PARAMS…] …)` DIRECTLY, but `fn*` is the
      low-level primitive that requires plain-symbol params — the fn-macro
      destructuring layer (`expandFn` → `transformFnArity`, lang/) was bypassed.
      defn/fn destructuring already worked; only defmacro (a special form, not a
      macro) didn't — the asymmetry clj avoids by making defmacro expand to defn.
      FIX: lower through `fn` (the destructuring macro), not `fn*` — `analyze`
      macro-expands the `fn` head (expandIfMacro), so the synthetic form is fully
      lowered (destructured) before the FnNode is built. One-token change ×2
      (single + multi arity); zone-clean (no eval/→lang/ import; the existing
      analyze pipeline does the expansion). Verified: perseverance.core now LOADS;
      e2e phase14_defmacro_destructure (map/vector/rest/multi-arity destructuring +
      plain-param regression, 6 assertions, clj-matched); both backends green via
      the F-012 diff oracle. NOTE: a macro must be defined in a SEPARATE top-level
      form before use (cljw analyses a whole `(do …)` before eval — a same-`do`
      define-then-call sees the macro var's root unset; unrelated cljw eval-model
      property, not this bug)."
