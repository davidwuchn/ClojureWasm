    discharged_at: "DISCHARGED 2026-05-31 (cluster A26, after bit statics): `print.zig::printFloat` re-lays Zig `std.fmt.float.render` shortest-scientific output into JVM `Double.toString` form ŌĆö decimal layout when the decimal exponent Ōłł [-3, 6] (`1e-3 Ōēż"
