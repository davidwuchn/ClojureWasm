  - id: "D-231"
    status: "now (found 2026-06-03 during D-230 sweep) — a `.var_ref` Value is not callable (Var-as-IFn missing)."
    category: "scope"
    barrier: |-
      **A Var value is not callable.** `((ns-resolve 'clojure.core 'inc) 4)` /
      `((var foo) args)` raise a type_error in cljw, where clj's Var implements
      IFn (calling a Var derefs its root and applies). The call dispatch
      (`higher_order.invokeCallable` + the analyzer/TreeWalk/VM call paths) has
      no `.var_ref` arm. Discharge: add a `.var_ref` arm that derefs the Var to
      its root value and re-dispatches the call on that (recursing through the
      normal callable path). Distinct from D-230 ns-reflection (ns-resolve
      correctly RETURNS the var-value `#'clojure.core/inc`; only direct
      invocation of that value is missing). Most code uses `@v`/`(var-get v)`
      then calls the value, so this is moderate value; clojure.test (D-227)
      runs test vars via the `:test` var-meta fn, not by calling the var, so it
      is not blocked. Cross-ref D-230 (surfaced it) / D-183 (var meta) / F-011.
      recall trigger: when a real lib calls a var directly, or a quality sweep
      hits it again.
