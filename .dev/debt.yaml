    barrier: |-
      `(re-find #"(a*)*" "aaa")` → cljw `["aaa" "aaa"]` vs clj `["aaa" ""]`;
      same for `(a*)+`. Java runs one final empty iteration of the outer
      quantifier (inner `a*` matches "" at end) and that empty capture becomes
      group 1's value; cljw's Pike-VM empty-loop dedup (`seen[pc]` cuts a thread
      that revisits a PC at the same position) suppresses that final iteration,
