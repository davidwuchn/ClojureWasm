  - id: "D-267"
    status: "DISCHARGED 2026-06-12 (polish loop) → AD-030. Classified as an F-005-derived accepted divergence (the audit's recommended disposition): cljw collapses int/Long (F-005) so it cannot reproduce clj's Integer-accepts (`(int 66)`→\"B\") / Long-rejects (`65`→IllegalFormatConversionException) split; cljw takes D-267 option (b) — reject `%c` on EVERY integer (the conservative surface, no silent codepoint coercion). char args are clj-parity in both. Pinned by test/e2e/phase14_format_char_int.sh (format_c_int_rejected + format_c_long_rejected lock the rejection; format_c_char locks parity). Error-kind divergence is AD-007. ORIGINAL: open (found 2026-06-06, format clj-diff sweep) — `(format \"%c\" <int>)` diverges; cljw collapses int/Long (F-005) so it rejects ALL integers (type_error). char args work in both."
    category: "clj-parity"
    barrier: |-
      **`%c` with an integer arg can't replicate clj's Integer-vs-Long split.**
      clj's `%c` accepts Character/Byte/Short/Integer and rejects Long, so
      `(format "%c" (int 66))`→"B" but `(format "%c" 65)`→IllegalFormatConversion.
      cljw has ONE integer type (F-005: int≡Long≡`.integer`), so `(int 66)` and
      `65` are indistinguishable — cljw currently rejects `%c` on every integer
      (type_error). The COMMON case is already clj-parity: `(format "%c" \A)` /
      `(format "%c" (char 65))` → "A" in both. Only the rare `%c`-with-int path
      diverges, and cljw CANNOT match both clj cases at once. Two finished-form
      options, both F-005-consequence divergences needing an AD: (a) accept `%c`
      on cljw's integer as a codepoint → matches `(int 66)`→"B" but makes
      `(format "%c" 65)`→"A" (clj errors there); (b) keep rejecting integers →
      matches `(format "%c" 65)`→error but `(int 66)` stays an error (clj "B").
      LOW value (`%c` with an int is rare; char args are the norm). Decision +
      AD deferred. Cross-ref F-005, F-011, AD-003 family.
