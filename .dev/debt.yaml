      runtime | **`defn` macro skips docstring + metadata-map**: JVM `defn` accepts `(defn name "doc" [params] body)`, `(defn name "doc" {meta} [params] body)`, plus multi-arity equivalents. Row 7.8 cycle 3 landed `(defn name [params] body)` + `(defn name ([params] body)+)` only ŌĆö docstring + meta-map slots cause the macro to treat them as the first body form and raise `defn_params_not_vector`. Discharge route: extend `expandDefn` to detect leading string (docstring) + leading map literal (meta-map) before the params-form lookup. Survey ┬¦11 Q6 explicitly deferred this. Pure additive; no F-NNN risk. recall trigger: opportunistic ŌĆö Phase 8+ ergonomic cycle OR when a `.clj` defn that needs docstring lands first. Source: row 7.8 survey ┬¦11 Q6 + row 7.8 cycle 3 implementation. | DISCHARGED 2026-06-01 | 2026-06-01
  - id: "D-092"
