      embedded-FIRST `chainedResolver` so core/test never shadowed);
      `RequireResolverFn`Γ¶Ê`{source,label}` (lib errors render at the lib's
      file:line); new `lib_load_failed` Code. VERIFIED: a disk test-ns requiring
