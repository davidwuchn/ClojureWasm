  - id: "D-427"
    status: "DISCHARGED 2026-06-14 (same cycle). The `=` half is fixed; the hash half is an ACCEPTED residual (identical to the pre-existing lazy_seq treatment), not a wart. Fix: equal.zig isSequential() now ALSO returns true for a typed_instance/reified_instance whose descriptor declaresProtocol(\"Sequential\") (gated on Sequential — maps/sets/priority-map stay identity/equiv); seqEqual REALIZES a Sequential instance to a native list (new realizeSequentialInstance: GC-rooted -seq→-first/-next walk, the print.zig realizeInstanceSeq pattern; one rooted value sidesteps the fresh-instance-from-`-next` GC hazard) then walks it with the rt-free Cursor. valueEqual's step-3 (sequential) runs BEFORE step-3b (instanceEquiv), so the element-walk correctly WINS over the finger-tree's stub `equiv` (the gotcha). Non-instance `=` stays frame-free (seqEqual splits fast `seqEqualWalk` vs rooted `seqEqualInstance`). HASH unchanged (identity for Sequential instances) — clj content-hashes but cljw's rt-free SeqKeyCursor can't realize, EXACTLY as lazy_seq keys already hash by identity (documented residual); so a Sequential instance as a hash key alongside a list key won't collide, consistent with existing lazy behaviour (NOT a new divergence). Oracle-verified all orderings == clj: `(= '(1 2 3 4) (seq dl))`/`(= dl '(…))`/`(= dl [..])`/`(= [..] dl)`/`(= dl dl)`/`(= cdl cdl)` → true, content/length-differ → false, `(= dl {..})` → false; non-Sequential ISeq deftype → false (gate). Regression-clean: lazy/list/vector/set/map `=`, defrecord `=`, ordered-map `=` (D-377) all unchanged; full gate + 16/16 verify sweep. e2e phase14_sequential_equal (6) + data.finger-tree verify (real lib, symmetric equiv). ORIGINAL: surfaced verifying data.finger-tree. `=` does not treat a Sequential-declaring deftype/reify as a sequential collection: `(= '(1 2 3 4) (seq (double-list 1 2 3 4)))` → cljw FALSE, clj TRUE (all orderings, incl. `(= '(…) tree)` on the collection itself). Root: equal.zig `isSequential(v)` is a hardcoded TAG list (vector/list/lazy_seq/range/map_entry/persistent_queue) that EXCLUDES typed_instance/reified_instance — a deftype declaring clojure.lang.Sequential is not recognized, so `seqEqual` is never entered and `=` falls through to identity (false). The same 'walk a typed_instance seq via ISeq -first/-next' gap as D-422 count: the equal.zig `Cursor` has no instance arm either. FINISHED FORM (TWO parts, full-gate, both backends — `=`/hash are hot): (1) isSequential() also true for a typed_instance/reified_instance whose descriptor.declaresProtocol(\"Sequential\") (NOT bare Seqable — maps/sets aren't Sequential; priority-map must stay identity-equal); Cursor gains an instance arm walking via dispatch -first/-next (GC-rooted, mirroring print.zig realizeInstanceSeq + sequence.zig countBySeqWalk). (2) valueHash must hash such an instance by its ELEMENT seq (clj Murmur ordered-hash) so the =-implies-equal-hash invariant holds when a finger-tree/list-seq is a map/set key — this hash half is the bigger, hotter change; design + verify carefully. Repro: `(= '(1 2 3 4) (seq (double-list 1 2 3 4)))`. Deferred from the data.finger-tree verify (which compares via vec/scalars to avoid this path); the LIB itself is verified (count/vec/peek/pop/conj/conjl/nth clj-correct). Not an F-NNN divergence — clj returns true (F-011 bug). DEEPER ANALYSIS (2026-06-14, before deferring): (i) the HASH residual is ALREADY accepted for lazy_seq keys (SeqKeyCursor is rt-free, can't realize — lazy keys hash by IDENTITY); so a Sequential-instance hashing by identity is CONSISTENT with existing behaviour, not a new wart — part 1 (`=`) can land without part 2 (hash). (ii) GOTCHA: equal.zig ALREADY has typedInstanceEquiv (valueEqual dispatches a deftype/reify's own `Object/equiv`); the finger-tree's internal trees ship `(equiv [_ x] false)` STUBS, so naively dispatching the instance's equiv gives FALSE. clj avoids this because Util.pcequiv calls the IPersistentCollection operand's equiv preferring k1, and for a proper list/ASeq that's the element-wise equiv — so the fix must make the SEQUENTIAL element-walk WIN over the instance's stub equiv when the instance declares Sequential (i.e. isSequential/seqEqual must be consulted BEFORE typedInstanceEquiv for a Sequential-declaring instance). (iii) Cursor needs an instance arm dispatching ISeq -first/-next (equal.zig already imports dispatch_mod; no cycle). Touch points: isSequential (l65), Cursor (l96), valueEqual's typed_instance routing (l~646), keyEqValue (l289, rt-free — stays identity residual like lazy)."
