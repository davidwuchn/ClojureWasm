# Accepted clj-divergences — SSOT (the authoritative "NOT a bug" ledger).
#
# Each AD-NNN is a behaviour where cljw INTENTIONALLY differs from JVM
# Clojure's observable surface, justified by a project invariant (F-NNN) or
# ADR. This file is the trust contract: a divergence here is a DECISION, not
# an accident, and must NOT be silently "fixed" by a future clj-diff sweep.
#
# Discipline (`.claude/rules/accepted_divergences.md`): a clj_diff DIFF is
# classified bug -> fix (F-011) OR accepted -> recorded HERE with a
# `derives_from` invariant. A DIFF is never left unclassified, and an entry
# is never added without a `derives_from` (no lazy "just accept it").
#
# Auto-defense: `scripts/check_accepted_divergences.sh --gate` enforces
# (a) the file is well-formed, (b) every entry cites a non-empty
# `derives_from`, (c) every entry's `pin` test path (when not "none") exists
# so the divergent cljw behaviour is locked against accidental change, and
# (d) COVERAGE.md's "Acceptable divergences" section points here (no drift).
#
# To PROMOTE an accepted divergence back to "should match clj" (i.e. decide
# it is actually a bug): remove its entry here + open a debt row + add a
# corpus/e2e case asserting the clj-matching behaviour. The reverse of
# accept. Both directions are explicit.

accepted:
  - id: "AD-001"
    summary: "Set / non-sorted-map print order follows cljw hash order, not clj's"
    example: '(pr-str #{1 2 3}) => cljw "#{1 2 3}" / clj "#{1 3 2}"'
    why: |-
      Order is not part of set / non-sorted-map VALUE semantics; the two
      values are `=`. clj's own order is hash-dependent and non-portable
      across versions / platforms, so matching it is neither possible nor
      meaningful. cljw's order is deterministic for a given insert sequence.
    derives_from: "Clojure unordered-collection semantics (value equality is order-independent); ADR-0045 (HAMT representation)"
    pin: "test/diff/clj_corpus/print_repr.txt (cljw-side order asserted)"
  - id: "AD-002"
    summary: "Opaque reference values (atom / volatile / fn / transient collections / etc.) print as `#<tag>` not clj's `#object[Class 0xADDR {...}]`"
    example: '(pr-str (atom 1)) => cljw "#<atom>" / clj "#object[clojure.lang.Atom 0x.. {:status :ready, :val 1}]". Verified 2026-06-16 (code reality): (pr-str (transient [1 2])) => cljw "#<transient_vector>" / clj "#object[clojure.lang.PersistentVector$TransientVector 0x.. \"..@..\"]"; (transient {..}) => "#<transient_map>"; (transient #{..}) => "#<transient_set>" — same opaque #<tag> mechanism as atom/fn.'
    why: |-
      clj embeds a non-reproducible identity hash (0xADDR) and a JVM class
      FQCN; neither is reproducible nor meaningful in cljw (no JVM class,
      no stable identity address in the printed form). Exact parity is
      impossible and undesirable. The value is opaque either way.
    derives_from: "F-011 (behavioural equivalence on VALUE, not identity); ADR-0059 (no-JVM-Class)"
    pin: "none — identity-hash dependent on the clj side (not value-comparable)"
  - id: "AD-003"
    summary: "`(class x)` / `(type x)` return the simple name, not the Java FQCN"
    example: '(class 5) => cljw Long / clj java.lang.Long'
    why: |-
      cljw has no JVM Class hierarchy (TypeDescriptor instead). The simple
      name is the cljw surface; the FQCN would be a JVM-specific fiction.
    derives_from: "ADR-0059 (no-JVM rule); no_jvm_specific_assumption.md"
    pin: "test/diff/clj_corpus/print_repr.txt + test/diff/clj_corpus/str_char.txt (class-name cases)"
  - id: "AD-004"
    summary: "`(float x)` yields an f64; cljw has no f32 representation"
    example: "(float 1/3) => cljw 0.3333333333333333 / clj 0.33333334 (f32)"
    why: |-
      F-005 fixes the numeric tower as a Zig-native single-double internal
      model. A distinct f32 would be a representation the tower does not
      carry; `float` widens to the f64 the value already is.
    derives_from: "F-005 (numeric tower: single internal double)"
    pin: "none — value-dependent (the f64 is correct; only the f32-narrowing is absent)"
  - id: "AD-005"
    summary: "Subnormal double shortest-rendering differs by the last digit"
    example: "smallest positive double => cljw 5.0E-324 / clj 4.9E-324 (the SAME f64 bit pattern)"
    why: |-
      Both print the identical IEEE-754 f64; only the shortest-round-trip
      decimal rendering of a subnormal differs. The value is bit-identical.
    derives_from: "F-005 (IEEE-754 f64; rendering is a shortest-round-trip cosmetic)"
    pin: "none — single subnormal edge, value bit-identical"
  - id: "AD-006"
    summary: "`Double/parseDouble` rejects some rare Java FloatingDecimal grammar (lower-case inf/nan, trailing d/f, hex-float)"
    example: '(Double/parseDouble "0x1p4") => cljw rejects / clj 16.0'
    why: |-
      The full Java FloatingDecimal grammar (hex-float, case-insensitive
      Infinity/NaN, trailing type suffixes) is a rare-edge surface not
      reimplemented; the common decimal grammar is at parity.
    derives_from: "F-011 (rare-edge; common-path parity holds) — revisit if a real corpus hits it"
    pin: "none — rare-edge (would be promoted to a bug if real code hits it)"
  - id: "AD-007"
    summary: "Error rendering shows cljw's catalog Kind, not the JVM exception class"
    example: '(quot 10 0) => cljw "[arithmetic_error] ..." / clj "ArithmeticException ..." (both reject). Also `(class <caught-ex>)`: cljw returns its own simple-named exception class (AD-003), Kind-derived, which APPROXIMATES but does not always match clj''s per-case JVM class — e.g. `(inc nil)`/`(+ nil 1)` => cljw ClassCastException / clj NullPointerException; `(count 5)` => cljw IllegalArgumentException / clj UnsupportedOperationException; `(inc "x")` => ClassCastException in BOTH. Both ALWAYS reject the same inputs.'
    why: |-
      cljw has no JVM exception-class hierarchy; its error catalog Kind
      (`[type_error]` / `[arithmetic_error]` / ...) is the cljw surface.
      Crucially BOTH runtimes REJECT the same inputs — only the message
      format differs, never the accept/reject decision or the value.
      Extends to the STACK TRACE / error PRINT representation: cljw's trace
      is cljw-native (no JVM frames like `[clojure.lang.Compiler eval
      "Compiler.java" 7757]`), and an exception prints as the compact
      `#error{:message :data}` form rather than clj's `#error {:cause :via
      :trace [JVM frames]}`. Reproducing JVM frames would be fiction (they
      do not exist in cljw) AND clj's trace is precise-but-unreadable —
      cljw is free to do BETTER, not merely different. User-confirmed
      (2026-06-14): the trace is intentionally NOT chased. (The narrower
      `(str ex)` one-liner readability — distinct from the trace — is tracked
      as the low-priority D-433, not this AD.)
    derives_from: "ADR-0059 (no-JVM); error_catalog_only.md (catalog is the message SSOT)"
    pin: "test/e2e/* error-rendering cases (cljw Kind asserted); behaviour = reject, verified"
  - id: "AD-008"
    summary: "Long arithmetic overflow past i64 auto-promotes to BigInt; clj's checked `+`/`*` THROW instead"
    example: '(* 9223372036854775807 2) => cljw 18446744073709551614N (BigInt) / clj THROW ArithmeticException "integer overflow"'
    why: |-
      F-005 chose silent auto-promotion as cljw's numeric-tower surface: a
      Long operation that overflows i64 promotes to BigInt rather than
      throwing. JVM Clojure's checked `+`/`*` throw `ArithmeticException`
      (only `+'`/`*'` promote). User-ratified 2026-06-02 ("A は Promote
      推奨どおり"): cljw keeps the friendlier no-overflow-exception behaviour
      and accepts the divergence from clj's throw. Note this is the
      overflow PAST i64 — the separate early-promotion-at-2^47 bug (Long
      should stay Long to full i64) is D-165 (a real bug, campaign C7), NOT
      this accepted divergence. The `+'`/`*'` promoting variants are not yet
      implemented; F-005's "`+'` throws" clause is itself inverted vs clj and
      is tracked in D-211 for when they land.
    derives_from: "F-005 (numeric tower: auto-promote on overflow is the chosen cljw surface)"
    pin: "none — clj diverges (throws) by design; cljw's promote result is pinned by the D-165/overflow cycle's e2e (campaign C7, next session)"
  - id: "AD-009"
    summary: "`hash` / `.hashCode` values are cljw-native and differ from clj/JVM (only intra-cljw consistency is guaranteed)"
    example: '(.hashCode "abc") => cljw -1277324294 / clj 96354 ; (hash "abc") => cljw -1277324294 / clj 74834163 ; (format "%h" "abc") => cljw "b3dd93fa" / clj "17862"'
    why: |-
      cljw has its own hash algorithm (no JVM `Object.hashCode` / Clojure
      `Murmur3` hasheq to reproduce). Hash values are explicitly impl-specific
      in Clojure (not stable across versions/runtimes), so the VALUE divergence
      is acceptable — what matters is intra-cljw consistency (equal values hash
      equal, the HAMT key contract) which holds. `(.hashCode x)` is the
      Object-method fallback (D-207) delegating to cljw `hash` (`valueHash`),
      so it inherits the same cljw-native value. Integers happen to match clj
      (`(hash 42)` == 1871679806 both); strings/keywords/etc. differ. The
      `%h`/`%H` format conversion (D-216) renders that same hashCode in hex, so
      it inherits the cljw-native value too (the conversion works; only the
      value diverges).
    derives_from: "ADR-0059 (no-JVM: no Object.hashCode); F-011 (cljw-native internals; hash is impl-specific)"
    pin: "test/diff/clj_corpus/object_methods.txt — `(= (.hashCode \"abc\") (hash \"abc\"))` → true (delegation locked) + `(integer? (.hashCode 42))` → true; test/e2e/phase14_format.sh — `(format \"%h\" \"abc\")` produces lowercase hex (intra-cljw stable)"
  - id: "AD-010"
    summary: "a Namespace value prints as `#object[Namespace \"<name>\"]` (no JVM class FQN, no `0xADDR` identity hash)"
    example: '(pr-str *ns*) => cljw "#object[Namespace \"user\"]" / clj "#object[clojure.lang.Namespace 0x5ad10c1a \"user\"]" ; (str *ns*) => "user" (matches clj)'
    why: |-
      ADR-0083 makes the current namespace a first-class `.ns` Value. clj's
      pr form embeds the JVM class name (`clojure.lang.Namespace`) and an
      identity-hash address (`0x..`); cljw is no-JVM (ADR-0059) and has no
      identity hash to mirror (same rationale as AD-002 opaque-ref print), so
      it emits the simple `#object[Namespace "<name>"]`. `(str *ns*)` /
      `(name (ns-name *ns*))` are clj-faithful ("user"); only the readable
      `#object[…]` form (pr / prn / print / println) diverges.
    derives_from: "ADR-0059 (no-JVM: no class FQN); AD-002 (opaque-ref identity-hash not reproducible); ADR-0083"
    pin: "test/e2e/phase15_namespace.sh — `(str *ns*)` => user + `(pr-str *ns*)` => #object[Namespace \"user\"] (the cljw form locked)"
  - id: "AD-011"
    summary: "`ns-interns`/`ns-publics` of `clojure.core` omit the `rt`-referred primitives (e.g. `reduce`, `+`) that clj interns directly"
    example: '(contains? (ns-publics (the-ns (quote clojure.core))) (quote reduce)) => cljw false / clj true ; (contains? (ns-interns (the-ns (quote clojure.core))) (quote map)) => true both (map is .clj-defined)'
    why: |-
      cljw splits the core surface (ADR-0033 / placement.yaml): kernel
      primitives are interned in the `rt` namespace and REFERRED into
      clojure.core, while clojure.core's own `mappings` hold only the
      `.clj`-defined vars (+ B2 private leaves). `ns-interns`/`ns-publics`
      faithfully report a namespace's INTERNED vars (its `mappings`), so a
      primitive that lives in `rt` and is merely referred (e.g. `reduce`)
      does not appear, whereas a `.clj`-redefined var (e.g. `map`) does. This
      diverges ONLY when introspecting clojure.core itself; for a user
      namespace `ns-interns`/`ns-publics` are exact (a user `(def x …)` shows
      up). `ns-map` (interns + refers) DOES include `reduce`, matching clj's
      total visible set. The driver (clojure.test, D-227) keys on a user test
      ns's interned `deftest` vars, which is unaffected.
    derives_from: "ADR-0033 (rt/clojure.core placement split: primitives in rt, referred); ADR-0083"
    pin: "test/e2e/phase15_namespace.sh — `ad011-pub` locks `(ns-publics 'clojure.core)` omitting `reduce` (false) + `ad011-map` locks `(ns-map …)` including it (true), matching clj's total visibility"

  - id: "AD-012"
    summary: "A PersistentQueue prints as a readable `#queue (…)` (cljw) instead of clj's opaque `#object[clojure.lang.PersistentQueue 0x… \"…@hash\"]`"
    example: '(pr-str (conj clojure.lang.PersistentQueue/EMPTY 1 2 3)) => cljw "#queue (1 2 3)" / clj "#object[clojure.lang.PersistentQueue 0x… \"clojure.lang.PersistentQueue@…\"]"'
    why: |-
      clj has no `print-method` for PersistentQueue, so it prints the opaque
      `#object[…]` wrapper embedding a JVM identity hash that cljw cannot and
      should not reproduce (no-JVM, ADR-0059) — the same non-reproducible-ref
      class as opaque refs. `(str q)` and `(pr-str q)` differ in clj only in
      that wrapper, both non-reproducible. cljw instead prints a READABLE,
      reader-round-trippable `#queue (e1 e2 …)` form and ships a matching
      `queue` data-reader (`*data-readers*`), so the printed form is honest
      EDN within cljw (clj's own form does not round-trip either). cljw's
      `str` and `pr-str` of a queue are intentionally identical. ADR-0087.
    derives_from: "ADR-0059 (no-JVM identity hash); ADR-0087 (PersistentQueue)"
    pin: "test/e2e/phase15_persistent_queue.sh — locks `(pr-str (conj EMPTY 1 2 3))` => `#queue (1 2 3)`, empty => `#queue ()`, and the `#queue` reader round-trip"

  - id: "AD-013"
    summary: "cljw STM is retry-only — it drops JVM's `barge` (a running transaction preempting a younger conflicting one). Result-equivalent: serializability holds; only contention fairness/throughput differ (unobservable in the committed state)."
    why: |-
      JVM's LockingTransaction resolves a write-write conflict by `barge`: an
      older transaction can kill (`barge`) a younger one to avoid livelock under
      heavy contention. cljw (ADR-0090 §3/§4) is retry-only — a conflicting
      transaction re-runs with a fresh read-point, bounded by a retry limit, and
      never barges a peer. The COMMITTED RESULT is identical (both produce a
      serializable history — e.g. 4 threads each doing 100 `(dosync (alter c
      inc))` both end at exactly 400, no lost updates); the divergence is purely
      in contention scheduling (which transaction wins a race, and worst-case
      latency under pathological contention), which is NOT observable in the
      final committed state. So there is no result DIFF to chase — this records
      the internal algorithm divergence ADR-0090 reserved, with a pin asserting
      the observable serializability contract the retry-only engine upholds.
    derives_from: "ADR-0090 §3 (MVCC retry-only LockingTransaction) + §4 (no-barge)"
    pin: "test/e2e/phase15_stm_dosync.sh — `dosync_concurrent_serializable` locks 4 threads × 100 `(dosync (alter c inc))` => exactly 400 (the serializable, no-lost-update result the retry-only engine produces under contention)"

  - id: "AD-014"
    summary: "`(locking x ...)` on an immutable immediate (small int, nil, bool, keyword without a heap header) ERRORS in cljw, where JVM clj locks the boxed value's monitor and runs the body. Only heap objects (those with a HeapHeader) are lockable."
    why: |-
      cljw's heap-value monitor (ADR-0092) locks the object's own header word
      (ADR-0009 lock_state bits). An immutable immediate is NaN-boxed with NO
      HeapHeader (F-004) — it has no identity word to lock and no shared mutable
      state to protect, so there is nothing a monitor could guard. JVM clj locks
      the boxed Long/Boolean/etc.'s intrinsic monitor, which "works" but is a
      foot-gun: `(locking 5 ...)` and `(locking 5 ...)` on two threads serialise
      only because `Long.valueOf` happens to cache small longs to the same box —
      a large long gives distinct boxes and does NOT serialise. cljw rejects the
      whole class with a clear `locking requires an object with identity` error
      instead of silently providing fragile, value-dependent serialisation. Real
      code always locks a mutable object (atom / deftype instance / etc.), which
      is a heap object and locks fine; only the pathological literal-as-lock
      pattern hits this. derives_from F-004 (immediates have no header).
    derives_from: "F-004 (NaN-box: immediates carry no HeapHeader) + ADR-0092 (heap-value monitor)"
    pin: "test/e2e/phase16_locking.sh — `locking_immediate_errors` locks `(locking 5 42)` => an object-identity error (not the body value JVM clj would return)"

  - id: "AD-015"
    summary: "An ESCAPED `with-local-vars` local var, deref'd AFTER its dynamic extent, returns `nil` in cljw, where JVM returns an unreproducible `#object[clojure.lang.Var$Unbound 0x…]` opaque."
    example: '(var-get (with-local-vars [x 5] x)) => cljw nil / clj #object[Var$Unbound 0x…]'
    why: |-
      `with-local-vars` mints anonymous dynamic Vars (ADR-0097); INSIDE the body
      they are thread-bound and `var-get`/`var-set`/`@` behave exactly as clj. The
      divergence is ONLY on the anti-pattern of letting the var itself escape the
      `with-local-vars` form and deref'ing it after the extent. cljw cannot mirror
      JVM's result for two independent reasons: (1) JVM's `Var$Unbound` sentinel
      prints with an embedded identity hash (`0x…`) — an opaque cljw structurally
      cannot/should not reproduce (the same class as every `#object[… 0xADDR …]`
      divergence); cljw has no Unbound sentinel, so an unbound dynamic var derefs to
      its root (nil here). (2) The anon Var is gpa-owned + GC-membrane-filtered
      (F-006), Env-owned and freed at session end (ADR-0097 Alt C, escape-safe — NOT
      freed at the extent, so the deref is memory-safe rather than a UAF). Escaping a
      local var is meaningless after its extent in both runtimes; cljw returns a safe
      `nil` instead of an unreproducible opaque.
    derives_from: "F-006 (Vars gpa-owned + GC-membrane-filtered; no Unbound sentinel) + ADR-0097 (anon local Var lifetime) + the opaque-ref non-reproducibility class"
    pin: "test/e2e/phase15_with_local_vars.sh — `escape-nil` asserts `(var-get (with-local-vars [x 5] x))` => nil (cljw's safe divergent value, not JVM's Var$Unbound opaque)"

  - id: "AD-016"
    summary: "`(biginteger x)` yields cljw's BigInt — prints `5N` (clj `5`) and `(class (biginteger 5))` is `BigInt` (clj `java.math.BigInteger`). cljw has no separate BigInteger type."
    example: '(biginteger 5) => cljw 5N / clj 5 ; (class (biginteger 5)) => cljw BigInt / clj java.math.BigInteger'
    why: |-
      F-005 collapses clj's two arbitrary-precision integer types
      (clojure.lang.BigInt and java.math.BigInteger) into cljw's single
      `.big_int`. So `biginteger` is registered as the SAME coercion `bigint`
      uses (math.zig: `biginteger ≡ bigint`, mirroring the in-tree `long ≡ int`
      alias), producing a `.bigint`-origin BigInt. The divergence is purely
      cosmetic: VALUE is identical (`(= (biginteger 5) (bigint 5) 5)` => true
      in both), and clj's BigInteger is itself "write-only" in the numeric tower
      — every arithmetic op on it returns BigInt, which cljw reproduces exactly
      and for free (`(+ (biginteger 5) 1)` => `6N` in both, `(class …)` => BigInt
      in both). The only divergent surfaces are the `N`-suffix print and the
      class NAME (BigInt vs BigInteger). Materializing a real BigInteger type to
      match would re-introduce the three-way BigInt/BigInteger/Long distinction
      F-005 deliberately abolished (and break the NATIVE_ENTRIES name↔Tag
      round-trip, D-204) — so the honest finished form is the collapse + this
      recorded divergence. The class-NAME simple form (BigInt, not the FQCN) is
      additionally the AD-003 no-JVM-class surface.
    derives_from: "F-005 (numeric tower collapses BigInt/BigInteger into one `.big_int`) + AD-003 (simple class name, no JVM Class)"
    pin: "test/e2e/phase14_biginteger.sh — biginteger_prints_N + biginteger_class_bigint lock cljw's `5N` print and BigInt class (the divergent values, not clj's 5 / java.math.BigInteger)"
  - id: "AD-017"
    summary: "A deftype mutable field's `^long` / primitive type hint is parsed-and-ignored; cljw does not enforce clj's 'must assign primitive to primitive mutable'."
    example: '(deftype C [^:unsynchronized-mutable ^long n] P (go [this] (set! n "hi") n)) (go (->C 0)) => cljw "hi" / clj compile error (primitive mismatch)'
    why: |-
      cljw's NaN-box value model (F-004) stores every field as a uniform 8-byte
      Value; there is no machine-`long` field storage to constrain. On the JVM a
      `^:unsynchronized-mutable ^long` field is a primitive `long` slot, and
      `set!` of a non-primitively-emittable value throws "Must assign primitive
      to primitive mutable" (Compiler.java emitAssignLocal). cljw has no such
      slot type, so the `^long`/`^"[B"` hint is advisory only — consistent with
      cljw's general no-primitive-specialization stance (F-005 single-f64 tower;
      type hints stripped elsewhere). Only the `:unsynchronized-mutable` /
      `:volatile-mutable` keyword (assignability) is acted on.
    derives_from: "F-004 (NaN-box uniform 8-byte Value, no primitive field storage) + F-005 (no primitive specialization) + ADR-0104"
    pin: "test/e2e/phase14_deftype_mutable.sh — long_hint_ignored_accepts_non_long (a `^long` mutable field accepts a String set)"
  - id: "AD-019"
    summary: "Java arrays are type-erased: element type hints (`^\"[B\"`, `^ints`, `^bytes`) are advisory only, and a typed-array constructor / `aset` does not coerce or type-check non-byte/short/char elements."
    example: '(let [^"[B" b (byte-array 1)] (aset b 0 65) (aget b 0)) => 65 (a non-byte stored into a byte-typed array, no error); (class (object-array 0)) => cljw "array" / clj "[Ljava.lang.Object;"'
    why: |-
      cljw arrays are one type-erased `[]Value` (ADR-0105): `byte-array`,
      `int-array`, `object-array`, `make-array` all produce the same `.array`
      shape. F-004 (uniform 8-byte Value) + F-005 (no primitive specialization)
      delete the JVM's runtime array component-type, which on the JVM drives
      boxing, `aset-X` coercion, and the `[Ljava.lang.Object;` class name. So a
      `^"[B"` hint parses (reader.zig normalises it to `{:tag …}`) but is
      ignored, and `aset` into a "typed" array never raises a type mismatch.
      VALUE fidelity is still preserved where it is observable and value-changing
      (F-011): per-constructor init defaults (0 / 0.0 / false / \space / nil) and
      byte/short/char modular wrap are applied at construction / `aset-byte` —
      those are NOT divergences. The simple class name (`array`, not the JVM
      array-class encoding) is the AD-003 no-JVM-class surface applied to arrays.
    derives_from: "F-004 (uniform Value) + F-005 (no primitive specialization) + ADR-0059 / AD-003 (no JVM class) + ADR-0105"
    pin: "test/e2e/phase14_arrays.sh — type_hint_advisory (a ^\"[B\" array accepts a non-byte) + array_class_simple (class is `array`)"
  - id: "AD-020"
    summary: "A java.util.Random (any host_instance) prints opaquely as `#<java.util.Random>` — clj prints `#object[java.util.Random 0x… …]` with a non-reproducible identity hash."
    example: '(pr-str (java.util.Random. 0)) => cljw "#<java.util.Random>" / clj "#object[java.util.Random 0x.. java.util.Random@..]"'
    why: |-
      A stateful host object (ADR-0106 host_instance) carries no identity hash
      cljw can or should mirror — clj's `#object[… 0xADDR …]` embeds a JVM
      identity hash + class FQCN that are non-reproducible (same rationale as
      AD-002's opaque-ref print). cljw prints a stable opaque form from the
      surface descriptor's fqcn (`#<java.util.Random>`). The VALUE / behaviour
      (the seeded LCG sequence) is fully clj-faithful (F-011); only the
      non-reproducible print identity diverges. `(class (java.util.Random.))` =>
      `java.util.Random` (simple, not the JVM Class object) is the AD-003 surface.
    derives_from: "AD-002 (opaque-ref identity-hash print cljw cannot mirror) + ADR-0059 (no JVM Class) + ADR-0106"
    pin: "test/e2e/phase14_random.sh — print_opaque (#<java.util.Random>) + class (java.util.Random)"
  - id: "AD-021"
    summary: "A namespace VALUE (e.g. `:ns` in `(meta #'x)`) prints opaquely as `#object[Namespace \"name\"]` — simple class name, no identity hash — vs clj's `#object[clojure.lang.Namespace 0x… \"name\"]`."
    example: '(pr-str (:ns (meta #''map))) => cljw "#object[Namespace \"clojure.core\"]" / clj "#object[clojure.lang.Namespace 0x.. \"clojure.core\"]"'
    why: |-
      Stage 1.4 synthesize-on-read now projects `:ns` (a first-class cljw
      namespace value, ADR-0083) onto var metadata, where it never appeared
      before. cljw's opaque namespace print uses the simple class name
      `Namespace` (AD-003 no-JVM-Class) and omits the JVM identity hash
      (AD-002 — non-reproducible). The VALUE is behaviourally clj-faithful:
      `(ns-name (:ns (meta #'x)))` => the ns symbol (F-011); only the `pr`
      identity rendering diverges. Same family as AD-002 / AD-020.
    derives_from: "AD-002 (opaque-ref identity-hash print cljw cannot mirror) + AD-003 (simple class name, ADR-0059 no JVM Class) + ADR-0083 (namespace as first-class value)"
    pin: "test/e2e/phase14_var_metadata.sh — synth_ns_render (#object[Namespace \"clojure.core\"]) + synth_ns_core (ns-name equivalence)"
  - id: "AD-022"
    summary: "An unresolved `clojure.lang.*` / `clojure.asm.*` reference defers to a CALL-time `feature_not_supported` (ADR-0113) instead of resolving (JVM) — so a fn whose body names such a JVM-internal class DEFINES + the namespace LOADS; the ref errors only if evaluated."
    example: '(do (defn f [] (clojure.lang.RT/baseLoader)) :ok) => cljw :ok (loads); (f) => "clojure.lang.RT/baseLoader is not supported in ClojureWasm". clj: (clojure.lang.RT/baseLoader) returns a ClassLoader.'
    why: |-
      `clojure.lang.*` / `clojure.asm.*` are JVM implementation classes cljw has
      no value for and will never represent (ADR-0059, no JVM class hierarchy).
      Failing the WHOLE namespace at analysis blocks libraries whose CORE is pure
      but whose periphery touches such a class (integrant's optional classpath
      hierarchy loader). The reference is rewritten to a LOUD runtime
      feature_not_supported — never a silent no-op — so the error is explicit,
      just later (call time, not load time). The strict prefix allowlist means a
      user alias typo (`(myalias/foo)`) still fails loudly at analysis; only
      provably-JVM-internal prefixes defer. F-011: explicit error preserved, only
      its timing diverges.
    derives_from: "ADR-0113 (deferred host-class refs) + ADR-0059 (no JVM class) + provisional_marker.md (explicit runtime error OK, silent no-op forbidden)"
    pin: "test/e2e/phase15_deferred_host_ref.sh — defines_and_loads + raises_when_called + typo_stays_loud"
  - id: "AD-023"
    summary: "Extending a protocol TO a host_inert java interface (`(extend-protocol P java.util.Map …)`) is a LOAD-ONLY no-op in cljw: the section loads but never dispatches, because no cljw value has a java.util.Map host type (cljw maps are native PersistentArrayMap/HashMap, not java.util.Map). A map receiver falls to the protocol's Object default (or raises if none)."
    example: '(do (defprotocol P (m [x])) (extend-protocol P java.util.Map (m [x] :map) Object (m [x] :obj)) (m {:a 1})) => cljw :obj (Map impl inert, falls to Object); clj => :map (a Clojure map IS a java.util.Map).'
    why: |-
      cljw has no JVM class hierarchy (ADR-0059) and its collections are native
      types, not java.util.* implementors (ADR-0103 host_inert: java.util.Map is
      recognised-but-inert). clj's PersistentArrayMap implements java.util.Map, so
      extending a protocol to java.util.Map covers all clj maps; cljw cannot mirror
      that without fabricating a java.util.* membership it does not model. Making
      the extend a LOAD-ONLY no-op (not an analysis error) lets a lib whose core is
      pure load even when its periphery extends java.util.Map (hiccup's url-encode
      branch) — F-013-faithful: the impl is dead in cljw exactly as a
      never-instantiated-class extension is dead in clj, and a map receiver still
      gets the Object default. Same inert family as the deftype-supertype
      java.util.Map (ADR-0103), here applied at the extend-TARGET position.
    derives_from: "ADR-0103 (host_inert java interfaces) + ADR-0059 (no JVM class hierarchy) + ADR-0114 Decision C-1"
    pin: "test/e2e/phase14_extend_protocol_targets.sh — map_target_inert (falls to Object) + object_fallback"
  - id: "AD-024"
    summary: "A cljw stack trace (`Trace:` / EDN `:trace`) shows ONLY user frames; cljw's own implementation — host builtins AND the embedded stdlib (`clojure.*` / `cljw.*`) — is elided uniformly. clj shows `clojure.core` frames in a full trace (its `pst` filters only the `RestFn`/`AFn` trampolines)."
    example: '(map (fn [x] (/ x 0)) [1 2]) → cljw trace = just `user/fn__N`, NOT `clojure.core/map` (a .clj stdlib fn over the `-map-eager` builtin) nor a nameless internal `fn` frame. clj''s trace includes clojure.core frames + machinery.'
    why: |-
      The trace answers "which of MY fns was running"; the premise is cljw's
      implementation is correct and the bug is in user code (user directive
      2026-06-08: principled, not ad-hoc, good UX). cljw's callable surface is
      non-uniform — some core fns are Zig builtins (no name), some are `.clj`
      (named), some are AOT-loaded (name dropped) — so a per-fn elision choice
      would be ad-hoc and inconsistent (e.g. `map` showing but `reduce` not). A
      single UNIFORM rule — elide a frame whose owning namespace is a cljw-reserved
      stdlib ns (`clojure.*` / `cljw.*`) or absent (an internal), plus all host
      builtins — makes the trace consistent regardless of how each callable is
      implemented. This deliberately diverges from clj's full trace; clj users
      reach for `pst` / `io.aviso/pretty` to strip exactly this clojure.core noise,
      so user-only-by-default is the better UX. A future verbose/full-trace mode
      may surface stdlib frames (like clj's `pst`).
    derives_from: "ADR-0119 (callable naming + the trace-visibility discipline `isUserNs`) + user directive 2026-06-08 (host/stdlib/user is non-uniform → follow a discipline, not ad-hoc, for good UX)"
    pin: "test/e2e/phase14_error_format.sh — error_trace_discipline (map → user-only trace, no clojure.* / nameless internal frame)"
  - id: "AD-025"
    summary: "A callable value (`fn` / `defmulti` / protocol method fn / BUILTIN) prints as `#<ns/name>` (`#<fn>` when unnamed) — clj prints `#object[user$boom__N 0xHASH \"user$boom__N@…\"]` with a munged JVM class + identity hash. A builtin prints `#<rt/+>` (home ns `rt`, matching `(resolve '+)` => `#'rt/+`). `str` and `pr` render identically (both reach the same site; clj agrees)."
    example: '(pr-str (defn boom [] 1)) => cljw "#<user/boom>" / clj "#object[user$boom__... 0x.. \"user$boom__...@..\"]" ; (pr-str (fn [])) => cljw "#<user/fn__N>" (or "#<fn>" if nameless) ; (pr-str +) => cljw "#<rt/+>" / clj "#object[clojure.core$_PLUS_ 0x.. …]" ; (str defmulti-val) == (pr-str defmulti-val) (no str↔pr split, matching clj)'
    why: |-
      cljw has no JVM Class hierarchy (TypeDescriptor instead, ADR-0059) and no
      reproducible identity hash, so the munged `user$boom__N` class + `0xHASH`
      cannot be mirrored — the same reason AD-002 prints opaque refs as `#<tag>`
      not `#object[…]`. ADR-0121 fills that `#<…>` envelope with the callable's
      qualified `ns/name` (already on the value per ADR-0119 Stage 1) instead of
      leaking the internal Zig heap-tag name (`#<fn_val>`). The form is identical
      for all three callable tags (fn/multifn/protocol-fn) and for both `str` and
      `pr` (they share the render site, as in clj). The print form implies NO
      `(class fn)` decision — `(class fn)` is a separate type-system concern
      (AD-044). Builtins (bare Zig fn-pointers with no name slot) now fill the same
      envelope via the `Env.builtin_names` reverse-index (D-327, landed): `#<rt/+>`,
      the truthful home ns. A builtin bound under several names (`inc`/`inc'`)
      shows the deterministic base name (shorter-then-lex), never the hashmap
      iteration order.
    derives_from: "ADR-0121 (callable print naming) + AD-002 (opaque refs print #<…> not #object[…]) + AD-003 (simple names) + ADR-0059 (no JVM class hierarchy)"
    pin: "test/e2e/phase14_callable_print.sh — fn_named + fn_anon + defmulti + str_eq_pr + builtin_named (#<rt/+>) + builtin_inc (#<rt/inc>, the inc/inc' tie-break) + builtin_str_eq_pr"
  - id: "AD-026"
    summary: "`read-string` is eval-free: `#=(form)` (clj's read-eval reader macro) is NOT evaluated. clj reads with `*read-eval*` true by default, so `(read-string \"#=(+ 1 2)\")` returns 3; cljw's EDN-based reader has no `#=` reader function, so it raises `No reader function for tag =` — reading data never executes code."
    example: '(read-string "#=(+ 1 2)") => clj 3 (evaluated) / cljw error "No reader function for tag =" (not evaluated)'
    why: |-
      cljw's `read-string` is the same full-reader `readOne → formToValue` path as
      `clojure.edn/read-string` — no `#=` eval-reader. This is a deliberate
      secure-by-default property (SE-8): `read-string` on untrusted input is NOT
      `eval` on untrusted input (the JVM read-eval footgun). Evaluation is reached
      only via a separate explicit `eval` call on already-read data. Recorded as a
      permanent intentional divergence (ADR-0122) so a future clj-diff sweep treats
      the `3`-vs-error difference as the locked decision, never a parity gap to
      "fix" back into an eval-on-read RCE.
    derives_from: "ADR-0122 (read-string eval-free by design) + SE-8 (security audit secure-by-default property)"
    pin: "test/e2e/phase14_read_string.sh — rs_no_read_eval (#=(+ 1 2) must not yield 3)"
  - id: "AD-027"
    summary: "java.util.Map/Collection/Iterable methods (iterator/entrySet/keySet/values/size/…) declared UNDER a clojure.lang.* deftype-supertype section are ACCEPTED-AND-DROPPED (load-level, no dispatch), not raised. clj's IPersistentMap/Set/Vector extend Iterable/Map/Collection, so a lib may group these java methods there (flatland.ordered.map); cljw has no java dispatch (ADR-0059), so a later `(.iterator x)` is DECLINED (method-not-found), exactly as a whole host_inert java section is dropped (ADR-0103) — at method granularity (D-372, ADR-0102 am2)."
    example: '(deftype OM [m] clojure.lang.IPersistentMap (valAt [this k] (get m k)) (iterator [this] (clojure.lang.SeqIterator. (.seq this)))) => loads; (.valAt x k) dispatches; (.iterator x) => method-not-found (NOT the JVM-only body, NOT a silent value)'
    why: |-
      cljw has no java-interop dispatch (ADR-0059), so a java.util/lang method has no
      callable target whether it sits in a java.util section (host_inert, dropped
      wholesale per ADR-0103) or — because clj's clojure.lang collection interfaces
      EXTEND the java ones — grouped under a clojure.lang.* section. The disposition
      MUST be identical regardless of the cosmetic placement, so the grouped form is
      dropped the same way. This is NOT a permanent-no-op: the drop removes the method
      REGISTRATION (a `(.iterator x)` call is declined with method-not-found), it does
      not install a success-masking body that answers the call — and the dropped body
      is JVM-only by construction (constructs clojure.lang.SeqIterator etc.). Scope is
      read/iteration-only: a persistent type's java MUTATORS (put/add/clear) throw on
      the JVM too, so an unmapped mutator correctly still raises (closer parity than a
      drop). The closed set lives in host_interface.isJavaUtilMethod, derived from the
      java.lang.Iterable + java.util.{Collection,Map,List} definitions (F-013), NOT from
      any one library — a genuinely-unwired clojure.lang method still raises so
      library-driven discovery survives.
    derives_from: "ADR-0059/AD-003 (no-JVM: java methods have no cljw dispatch) + ADR-0103 (host_inert accept-don't-dispatch) + ADR-0102 am2 (method-granularity application) + F-013 (definition-derived closed set)"
    pin: "test/e2e/phase14_java_method_grouping.sh — case 2 (a dropped .iterator is DECLINED, never silently run)"
  - id: "AD-028"
    summary: "`clojure.lang.APersistentMap/mapHash` and `/mapHasheq` return cljw's SINGLE content hash (= `(hash m)`), NOT clj's distinct additive `Object.hashCode` (mapHash) vs murmur `hasheq` (mapHasheq). cljw collapsed the JVM two-hash split into one `valueHash` (ADR-0108), so a custom-collection deftype's `.hashCode` (via mapHash) and `(hash inst)` agree with an `=`-equal native map within cljw — the observable collision contract — at the cost of clj's internal additive/murmur shapes (unobservable per AD-009)."
    example: '(= (clojure.lang.APersistentMap/mapHash {:a 1 :b 2}) (hash {:a 1 :b 2})) => cljw true / clj false ; (= (APersistentMap/mapHash m) (APersistentMap/mapHasheq m)) => cljw true / clj false'
    why: |-
      cljw has ONE value-hash (Util/hash and Util/hasheq both route to
      equal.valueHash; a native map's (.hashCode) = (hash) = map.contentHash,
      mix-finalized). The JVM's additive Object.hashCode vs murmur IHashEq split
      has no cljw counterpart. Custom-collection libraries wire
      (hashCode [this] (APersistentMap/mapHash this)) so their map collides with an
      =-equal native map; to honour that observable contract cljw's mapHash returns
      the same single content hash, reusing map.entryHash + mixCollHash (the native
      contentHash fold), and mapHash == mapHasheq (one hash notion). Replicating
      clj's additive form would make mapHash differ from a native map's (.hashCode)
      and break the collision contract — the inverted priority (AD-009: the JVM hash
      VALUE/shape is unobservable, intra-cljw equal-colls-equal-hash is what matters).
      DA-fork (ADR-0108 am1) Alt 2.
    derives_from: "AD-009 (cljw-native hash, intra-cljw consistency only) + ADR-0108 am1 (the DA-fork decision) + F-011 (observable equivalence over unobservable JVM bit-shape)"
    pin: "test/diff/clj_corpus/clojure_lang_coll_hash.txt (the two `(= (mapHash …) (hash …))` / `(= (mapHash …) (mapHasheq …))` lines lock cljw=true)"
  - id: "AD-029"
    summary: "`clojure.stacktrace/print-stack-trace` / `print-cause-trace` print per-frame `<ns>/<fn> (<file>:<line>)` lines (cljw-native format), NOT JVM `Class.method (File.java:line)` frames — cljw has no JVM `StackTraceElement` (ADR-0059). A CAUGHT exception carries frames (ADR-0120) so they print via `(stack-trace e)` (ADR-0140); a NEVER-THROWN ex-info has no frames so it keeps the `[no stack trace available]` marker. Frames are user-only (AD-024); no demunge regex (cljw carries ns+fn separately). The `*e`-dependent REPL helper `e` is not provided."
    example: '(with-out-str (clojure.stacktrace/print-stack-trace <caught e>)) => cljw "ArithmeticException: Divide by zero\n at user/boom (FILE:LINE)\n    user/mid (FILE:LINE)" / clj "java.lang.ArithmeticException: Divide by zero\n at user$boom… (REPL:1)\n …". A never-thrown (ex-info "x" {}) → cljw "ExceptionInfo: x\n{}\n at [no stack trace available]".'
    why: |-
      A caught exception in cljw is an ex-info value (ADR-0059: no JVM Throwable /
      StackTraceElement). The frames are deep-copied onto the value (trace_ptr,
      ADR-0120) and ADR-0140 exposes them as `(stack-trace e)` → a seq of
      cljw-shaped `{:ns :fn :file :line :column}` maps, which `clojure.stacktrace`
      prints as `<ns>/<fn> (<file>:<line>)`. The remaining divergence is the
      per-frame FORMAT: cljw prints `ns/fn` (no JVM class.method, no demunge
      regex — cljw carries ns + fn separately) and user-frames-only (AD-024).
      JVM StackTraceElement-shaped frames will NEVER exist (no JVM). A NEVER-THROWN
      ex-info has no captured frames, so the honest `[no stack trace available]`
      marker remains for that case — never a silent empty success. The simple
      class name (`ExceptionInfo`, not `clojure.lang.ExceptionInfo`) is AD-003.
      (Supersedes the pre-ADR-0140 "marker for every caught exception" degradation
      + the dangling D-232 frame-accessor reservation — D-438 / ADR-0140 are the
      real owner.)
    derives_from: "ADR-0059 (no JVM Throwable / StackTraceElement) + AD-024 (user-frames-only trace) + AD-003 (simple class name) + ADR-0140 (cljw-shaped frame seq)"
    pin: "test/e2e/phase15_clojure_stacktrace.sh — caught_prints_user_frame + caught_no_marker lock the cljw-native per-frame format; print_cause_trace + unthrown_no_frames lock the frame-less marker + clj-faithful cause chain"
  - id: "AD-030"
    summary: "`(format \"%c\" <integer>)` is rejected by cljw for EVERY integer, where clj accepts an Integer (`(format \"%c\" (int 65))` → \"A\") but rejects a Long (`(format \"%c\" 65)` → IllegalFormatConversionException). cljw collapses int/Long into ONE integer type (F-005), so it cannot reproduce clj's Integer-accepts / Long-rejects split and chooses to reject all integers (D-267 option (b)). `%c` with an actual char (`\\A` / `(char 65)`) is clj-parity in both."
    example: '(format "%c" (int 65)) => cljw type_error / clj "A" ; (format "%c" 65) => cljw type_error / clj IllegalFormatConversionException ; (format "%c" (char 65)) => both "A"'
    why: |-
      clj's `%c` accepts Character/Byte/Short/Integer and rejects Long. cljw has a
      single integer representation (F-005: `(int x)` ≡ `(long x)` ≡ `.integer`), so
      `(int 65)` and `65` are INDISTINGUISHABLE — cljw cannot match clj's both-ways
      behaviour (accept the Integer form, reject the Long form) at once. Of the two
      F-005-consequence options (D-267): (a) accept any integer as a codepoint —
      then `(format "%c" 65)` → "A" where clj throws; (b) reject every integer —
      then `(int 65)` errors where clj gives "A". cljw takes (b): the common path is
      `%c` with an actual char (clj-parity in both), and an integer `%c` arg is rare;
      rejecting is the more conservative surface (no silent codepoint coercion of a
      value clj would refuse). The error KIND also differs (cljw type_error vs clj
      IllegalFormatConversionException) per AD-007.
    derives_from: "F-005 (numeric tower: int/Long collapse — cljw has no distinct Integer, so the Integer-accepts/Long-rejects split is unreproducible) + AD-007 (error Kind, not the JVM exception class)"
    pin: "test/e2e/phase14_format_char_int.sh — format_c_int_rejected + format_c_long_rejected lock cljw's integer rejection; format_c_char locks the char-arg parity"
  - id: "AD-031"
    summary: "Ratio components `(numerator r)` / `(denominator r)` (and integer results derived from them, e.g. `(clojure.math.numeric-tower/floor 5/2)` / `(ceil 5/2)`) narrow to Long when they fit i64; clj returns a BigInteger (numerator/denominator) / BigInt (floor/ceil). VALUE is `=` in both; only the class NAME + `N`-suffix print diverge."
    example: '(numerator 5/2) => cljw 5 (Long) / clj 5 (java.math.BigInteger) ; (clojure.math.numeric-tower/floor 5/2) => cljw 2 / clj 2N ; (ceil 5/2) => cljw 3 / clj 3N ; (= 2 2N) => true in both'
    why: |-
      F-005 collapses clj's arbitrary-precision integer types into cljw's single
      `.big_int` AND narrows an integer result to the native Long when it fits i64
      (the same narrow-when-fits surface AD-016 records for `biginteger`). clj's
      Ratio stores numerator/denominator as `java.math.BigInteger`, so it returns
      BigInteger components and BigInt floor/ceil unconditionally; cljw stores the
      narrowest fitting integer (Long for a small ratio) and returns it directly.
      The divergence is purely cosmetic — VALUE is identical (`(= 5 (numerator 5/2))`
      / `(= 2N (floor 5/2))` => true in both) and every downstream arithmetic op
      agrees — so materialising a BigInteger-typed component purely to match clj's
      class name would re-introduce the Long/BigInt distinction F-005 abolished, for
      no behavioural gain. `round` (which lands on a whole BigInt via `(+ 5/2 1/2)`)
      DOES return `3N` in both (D-421 unblocked the gating `when-available` so the
      BigInt MathFunctions extend is emitted); only floor/ceil, which compute via
      the narrowed numerator/denominator, take the Long form. The simple class NAME
      (not the FQCN) is additionally the AD-003 no-JVM-class surface.
    derives_from: "F-005 (numeric tower: collapse + narrow-when-fits) + AD-016 (biginteger ≡ bigint, narrow integer results) + AD-003 (simple class name, no JVM Class)"
    pin: "test/e2e/phase14_ratio_accessors.sh — num + long_eq lock cljw's Long-narrowed numerator/denominator (the divergent type, not clj's BigInteger); floor/ceil-on-ratio derive directly from this narrowing. test/conformance/verified_projects/math.numeric-tower/verify.clj exercises the full surface (round/floor/ceil/sqrt/expt/gcd/lcm/abs) value-equal to clj."
  - id: "AD-032"
    summary: "cljw java.util.HashMap/TreeMap/ArrayList seq-views are cljw collections, not Java view objects: `(seq hm)` → cljw MapEntry pairs (`[k v]`) not `java.util.HashMap$Node` / `TreeMap$Entry`; `(.keySet hm)` / `(.values hm)` → a cljw seq not a `java.util.Set`/`Collection` view; `(seq al)` → a plain element seq. into / map-key/val-over-seq / sort-of-keySet / count / destructuring are identical. (TreeSet is NOT in this class — its `(seq ts)` yields plain elements that match clj.)"
    example: '(seq hm) => cljw ([:a 9]) / clj (#object[java.util.HashMap$Node 0x.. :a=9]) ; (into {} hm) => {:a 9} in both'
    why: |-
      cljw's java.util.HashMap/ArrayList are `.host_instance` surfaces backed by a
      cljw map / vector Value (D-425); their `(Seqable -seq)` returns cljw's own
      entry/element seq. clj wraps each entry in a `java.util.HashMap$Node` (a Java
      Map.Entry whose pr form embeds a non-reproducible `0xADDR` identity hash —
      the AD-002 class). cljw is no-JVM (ADR-0059): there is no Map$Node type and
      no identity hash to mirror, so it yields the cljw MapEntry, which is strictly
      MORE useful (works with key/val/destructuring directly). The VALUE is
      equivalent — `(into {} hm)` / `(keys hm-via-seq)` / `(count hm)` agree with
      clj — only the raw entry OBJECT type in `(seq hm)` differs.
    derives_from: "ADR-0059 (no-JVM: no java.util.HashMap$Node) + AD-002 (Java entry pr embeds a non-reproducible identity hash) + D-425"
    pin: "test/e2e/phase14_hashmap.sh — seq_cljw_entry asserts ([:a 9]) (the cljw MapEntry form); into asserts {:a 9} (clj-equal); keySet/values assert cljw-collection results (value-equal to clj). test/e2e/phase14_arraylist.sh — seq asserts the plain element seq. test/e2e/phase14_treemap.sh — the cljw MapEntry seq + cljw-seq keySet/values forms (sorted); the clj-parity corpus pins only the VALUE-equal matched forms (into / map-key-over-seq / sort-of-keySet)."
  - id: "AD-033"
    summary: "`clojure.core/Throwable->map` `:trace` and per-`:via` `:at` are cljw-shaped `{:ns :fn :file :line :column}` maps, NOT JVM `[class method file line]` 4-vectors. `(stack-trace e)` (ADR-0140) returns the same maps. `:cause`/`:via`(`:type`/`:message`/`:data`)/`:data` are clj-faithful."
    example: '(:trace (Throwable->map <caught e>)) => cljw [{:ns "user" :fn "boom" :file "f.clj" :line 2 :column 19} …] / clj [[user$boom invoke "f.clj" 2] …] ; (:at (first (:via (Throwable->map e)))) => cljw a {:ns …} map / clj a [class method file line] 4-vec'
    why: |-
      cljw has no JVM `StackTraceElement` (ADR-0059): class + method are fictions
      cljw will not fake (AD-003 rejects JVM fictions). The native frame is
      `{ns, fn, file, line, column}` (info.zig StackFrame), so `Throwable->map`'s
      `:trace`/`:at` carry that map directly rather than a mislabelled `[ns fn file
      line]` tuple or a fake `ns$fn__N` class string. The map keeps `column` (a
      4-vector drops it) and is the SAME shape `(stack-trace e)` returns — one
      shape across both surfaces (ADR-0140 Alt 2). This is a refinement of the
      already-accepted AD-007 posture (cljw's whole `#error{…}` trace
      representation intentionally diverges from clj's JVM-frame `:trace`). A
      consumer that positionally destructures `(let [[cls m f l] frame] …)` the
      clj-documented way gets the map (not 4 slots) — the recorded divergence.
    derives_from: "ADR-0059 (no JVM StackTraceElement) + AD-003 (no JVM class fiction) + AD-007 (cljw-native trace representation) + ADR-0140 (frame-seq shape)"
    pin: "test/e2e/phase14_throwable_map.sh — caught_trace_present/caught_at_present/caught_trace_fn lock the map-shaped :trace/:at for a caught exception; trace_absent/at_absent lock the omit-when-frame-less invariant"
  - id: "AD-034"
    summary: "cljw's volatile-grade concurrency cells (atom / volatile / ref / agent / `^:volatile-mutable` deftype fields) use `.acquire`/`.release` ordering, NOT `.seq_cst`; the JMM cross-independent-volatile total order (IRIW) is not guaranteed."
    example: "Two independent `^:volatile-mutable` fields (or two atoms) written on two threads: two observer threads can disagree on the relative order of the writes — JVM `volatile` (sequentially consistent across volatile accesses) forbids this; cljw's acquire/release permits it."
    why: |-
      cljw's entire lock-free substrate uses `@atomicLoad(.acquire)` /
      `@atomicStore(.release)` (CAS: `.acq_rel`/`.acquire`) — atom.zig,
      volatile.zig, iref.zig, agent.zig, and (D-444 / ADR-0152) the
      `^:volatile-mutable` deftype field path. Acquire/release gives full
      happens-before for the dominant single-cell publish/consume pattern
      (≥99.9% of real code) but is strictly weaker than JMM `volatile`, which is
      sequentially consistent ACROSS independent volatile accesses (the IRIW /
      two-independent-volatiles total-order property). cljw consciously elects a
      UNIFORM acquire/release volatile-grade ordering (internal consistency +
      the IRIW scenario is pathological — real Clojure code does not depend on a
      cross-independent-volatile total order) rather than a per-cell `.seq_cst`
      that would tax every store for an unused guarantee. Non-deterministic +
      multi-thread, so not clj-oracle-observable via the diff sweep; the
      by-construction half (the cells ARE atomic acquire/release) is what the pin
      locks. See ADR-0152 (the conscious election + the DA's seq_cst analysis).
    derives_from: "ADR-0152 (uniform acquire/release volatile-grade ordering) — JMM volatile = seq_cst across volatile accesses; cljw's acquire/release omits the IRIW cross-cell total order. Substrate: atom.zig/volatile.zig/iref.zig/agent.zig + the D-444 deftype field path."
    pin: "test/e2e/phase14_deftype_mutable.sh — the :volatile-mutable field increments correctly (the by-construction half: the field IS atomic acquire/release; the IRIW gap itself is non-deterministic + untestable)"
  - id: "AD-035"
    summary: "A defrecord prints with its SIMPLE name (`#R{:x 1, :y 2}`), not clj's namespace-qualified `#user.R{:x 1, :y 2}`."
    example: '(pr-str (->R 1 2)) => cljw "#R{:x 1, :y 2}" / clj "#user.R{:x 1, :y 2}" ; with extras: cljw "#R{:x 1, :y 2, :z 9}" / clj "#user.R{:x 1, :y 2, :z 9}"'
    why: |-
      cljw registers a defrecord/deftype by its SIMPLE name (the descriptor's
      `fqcn` is `R`, not `user.R`) — the same no-JVM-Class simple-name surface
      AD-003 records for `(class x)`. clj prints a record reader-tag qualified by
      its defining namespace because the JVM record class IS `user.R`; cljw has
      no defining-ns on the descriptor (ADR-0059, no JVM Class hierarchy), so it
      prints the simple name it actually carries. The record CONTENT (declared
      fields + extmap entries, in declared-then-extmap order) is byte-identical
      to clj modulo this prefix — verified across assoc/dissoc/get/keys/vals/
      count/seq/merge/select-keys/find/update/assoc-in/reduce-kv (D-086). Adding
      the ns prefix would require threading a defining-ns through every record
      descriptor purely for the print fiction, contradicting the AD-003 simple-
      name policy for no behavioural gain.
    derives_from: "ADR-0059 (no-JVM Class hierarchy) + AD-003 (simple class name, not FQCN); no_jvm_specific_assumption.md. Records carry only a simple `fqcn`, so the printer emits `#<simple>{…}`."
    pin: "test/e2e/phase9_record_extmap.sh — record_extmap_print locks cljw's `#R{:x 1, :y 2, :z 9}` (simple name, no `user.` prefix)"
  - id: "AD-036"
    summary: "The 2-arg array ctors `(byte-array size n)` / `(short-array size n)` / `(char-array size n)` FILL with a number init; clj throws (`IllegalArgumentException`, 'Don't know how to create ISeq from: java.lang.Long') because the JVM `Numbers` overload for those element types has no number-fill branch."
    example: "(vec (byte-array 3 65)) => cljw [65 65 65] / clj THROWS ; (int (aget (char-array 3 65) 0)) => cljw 65 / clj THROWS ; matching cases agree: (vec (int-array 5 7)) => [7 7 7 7 7], (vec (byte-array 3 [1 2])) => [1 2 0]"
    why: |-
      cljw's typed array ctors compose over ONE uniform helper (`-array-from2`):
      a `sequential?` init is copied, any other init fills every slot with
      `(coerce init)` — applied identically to int/long/double/float/short/byte/
      char/boolean (F-011 single mechanism). clj's 2-arg behaviour is instead
      per-element-type: int/long/double/float/boolean accept a number-fill, but
      byte/short/char route an unrecognised init through `RT.seq` and THROW on a
      number (a `Numbers.java` method-overload accident keyed on the distinct JVM
      element types). cljw arrays are TYPE-ERASED (AD-019): there is no distinct
      byte/short/char element type, so there is no per-type overload to key the
      throw on. Reproducing clj's throw would require re-introducing the very
      element-type distinction AD-019 denies — so the uniform fill is the FORCED
      consequence of AD-019, not a convenience. (Devil's-advocate fork 2026-06-18
      confirmed: the per-type-throw mirror is the option that would contradict
      AD-019; uniform + this AD is the finished-form-clean choice per F-002/F-011.
      `object-array` keeps NO 2-arg form — cljw matches clj's arity error there.)
      The matching cases (number-fill for int/long/double/float/boolean, seq-copy
      for every type) are clj-byte-identical and corpus-pinned.
    derives_from: "AD-019 (type-erased arrays — no distinct byte/short/char element type) + F-011 (uniform shared mechanism over per-JVM-type overload accidents). DA fork 2026-06-18 (private/notes/D446-array2arg-da-fork.md)."
    pin: "test/e2e/phase14_arity_parity.sh — `AD-036 (byte-array n num)` locks (vec (byte-array 3 65)) => [65 65 65] and `AD-036 (char-array n int)` locks (int (aget (char-array 3 65) 0)) => 65 (cljw fills where clj throws)"
  - id: "AD-037"
    summary: "`(str <lazy_seq>)` renders the realized ELEMENTS `(…)`; clj renders the LazySeq's identity-hash `toString` (`clojure.lang.LazySeq@<hash>`)."
    example: '(str (map inc [1 2 3])) => cljw "(2 3 4)" / clj "clojure.lang.LazySeq@7c42" ; (str (interpose :x (range 3))) => cljw "(0 :x 1 :x 2)" / clj "clojure.lang.LazySeq@14428d92". pr-str MATCHES in both ("(2 3 4)"); a seq''d/list/vector/chunked_cons also matches in both ((str (seq (map inc [1 2 3]))) => "(2 3 4)" both).'
    why: |-
      clj's `str` calls `.toString`, and `clojure.lang.LazySeq` does NOT override
      `toString` (it inherits `Object.toString` → `clojure.lang.LazySeq@<idhash>`),
      so `(str <unrealized-or-realized LazySeq>)` embeds a non-reproducible
      identity hash — even after `doall` (the object stays a LazySeq). Every OTHER
      seq type (PersistentList / Cons / ChunkedCons / vector) DOES element-print
      via its `toString`, and `pr`/`prn` element-print every seq via
      `RT.printString`. cljw has no JVM identity hash to mirror (AD-002), and its
      print path uniformly realizes a seq before rendering (ADR-0054 deepRealize),
      so `(str <lazy_seq>)` yields the deterministic element form. That is the only
      sensible choice: mirroring clj would require fabricating a fake `@hash`, and
      the element form is strictly more useful + matches what `pr`/`prn` already
      produce in BOTH runtimes. Narrow scope: ONLY `(str …)` on a value whose tag
      is `lazy_seq` diverges; `pr-str`/`prn`/`print` and `str` of any realized seq
      match clj.
    derives_from: "AD-002 (non-reproducible JVM identity hash is not mirrored) + ADR-0054 (the print path realizes a lazy seq to its elements). clj's LazySeq.toString is the un-overridden Object.toString; no cljw analogue exists."
    pin: "test/e2e/phase14_lazy_map.sh — `str_lazyseq_elements` locks (str (map inc [1 2 3])) => \"(2 3 4)\" and `str_interpose_lazy` locks (str (interpose :x (range 3))) => \"(0 :x 1 :x 2)\" (cljw's deterministic element form, vs clj's identity-hash toString)"
  - id: "AD-038"
    summary: "The `@x` deref reader macro expands to `(rt/deref x)`; clj expands to `(clojure.core/deref x)`. Both are NS-qualified (so a local `deref` cannot capture it — same reader hygiene); only the qualifying namespace differs."
    example: '(read-string "@foo") => cljw "(rt/deref foo)" / clj "(clojure.core/deref foo)". The HYGIENE matches: (let [deref (fn [_] :shadowed)] @(atom 5)) => 5 in BOTH (the qualified deref is not captured by the local).'
    why: |-
      clj qualifies the `@` reader expansion to `clojure.core/deref` so a local
      `deref` binding cannot shadow it. cljw needs the same hygiene but qualifies
      to the `rt` primitive namespace — `rt` is cljw's canonical home for core
      fns (`(resolve 'inc)` => `#'rt/inc`; ADR-0033 / AD-011 placement split), and
      crucially it is the ONLY core ns resolvable in a core.clj-less environment
      (the dual-backend differential fixture is primitive-only, so
      `clojure.core/deref` would not resolve there — verified: it broke the
      `@(atom 7)` diff case, `rt/deref` does not). The reader runs in every
      context, so it must emit a symbol resolvable in every context. The
      behavioural contract (hygiene + the deref value) is identical to clj; only
      the printed expansion's namespace differs — the same `rt`-vs-`clojure.core`
      surface AD-011 records. `(read-string "@x")` + printing the expansion is the
      only place a user observes it.
    derives_from: "AD-011 / ADR-0033 (rt-vs-clojure.core primitive placement: core fns live in `rt`, referred into clojure.core) + reader-hygiene parity (the qualification itself matches clj; only the ns name differs). `rt` is the only core ns resolvable without core.clj (the diff-test fixture)."
    pin: "test/e2e/phase14_var_special.sh — `deref_reader_qualified` locks (read-string \"@deref\") => (rt/deref deref) and `deref_no_local_capture` locks the hygiene ((let [deref f] @(atom 5)) => 5, NOT the captured local)"
  - id: "AD-039"
    summary: "The `#(…)` anonymous-fn reader expands with DETERMINISTIC params `%1`/`%2`/`%&`; clj uses non-reproducible gensyms (`p1__N#` / `rest__N#`)."
    example: '(read-string "#(+ % 1)") => cljw "(fn* [%1] (+ %1 1))" / clj "(fn* [p1__3#] (+ p1__3# 1))" ; (read-string "#(apply + % %&)") => cljw "(fn* [%1 & %&] (apply + %1 %&))" / clj "(fn* [p1__10# & rest__11#] …)". The CALL behaviour matches: (#(+ % 1) 10) => 11 both.'
    why: |-
      clj gensyms the `#()` params (`p1__N#`, counter-suffixed) so a literal `%`
      in the body cannot collide with an outer binding; the `N` is a process-wide
      counter, so the printed form is non-reproducible (like AD-002's identity
      hash). cljw canonicalises `%`→`%1`, `%N` positional, `%&` rest — a fixed,
      deterministic naming with no counter. Functionally identical (arity + body
      reference the same params); the only observable difference is the printed
      param NAMES, and only via `(read-string "#(…)")` + printing the expansion
      (a macro-author edge). cljw's deterministic form is the right choice: a
      counter would be non-reproducible for no behavioural gain, and `%N` reads
      naturally as "the Nth arg". Nested `#()` is a read error in BOTH (so `%`
      can't span levels — the only real capture hazard the gensym guards).
    derives_from: "AD-002 (non-reproducible JVM-side token — here a gensym counter — is not mirrored; cljw uses a deterministic name). The fixed `%N`/`%&` naming is sound because nested `#()` is rejected (no `%`-across-levels capture to guard)."
    pin: "test/e2e/phase14_anon_fn_reader.sh — `anon_readform_pct1` locks (read-string \"#(+ % 1)\") => (fn* [%1] (+ %1 1)) and `anon_readform_rest` locks the `%&` rest form (cljw's deterministic params vs clj's gensyms)"
  - id: "AD-040"
    summary: "A cascading macro (`cond`, and similar) macroexpand-1's to the FULL nested form in cljw, where clj expands ONE clause and leaves a recursive `(clojure.core/cond …)` call. Functionally identical; the expanded form (and the nested macro's namespace) differ."
    example: "(macroexpand-1 '(cond a 1 :else 2)) => cljw \"(if a 1 (if :else 2 nil))\" / clj \"(if a 1 (clojure.core/cond :else 2))\". Running the macro is identical: (cond false 1 :else 2) => 2 both. NOTE: `when` DOES byte-match clj (`(if c (do body))`, fixed) — only the recursive-cascade macros (cond/condp/…) differ."
    why: |-
      cljw's macro transforms are eager Zig functions that build the entire
      lowered form in one `macroexpand-1` step (`expandCond` → `buildCondTail`
      recurses fully), whereas clj's `cond` is a self-referential Clojure macro
      that rewrites one clause to `(if test then (cond rest…))` and re-expands on
      the next step. Both reach the SAME nested-if after full expansion — only
      the per-step shape an inspecting tool sees differs. Matching clj's per-step
      form would require (a) re-emitting a `cond` call (an artificial partial
      expansion) AND (b) qualifying it `clojure.core/cond`, which cljw cannot do
      faithfully (cljw's macros emit bare syms; the core ns is `rt`, AD-011) — so
      exact per-step parity is impractical for zero behavioural gain. The common
      `when`/`if-not`/`when-not` forms ARE made to byte-match clj; only the
      recursive-cascade cases keep cljw's full-expand shape.
    derives_from: "F-011 (behavioural equivalence is the contract; the macros run identically — only the intermediate macroexpand-1 FORM differs) + AD-011/ADR-0033 (cljw emits bare/`rt`-ns syms, not clojure.core-qualified, so a faithful recursive re-emit is impossible). Functionally-equivalent expansion form, like ClojureScript's macroexpansions vs JVM clj."
    pin: "test/e2e/phase14_when_if_not.sh — `cond_expand_full` locks (macroexpand-1 '(cond a 1 :else 2)) => (if a 1 (if :else 2 nil)) (cljw's full form), and `when_expand_multi`/`when_expand_single` lock when's byte-match with clj"
  - id: "AD-041"
    summary: "clojure.test's FAIL/ERROR report line omits clj's ` (file:line)` source-location suffix, and `report :error` prints the exception's value instead of clj's JVM cause trace. The test name, expected/actual, context line, and counts all match clj."
    example: "(deftest a (is (= 1 2))) (run-tests) => cljw `FAIL in (a)` / clj `FAIL in (a) (NO_SOURCE_FILE:1)`. An erroring test: cljw `  actual: #error {…}` (the ex value) / clj a multi-line `clojure.lang.ExceptionInfo … at …` cause trace."
    why: |-
      cljw Vars carry no source location — `(meta #'a)` has `:name`/`:ns` but no
      `:line`/`:file` (clj attaches both at compile time). So `testing-vars-str`
      cannot emit the ` (file:line)` suffix clj appends, and there is no JVM
      stack to print for an errored assertion. Everything that does NOT depend on
      a source location — the `(test-name)` list, `expected:`/`  actual:` (incl.
      the clj `(not (= …))` actual form), the joined `testing` context line, the
      `Testing <ns>` begin line, and the `Ran … / failures, errors.` summary —
      matches clj byte-for-line. Reproducing the suffix/trace would require a
      source-location + JVM-stack model cljw does not have (ADR-0059 no-JVM).
    derives_from: "ADR-0059 (no-JVM: no JVM stack / class-file source positions) + F-011 (behavioural equivalence — pass/fail/error outcomes + counts match; only the unreproducible location/trace text differs)."
    pin: "test/e2e/phase15_clojure_test_output.sh — asserts the clj-matching lines (`FAIL in (eqfail)`, `  actual: (not (= 1 2))`, context, `Testing demo`, summary) are present and that `*test-out*` is re-enabled; the absent ` (file:line)` suffix is the locked divergence."
  - id: "AD-042"
    summary: "`(pr-str v)` / `(str v)` print the bare ISO toString for a `java.time.*` value (Instant, Duration, …), where clj's `pr` emits the opaque `#object[java.time.X 0x.. \"ISO\"]` identity form. cljw makes both str and pr the toString; the value's `(str …)`, method results, and `=` all match clj."
    example: "(pr-str (java.time.Instant/ofEpochSecond 0)) => cljw \"1970-01-01T00:00:00Z\" / clj \"#object[java.time.Instant 0x5d3411d \\\"1970-01-01T00:00:00Z\\\"]\". (str (java.time.Duration/ofSeconds 90)) => both \"PT1M30S\"."
    why: |-
      clj's default `print-method` for a `java.time.*` value falls through to the
      generic Object printer, which embeds the JVM identity hash
      (`0x5d3411d`) — a per-run, non-reproducible address cljw has no faithful
      analogue for (ADR-0059 no-JVM, no identity-hash object form). cljw prints
      the value's toString (the ISO string — ISO_INSTANT for Instant, the
      `PT…` duration form for Duration) for both `str` and `pr`, which is the
      reproducible, value-bearing form. Everything that does NOT depend on the
      identity-hash wrapper — `(str v)`, the instance method results, and value
      `=` — matches clj exactly.
    derives_from: "ADR-0059 (no-JVM: no identity-hash `#object[…]` object form) + F-011 (behavioural equivalence — toString / method results / `=` match; only the unreproducible identity-wrapped pr form differs)."
    pin: "test/e2e/phase15_java_time_instant.sh + test/e2e/phase15_java_time_duration.sh + test/e2e/phase15_java_time_local_date_time.sh + test/e2e/phase15_java_time_local_date.sh — lock `(str v)` = the bare ISO toString (Instant ISO_INSTANT variable fraction + `Z`; Duration `PT…`; LocalDateTime ISO-local conditional seconds + variable fraction; LocalDate `yyyy-MM-dd`; LocalTime ISO-local time) and the instance-method + value-`=` results; the absent `#object[…]` pr wrapper is the locked divergence."
  - id: "AD-043"
    summary: "`(compare a b)` (and the `.compareTo` it backs) returns the SIGN (-1/0/1, an Order) where clj returns a difference MAGNITUDE for some Comparable types — a char-difference for strings, a field-difference (year/month/day) for java.time.LocalDate/LocalDateTime, and the ORDINAL difference for the host enums (RoundingMode/ChronoUnit/DayOfWeek/Month, ADR-0161). The SIGN is identical, so sort order / branch behaviour match; only the non-zero magnitude differs."
    example: "(compare \"a\" \"c\") => cljw -1 / clj -2. (compare (java.time.LocalDate/of 2024 6 1) (java.time.LocalDate/of 2024 1 1)) => cljw 1 / clj 5. (compare java.time.DayOfWeek/MONDAY java.time.DayOfWeek/SUNDAY) => cljw -1 / clj -6 (ordinal diff). (compare (java.time.Instant/ofEpochSecond 5) (java.time.Instant/ofEpochSecond 9)) => -1 BOTH (Instant/Duration/LocalTime already match — they use a sign-returning Long/Integer.compare). (sort …) is identical either way."
    why: |-
      cljw's `compare` (runtime/compare.zig, ADR-0053) is uniformly Order-based:
      every arm returns `std.math.Order` → -1/0/1 when surfaced to Clojure. The
      JVM's `Comparable.compareTo` is only contracted to return a value whose
      SIGN indicates the ordering — the magnitude is unspecified — and several
      JVM types (String, LocalDate, LocalDateTime) happen to return a field
      difference. Mirroring those magnitudes would mean re-deriving each type's
      JVM-internal subtraction chain (ADR-0059: cljw is not a JVM reimpl) for
      zero behavioural gain: `sort`, `compare`-keyed maps, and every
      sign-test see identical results. This is a PRE-EXISTING cljw property
      (strings already diverged); the D-462 temporal `compare` arms follow the
      same sign-based design and this AD records the whole class.
    derives_from: "java.lang.Comparable / java.util.Comparator contract (only the SIGN of compareTo/compare is specified; magnitude is implementation-defined) + ADR-0053 (cljw compare is Order-based) + ADR-0059 (no JVM-internal magnitude reproduction)."
    pin: "test/e2e/phase15_java_time_sort.sh — locks cljw's sign-based results: `(compare \"a\" \"c\")` => -1, `(compare LocalDate-jun LocalDate-jan)` => 1 (clj 5), and `(sort [LocalDate …])` ordering. test/e2e/phase15_java_time_dow_month.sh (block `enum-compare`) locks the host-enum sign result `(compare DayOfWeek/MONDAY DayOfWeek/SUNDAY)` => -1 (clj -6) + a sort by ordinal (ADR-0161)."
  - id: "AD-044"
    summary: "`(class x)` / `(type x)` of a callable / seq-view / reference / transient returns a STABLE clj-faithful simple class name (`Fn` / `MultiFn` / `LazySeq` / `LongRange` / `Atom` / `Ref` / `Future` / `Promise` / …); clj returns a per-fn GENERATED class (`user$eval$fn__135`, `clojure.core$_PLUS_`) for closures/builtins and a per-call REIFY class for future/promise that cljw has no analog for."
    example: '(class (fn [x] x)) => cljw "Fn" / clj "user$eval$fn__135". (class +) => cljw "Fn" / clj "clojure.core$_PLUS_". (class (future 1)) => cljw "Future" / clj "core$future_call$reify__8578". (class (map inc [1])) => cljw "LazySeq" / clj "clojure.lang.LazySeq" (this one matches).'
    why: |-
      cljw has no JVM Class system (ADR-0059 / AD-003): closures and builtins are
      NaN-boxed fn-pointers with no generated per-fn class, and future/promise are
      runtime values, not reified anonymous classes. Reproducing clj's
      generated/reify class names would be a JVM-specific fiction (AD-003's
      rationale, extended to callables). The chosen names are the clj SIMPLE class
      name where cljw has a 1:1 analog (LazySeq/LongRange/Atom/Ref/Volatile/Delay/
      Reduced/Namespace/TransientVector/MultiFn all match clj exactly) and a stable
      cljw name where clj's is generated (`Fn` for every fn/builtin/protocol-fn,
      `Future`/`Promise` for the reify types). The prior behaviour LEAKED the raw
      internal heap-tag name (`fn_val` / `lazy_seq` / `atom`) — a genuine defect this
      AD's fix (D-337) closed; the residual clj-vs-cljw name difference is the
      accepted divergence. `displayClassName` (runtime/class_name.zig) is the SSOT;
      the names are NOT `instance?` targets (no `clojure.lang.*` FQCN to resolve).
    derives_from: "ADR-0059 (no JVM Class) + AD-003 (simple class name, no JVM FQCN) — extended to callables/seq-views/refs which clj backs with generated/reify classes."
    pin: "test/e2e/phase14_class_type.sh — class_fn_anon/class_fn_builtin => Fn, class_multifn => MultiFn, class_lazyseq/range/chunkseq/future/agent/atom/ref/volatile/delay/reduced/tvec, and class_fn_isa_ifn (the IFn isa? still resolves through the renamed callable classes)."
  - id: "AD-045"
    summary: "`send-via` / `set-agent-send-executor!` / `set-agent-send-off-executor!` RAISE (`value_error`) instead of dispatching on / configuring a user-supplied executor — cljw has no `java.util.concurrent.ExecutorService` type, so there is no executor to pass or configure. clj runs these for real against its global agent thread pools."
    example: '(send-via my-executor a inc) / (set-agent-send-executor! my-executor) => cljw raises "ClojureWasm has no configurable executor — agents run on a per-agent worker …" / clj dispatches-via / mutates the pool.'
    why: |-
      cljw's agent model (ADR-0093 / D-388) is one DETACHED worker thread per
      agent, not a shared, user-configurable `ExecutorService` pool — and cljw
      exposes no `java.util.concurrent` executor TYPE at all, so a user has no
      executor value to pass. The three executor-shaped functions therefore have
      nothing real to thread or configure. Silently accepting-and-ignoring the
      explicitly-passed executor would MASK a dropped semantic (the user thinks
      work runs on their bounded pool) — the permanent-no-op the project forbids —
      so the honest disposition is an explicit error (ADR-0155, DA-fork-confirmed).
      The deprecated `agent-errors`/`clear-agent-errors` + (future) `*agent*` /
      `release-pending-sends` are implemented for real; only the executor surface
      diverges, because it presupposes a subsystem cljw deliberately lacks.
    derives_from: "ADR-0093 (per-agent worker, no shared pool) + ADR-0155 (D-442 classification) + the no-`java.util.concurrent`-executor model + provisional_marker.md permanent-no-op-forbidden."
    pin: "test/e2e/phase16_agent.sh — agent_send_via_raises / agent_set_executor_raises / agent_set_off_executor_raises (all three raise the no-configurable-executor message)."
  - id: "AD-046"
    summary: "After `(shutdown-agents)`, a dropped `send` does NOT fire an agent's `:error-handler` — cljw silently drops the action; clj routes the swallowed `RejectedExecutionException` to the handler if one is set. The COMMON case (no handler) MATCHES clj exactly: send returns the agent, no throw, action never runs."
    example: '(do (shutdown-agents) (let [a (agent 0 :error-handler h)] (send a inc))) => cljw drops, h NOT called / clj drops, h called with a RejectedExecutionException. Without a handler both runtimes drop silently (identical).'
    why: |-
      cljw's agent model (ADR-0093) is one detached worker per agent, NOT a shared
      `java.util.concurrent` executor pool, and cljw exposes no
      `RejectedExecutionException` type. clj's post-shutdown behaviour is an
      artifact of its executor: `Agent$Action.execute` calls `pooledExecutor.execute`,
      which throws `RejectedExecutionException` once the pool is shut down; that
      throw is CAUGHT inside `execute` and, IF the agent has an error-handler,
      routed to it — else swallowed. So clj's observable post-shutdown contract is:
      send returns the agent, NEVER throws to the caller, the action is dropped, and
      (only when a handler is set) the handler fires with a rejection exception.
      cljw reproduces the whole observable contract EXCEPT the handler-routing
      branch: it would have to synthesize a fake exception of a type cljw lacks and
      feed it to `(fn [agent ex])`, which would itself be a fresh DIFF (the
      fabricated `ex`'s class/message). Dropping without firing the handler is the
      honest disposition; the shared, dominant no-handler path is byte-identical to
      clj. The post-shutdown silent DROP is itself a clj-faithful terminal no-op (an
      audited exception to permanent_no_op_forbidden, which governs cljw-INVENTED
      drops, not faithful reproduction of clj's documented "no new actions accepted"
      terminal state — ADR-0155). ADR-0155's original "needs no AD — only the error
      Kind differs, AD-007 covers it" claim was FACTUALLY WRONG (it assumed clj
      throws to the caller; the oracle shows it does not) and is corrected here.
    derives_from: "F-011 (clj-parity authoritative; the no-handler path matches exactly) + ADR-0093 (per-agent worker, no java.util.concurrent executor / no RejectedExecutionException type) + ADR-0155 (D-442 shutdown-agents classification) + provisional_marker.md permanent-no-op-forbidden (the silent drop is the clj-faithful terminal no-op, audited)."
    pin: "test/e2e/phase16_agent.sh — shutdown_agents_send_returns_agent (send returns the agent, no throw), shutdown_agents_action_dropped (state unchanged), shutdown_agents_no_handler_fire (cljw does NOT fire the :error-handler on the dropped send: log stays empty)."
  - id: "AD-047"
    summary: "A host java.util collection's `str`/`.toString` renders in CLOJURE content form (`[1 2]`, `{:a 1, :b 2}`, `#{1 2}`), not JVM toString form (`[1, 2]`, `{:b=2, :a=1}` with `=` pairs + JVM iteration order). The `pr`/`pr-str`/REPL form MATCHES clj exactly (`[1 2]` / `#{1 2}` / `{:a 1}`) — D-468; only the str-form (Java toString) diverges."
    example: '(str (doto (java.util.HashMap.) (.put :a 1) (.put :b 2))) => cljw "{:a 1, :b 2}" / clj "{:b=2, :a=1}"; (str (java.util.ArrayList. [1 2])) => cljw "[1 2]" / clj "[1, 2]"'
    why: |-
      Before D-468 a host java.util collection (ArrayList/HashSet/TreeSet/HashMap/
      TreeMap) printed FULLY opaquely as `#<cljw.java.util.X>` in BOTH the pr and str
      contexts — diverging from clj in both. D-468 routes these through their backing
      native cljw collection (a print pre-pass hook, type_descriptor.print_content),
      so the `pr`/`pr-str` form now matches clj EXACTLY (`[1 2]` / `#{1 2}` / `{:a 1}`,
      sorted variants sorted). That is the readable, dominant print path (prn / REPL /
      nested rendering) and the F-011-important one.
      Only the `str`/`.toString` form still diverges, and matching clj there is
      undesirable: clj's `(str coll)` calls the JVM `AbstractCollection`/`AbstractMap`
      `.toString`, which embeds JVM-implementation specifics cljw neither can nor
      should reproduce — `key=value` pairs with `=` separators and the JVM hash-bucket
      ITERATION ORDER (non-reproducible, same class as AD-001). cljw renders the
      str-form via its native collection's Clojure rendering (`{:a 1, :b 2}`), which is
      internally consistent and cleaner than mirroring JVM toString quirks. Same spirit
      as AD-003 (cljw uses simple class names, not JVM FQCNs): cljw deliberately does
      not reproduce JVM-implementation surface details. A program needing an exact
      Clojure value uses `vec`/`into`/`seq` (all clj-faithful); the raw host-collection
      str is an interop edge.
    derives_from: "ADR-0059 (no JVM — cljw does not reproduce JVM AbstractMap/AbstractCollection toString form) + AD-001 (non-reproducible collection iteration order) + AD-003 (cljw renders host surface in cljw form, not JVM form) + F-011 (the pr/pr-str form matches clj exactly; only the JVM-toString str-form diverges) + D-468 (the content-print mechanism)."
    pin: "test/diff/class_corpus/ArrayList.txt + test/diff/class_corpus/HashMap.txt — the D-468 print cases lock cljw's pr content-form; the str Clojure-form divergence is asserted in test/e2e/phase14_hashmap.sh (str_clojure_form + print_pr_content)."
  - id: "AD-048"
    summary: "`(str record)` / `(.toString record)` renders the cljw CONTENT form (`#Pt{:x 1, :y 2}`), same as pr-str — NOT clj's `Object.toString` identity form (`user.Pt@3c6f0c2c` = FQCN + identity hash). A defrecord/deftype does not override toString, so clj's str is the JVM default."
    example: '(str (->Pt 1 2)) => cljw "#Pt{:x 1, :y 2}" / clj "user.Pt@<hash>" (where (defrecord Pt [x y]))'
    why: |-
      clj's `(str some-record)` calls `java.lang.Object.toString` (a defrecord does
      NOT override toString), which is `<FQCN>@<Integer.toHexString(identityHashCode)>`
      — both halves are unreproducible in cljw: the JVM class FQN (cljw is no-JVM,
      ADR-0059; cljw uses the simple record name per AD-003) and the per-object
      identity hash (a JVM address-derived value cljw has no analogue for, same class
      as AD-002). cljw therefore renders a record's str AS its readable content form
      (the pr-form), identical to `(pr-str record)` (`#Pt{:x 1, :y 2}`, simple name
      per AD-003). This is strictly more useful than the JVM `Class@hash` (which leaks
      nothing about the value) and is the only internally-consistent choice given cljw
      has neither a JVM FQN nor an identity hash to print. Sibling to AD-047 (host
      java.util collection str renders cljw-content, not JVM toString); both stem from
      "cljw does not reproduce JVM Object/Abstract* toString surface details".
    derives_from: "ADR-0059 (no JVM — no class FQN, no Object.toString identity form) + AD-002 (non-reproducible identity hash) + AD-003 (cljw renders the record with its simple name, not the JVM FQCN) + F-011 (pr-str already matches modulo the AD-003 simple name; only the JVM-Object.toString str-form diverges)."
    pin: "test/e2e/phase7_defrecord.sh — defrecord_str_content_form (str of a record = its #Name{...} content form, not Class@hash) + defrecord_print_map_style (the pr-form it mirrors)."
  - id: "AD-049"
    summary: "A spec's RAW captured pred form (`s/form`, and the `:pred` in `s/explain-data`) shows core predicates qualified to the `rt` namespace (`rt/int?`) where clj shows `clojure.core/int?`. Both are the same predicate; only the qualifying namespace differs. `s/explain-str` / `s/describe` go through spec's `abbrev` (which strips ANY namespace) so they match clj EXACTLY — only the un-abbreviated `s/form` / explain-data `:pred` exposes the rt/ qualification."
    example: '(clojure.spec.alpha/form (clojure.spec.alpha/cat :a int?)) => cljw "(clojure.spec.alpha/cat :a rt/int?)" / clj "(clojure.spec.alpha/cat :a clojure.core/int?)". But (clojure.spec.alpha/explain-str int? "x") => "\"x\" - failed: int?\n" in BOTH (abbrev strips the ns).'
    why: |-
      spec captures a predicate's form via syntax-quote (the `cat`/`and`/... macros),
      which qualifies a bare core symbol to its home namespace. cljw's core fns live
      in the `rt` primitive namespace (`(resolve 'int?)` => `#'rt/int?`; ADR-0033 /
      AD-011 placement split — `rt` is interned, referred into clojure.core), so the
      captured form reads `rt/int?` where clj reads `clojure.core/int?`. This is the
      SAME rt-vs-clojure.core surface as AD-038 (the `@` reader expands to `rt/deref`)
      and AD-011 — `rt` is cljw's canonical home for core fns, and the only core ns
      resolvable in a core.clj-less environment. The behavioural contract is identical
      (the predicate validates the same way; conform/valid?/explain-str/describe all
      match clj — describe/explain go through `abbrev` which strips the ns). Only the
      raw `s/form` / explain-data `:pred`, where a user inspects the unabbreviated
      captured form, exposes the difference. cljw cannot show `clojure.core/int?`
      without making `clojure.core` int?'s home ns, which ADR-0033 forbids.
    derives_from: "AD-011 / ADR-0033 (rt-vs-clojure.core primitive placement: core fns live in `rt`, referred into clojure.core) + AD-038 (the sibling reader-macro rt/-qualification) + F-011 (conform/valid?/explain-str/describe all match clj; only the raw captured form's ns differs). The fn-name half is clj-IDENTICAL: cljw's `fn-sym` recovers a predicate's name from its `#<ns/name>` print form, so explain/describe abbreviate to the same `int?` clj shows."
    pin: "test/e2e/phase15_spec.sh — `ad049_form` locks (s/form (s/cat :a int?)) => (clojure.spec.alpha/cat :a rt/int?) (the rt/-qualified captured form), while `explain_named`/`describe` lock the clj-IDENTICAL abbreviated surface."
  - id: "AD-050"
    summary: "A float-zero DIVISOR yields IEEE ±Inf/NaN on EVERY cljw `/` path; clj returns ±Inf only on its compile-inlined 2-arg literal path and THROWS `ArithmeticException: Divide by zero` on the runtime path (1-arg `(/ 0.0)`, `(apply / …)`, `(reduce / …)`). An INTEGER-zero divisor throws in BOTH (parity). VALUE-bearing common case `(/ x 0.0)` matches clj (±Inf)."
    example: '(/ 1.0 0.0) => ##Inf in BOTH ; (/ 0.0) => cljw ##Inf / clj THROW ; (apply / [1.0 0.0]) => cljw ##Inf / clj THROW ; (reduce / [1.0 2.0 0.0]) => cljw ##Inf / clj THROW ; (/ 1 0) => THROW in both'
    why: |-
      clj's `clojure.lang.Numbers.divide` throws on a zero divisor of ANY type
      (incl. 0.0), but the compiler INLINES a 2-arg `/` whose operands it can prove
      primitive into a raw machine `ddiv` that has no zero check — so `(/ 1.0 0.0)`
      (literal / let-bound double) returns ±Inf while `(apply / [1.0 0.0])` (forced
      through the runtime fn) throws. clj is thus internally inconsistent: the SAME
      operation gives ±Inf or a throw depending on whether the compiler inlined it.
      cljw is a tree-walk / simple-VM with no such operand-type-inlining pass
      (ADR-0059-adjacent: no JVM Compiler), so it cannot reproduce the split. It
      picks the IEEE-consistent surface — a float-zero divisor ALWAYS gives ±Inf/NaN
      (F-005 numeric tower = IEEE f64 semantics), which matches clj's COMMON inlined
      `(/ x 0.0)` path and the actual hardware. An integer-zero divisor still throws
      in both (cljw has no IEEE integer infinity; promote.zig raises divide_by_zero).
      Matching clj's runtime-path throw would require either replicating JVM inlining
      or throwing on `(/ 1.0 0.0)` too (breaking the common case) — both worse.
    derives_from: "F-005 (numeric tower = IEEE f64 semantics: float-zero divisor → ±Inf/NaN, integer-zero → throw) + ADR-0059 (no JVM Compiler — cljw has no operand-type inlining pass, so it cannot reproduce clj's inline-vs-runtime split) + F-011 (the common `(/ x 0.0)` literal path matches clj's inlined ±Inf exactly; only the rare runtime-dispatched 1-arg/apply/reduce path diverges)."
    pin: "test/e2e/phase14_float_div.sh — `ad050_recip`/`ad050_recip_n`/`ad050_apply`/`ad050_reduce` lock cljw's IEEE ±Inf form (NOT clj's throw) on the runtime paths; `pos_inf`/`int_zero` lock the clj-IDENTICAL inlined-±Inf + integer-throw surfaces."
  - id: "AD-051"
    summary: "`(bytes? x)` is true for ANY cljw array, where clj's `bytes?` is true only for a `byte[]`. cljw arrays are type-erased (AD-019) — `byte-array`/`int-array`/`object-array`/`make-array` share one runtime shape — so a byte-array is runtime-indistinguishable from any other array. The common positive guard `(bytes? (byte-array n))` matches clj (true); non-byte arrays diverge (clj false, cljw true)."
    example: '(bytes? (byte-array 3)) => true in BOTH ; (bytes? (int-array 3)) => cljw true / clj false ; (bytes? (object-array 0)) => cljw true / clj false ; (bytes? "x") / (bytes? nil) / (bytes? [1 2]) => false in both'
    why: |-
      clj's `bytes?` is `(-> x class .getComponentType (= Byte/TYPE))` — it keys on
      the JVM array's runtime component type. cljw deletes that component type:
      every array (`byte-array`, `int-array`, `object-array`, `make-array`) is the
      same type-erased `[]Value` (AD-019, derived from F-004 uniform 8-byte Value +
      F-005 no primitive specialization). So cljw genuinely cannot tell a byte-array
      from an int-array at runtime — the only signal available is `array?`. The
      over-broad `(defn bytes? [x] (array? x))` is NOT a silent positive lie: in
      cljw a byte-array IS usable as bytes (`(String. (byte-array [104 105]))` =>
      "hi", matching clj) AND, because all arrays share one representation, an
      int/object array routed into byte-handling behaves identically to a byte-array
      — there is no distinct byte-path to corrupt. The alternatives are worse: an
      always-`false` `bytes?` would deny the predicate's DEFINING case
      (`(bytes? (byte-array n))` => false), a negative lie on a capability cljw
      demonstrably has; an element-inspection heuristic (`every? byte-range?`) dresses
      an unknowable distinction as knowable (an int-array of 0-255 ints reads true)
      and is the 個別最適化 F-013 closes. A Devil's-advocate fork (2026-06-25)
      recommended always-`false` on a "positive answers can't be honored" premise;
      the main loop overrode it because a probe falsified that premise (byte-arrays
      ARE byte-usable in cljw). Record: `private/notes/2026-06-25-D472-bytes-da-fork.md`.
    derives_from: "AD-019 (type-erased arrays — no per-array component type, so byte-array is runtime-indistinguishable from any other array) + F-004 (uniform 8-byte Value) + F-005 (no primitive specialization) + F-011 (the common positive guard `(bytes? (byte-array n))` matches clj true exactly; only non-byte arrays diverge) + F-013 (no bespoke per-array type-tag mechanism added to fake a distinction the representation does not carry)."
    pin: "test/e2e/phase14_arity_parity.sh — `AD-051 (bytes? byte-array)`/`AD-051 (bytes? int-array)`/`AD-051 (bytes? object-array)` lock cljw's over-broad `true` (incl. the int/object-array cases where clj returns false). The clj-IDENTICAL cases (byte-array→true, string/nil/vector→false) are corpus-pinned in test/diff/clj_corpus/clojure_1_11_additions.txt."
  - id: "AD-052"
    summary: "format's `%t` date/time conversions render in UTC with fixed English names (month/day/am-pm) and a fixed `+0000`/`UTC` zone; the JVM renders in the process's default TIME ZONE and LOCALE (a JST/ja machine shows shifted hours and 金曜日/2月/午後)."
    example: '(format "%tH" 0) => cljw "00" (UTC) / clj-on-JST "09" ; (format "%ta" 1234567890123) => cljw "Fri" / clj-on-ja "金"'
    why: |-
      cljw ships no tz database and no locale data (edge/wasm target — D-462
      recorded tz-DB as out of scope). Java's Formatter %t uses the JVM default
      TimeZone + Locale, both host-environment-dependent, so the JVM's own
      output is not even stable across machines. cljw picks the one rendering
      that IS deterministic everywhere: UTC + English (= the JVM's behaviour
      under TZ=UTC LANG=en, the CI-conventional environment). Numeric
      conversions (%tY %tm %td %tH %tM %tS %tL %tj %ts %tQ %tD %tF %tT %tR
      %tr) match a TZ=UTC JVM byte-for-byte — verified against `TZ=UTC clj`
      2026-07-07. Name conversions (%ta %tA %tb %tB %tp) match an
      English-locale JVM.
    derives_from: "ADR-0059 no-JVM (no host tz/locale database dependency) + F-011 (the deterministic-environment rendering matches TZ=UTC/en JVM exactly; only the host-env-dependent rendering diverges) + D-462 (tz database out of scope for the edge/wasm target)."
    pin: "test/e2e/phase14_format.sh — the `%t` cases pin the UTC/English renderings (epoch-0 hour 00, Fri/Feb names, +0000 zone)."
