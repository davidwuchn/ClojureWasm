# Accepted clj-divergences ŌĆö SSOT (the authoritative "NOT a bug" ledger).
#
# Each AD-NNN is a behaviour where cljw INTENTIONALLY differs from JVM
# Clojure's observable surface, justified by a project invariant (F-NNN) or
# ADR. This file is the trust contract: a divergence here is a DECISION, not
# an accident, and must NOT be silently "fixed" by a future clj-diff sweep.
#
# Discipline (`.claude/rules/accepted_divergences.md`): a clj_diff DIFF is
# classified bug -> fix (F-011) OR accepted -> recorded HERE with a
# `derives_from` invariant. A DIFF is never left unclassified, and an entry
# is never added without a `derives_from` (no lazy "just accept it").
#
# Auto-defense: `scripts/check_accepted_divergences.sh --gate` enforces
# (a) the file is well-formed, (b) every entry cites a non-empty
# `derives_from`, (c) every entry's `pin` test path (when not "none") exists
# so the divergent cljw behaviour is locked against accidental change, and
# (d) COVERAGE.md's "Acceptable divergences" section points here (no drift).
#
# To PROMOTE an accepted divergence back to "should match clj" (i.e. decide
# it is actually a bug): remove its entry here + open a debt row + add a
# corpus/e2e case asserting the clj-matching behaviour. The reverse of
# accept. Both directions are explicit.

accepted:
  - id: "AD-001"
    summary: "Set / non-sorted-map print order follows cljw hash order, not clj's"
    example: '(pr-str #{1 2 3}) => cljw "#{1 2 3}" / clj "#{1 3 2}"'
    why: |-
      Order is not part of set / non-sorted-map VALUE semantics; the two
      values are `=`. clj's own order is hash-dependent and non-portable
      across versions / platforms, so matching it is neither possible nor
      meaningful. cljw's order is deterministic for a given insert sequence.
    derives_from: "Clojure unordered-collection semantics (value equality is order-independent); ADR-0045 (HAMT representation)"
    pin: "test/diff/clj_corpus/print_repr.txt (cljw-side order asserted)"
  - id: "AD-002"
    summary: "Opaque reference values (atom / volatile / fn / transient collections / etc.) print as `#<tag>` not clj's `#object[Class 0xADDR {...}]`"
    example: '(pr-str (atom 1)) => cljw "#<atom>" / clj "#object[clojure.lang.Atom 0x.. {:status :ready, :val 1}]". Verified 2026-06-16 (code reality): (pr-str (transient [1 2])) => cljw "#<transient_vector>" / clj "#object[clojure.lang.PersistentVector$TransientVector 0x.. \"..@..\"]"; (transient {..}) => "#<transient_map>"; (transient #{..}) => "#<transient_set>" ŌĆö same opaque #<tag> mechanism as atom/fn.'
    why: |-
      clj embeds a non-reproducible identity hash (0xADDR) and a JVM class
      FQCN; neither is reproducible nor meaningful in cljw (no JVM class,
      no stable identity address in the printed form). Exact parity is
      impossible and undesirable. The value is opaque either way.
    derives_from: "F-011 (behavioural equivalence on VALUE, not identity); ADR-0059 (no-JVM-Class)"
    pin: "none ŌĆö identity-hash dependent on the clj side (not value-comparable)"
  - id: "AD-003"
    summary: "`(class x)` / `(type x)` return the simple name, not the Java FQCN"
    example: '(class 5) => cljw Long / clj java.lang.Long'
    why: |-
      cljw has no JVM Class hierarchy (TypeDescriptor instead). The simple
      name is the cljw surface; the FQCN would be a JVM-specific fiction.
    derives_from: "ADR-0059 (no-JVM rule); no_jvm_specific_assumption.md"
    pin: "test/diff/clj_corpus/print_repr.txt + test/diff/clj_corpus/str_char.txt (class-name cases)"
  - id: "AD-004"
    summary: "`(float x)` yields an f64; cljw has no f32 representation"
    example: "(float 1/3) => cljw 0.3333333333333333 / clj 0.33333334 (f32)"
    why: |-
      F-005 fixes the numeric tower as a Zig-native single-double internal
      model. A distinct f32 would be a representation the tower does not
      carry; `float` widens to the f64 the value already is.
    derives_from: "F-005 (numeric tower: single internal double)"
    pin: "none ŌĆö value-dependent (the f64 is correct; only the f32-narrowing is absent)"
  - id: "AD-005"
    summary: "Subnormal double shortest-rendering differs by the last digit"
    example: "smallest positive double => cljw 5.0E-324 / clj 4.9E-324 (the SAME f64 bit pattern)"
    why: |-
      Both print the identical IEEE-754 f64; only the shortest-round-trip
      decimal rendering of a subnormal differs. The value is bit-identical.
    derives_from: "F-005 (IEEE-754 f64; rendering is a shortest-round-trip cosmetic)"
    pin: "none ŌĆö single subnormal edge, value bit-identical"
  - id: "AD-006"
    summary: "`Double/parseDouble` rejects some rare Java FloatingDecimal grammar (lower-case inf/nan, trailing d/f, hex-float)"
    example: '(Double/parseDouble "0x1p4") => cljw rejects / clj 16.0'
    why: |-
      The full Java FloatingDecimal grammar (hex-float, case-insensitive
      Infinity/NaN, trailing type suffixes) is a rare-edge surface not
      reimplemented; the common decimal grammar is at parity.
    derives_from: "F-011 (rare-edge; common-path parity holds) ŌĆö revisit if a real corpus hits it"
    pin: "none ŌĆö rare-edge (would be promoted to a bug if real code hits it)"
  - id: "AD-007"
    summary: "Error rendering shows cljw's catalog Kind, not the JVM exception class"
    example: '(quot 10 0) => cljw "[arithmetic_error] ..." / clj "ArithmeticException ..." (both reject)'
    why: |-
      cljw has no JVM exception-class hierarchy; its error catalog Kind
      (`[type_error]` / `[arithmetic_error]` / ...) is the cljw surface.
      Crucially BOTH runtimes REJECT the same inputs ŌĆö only the message
      format differs, never the accept/reject decision or the value.
      Extends to the STACK TRACE / error PRINT representation: cljw's trace
      is cljw-native (no JVM frames like `[clojure.lang.Compiler eval
      "Compiler.java" 7757]`), and an exception prints as the compact
      `#error{:message :data}` form rather than clj's `#error {:cause :via
      :trace [JVM frames]}`. Reproducing JVM frames would be fiction (they
      do not exist in cljw) AND clj's trace is precise-but-unreadable ŌĆö
      cljw is free to do BETTER, not merely different. User-confirmed
      (2026-06-14): the trace is intentionally NOT chased. (The narrower
      `(str ex)` one-liner readability ŌĆö distinct from the trace ŌĆö is tracked
      as the low-priority D-433, not this AD.)
    derives_from: "ADR-0059 (no-JVM); error_catalog_only.md (catalog is the message SSOT)"
    pin: "test/e2e/* error-rendering cases (cljw Kind asserted); behaviour = reject, verified"
  - id: "AD-008"
    summary: "Long arithmetic overflow past i64 auto-promotes to BigInt; clj's checked `+`/`*` THROW instead"
    example: '(* 9223372036854775807 2) => cljw 18446744073709551614N (BigInt) / clj THROW ArithmeticException "integer overflow"'
    why: |-
      F-005 chose silent auto-promotion as cljw's numeric-tower surface: a
      Long operation that overflows i64 promotes to BigInt rather than
      throwing. JVM Clojure's checked `+`/`*` throw `ArithmeticException`
      (only `+'`/`*'` promote). User-ratified 2026-06-02 ("A Ńü» Promote
      µÄ©Õź©Ńü®ŃüŖŃéŖ"): cljw keeps the friendlier no-overflow-exception behaviour
      and accepts the divergence from clj's throw. Note this is the
      overflow PAST i64 ŌĆö the separate early-promotion-at-2^47 bug (Long
      should stay Long to full i64) is D-165 (a real bug, campaign C7), NOT
      this accepted divergence. The `+'`/`*'` promoting variants are not yet
      implemented; F-005's "`+'` throws" clause is itself inverted vs clj and
      is tracked in D-211 for when they land.
    derives_from: "F-005 (numeric tower: auto-promote on overflow is the chosen cljw surface)"
    pin: "none ŌĆö clj diverges (throws) by design; cljw's promote result is pinned by the D-165/overflow cycle's e2e (campaign C7, next session)"
  - id: "AD-009"
    summary: "`hash` / `.hashCode` values are cljw-native and differ from clj/JVM (only intra-cljw consistency is guaranteed)"
    example: '(.hashCode "abc") => cljw -1277324294 / clj 96354 ; (hash "abc") => cljw -1277324294 / clj 74834163 ; (format "%h" "abc") => cljw "b3dd93fa" / clj "17862"'
    why: |-
      cljw has its own hash algorithm (no JVM `Object.hashCode` / Clojure
      `Murmur3` hasheq to reproduce). Hash values are explicitly impl-specific
      in Clojure (not stable across versions/runtimes), so the VALUE divergence
      is acceptable ŌĆö what matters is intra-cljw consistency (equal values hash
      equal, the HAMT key contract) which holds. `(.hashCode x)` is the
      Object-method fallback (D-207) delegating to cljw `hash` (`valueHash`),
      so it inherits the same cljw-native value. Integers happen to match clj
      (`(hash 42)` == 1871679806 both); strings/keywords/etc. differ. The
      `%h`/`%H` format conversion (D-216) renders that same hashCode in hex, so
      it inherits the cljw-native value too (the conversion works; only the
      value diverges).
    derives_from: "ADR-0059 (no-JVM: no Object.hashCode); F-011 (cljw-native internals; hash is impl-specific)"
    pin: "test/diff/clj_corpus/object_methods.txt ŌĆö `(= (.hashCode \"abc\") (hash \"abc\"))` ŌåÆ true (delegation locked) + `(integer? (.hashCode 42))` ŌåÆ true; test/e2e/phase14_format.sh ŌĆö `(format \"%h\" \"abc\")` produces lowercase hex (intra-cljw stable)"
  - id: "AD-010"
    summary: "a Namespace value prints as `#object[Namespace \"<name>\"]` (no JVM class FQN, no `0xADDR` identity hash)"
    example: '(pr-str *ns*) => cljw "#object[Namespace \"user\"]" / clj "#object[clojure.lang.Namespace 0x5ad10c1a \"user\"]" ; (str *ns*) => "user" (matches clj)'
    why: |-
      ADR-0083 makes the current namespace a first-class `.ns` Value. clj's
      pr form embeds the JVM class name (`clojure.lang.Namespace`) and an
      identity-hash address (`0x..`); cljw is no-JVM (ADR-0059) and has no
      identity hash to mirror (same rationale as AD-002 opaque-ref print), so
      it emits the simple `#object[Namespace "<name>"]`. `(str *ns*)` /
      `(name (ns-name *ns*))` are clj-faithful ("user"); only the readable
      `#object[ŌĆ”]` form (pr / prn / print / println) diverges.
    derives_from: "ADR-0059 (no-JVM: no class FQN); AD-002 (opaque-ref identity-hash not reproducible); ADR-0083"
    pin: "test/e2e/phase15_namespace.sh ŌĆö `(str *ns*)` => user + `(pr-str *ns*)` => #object[Namespace \"user\"] (the cljw form locked)"
  - id: "AD-011"
    summary: "`ns-interns`/`ns-publics` of `clojure.core` omit the `rt`-referred primitives (e.g. `reduce`, `+`) that clj interns directly"
    example: '(contains? (ns-publics (the-ns (quote clojure.core))) (quote reduce)) => cljw false / clj true ; (contains? (ns-interns (the-ns (quote clojure.core))) (quote map)) => true both (map is .clj-defined)'
    why: |-
      cljw splits the core surface (ADR-0033 / placement.yaml): kernel
      primitives are interned in the `rt` namespace and REFERRED into
      clojure.core, while clojure.core's own `mappings` hold only the
      `.clj`-defined vars (+ B2 private leaves). `ns-interns`/`ns-publics`
      faithfully report a namespace's INTERNED vars (its `mappings`), so a
      primitive that lives in `rt` and is merely referred (e.g. `reduce`)
      does not appear, whereas a `.clj`-redefined var (e.g. `map`) does. This
      diverges ONLY when introspecting clojure.core itself; for a user
      namespace `ns-interns`/`ns-publics` are exact (a user `(def x ŌĆ”)` shows
      up). `ns-map` (interns + refers) DOES include `reduce`, matching clj's
      total visible set. The driver (clojure.test, D-227) keys on a user test
      ns's interned `deftest` vars, which is unaffected.
    derives_from: "ADR-0033 (rt/clojure.core placement split: primitives in rt, referred); ADR-0083"
    pin: "test/e2e/phase15_namespace.sh ŌĆö `ad011-pub` locks `(ns-publics 'clojure.core)` omitting `reduce` (false) + `ad011-map` locks `(ns-map ŌĆ”)` including it (true), matching clj's total visibility"

  - id: "AD-012"
    summary: "A PersistentQueue prints as a readable `#queue (ŌĆ”)` (cljw) instead of clj's opaque `#object[clojure.lang.PersistentQueue 0xŌĆ” \"ŌĆ”@hash\"]`"
    example: '(pr-str (conj clojure.lang.PersistentQueue/EMPTY 1 2 3)) => cljw "#queue (1 2 3)" / clj "#object[clojure.lang.PersistentQueue 0xŌĆ” \"clojure.lang.PersistentQueue@ŌĆ”\"]"'
    why: |-
      clj has no `print-method` for PersistentQueue, so it prints the opaque
      `#object[ŌĆ”]` wrapper embedding a JVM identity hash that cljw cannot and
      should not reproduce (no-JVM, ADR-0059) ŌĆö the same non-reproducible-ref
      class as opaque refs. `(str q)` and `(pr-str q)` differ in clj only in
      that wrapper, both non-reproducible. cljw instead prints a READABLE,
      reader-round-trippable `#queue (e1 e2 ŌĆ”)` form and ships a matching
      `queue` data-reader (`*data-readers*`), so the printed form is honest
      EDN within cljw (clj's own form does not round-trip either). cljw's
      `str` and `pr-str` of a queue are intentionally identical. ADR-0087.
    derives_from: "ADR-0059 (no-JVM identity hash); ADR-0087 (PersistentQueue)"
    pin: "test/e2e/phase15_persistent_queue.sh ŌĆö locks `(pr-str (conj EMPTY 1 2 3))` => `#queue (1 2 3)`, empty => `#queue ()`, and the `#queue` reader round-trip"

  - id: "AD-013"
    summary: "cljw STM is retry-only ŌĆö it drops JVM's `barge` (a running transaction preempting a younger conflicting one). Result-equivalent: serializability holds; only contention fairness/throughput differ (unobservable in the committed state)."
    why: |-
      JVM's LockingTransaction resolves a write-write conflict by `barge`: an
      older transaction can kill (`barge`) a younger one to avoid livelock under
      heavy contention. cljw (ADR-0090 ┬¦3/┬¦4) is retry-only ŌĆö a conflicting
      transaction re-runs with a fresh read-point, bounded by a retry limit, and
      never barges a peer. The COMMITTED RESULT is identical (both produce a
      serializable history ŌĆö e.g. 4 threads each doing 100 `(dosync (alter c
      inc))` both end at exactly 400, no lost updates); the divergence is purely
      in contention scheduling (which transaction wins a race, and worst-case
      latency under pathological contention), which is NOT observable in the
      final committed state. So there is no result DIFF to chase ŌĆö this records
      the internal algorithm divergence ADR-0090 reserved, with a pin asserting
      the observable serializability contract the retry-only engine upholds.
    derives_from: "ADR-0090 ┬¦3 (MVCC retry-only LockingTransaction) + ┬¦4 (no-barge)"
    pin: "test/e2e/phase15_stm_dosync.sh ŌĆö `dosync_concurrent_serializable` locks 4 threads ├Ś 100 `(dosync (alter c inc))` => exactly 400 (the serializable, no-lost-update result the retry-only engine produces under contention)"

  - id: "AD-014"
    summary: "`(locking x ...)` on an immutable immediate (small int, nil, bool, keyword without a heap header) ERRORS in cljw, where JVM clj locks the boxed value's monitor and runs the body. Only heap objects (those with a HeapHeader) are lockable."
    why: |-
      cljw's heap-value monitor (ADR-0092) locks the object's own header word
      (ADR-0009 lock_state bits). An immutable immediate is NaN-boxed with NO
      HeapHeader (F-004) ŌĆö it has no identity word to lock and no shared mutable
      state to protect, so there is nothing a monitor could guard. JVM clj locks
      the boxed Long/Boolean/etc.'s intrinsic monitor, which "works" but is a
      foot-gun: `(locking 5 ...)` and `(locking 5 ...)` on two threads serialise
      only because `Long.valueOf` happens to cache small longs to the same box ŌĆö
      a large long gives distinct boxes and does NOT serialise. cljw rejects the
      whole class with a clear `locking requires an object with identity` error
      instead of silently providing fragile, value-dependent serialisation. Real
      code always locks a mutable object (atom / deftype instance / etc.), which
      is a heap object and locks fine; only the pathological literal-as-lock
      pattern hits this. derives_from F-004 (immediates have no header).
    derives_from: "F-004 (NaN-box: immediates carry no HeapHeader) + ADR-0092 (heap-value monitor)"
    pin: "test/e2e/phase16_locking.sh ŌĆö `locking_immediate_errors` locks `(locking 5 42)` => an object-identity error (not the body value JVM clj would return)"

  - id: "AD-015"
    summary: "An ESCAPED `with-local-vars` local var, deref'd AFTER its dynamic extent, returns `nil` in cljw, where JVM returns an unreproducible `#object[clojure.lang.Var$Unbound 0xŌĆ”]` opaque."
    example: '(var-get (with-local-vars [x 5] x)) => cljw nil / clj #object[Var$Unbound 0xŌĆ”]'
    why: |-
      `with-local-vars` mints anonymous dynamic Vars (ADR-0097); INSIDE the body
      they are thread-bound and `var-get`/`var-set`/`@` behave exactly as clj. The
      divergence is ONLY on the anti-pattern of letting the var itself escape the
      `with-local-vars` form and deref'ing it after the extent. cljw cannot mirror
      JVM's result for two independent reasons: (1) JVM's `Var$Unbound` sentinel
      prints with an embedded identity hash (`0xŌĆ”`) ŌĆö an opaque cljw structurally
      cannot/should not reproduce (the same class as every `#object[ŌĆ” 0xADDR ŌĆ”]`
      divergence); cljw has no Unbound sentinel, so an unbound dynamic var derefs to
      its root (nil here). (2) The anon Var is gpa-owned + GC-membrane-filtered
      (F-006), Env-owned and freed at session end (ADR-0097 Alt C, escape-safe ŌĆö NOT
      freed at the extent, so the deref is memory-safe rather than a UAF). Escaping a
      local var is meaningless after its extent in both runtimes; cljw returns a safe
      `nil` instead of an unreproducible opaque.
    derives_from: "F-006 (Vars gpa-owned + GC-membrane-filtered; no Unbound sentinel) + ADR-0097 (anon local Var lifetime) + the opaque-ref non-reproducibility class"
    pin: "test/e2e/phase15_with_local_vars.sh ŌĆö `escape-nil` asserts `(var-get (with-local-vars [x 5] x))` => nil (cljw's safe divergent value, not JVM's Var$Unbound opaque)"

  - id: "AD-016"
    summary: "`(biginteger x)` yields cljw's BigInt ŌĆö prints `5N` (clj `5`) and `(class (biginteger 5))` is `BigInt` (clj `java.math.BigInteger`). cljw has no separate BigInteger type."
    example: '(biginteger 5) => cljw 5N / clj 5 ; (class (biginteger 5)) => cljw BigInt / clj java.math.BigInteger'
    why: |-
      F-005 collapses clj's two arbitrary-precision integer types
      (clojure.lang.BigInt and java.math.BigInteger) into cljw's single
      `.big_int`. So `biginteger` is registered as the SAME coercion `bigint`
      uses (math.zig: `biginteger ŌēĪ bigint`, mirroring the in-tree `long ŌēĪ int`
      alias), producing a `.bigint`-origin BigInt. The divergence is purely
      cosmetic: VALUE is identical (`(= (biginteger 5) (bigint 5) 5)` => true
      in both), and clj's BigInteger is itself "write-only" in the numeric tower
      ŌĆö every arithmetic op on it returns BigInt, which cljw reproduces exactly
      and for free (`(+ (biginteger 5) 1)` => `6N` in both, `(class ŌĆ”)` => BigInt
      in both). The only divergent surfaces are the `N`-suffix print and the
      class NAME (BigInt vs BigInteger). Materializing a real BigInteger type to
      match would re-introduce the three-way BigInt/BigInteger/Long distinction
      F-005 deliberately abolished (and break the NATIVE_ENTRIES nameŌåöTag
      round-trip, D-204) ŌĆö so the honest finished form is the collapse + this
      recorded divergence. The class-NAME simple form (BigInt, not the FQCN) is
      additionally the AD-003 no-JVM-class surface.
    derives_from: "F-005 (numeric tower collapses BigInt/BigInteger into one `.big_int`) + AD-003 (simple class name, no JVM Class)"
    pin: "test/e2e/phase14_biginteger.sh ŌĆö biginteger_prints_N + biginteger_class_bigint lock cljw's `5N` print and BigInt class (the divergent values, not clj's 5 / java.math.BigInteger)"
  - id: "AD-017"
    summary: "A deftype mutable field's `^long` / primitive type hint is parsed-and-ignored; cljw does not enforce clj's 'must assign primitive to primitive mutable'."
    example: '(deftype C [^:unsynchronized-mutable ^long n] P (go [this] (set! n "hi") n)) (go (->C 0)) => cljw "hi" / clj compile error (primitive mismatch)'
    why: |-
      cljw's NaN-box value model (F-004) stores every field as a uniform 8-byte
      Value; there is no machine-`long` field storage to constrain. On the JVM a
      `^:unsynchronized-mutable ^long` field is a primitive `long` slot, and
      `set!` of a non-primitively-emittable value throws "Must assign primitive
      to primitive mutable" (Compiler.java emitAssignLocal). cljw has no such
      slot type, so the `^long`/`^"[B"` hint is advisory only ŌĆö consistent with
      cljw's general no-primitive-specialization stance (F-005 single-f64 tower;
      type hints stripped elsewhere). Only the `:unsynchronized-mutable` /
      `:volatile-mutable` keyword (assignability) is acted on.
    derives_from: "F-004 (NaN-box uniform 8-byte Value, no primitive field storage) + F-005 (no primitive specialization) + ADR-0104"
    pin: "test/e2e/phase14_deftype_mutable.sh ŌĆö long_hint_ignored_accepts_non_long (a `^long` mutable field accepts a String set)"
  - id: "AD-019"
    summary: "Java arrays are type-erased: element type hints (`^\"[B\"`, `^ints`, `^bytes`) are advisory only, and a typed-array constructor / `aset` does not coerce or type-check non-byte/short/char elements."
    example: '(let [^"[B" b (byte-array 1)] (aset b 0 65) (aget b 0)) => 65 (a non-byte stored into a byte-typed array, no error); (class (object-array 0)) => cljw "array" / clj "[Ljava.lang.Object;"'
    why: |-
      cljw arrays are one type-erased `[]Value` (ADR-0105): `byte-array`,
      `int-array`, `object-array`, `make-array` all produce the same `.array`
      shape. F-004 (uniform 8-byte Value) + F-005 (no primitive specialization)
      delete the JVM's runtime array component-type, which on the JVM drives
      boxing, `aset-X` coercion, and the `[Ljava.lang.Object;` class name. So a
      `^"[B"` hint parses (reader.zig normalises it to `{:tag ŌĆ”}`) but is
      ignored, and `aset` into a "typed" array never raises a type mismatch.
      VALUE fidelity is still preserved where it is observable and value-changing
      (F-011): per-constructor init defaults (0 / 0.0 / false / \space / nil) and
      byte/short/char modular wrap are applied at construction / `aset-byte` ŌĆö
      those are NOT divergences. The simple class name (`array`, not the JVM
      array-class encoding) is the AD-003 no-JVM-class surface applied to arrays.
    derives_from: "F-004 (uniform Value) + F-005 (no primitive specialization) + ADR-0059 / AD-003 (no JVM class) + ADR-0105"
    pin: "test/e2e/phase14_arrays.sh ŌĆö type_hint_advisory (a ^\"[B\" array accepts a non-byte) + array_class_simple (class is `array`)"
  - id: "AD-020"
    summary: "A java.util.Random (any host_instance) prints opaquely as `#<java.util.Random>` ŌĆö clj prints `#object[java.util.Random 0xŌĆ” ŌĆ”]` with a non-reproducible identity hash."
    example: '(pr-str (java.util.Random. 0)) => cljw "#<java.util.Random>" / clj "#object[java.util.Random 0x.. java.util.Random@..]"'
    why: |-
      A stateful host object (ADR-0106 host_instance) carries no identity hash
      cljw can or should mirror ŌĆö clj's `#object[ŌĆ” 0xADDR ŌĆ”]` embeds a JVM
      identity hash + class FQCN that are non-reproducible (same rationale as
      AD-002's opaque-ref print). cljw prints a stable opaque form from the
      surface descriptor's fqcn (`#<java.util.Random>`). The VALUE / behaviour
      (the seeded LCG sequence) is fully clj-faithful (F-011); only the
      non-reproducible print identity diverges. `(class (java.util.Random.))` =>
      `java.util.Random` (simple, not the JVM Class object) is the AD-003 surface.
    derives_from: "AD-002 (opaque-ref identity-hash print cljw cannot mirror) + ADR-0059 (no JVM Class) + ADR-0106"
    pin: "test/e2e/phase14_random.sh ŌĆö print_opaque (#<java.util.Random>) + class (java.util.Random)"
  - id: "AD-021"
    summary: "A namespace VALUE (e.g. `:ns` in `(meta #'x)`) prints opaquely as `#object[Namespace \"name\"]` ŌĆö simple class name, no identity hash ŌĆö vs clj's `#object[clojure.lang.Namespace 0xŌĆ” \"name\"]`."
    example: '(pr-str (:ns (meta #''map))) => cljw "#object[Namespace \"clojure.core\"]" / clj "#object[clojure.lang.Namespace 0x.. \"clojure.core\"]"'
    why: |-
      Stage 1.4 synthesize-on-read now projects `:ns` (a first-class cljw
      namespace value, ADR-0083) onto var metadata, where it never appeared
      before. cljw's opaque namespace print uses the simple class name
      `Namespace` (AD-003 no-JVM-Class) and omits the JVM identity hash
      (AD-002 ŌĆö non-reproducible). The VALUE is behaviourally clj-faithful:
      `(ns-name (:ns (meta #'x)))` => the ns symbol (F-011); only the `pr`
