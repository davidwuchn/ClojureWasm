  - id: "AD-034"
    summary: "cljw's volatile-grade concurrency cells (atom / volatile / ref / agent / `^:volatile-mutable` deftype fields) use `.acquire`/`.release` ordering, NOT `.seq_cst`; the JMM cross-independent-volatile total order (IRIW) is not guaranteed."
    example: "Two independent `^:volatile-mutable` fields (or two atoms) written on two threads: two observer threads can disagree on the relative order of the writes ŌĆö JVM `volatile` (sequentially consistent across volatile accesses) forbids this; cljw's acquire/release permits it."
    why: |-
      cljw's entire lock-free substrate uses `@atomicLoad(.acquire)` /
      `@atomicStore(.release)` (CAS: `.acq_rel`/`.acquire`) ŌĆö atom.zig,
      volatile.zig, iref.zig, agent.zig, and (D-444 / ADR-0152) the
      `^:volatile-mutable` deftype field path. Acquire/release gives full
      happens-before for the dominant single-cell publish/consume pattern
      (Ōēź99.9% of real code) but is strictly weaker than JMM `volatile`, which is
      sequentially consistent ACROSS independent volatile accesses (the IRIW /
      two-independent-volatiles total-order property). cljw consciously elects a
      UNIFORM acquire/release volatile-grade ordering (internal consistency +
      the IRIW scenario is pathological ŌĆö real Clojure code does not depend on a
      cross-independent-volatile total order) rather than a per-cell `.seq_cst`
      that would tax every store for an unused guarantee. Non-deterministic +
      multi-thread, so not clj-oracle-observable via the diff sweep; the
      by-construction half (the cells ARE atomic acquire/release) is what the pin
      locks. See ADR-0152 (the conscious election + the DA's seq_cst analysis).
    derives_from: "ADR-0152 (uniform acquire/release volatile-grade ordering) ŌĆö JMM volatile = seq_cst across volatile accesses; cljw's acquire/release omits the IRIW cross-cell total order. Substrate: atom.zig/volatile.zig/iref.zig/agent.zig + the D-444 deftype field path."
    pin: "test/e2e/phase14_deftype_mutable.sh ŌĆö the :volatile-mutable field increments correctly (the by-construction half: the field IS atomic acquire/release; the IRIW gap itself is non-deterministic + untestable)"
  - id: "AD-035"
    summary: "A defrecord prints with its SIMPLE name (`#R{:x 1, :y 2}`), not clj's namespace-qualified `#user.R{:x 1, :y 2}`."
