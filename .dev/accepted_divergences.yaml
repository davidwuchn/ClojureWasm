      shape across both surfaces (ADR-0140 Alt 2). This is a refinement of the
      already-accepted AD-007 posture (cljw's whole `#error{ŌĆ”}` trace
      representation intentionally diverges from clj's JVM-frame `:trace`). A
      consumer that positionally destructures `(let [[cls m f l] frame] ŌĆ”)` the
      clj-documented way gets the map (not 4 slots) ŌĆö the recorded divergence.
