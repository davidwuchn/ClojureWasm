  - name: clojure.set/map-invert
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires_features:
      - clojure.core/reduce
      - clojure.core/assoc
    requires_debts:
      - D-074
    provisional_markers:
      - src/lang/clj/clojure/set.clj (map-invert — persistent reduce)
    notes: |
      JVM uses `transient!` + `reduce-kv` + `persistent!` for O(n)
      cost. cw v1 has no transient surface yet (D-074, Phase 8
      target), so the body folds with persistent `assoc` — same
      complexity asymptotically, just more allocator churn. When
      D-074 lands the body switches to the transient form and this
      entry flips to `landed`.

  - name: clojure.set/project
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires_features:
      - clojure.core/set
      - clojure.core/map
      - clojure.core/select-keys
    requires_debts:
      - D-075
    provisional_markers:
      - src/lang/clj/clojure/set.clj (project — drops with-meta wrap)
    notes: |
      JVM wraps the result in `(with-meta result (meta xrel))` to
      preserve metadata across the projection. cw v1 has no value-
      metadata system (D-075, Phase 7+ target), so the wrap is
      omitted. Observable divergence: callers carrying metadata
      on `xrel` lose it. When D-075 lands the wrap is added and
      this entry flips to `landed`.

  - name: clojure.set/rename
    kind: var
