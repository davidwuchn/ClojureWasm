# feature_deps.yaml — Feature dependency SSOT.
#
# Catalogues vars / special forms / reader features / runtime-layer
# capabilities and the dependencies that must land before each entry
# is callable in its finished form. Read by:
#
#   - scripts/check_provisional_sync.sh — enforces marker / yaml /
#     debt.md three-way sync on every source-bearing commit.
#   - audit_scaffolding skill — counts PROVISIONAL markers per entry,
#     flags entries that have been provisional for >14 days.
#   - Cycle planning — topological sort of `requires_features:` graph
#     to verify a cycle's prerequisites are in place before it opens.
#
# Sister SSOTs:
#   - compat_tiers.yaml — Tier A/B/C/D classification per Java class /
#     special form (host-surface granularity).
#   - placement.yaml — Pattern A vs Pattern B classification per
#     Clojure-ns var (var-level placement).
#   - feature_deps.yaml (this file) — dependencies between any two
#     features (cross-cutting graph; the edge of the other two yamls).
#
# Schema per entry:
#   - name        : string, the canonical identifier (e.g.
#                   "clojure.core/select-keys" /
#                   "runtime/eval/in_ns_auto_refer").
#   - kind        : enum, one of:
#                     var               — a callable / def'd value
#                     special_form      — analyzer-recognised form
#                     reader_feature    — tokenizer / reader capability
#                     runtime_layer     — host-side runtime affordance
#   - defined_in  : relative path of the file that owns the
#                   implementation (or the headline file when
#                   multi-file).
#   - status      : enum, one of:
#                     landed       — finished form (no PROVISIONAL
#                                    markers exist; no close-out
#                                    pending).
#                     provisional  — current implementation is
#                                    intermediate; PROVISIONAL markers
#                                    point here and a close-out plan
#                                    is in .dev/debt.md.
#                     planned      — not yet implemented; entry exists
#                                    to record the upcoming dependency.
#   - requires_features : list of feature_deps entry `name:` references
#                          that must land before this entry's finished
#                          form is reachable (= upstream features in
#                          the same yaml).
#   - requires_debts    : list of `D-NNN` debt row references that
#                          must close before this entry's finished
#                          form is reachable (= upstream tasks not
#                          yet represented as feature entries).
#                          requires_features + requires_debts split
#                          (Wave-15-follow-up, F9) so future
#                          topological sort can resolve a closed
#                          graph without mixing node kinds.
#   - provisional_markers (optional, only when status: provisional):
#                          list of source-location labels carrying a
#                          `PROVISIONAL:` comment that refers to this
#                          entry. Format is free-text prose (typically
#                          `<file> (<context label>)`) because line
#                          numbers shift on edit; an `anchor:` field
#                          may be added later if file:line linking is
#                          needed. audit_scaffolding cross-checks
#                          via grep count, not line lookup.
#   - notes (optional): one-paragraph free-text explanation of the
#                   provisional shape and what landing looks like.
#                   Used by audit reports; not read by hooks.
#
# Populating discipline: Cycle 1 lands the schema header + a small
# seed of entries reflecting the active provisional behaviour. Each
# new cycle that introduces or discharges a PROVISIONAL marker MUST
# update this file in the same commit (enforced by
# scripts/check_provisional_sync.sh). The full var / feature
# population is incremental (per cycle), not a single big sweep.

entries:

  - name: runtime/eval/in_ns_auto_refer
    kind: runtime_layer
    defined_in: src/eval/backend/tree_walk.zig
    status: landed
    requires_features: []
    requires_debts: []
    notes: |
      Retired at Phase 7 entry T3 (ADR-0035 D9 second
      amendment, 2026-05-26). The "convenience auto-refer of
      rt + clojure.core for direct user `(in-ns 'foo)`" semantic
      that D9 first amendment (sub-cycle d) classified as
      load-bearing has been removed: `(in-ns 'foo)` is now a
      naked ns switch (both `evalInNs` and `op_in_ns` no longer
      fire `referAll`). The refer mechanism is now exclusively
      driven by `(ns foo (:refer-clojure))` (the analyzer
      special form). cw v1 `(:refer-clojure)` widens to include
      both `clojure.core` AND `rt` — a cw-specific divergence
      from JVM (which has no `rt` ns). The `runtime/bootstrap/
      refer_table` entry remains active for boot-time fan-out
      into `user/` (the only ns that has no `.clj` head and
      thus cannot self-install via `(ns ...)`). Status stays
      `landed` because the new semantic IS the finished form;
      the entry remains for historical SSOT linkage.

  - name: runtime/bootstrap/refer_table
    kind: runtime_layer
    defined_in: src/lang/bootstrap.zig
    status: landed
    requires_features: []
    requires_debts: []
    notes: |
      Landed at Phase 6.16.b-4 sub-cycle d (ADR-0035 D9
      discharge). Bootstrap retains 3 boot-time `referAll` sites
      with non-PROVISIONAL rationale:
        1. `bootstrap.zig::loadCore` end-of-loop refers
           clojure.core into `user/` (the REPL-prompt ns is not a
           `.clj` file, so the `(ns ...)` macro cannot install
           the refer for it). The fan-out to clojure.set /
           clojure.string / clojure.walk is removed because each
           file now uses `(ns foo (:refer-clojure))`.
        2. `primitive.zig::registerAll` refers rt → user so
           primitives (`+`, `=`, `count`, ...) resolve unqualified
           at the REPL prompt — `(ns ...)` does NOT auto-refer rt.
        3. `macro_transforms.zig::registerInto` refers rt → user
           for macro Vars by the same rationale.

  - name: runtime/eval/bare_in_ns_decl
    kind: runtime_layer
    defined_in: src/lang/clj/clojure/core.clj
    status: landed
    requires_features: []
    requires_debts: []
    notes: |
      Landed at Phase 6.16.b-4 sub-cycle d (ADR-0035 D9
      discharge). All 4 bootstrap `.clj` heads (core / set /
      string / walk) now use `(ns foo (:refer-clojure))` —
      the analyzer special form per ADR-0035 D1 — instead of
      bare `(in-ns 'foo)`. Discharge complete.

  - name: special_form/ns_macro
    kind: special_form
    defined_in: src/eval/analyzer/special_forms.zig
    status: landed
    requires_features: []
    requires_debts: []
    notes: |
      Landed at Phase 6.16.b-4 sub-cycle c.7 as an analyzer special
      form (NOT a macro per Devil's-advocate Alt 2 of ADR-0035 D1 —
      analyzer special form gives precise location errors + cannot
      be shadowed by user `(def ns ...)`). Sub-cycle c.7 ships bare
      `(ns foo)` + `(:refer-clojure)` (no filter); the four
      bootstrap `.clj` heads use this shape from sub-cycle d.
      `:require` / `:exclude` / `:only` / `:use` directives inside
      ns body raise transient `feature_not_supported` (deferred
      within ADR-0035 follow-up scope; users compose with separate
      `(require ...)` calls today).

      At Phase 7 entry T3 (ADR-0035 D9 second amendment,
      2026-05-26) the cw v1 `(:refer-clojure)` semantic was
      widened to refer BOTH `clojure.core` AND `rt` (cw-specific
      divergence from JVM which has no `rt` ns). VM compile arm
      `compileNs` now emits the new opcode `op_ns_with_refer_clojure`
      when `refer_clojure = true` (sibling to bare `op_in_ns`);
      tree_walk `evalNs` fires both refers in the same condition.
      The widening replaces the prior `evalInNs` / `op_in_ns`
      auto-refer convenience (now removed) as the single source
      of refer installation for any non-bootstrap-fan-out ns.

  - name: clojure.core/select-keys
    kind: var
    defined_in: src/lang/clj/clojure/core.clj
    status: landed
    requires_features:
      - clojure.core/reduce
      - clojure.core/contains?
      - clojure.core/assoc
      - clojure.core/get
      - reader_feature/map_literal_value
    requires_debts: []

  - name: clojure.core/merge
    kind: var
    defined_in: src/lang/clj/clojure/core.clj
    status: landed
    requires_features:
      - clojure.core/reduce
      - clojure.core/assoc
      - clojure.core/keys
      - clojure.core/get
    requires_debts: []
    notes: |
      Variadic via `[& maps]` with internal arity discrimination
      (`(if (= 0 (count maps)) ...)`). The shape IS the finished
      form for "fold over N maps" — multi-arity dispatch would not
      improve clarity nor behaviour. Spike 2.3 (2026-05-26)
      re-classified from `provisional` to `landed`: the original
      framework-1.2 seed entry mis-marked this as provisional
      because the body avoids multi-arity `fn*` (D-070), but
      "avoids D-070 via finished-form-compatible alternative" is
      precisely NOT what `provisional` means.

  - name: clojure.core/set
    kind: var
    defined_in: src/lang/clj/clojure/core.clj
    status: landed
    requires_features:
      - clojure.core/reduce
      - clojure.core/conj
      - reader_feature/set_literal
    requires_debts: []

  - name: clojure.set/join
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires_features:
      - clojure.core/intersection
      - clojure.core/set
      - clojure.core/keys
      - clojure.core/first
      - clojure.core/select-keys
      - clojure.core/merge
      - clojure.core/index
      - clojure.set/rename-keys
      - reader_feature/set_literal
      - reader_feature/map_literal_value
      - special_form/fn_multi_arity
    requires_debts:
      - D-070
    provisional_markers:
      - src/lang/clj/clojure/set.clj (join — 2-arity only)
    notes: |
      Ships 2-arity `[xrel yrel]` natural-join only. The 3-arity
      `[xrel yrel km]` key-map form requires multi-arity `fn*`
      dispatch (D-070). When D-070 closes, the 3-arity body lands
      and this entry's status flips to `landed`.

  - name: clojure.set/map-invert
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires_features:
      - clojure.core/reduce
      - clojure.core/assoc
    requires_debts:
      - D-074
    provisional_markers:
      - src/lang/clj/clojure/set.clj (map-invert — persistent reduce)
    notes: |
      JVM uses `transient!` + `reduce-kv` + `persistent!` for O(n)
      cost. cw v1 has no transient surface yet (D-074, Phase 8
      target), so the body folds with persistent `assoc` — same
      complexity asymptotically, just more allocator churn. When
      D-074 lands the body switches to the transient form and this
      entry flips to `landed`.

  - name: clojure.set/project
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires_features:
      - clojure.core/set
      - clojure.core/map
      - clojure.core/select-keys
    requires_debts:
      - D-075
    provisional_markers:
      - src/lang/clj/clojure/set.clj (project — drops with-meta wrap)
    notes: |
      JVM wraps the result in `(with-meta result (meta xrel))` to
      preserve metadata across the projection. cw v1 has no value-
      metadata system (D-075, Phase 7+ target), so the wrap is
      omitted. Observable divergence: callers carrying metadata
      on `xrel` lose it. When D-075 lands the wrap is added and
      this entry flips to `landed`.

  - name: clojure.set/rename
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires_features:
      - clojure.core/set
      - clojure.core/map
      - clojure.set/rename-keys
    requires_debts:
      - D-075
    provisional_markers:
      - src/lang/clj/clojure/set.clj (rename — drops with-meta wrap)
    notes: |
      Same as `clojure.set/project`: drops `with-meta` because
      D-075 (metadata system) is pending. Mirror divergence.

  - name: clojure.set/rename-keys
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires_features:
      - clojure.core/reduce
      - clojure.core/contains?
      - clojure.core/assoc
      - clojure.core/dissoc
      - clojure.core/get
      - clojure.core/nth
    requires_debts:
      - D-076
    provisional_markers:
      - src/lang/clj/clojure/set.clj (rename-keys — nth destructure)
    notes: |
      JVM uses vector destructure inside `let`: `(fn [m [old new]]
      ...)`. cw v1 `let*` does not yet support sequential
      destructuring (D-076, Phase 7+ target), so the body uses
      `(nth kv 0)` / `(nth kv 1)` against the map-entry vector.
      When D-076 lands the body switches to destructure form and
      this entry flips to `landed`.

  - name: special_form/fn_multi_arity
    kind: special_form
    defined_in: src/eval/analyzer/special_forms.zig
    status: planned
    requires_features: []
    requires_debts:
      - D-070
    notes: |
      `(fn* ([x] body1) ([x y] body2))` form + arity-dispatch table.
      Currently cw v1 `fn*` accepts only a single argv vector. D-070
      tracks the analyzer extension (~150 LOC).

  - name: reader_feature/set_literal
    kind: reader_feature
    defined_in: src/eval/reader.zig
    status: landed
    requires_features:
      - reader_feature/tokenizer_dispatch_hash
    requires_debts: []

  - name: reader_feature/map_literal_value
    kind: reader_feature
    defined_in: src/eval/analyzer/analyzer.zig
    status: landed
    requires_features:
      - reader_feature/tokenizer_lbrace
    requires_debts: []

  - name: reader_feature/tokenizer_dispatch_hash
    kind: reader_feature
    defined_in: src/eval/tokenizer.zig
    status: landed
    requires_features: []
    requires_debts: []

  - name: reader_feature/tokenizer_lbrace
    kind: reader_feature
    defined_in: src/eval/tokenizer.zig
    status: landed
    requires_features: []
    requires_debts: []

  - name: runtime/eval/catch_class_table
    kind: runtime_layer
    defined_in: src/eval/backend/tree_walk.zig
    status: provisional
    requires_features: []
    requires_debts:
      - D-077
    provisional_markers:
      - src/eval/backend/tree_walk.zig (catchMatches — ExceptionInfo-only)
      - src/eval/backend/vm.zig (matchExceptionClass — ExceptionInfo-only)
    notes: |
      `(try ... (catch ClassName e ...))` accepts arbitrary class
      symbols at analyse time so user code stays readable, but at
      eval time both backends only match `ExceptionInfo` (= the
      `.ex_info` tag). Any other class name silently fails to
      match — the catch clause is dead code from the runtime's
      perspective. JVM Clojure dispatches via `instance?` against
      a real class hierarchy. cw v1 will land a class-name → tag
      table when host class wiring (Phase 6 entry, D-048 + the
      runtime/java/lang/Throwable Class skeleton) stabilises;
      until then catchMatches is a single-class predicate. Two
      mirrored sites (tree_walk + VM) discharge together.

  - name: runtime/vm/dispatch_family
    kind: runtime_layer
    defined_in: src/eval/backend/vm/compiler.zig
    status: provisional
    requires_features: []
    requires_debts:
      - D-073
    provisional_markers:
      - src/eval/backend/vm/compiler.zig (compileNode deftype_node arm — VM-DEFER pending row 7.6)
      - src/eval/backend/vm/compiler.zig (compileNode ctor_call_node arm — VM-DEFER pending row 7.6)
      - src/eval/backend/vm/compiler.zig (compileNode field_access_node arm — VM-DEFER pending row 7.6)
    notes: |
      VM compiler arms for the deftype-family Nodes (`deftype_node`
      / `ctor_call_node` / `field_access_node`) ship as
      `return error.NotImplemented` with VM-DEFER markers per
      ADR-0036. Tree_walk handles these Nodes today; VM mode raises
      `error.NotImplemented` (transient stub, not silent fake).
      The bytecode shape for the entire dispatch family (deftype +
      ctor + field-access + future method-call) is owned by
      ROADMAP §9.9 row 7.6 (MethodCallNode landing). Row 7.6 will
      decide the operand encoding (e.g., `op_ctor_call <type_idx>
      <arg_count>` + `op_field_access <field_idx>` vs a generic
      `op_invoke_protocol_method` sequence over the Phase 7.1
      `CallSite` cache) and discharge all 3 markers in the same
      commit. Landing throwaway VM lowering now would be the
      Smallest-diff bias smell since the chosen shape is not yet
      finished-form.

  - name: runtime/vm/ns_filter
    kind: runtime_layer
    defined_in: src/eval/backend/vm/compiler.zig
    status: landed
    requires_features: []
    requires_debts: []
    provisional_markers: []
    notes: |
      Discharged at Phase 7 entry T3 (ADR-0035 D9 second amendment,
      2026-05-26). The `_ = n.refer_clojure;` silent field-drop in
      `compileNs` has been removed: T3 introduced opcode
      `op_ns_with_refer_clojure` which is emitted when
      `refer_clojure = true`, and bare `op_in_ns` is emitted when
      false — `n.refer_clojure` is now consumed by the lowering.
      The future `:exclude` / `:only` filter encoding remains a
      separate concern (analyzer doesn't yet produce `NsNode`
      filter fields per `special_forms.zig:341-343`
      `feature_not_supported` raise); when those fields land, a
      new entry will track that VM gap independently — keeping
      this entry as the "refer_clojure drop" closure history
      (entry stays in the file as SSOT linkage for D-073 sub-site
      (e) discharge).

  - name: runtime/vm/require_libspec
    kind: runtime_layer
    defined_in: src/eval/backend/vm/compiler.zig
    status: provisional
    requires_features: []
    requires_debts:
      - D-073
    provisional_markers:
      - src/eval/backend/vm/compiler.zig (compileRequire libspec branch — VM-DEFER)
    notes: |
      `vm/compiler.zig::compileRequire` raises
      `error.NotImplemented` when `n.alias != null or
      n.refers.len > 0`. The bare-symbol shape works via the
      single-operand `op_require`. Libspec lowering needs a new
      opcode (e.g. `op_require_with_libspec` with operand =
      constants index of a heap Vector<String> packaging
      `[ns_name, alias_or_empty, refer_name, ...]`) — see survey
      `private/notes/phase7-T1-survey.md` §3.1 options A/B/C.
      ADR-0036 Devil's-advocate (Alt 2 refined) carved this impl
      out of T1 because the opcode encoding choice is a depth-3
      decision deserving its own Devil's-advocate fork — T1
      lands as pure discipline + markers + diff cases for
      fully-working arms only. The follow-up cycle that picks the
      encoding becomes ADR-0036's first real-feature exercise:
      one new opcode + 2 diff cases (bare + libspec) + discharge
      this entry. Discharging this entry also unlocks ADR-0035 D2
      second amendment (`require` runtime fn migration possible
      once VM parity for libspec is real, gated on T2 Symbol
      Value).

