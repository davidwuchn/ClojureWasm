    notes: |
      Row 14.5 (D-014b) landed the keyword catch surface on TreeWalk:
      `(catch :type-kw e ...)` matches when the thrown ex-info's data
      map carries `:type` equal to the catch keyword. The VM compiler
      arm raises `error.NotImplemented` with a VM-DEFER marker per
