# feature_deps.yaml — Feature dependency SSOT.
#
# Catalogues vars / special forms / reader features / runtime-layer
# capabilities and the dependencies that must land before each entry
# is callable in its finished form. Read by:
#
#   - scripts/check_provisional_sync.sh — enforces marker / yaml /
#     debt.md three-way sync on every source-bearing commit.
#   - audit_scaffolding skill — counts PROVISIONAL markers per entry,
#     flags entries that have been provisional for >14 days.
#   - Cycle planning — topological sort of `requires_features:` graph
#     to verify a cycle's prerequisites are in place before it opens.
#
# Sister SSOTs:
#   - compat_tiers.yaml — Tier A/B/C/D classification per Java class /
#     special form (host-surface granularity).
#   - placement.yaml — Pattern A vs Pattern B classification per
#     Clojure-ns var (var-level placement).
#   - feature_deps.yaml (this file) — dependencies between any two
#     features (cross-cutting graph; the edge of the other two yamls).
#
# Schema per entry:
#   - name        : string, the canonical identifier (e.g.
#                   "clojure.core/select-keys" /
#                   "runtime/eval/in_ns_auto_refer").
#   - kind        : enum, one of:
#                     var               — a callable / def'd value
#                     special_form      — analyzer-recognised form
#                     reader_feature    — tokenizer / reader capability
#                     runtime_layer     — host-side runtime affordance
#   - defined_in  : relative path of the file that owns the
#                   implementation (or the headline file when
#                   multi-file).
#   - status      : enum, one of:
#                     landed       — finished form (no PROVISIONAL
#                                    markers exist; no close-out
#                                    pending).
#                     provisional  — current implementation is
#                                    intermediate; PROVISIONAL markers
#                                    point here and a close-out plan
#                                    is in .dev/debt.md.
#                     planned      — not yet implemented; entry exists
#                                    to record the upcoming dependency.
#   - requires_features : list of feature_deps entry `name:` references
#                          that must land before this entry's finished
#                          form is reachable (= upstream features in
#                          the same yaml).
#   - requires_debts    : list of `D-NNN` debt row references that
#                          must close before this entry's finished
#                          form is reachable (= upstream tasks not
#                          yet represented as feature entries).
#                          requires_features + requires_debts split
#                          (Wave-15-follow-up, F9) so future
#                          topological sort can resolve a closed
#                          graph without mixing node kinds.
#   - provisional_markers (optional, only when status: provisional):
#                          list of source-location labels carrying a
#                          `PROVISIONAL:` comment that refers to this
#                          entry. Format is free-text prose (typically
#                          `<file> (<context label>)`) because line
#                          numbers shift on edit; an `anchor:` field
#                          may be added later if file:line linking is
#                          needed. audit_scaffolding cross-checks
#                          via grep count, not line lookup.
#   - notes (optional): one-paragraph free-text explanation of the
#                   provisional shape and what landing looks like.
#                   Used by audit reports; not read by hooks.
#
# Populating discipline: Cycle 1 lands the schema header + a small
# seed of entries reflecting the active provisional behaviour. Each
# new cycle that introduces or discharges a PROVISIONAL marker MUST
# update this file in the same commit (enforced by
# scripts/check_provisional_sync.sh). The full var / feature
# population is incremental (per cycle), not a single big sweep.

entries:

  - name: runtime/eval/in_ns_auto_refer
    kind: runtime_layer
    defined_in: src/eval/backend/tree_walk.zig
    status: landed
    requires_features: []
    requires_debts: []
    notes: |
      Retired at Phase 7 entry T3 (ADR-0035 D9 second
      amendment, 2026-05-26). The "convenience auto-refer of
      rt + clojure.core for direct user `(in-ns 'foo)`" semantic
      that D9 first amendment (sub-cycle d) classified as
      load-bearing has been removed: `(in-ns 'foo)` is now a
      naked ns switch (both `evalInNs` and `op_in_ns` no longer
      fire `referAll`). The refer mechanism is now exclusively
      driven by `(ns foo (:refer-clojure))` (the analyzer
      special form). cw v1 `(:refer-clojure)` widens to include
      both `clojure.core` AND `rt` — a cw-specific divergence
      from JVM (which has no `rt` ns). The `runtime/bootstrap/
      refer_table` entry remains active for boot-time fan-out
      into `user/` (the only ns that has no `.clj` head and
      thus cannot self-install via `(ns ...)`). Status stays
      `landed` because the new semantic IS the finished form;
      the entry remains for historical SSOT linkage.

  - name: runtime/bootstrap/refer_table
    kind: runtime_layer
    defined_in: src/lang/bootstrap.zig
    status: landed
    requires_features: []
    requires_debts: []
    notes: |
      Landed at Phase 6.16.b-4 sub-cycle d (ADR-0035 D9
      discharge). Bootstrap retains 3 boot-time `referAll` sites
      with non-PROVISIONAL rationale:
        1. `bootstrap.zig::loadCore` end-of-loop refers
           clojure.core into `user/` (the REPL-prompt ns is not a
           `.clj` file, so the `(ns ...)` macro cannot install
           the refer for it). The fan-out to clojure.set /
           clojure.string / clojure.walk is removed because each
           file now uses `(ns foo (:refer-clojure))`.
        2. `primitive.zig::registerAll` refers rt → user so
           primitives (`+`, `=`, `count`, ...) resolve unqualified
           at the REPL prompt — `(ns ...)` does NOT auto-refer rt.
        3. `macro_transforms.zig::registerInto` refers rt → user
           for macro Vars by the same rationale.

