      Cycle 3 added analyzer-time `catch_class_unknown` raise so
      `(catch FooBarException e ...)` is a loud name_error rather than
      silently dead code (= silent-default-shift smell eliminated at
      the source per ADR-0019 / `provisional_marker.md`
