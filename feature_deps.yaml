# feature_deps.yaml — Feature dependency SSOT.
#
# Catalogues vars / special forms / reader features / runtime-layer
# capabilities and the dependencies that must land before each entry
# is callable in its finished form. Read by:
#
#   - scripts/check_provisional_sync.sh — enforces marker / yaml /
#     debt.md three-way sync on every source-bearing commit.
#   - audit_scaffolding skill — counts PROVISIONAL markers per entry,
#     flags entries that have been provisional for >14 days.
#   - Cycle planning — topological sort of `requires:` graph to verify
#     a cycle's prerequisites are in place before it opens.
#
# Sister SSOTs:
#   - compat_tiers.yaml — Tier A/B/C/D classification per Java class /
#     special form (host-surface granularity).
#   - placement.yaml — Pattern A vs Pattern B classification per
#     Clojure-ns var (var-level placement).
#   - feature_deps.yaml (this file) — dependencies between any two
#     features (cross-cutting graph; the edge of the other two yamls).
#
# Schema per entry:
#   - name        : string, the canonical identifier (e.g.
#                   "clojure.core/select-keys" /
#                   "runtime/eval/in_ns_auto_refer").
#   - kind        : enum, one of:
#                     var               — a callable / def'd value
#                     special_form      — analyzer-recognised form
#                     reader_feature    — tokenizer / reader capability
#                     runtime_layer     — host-side runtime affordance
#   - defined_in  : relative path of the file that owns the
#                   implementation (or the headline file when
#                   multi-file).
#   - status      : enum, one of:
#                     landed       — finished form (no PROVISIONAL
#                                    markers exist; no close-out
#                                    pending).
#                     provisional  — current implementation is
#                                    intermediate; PROVISIONAL markers
#                                    point here and a close-out plan
#                                    is in .dev/debt.md.
#                     planned      — not yet implemented; entry exists
#                                    to record the upcoming dependency.
#   - requires    : list of `name:` references that must land before
#                   this entry's finished form is reachable. Each
#                   reference can be a feature_deps entry name or
#                   a debt row reference `D-NNN`.
#   - provisional_markers (optional, only when status: provisional):
#                   list of `file:line` locations carrying a
#                   `PROVISIONAL:` comment that refers to this entry.
#                   audit_scaffolding cross-checks against
#                   `rg 'feature_deps.yaml#<name>' src/`.
#   - notes (optional): one-paragraph free-text explanation of the
#                   provisional shape and what landing looks like.
#                   Used by audit reports; not read by hooks.
#
# Populating discipline: Cycle 1 lands the schema header + a small
# seed of entries reflecting the active provisional behaviour. Each
# new cycle that introduces or discharges a PROVISIONAL marker MUST
# update this file in the same commit (enforced by
# scripts/check_provisional_sync.sh). The full var / feature
# population is incremental (per cycle), not a single big sweep.

entries:

  - name: runtime/eval/in_ns_auto_refer
    kind: runtime_layer
    defined_in: src/eval/backend/tree_walk.zig
    status: provisional
    requires:
      - special_form/ns_macro
      - D-063
      - D-071
    provisional_markers:
      - src/eval/backend/tree_walk.zig (evalInNs — rt/ auto-refer)
      - src/eval/backend/tree_walk.zig (evalInNs — clojure.core auto-refer)
      - src/eval/backend/vm.zig (op_in_ns — rt/ auto-refer)
      - src/eval/backend/vm.zig (op_in_ns — clojure.core auto-refer)
    notes: |
      evalInNs (tree_walk + VM) auto-refers `rt/` and (when present)
      `clojure.core` into the entered namespace. This is the
      mechanical substitute for the JVM `(ns ...)` macro that
      explicitly calls `(clojure.core/refer 'clojure.core)`. Finished
      form lands at ADR-0035 (Phase 6.16.b-4) when `(ns ...)` is a
      real macro; evalInNs then reverts to bare ns-switch.

  - name: runtime/bootstrap/refer_table
    kind: runtime_layer
    defined_in: src/lang/bootstrap.zig
    status: provisional
    requires:
      - special_form/ns_macro
      - D-063
      - D-071
    provisional_markers:
      - src/lang/bootstrap.zig (loadCore — end-of-loop refer table)
      - src/lang/primitive.zig (registerAll — rt → user refer)
      - src/lang/macro_transforms.zig (registerInto — rt → user macro refer)
    notes: |
      Three hardcoded `referAll(rt_ns, target)` sites set up the
      initial namespace visibility graph at boot:
        1. `bootstrap.zig::loadCore` end-of-loop fans clojure.core
           into user / clojure.set / clojure.string / clojure.walk.
        2. `primitive.zig::registerAll` fans rt/ into user/.
        3. `macro_transforms.zig::registerInto` fans rt/'s macro
           vars into user/.
      All three discharge when ADR-0035 ships the `(ns ...)`
      macro + explicit `:refer-clojure` directive per file.

      Generalised from spike 2.1's single-site framing after
      review finding F15 (2026-05-26): the same provisional
      pattern (= hardcoded refer pending macro-emitted directive)
      surfaces 3 places, not 1.

  - name: runtime/eval/bare_in_ns_decl
    kind: runtime_layer
    defined_in: src/lang/clj/clojure/core.clj
    status: provisional
    requires:
      - special_form/ns_macro
      - D-063
      - D-071
    provisional_markers:
      - src/lang/clj/clojure/core.clj (head — bare in-ns declaration)
      - src/lang/clj/clojure/set.clj (head — bare in-ns declaration)
      - src/lang/clj/clojure/string.clj (head — bare in-ns declaration)
      - src/lang/clj/clojure/walk.clj (head — bare in-ns declaration)
    notes: |
      Each multi-file bootstrap source opens with a bare
      `(in-ns 'foo.bar)` special-form call. The finished form is
      `(ns foo.bar (:refer-clojure))` macro that handles in-ns
      + refer atomically + carries metadata for the namespace.
      One shared provisional pattern across 4 sites; lands at
      ADR-0035 / Phase 6.16.b-4 when `(ns ...)` arrives.

      Generalised from the original `clojure.core/ns_declaration`
      entry after review finding F14 (2026-05-26): the
      bare-in-ns smell is identical for all 4 files; SSOT is one
      entry, four marker sites.

  - name: special_form/ns_macro
    kind: special_form
    defined_in: src/eval/analyzer/special_forms.zig
    status: planned
    requires:
      - D-063
    notes: |
      JVM Clojure's `(ns foo (:require [x] [y :as a]) (:refer-clojure))`
      macro. Currently cw v1 has only the bare `(in-ns 'foo)` special
      form (ADR-0032). Lands at ADR-0035 (D-063).

  - name: clojure.core/select-keys
    kind: var
    defined_in: src/lang/clj/clojure/core.clj
    status: landed
    requires:
      - clojure.core/reduce
      - clojure.core/contains?
      - clojure.core/assoc
      - clojure.core/get
      - reader_feature/map_literal_value

  - name: clojure.core/merge
    kind: var
    defined_in: src/lang/clj/clojure/core.clj
    status: landed
    requires:
      - clojure.core/reduce
      - clojure.core/assoc
      - clojure.core/keys
      - clojure.core/get
    notes: |
      Variadic via `[& maps]` with internal arity discrimination
      (`(if (= 0 (count maps)) ...)`). The shape IS the finished
      form for "fold over N maps" — multi-arity dispatch would not
      improve clarity nor behaviour. Spike 2.3 (2026-05-26)
      re-classified from `provisional` to `landed`: the original
      framework-1.2 seed entry mis-marked this as provisional
      because the body avoids multi-arity `fn*` (D-070), but
      "avoids D-070 via finished-form-compatible alternative" is
      precisely NOT what `provisional` means.

  - name: clojure.core/set
    kind: var
    defined_in: src/lang/clj/clojure/core.clj
    status: landed
    requires:
      - clojure.core/reduce
      - clojure.core/conj
      - reader_feature/set_literal

  - name: clojure.set/join
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires:
      - clojure.core/intersection
      - clojure.core/set
      - clojure.core/keys
      - clojure.core/first
      - clojure.core/select-keys
      - clojure.core/merge
      - clojure.core/index
      - clojure.set/rename-keys
      - reader_feature/set_literal
      - reader_feature/map_literal_value
      - special_form/fn_multi_arity
      - D-070
    provisional_markers:
      - src/lang/clj/clojure/set.clj (join — 2-arity only)
    notes: |
      Ships 2-arity `[xrel yrel]` natural-join only. The 3-arity
      `[xrel yrel km]` key-map form requires multi-arity `fn*`
      dispatch (D-070). When D-070 closes, the 3-arity body lands
      and this entry's status flips to `landed`.

  - name: clojure.set/map-invert
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires:
      - clojure.core/reduce
      - clojure.core/assoc
      - D-074
    provisional_markers:
      - src/lang/clj/clojure/set.clj (map-invert — persistent reduce)
    notes: |
      JVM uses `transient!` + `reduce-kv` + `persistent!` for O(n)
      cost. cw v1 has no transient surface yet (D-074, Phase 8
      target), so the body folds with persistent `assoc` — same
      complexity asymptotically, just more allocator churn. When
      D-074 lands the body switches to the transient form and this
      entry flips to `landed`.

  - name: clojure.set/project
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires:
      - clojure.core/set
      - clojure.core/map
      - clojure.core/select-keys
      - D-075
    provisional_markers:
      - src/lang/clj/clojure/set.clj (project — drops with-meta wrap)
    notes: |
      JVM wraps the result in `(with-meta result (meta xrel))` to
      preserve metadata across the projection. cw v1 has no value-
      metadata system (D-075, Phase 7+ target), so the wrap is
      omitted. Observable divergence: callers carrying metadata
      on `xrel` lose it. When D-075 lands the wrap is added and
      this entry flips to `landed`.

  - name: clojure.set/rename
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires:
      - clojure.core/set
      - clojure.core/map
      - clojure.set/rename-keys
      - D-075
    provisional_markers:
      - src/lang/clj/clojure/set.clj (rename — drops with-meta wrap)
    notes: |
      Same as `clojure.set/project`: drops `with-meta` because
      D-075 (metadata system) is pending. Mirror divergence.

  - name: clojure.set/rename-keys
    kind: var
    defined_in: src/lang/clj/clojure/set.clj
    status: provisional
    requires:
      - clojure.core/reduce
      - clojure.core/contains?
      - clojure.core/assoc
      - clojure.core/dissoc
      - clojure.core/get
      - clojure.core/nth
      - D-076
    provisional_markers:
      - src/lang/clj/clojure/set.clj (rename-keys — nth destructure)
    notes: |
      JVM uses vector destructure inside `let`: `(fn [m [old new]]
      ...)`. cw v1 `let*` does not yet support sequential
      destructuring (D-076, Phase 7+ target), so the body uses
      `(nth kv 0)` / `(nth kv 1)` against the map-entry vector.
      When D-076 lands the body switches to destructure form and
      this entry flips to `landed`.

  - name: special_form/fn_multi_arity
    kind: special_form
    defined_in: src/eval/analyzer/special_forms.zig
    status: planned
    requires:
      - D-070
    notes: |
      `(fn* ([x] body1) ([x y] body2))` form + arity-dispatch table.
      Currently cw v1 `fn*` accepts only a single argv vector. D-070
      tracks the analyzer extension (~150 LOC).

  - name: reader_feature/set_literal
    kind: reader_feature
    defined_in: src/eval/reader.zig
    status: landed
    requires:
      - reader_feature/tokenizer_dispatch_hash

  - name: reader_feature/map_literal_value
    kind: reader_feature
    defined_in: src/eval/analyzer/analyzer.zig
    status: landed
    requires:
      - reader_feature/tokenizer_lbrace

  - name: reader_feature/tokenizer_dispatch_hash
    kind: reader_feature
    defined_in: src/eval/tokenizer.zig
    status: landed
    requires: []

  - name: reader_feature/tokenizer_lbrace
    kind: reader_feature
    defined_in: src/eval/tokenizer.zig
    status: landed
    requires: []
