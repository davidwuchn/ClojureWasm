      eventual `.host_instance` Value will route through host_class's
      hierarchy walk once D-048 lands. Today there is no way to
      produce a `.host_instance` Value (= D-048 lands the constructor
      surface), so both arms have no live consumer. When D-048 lands,
      `host_class.matches` walks `TypeDescriptor.parent` chain
      (analogous to JVM's `Class.isInstance` walk) and `class_name.
      isThrowableTag` adds `.host_instance` to the throwable carrier
      set; both markers discharge in the same commit.

