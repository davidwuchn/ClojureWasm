  - name: special_form/ns_macro
    kind: special_form
    defined_in: src/eval/analyzer/special_forms.zig
    status: landed
    requires_features: []
    requires_debts: []
    notes: |
      Landed at Phase 6.16.b-4 sub-cycle c.7 as an analyzer special
      form (NOT a macro per Devil's-advocate Alt 2 of ADR-0035 D1 —
      analyzer special form gives precise location errors + cannot
      be shadowed by user `(def ns ...)`). Sub-cycle c.7 ships bare
      `(ns foo)` + `(:refer-clojure)` (no filter); the four
      bootstrap `.clj` heads use this shape from sub-cycle d.
      `:require` / `:exclude` / `:only` / `:use` directives inside
      ns body raise transient `feature_not_supported` (deferred
      within ADR-0035 follow-up scope; users compose with separate
      `(require ...)` calls today).

      At Phase 7 entry T3 (ADR-0035 D9 second amendment,
      2026-05-26) the cw v1 `(:refer-clojure)` semantic was
      widened to refer BOTH `clojure.core` AND `rt` (cw-specific
      divergence from JVM which has no `rt` ns). VM compile arm
      `compileNs` now emits the new opcode `op_ns_with_refer_clojure`
      when `refer_clojure = true` (sibling to bare `op_in_ns`);
      tree_walk `evalNs` fires both refers in the same condition.
      The widening replaces the prior `evalInNs` / `op_in_ns`
      auto-refer convenience (now removed) as the single source
      of refer installation for any non-bootstrap-fan-out ns.

