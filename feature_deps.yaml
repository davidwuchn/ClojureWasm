    provisional_markers: []
    notes: |
      Row 7.11 cycles 1+2+3 (2026-05-27) discharged this entry. Cycle 1
      landed `src/runtime/error/host_class.zig` (17-entry Throwable
      hierarchy + `isKnownException` / `getParent` / `isSubclassOf` +
