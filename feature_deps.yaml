      `runtime/error/catch_class_host_instance_arm` entry.

  - name: runtime/error/catch_class_host_instance_arm
    kind: runtime_layer
    defined_in: src/runtime/error/host_class.zig
    status: provisional
    requires_features: []
    requires_debts:
      - D-048
    provisional_markers:
      - src/runtime/error/host_class.zig (matches — host_instance arm returns false)
    notes: |
      `host_class.matches` returns false defensively when
      `thrown.tag() == .host_instance`. Today there is no way to
      produce a `.host_instance` Value (= host-class wire-up D-048
      lands the constructor surface), so the arm has no live
      consumer. When D-048 lands, the arm walks
      `TypeDescriptor.parent` chain (analogous to JVM's
      `Class.isInstance` walk) and the marker discharges. Split from
      the cycle 3 close of `runtime/eval/catch_class_table` so that
      entry could land cleanly without bundling the unrelated D-048
      wait.

  - name: runtime/vm/dispatch_family
    kind: runtime_layer
    defined_in: src/eval/backend/vm/compiler.zig
    status: provisional
    requires_features: []
    requires_debts:
      - D-073
    provisional_markers:
      - src/eval/backend/vm/compiler.zig (compileNode deftype_node arm — VM-DEFER pending row 7.6)
      - src/eval/backend/vm/compiler.zig (compileNode ctor_call_node arm — VM-DEFER pending row 7.6)
      - src/eval/backend/vm/compiler.zig (compileNode field_access_node arm — VM-DEFER pending row 7.6)
    notes: |
      VM compiler arms for the deftype-family Nodes (`deftype_node`
      / `ctor_call_node` / `field_access_node`) ship as
      `return error.NotImplemented` with VM-DEFER markers per
      ADR-0036. Tree_walk handles these Nodes today; VM mode raises
      `error.NotImplemented` (transient stub, not silent fake).
      The bytecode shape for the entire dispatch family (deftype +
      ctor + field-access + future method-call) is owned by
      ROADMAP §9.9 row 7.6 (MethodCallNode landing). Row 7.6 will
      decide the operand encoding (e.g., `op_ctor_call <type_idx>
      <arg_count>` + `op_field_access <field_idx>` vs a generic
      `op_invoke_protocol_method` sequence over the Phase 7.1
      `CallSite` cache) and discharge all 3 markers in the same
      commit. Landing throwaway VM lowering now would be the
      Smallest-diff bias smell since the chosen shape is not yet
      finished-form.

