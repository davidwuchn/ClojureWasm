# placement.yaml — Clojure-ns var placement SSOT
#
# Per v5 §15 (private/notes/clj_vs_zig_split_proposal_v5.md):
#   - Clojure-ns vars の placement (Pattern A/B + status + dependencies)
#   - compat_tiers.yaml と役割分担 (compat_tiers.yaml = Java + cljw surface)
#
# Schema (per v5 §15.2 + App D):
#   schema_version: ADR-0033 起票時 "1.0" 固定 start、 amendment で incr
#     自動検知: 完成形 (Phase 14 v0.1.0 release 近辺) で
#     scripts/check_placement_schema.sh を着地予定 — schema 変更を
#     Git diff で検知して gate fail させる仕組み。 開発期間中 (Phase 6-13)
#     は schema が頻繁に変わるため手動管理、 ADR-0033 amendment ログで追跡
#
#   vars:
#     <fqn>:
#       pattern: A | B1 | B2 | C-thin | C-zig
#         A      — Layer 3 .clj defn (composition)
#         B1     — Layer 2 .zig 直 intern、 .clj 不在
#         B2     — Layer 2 .zig -name leaf + Layer 3 1-line shim defn
#         C-thin — .clj で 1-2 条件分岐 + leaf 呼出
#         C-zig  — Layer 2 全実装 (B1 同形、 multi-arity 複雑 / hot path)
#       status: transient_zig | ready_for_migration | stable | migrated
#         transient_zig       — Zig 直書きだが Pattern A/B2 化予定
#         ready_for_migration — composition_deps 全 registered、 .clj 化 ready
#         stable              — 最終形 (Pattern B1 等で Zig が最終形)
#         migrated            — transient_zig から .clj 化済
#       leaf_deps: [<-name leaf> ...]            # Zig 側 leaf 依存
#       composition_deps: [<fqn-or-short> ...]   # 他の user-callable Clojure var 依存
#       target_loc: src/lang/clj/clojure/<ns>.clj  # .clj 着地先 (Pattern A/B2/C-thin の場合)
#       leaf_loc: src/lang/primitive/<file>.zig    # Zig leaf 着地先 (Pattern B*/C-zig の場合)
#       upstream_ref: src/clj/clojure/<ns>.clj#L<n>   # path within the Clojure JVM repo
#       recall_trigger: "<phase or cycle 完了> trigger"
#       notes: "free-form"
#
# Used by:
#   - scripts/check_placement_status.sh (audit + status flip suggestion)
#   - cljw --list-vars (Phase 14+)
#   - ADR-0033 amendment history reference
#   - scripts/analyze_clojure_upstream.bb (Babashka generator for initial yaml)
#   - scripts/gen_placement_yaml.bb (Babashka yaml generator from analysis edn)

schema_version: "1.0"

